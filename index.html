{id:'S27-67_urte',cod:'S27',nom:'Trabajo en equipo',nom_es:'Trabajo en equipo',adina:'6-7 urte',inst:'Nata 2',pto:'Sentados/as en la grada',materiala:['12 churros largos','12 aros','12 picas azules'],arranque:'Preguntamos a los/las niños/as a ver cuántos tipos de saltos conocen. Y saltaremos intentando hacer diferentes saltos. Si es necesario se podrán juntar los/las niños/as.\nPodemos saltar también de 1 en 1, luego de 2 en 2 así hasta la totalidad del grupo.',intencionada:'Por parejas: Cada pareja con un churro tienen que ir medio largo, hacia delante, mirando para arriba, de caballito cambiando las posiciones delante - atrás. Acaban juntándose todos los caballitos haciendo una sola fila (tren).\nCada pareja con un aro agarrado con una mano y al de medio largo cambian de sentido y de mano.\nVamos complicando el mismo ejercicio a tríos, cuartetos o según el nivel todo el grupo, unidos entre ellos con los aros\nPor parejas de nuevo tendrán que nadar crol coordinándose para mirarse el uno al otro. Cuando sacan la cabeza para respirar tendrán que verse.\nDespués jugaremos a imitarnos, uno nadara por delante y el compañero deberá seguirlo haciendo el mismo recorrido, Para enriquecer las posibilidades podemos meter aros y otro material que consideremos.\nDespués podemos hacer grupos más grandes e ir cambiando al que deben imitar el resto.',reflexion:'Trabajo en equipo'},
{id:'S28-67_urte',cod:'S28',nom:'Saioa S28',nom_es:'Saioa S28',adina:'6-7 urte',inst:'Nata 2',pto:'Salida del circuito',materiala:['2 aros lastrados grandes','1 alfombra','1 tapiz','12 pull buoy'],arranque:'Los/las niños/as se desplazarán hasta la mitad un par de largos de calentamiento, y demostrar a los/las familiares que han venido cómo se desplazan los/as niños/as.',intencionada:'Saldrán por el tapiz donde deberán de mantener el equilibrio, se desplazarán hacia el tapiz que se encuentra al lado de la segunda escalera, donde tendrán un montón de material (pull buoys) y los sacarán de diferentes maneras fuera de la piscina, de uno en uno.\nPodremos complicar un poco más realizando inversiones y pasando por entre los aros lastrados, y cambiando la forma de desplazamiento.',reflexion:'Día conjunto monitor/familia/niño/a'},
{id:'S30-67_urte',cod:'S30',nom:'GURE EGUNA',nom_es:'GURE EGUNA',adina:'6-7 urte',inst:'NATA 2',pto:'',materiala:['Reloj plastificado','fichas de buceo','fichas alimentos'],arranque:'Preguntaos si les cuesta levantarse a las mañanas. Para terminar de espabilarnos hacemos unos saltos para “espabilarnos”.',intencionada:'1: “Ze ordutan gozaltzen duzue?”\nPondremos en el reloj la hora en la que más o menos desayunan. Será el número de largos que tengan que nadar como el monitor indique.',reflexion:''},
{id:'S31-67_urte',cod:'S31',nom:'Matemáticas acuáticas',nom_es:'Matemáticas acuáticas',adina:'6-7 urte',inst:'Nata 2',pto:'Sentados/as en la grada',materiala:['hoja de matemáticas','fichas con números redondas'],arranque:'Llevamos a los niños al lado de la escalera de la mitad del nata 2. Allí (con cuidado de no pasar a la otra calle tiraran todas las fichas redondas con números a la piscina). Pedimos que se tiren y naden hasta el otro lado de nuestra zona.',intencionada:'Damos a los niños a elegir las fichas de matemáticas (tienen un dibujo de un animal para que distingan cual es la de cada uno). Coloca cada uno su ficha sobre el muro.\nDeberán rellenar la hoja desplazándose hasta donde están las fichas cogiendo una del fondo y volviendo para colocarla. La hoja tiene 2 caras y puede que algún niño necesite ayuda para realizar-entender bien la cuenta o coger la ficha del fondo. Tendrá que pedir ayuda al monitor o algún compañero.\n(Podemos poner condiciones de como nadar si es un número par/impar o menor/mayor de x)\nCuando vayan terminando corregimos la ficha con ellos y pedimos que ayuden a algún compañero.\nCuando todos acaben tendrán que recoger las fichas que quedan y ordenarlas por números.',reflexion:''},
{id:'S32-67_urte',cod:'S32',nom:'DESIERTO',nom_es:'DESIERTO',adina:'6-7 urte',inst:'NATA2',pto:'Sentados/as en el muro fuera del agua.',materiala:['12 churros','1 balón','aros','perlas','ficha escorpión','camellos/dromedarios'],arranque:'Los alumnos se pondrán en el borde de la piscina preparados para saltar y golpear un balón que les lanzara el monitor desde el otro extremo.\nDespués deberán recoger el balón y devolverlo para que el/la siguiente realice la misma acción. Varias veces.',intencionada:'El mundo del desierto:\nDeberemos desplazarnos como nómadas o tuaregs de diferentes modos montados en nuestros camellos (churros):\nSentados remando con una mano, después cambiamos la mano. Con las dos manos (brazos de Braza), Brazos a los lados (a la vez y simultáneos etc...).\nHemos llegado a nuestro Oasis… Tiempo para descansar…Nos desplazamos tumbados de espalda con el churro de almohada, pero sin dormirnos, pies de crol y sin sacar las manos del agua.\nSeguimos descansando. Esta vez el churro lo pasamos debajo de las rodillas y seguimos tumbados boca arriba, Nos desplazamos únicamente con los brazos. (Los que tienen miedo, podrán utilizar dos churros, debajo de las rodillas y de las axilas).\nDespués de un gran descanso debemos abastecernos de provisiones y de agua, deberemos sacar del fondo de la piscina aros pequeños, los/las que no realizan las inversiones serán los/las encargados de desplazar los alimentos cuando los/las compañeros/as los sacan.\nEl juego del escorpión: Uno se la queda y los/las demás escapan hasta que toca a un compañero que pasa a ser el escorpión así sucesivamente. Todos/as huyen del escorpión porque es uno de los animales más peligrosos del desierto. ¿Lo conocen?',reflexion:'Iniciación a la técnica jugando, trabajo en equipo, conocimiento del desierto y su hábitat.'},
{id:'S33-67_urte',cod:'S33',nom:'Saioa S33',nom_es:'Saioa S33',adina:'6-7 urte',inst:'Nata 2',pto:'Escalón',materiala:['2 bases de puente','24 vasos','24 aros','12 figuras flotantes','36 números sumergibles','12 tablas'],arranque:'1-2-3 calabin calavera*: desde la mitad de la piscina, hasta el bordillo (Cristalera)',intencionada:'LOS NIÑOS MIRARAN LA SECUENCIA HECHA POR EL MONITOR. SE PUEDEN METER LOS VASOS DENTRO DE LOS VASOS, LOS NUMEROS ENCIMA, LAS FIGURAS DENTRO DEL VASO,…. (SUJERENCIAS)\nEl resto del material lo colocaremos al lado de la escalera central.\nCada niño cojera una ficha de las de la caja mágica de Jon y la colocara en un hueco. Ese será su sitio durante toda la sesión.\nDeberán, en cada vuelta coger una cosa por vuelta, solo una!!! Y en cada vuelta intentaremos meter técnica de crol/braza',reflexion:''},
{id:'S34-67_urte',cod:'S34',nom:'Hondartzara txangoa',nom_es:'Hondartzara txangoa',adina:'6-7 urte',inst:'Piscina nata 2',pto:'',materiala:['12 tablas medianas','12 colchonetas individuales','fichas sumergibles','12 cubos','rastrillos','palas (objetos de playa)'],arranque:'Preparemos las cosas para ir a la playa, lo primero es preparar la mochila, una tabla será la mochila, echamos todas las tablas al agua, los/las niños/as saltan al agua y cogerán una tabla para desplazarse con la tabla ida y vuelta y dejamos la tabla en el muro fuera.\nTenemos colocados los objetos de playa al lado de la 2ª escalera.\nPreguntamos a los/las niños/as que se necesita llevar a la playa, p r ejemplo: (Toalla, crema, sombrilla, chanclas, juguetes), iremos nadando hasta la mitad y volveremos con algo y lo colocaremos en la tabla.',intencionada:'Cuando tengamos todo lo que necesitamos para ir a la playa, cogeremos la tabla y haremos 4 largos para llegar a la playa.\nHondartzan gaude! En la playa ¿Qué podemos hacer?, jugaremos en el agua, nos tiramos de cabeza, les enseñamos a los/las niños/as la entrada al agua de cabeza.\n¡A tomar el sol!, les daremos a cada niño una colchoneta individual y tomaremos el sol, (intentaremos desplazarnos boca arriba y boca abajo encima de la colchoneta).\n¡Recogeremos txirlas! tiraremos fichas al fondo de la piscina y las cogeremos y las dejaremos dentro del cubo que tenga cada uno/a.',reflexion:'Trabajo variado en diferentes formas de desplazamiento.'},
{id:'S35-67_urte',cod:'S35',nom:'Al restaurante',nom_es:'Al restaurante',adina:'6-7 urte',inst:'Nata 2',pto:'Sentados/as en la grada',materiala:['tapiz amarillo (olla a presión)','lentejas (figuras flotantes','la caja entera)','verdura (aros','figuras sumergibles)','chorizo (12 picas sumergibles)','12 tablas (platos)'],arranque:'',intencionada:'Vamos a preparar la comida para servirla en nuestro restaurante. Hoy seremos cocineros!!!!!!!!\nMENU: Lentejas con verdura y chorizo\nCogemos de uno en uno el material de fuera y lo vamos llevando a la cazuela que estará en la segunda escalera, fuera.\nCuando tengamos preparada la comida la serviremos. Cada uno/a cogerá una tabla y colocara una ración de lentejas y la llevara a hasta la grada.\nSin salir del agua!!!! Al llevar el material nadaran como quieran, la vuelta sin material será con técnica de crol, espalda y braza.',reflexion:''},
{id:'S36-67_urte',cod:'S36',nom:'Tres en raya',nom_es:'Tres en raya',adina:'6-7 urte',inst:'Nata 2',pto:'Junto a la grada',materiala:['12 churros','fichas de colores redondas'],arranque:'Preguntamos cuales de los niños saben jugar al tres en raya. El que sepa explica cómo se juega y el monitor aclara dudas. Luego hacemos unos saltos de tres en tres.',intencionada:'Colocamos cuatro churros, dos y dos, haciendo el tablero del 3 en raya. Para luego jugar con las fichas de colores, cada jugador con un color.\nPonemos a los niños por parejas, si tenemos impar o alguno no sabe bien como jugar hacemos algún trio.\nPara poder poner ficha deberán realizar un desplazamiento desde la zona de la grada hasta la escalera del medio. Se respetarán los turnos del tres en raya, aunque uno de los niños realice el desplazamiento en menos tiempo.\nDespués de 2-3 partidas cambiamos las parejas y seguimos jugando.\nPodemos usar el dado con diferentes tipos de desplazamiento si lo vemos correcto o el monitor puede ir indicando el tipo de desplazamiento que se debe realizar.',reflexion:''},
{id:'S37-67_urte',cod:'S37',nom:'Saioa S37',nom_es:'Saioa S37',adina:'6-7 urte',inst:'Nata 2',pto:'Nata 2-ko harmailan',materiala:['Durangoko argazkiak'],arranque:'Banaka, binaka hirunaka.... saltoak egingo dituzte igerileku erdirainoko joan etorriak eginez. Igerian nahi duten bezala egingo dituzte Joan etorriak. Saltoak egin baino lehen Durangoko toki bat aipatu beharko dute.',intencionada:'Begiraleak aldi bakoitzean argazki desberdin batera utziko die, ia leku hori non dagoen dakiten galdetuz. Argazki bakoitzarekin luzera bat egingo dute begiraleak esandako estilo eta eran. Argazki guztiak egin eta gero beraiek esan beharko diete begiraleari non dagoen argazkian agertzen den irudia eta zein estilotan egingo duten igerian.\nSanta Anako arkupea\nTabirako igerilekuak\nLandako 2 kiroldegia\nLandako 2ko igerilekuak\nSanta Maria elizpea\nEzkurdi parkea\nBalbino Garitaonandia plaza\nUdaletxea\n“Zezenak dira” monumentua\nKurutziaga',reflexion:'HOBETU BEHARREKOA'},
{id:'S38-67_urte',cod:'S38',nom:'Saioa S38',nom_es:'Saioa S38',adina:'6-7 urte',inst:'NATA2',pto:'',materiala:['Zakarrontzi desberdinen argazkiak','(Karpeta 39)'],arranque:'Argazkiak horman jarriko ditugu, batetik bestera 1,5mko distantzia utziz, azalpenak emango ditugu galderak egiten, kolore bakoitzeko zakarrontzian zer botatzen den galdetuz. 1.argazkiaren aurrean jarriko gara. Adibidez: kontenedore berdearen aurrean eta kontenedore honetara bota al diren gauzak izendatuko ditugu uretara salto egiten duten heinean. Hurrengo argazkiekin berdin egingo dogu.',intencionada:'4 kontenedore egongo dira eta bakoitza estilo batekin erlazionatuko dugu.\nKontenedore urdina: krol estiloa\nKontenedore berdea: bizkarrez\nKontenedore horia: bular estiloa\nKontenedore marroia ( organikoa): nahi duten estiloa.\nAdibidez:\nBegiraleak papera esaten badu denak krol estiloan egin beharko dute igerian.',reflexion:'Zerbait ikasi dugu? Etxean birziklatzen dugu? edo birziklatzen hasiko gara?\nHOBETZEKO GAUZAK'},
{id:'S39-67_urte',cod:'S39',nom:'Inhauteriak',nom_es:'Inhauteriak',adina:'6-7 urte',inst:'Nata2',pto:'Sentados/as fuera en la grada',materiala:['Mascaras de carnavales (x12)','1 tapiz','carteles de hegaztiak','lurreko animaliak','uretako animaliak'],arranque:'Contamos como el carnaval combina elementos tales como disfraces, grupos que cantan coplas, desfiles y fiestas en la calle, el carnaval es un desfile en que los participantes vestían disfraces y usaban máscaras.\nEn este caso, repartimos una máscara a cada niño/a, se las pondrán, y tendrán que desplazarse 4 veces hasta la mitad por el agua sin meter la cabeza, de la forma que lo harían los animales.',intencionada:'Una vez que cada niño/a sabe que animal tiene que interpretar, tendrán que hacer lo siguiente con cada uno:\nEntre todos/as tienen que decir 1º el nombre de cada animal, las características de cada animal, de qué tipo es, sus características (si vuela o no), que sonidos hacen, que tamaño tienen, dónde viven, qué comen,…, y por cada animal tendrán que decir por lo menos 4 cosas entre todos/as, y nadar 1 vez hasta la mitad salir y volver andando por cada cosa que digan.',reflexion:'Conocer las características de los mamíferos, aves y peces.\nClasificar los animales según sean mamíferos, aves o peces.\nConocer y utilizar el vocabulario básico sobre animales.\nConocimiento y discriminación de animales según sean mamíferos, aves o peces.'},
{id:'S40-67_urte',cod:'S40',nom:'atrevidos',nom_es:'atrevidos',adina:'6-7 urte',inst:'Nata 2',pto:'',materiala:['Tapiz','churros','aros sumergibles','(uno por cada niño)','tablas'],arranque:'Uno de los primeros pasos para vencer al miedo, es reconocerlo, por eso hoy vamos a hablar con los niños, sobre que les da miedo en la piscina.\n¿Saltar?, ¿hundirse?, ¿no tocar el suelo?, meter la cara en el agua?\nTodos tenemos miedo a algo, es normal tener miedo, por eso no nos tenemos que burlar de alguien que tiene miedo “es un miedica”, porque es muy cruel.\nHoy vamos a intentar vencer el miedo a las cosas que hemos nombrado, por ejemplo, si nos da miedo saltar, saltaremos con ayuda del monitor o con ayuda de un amigo, si nos da miedo no tocar el suelo, intentaremos hundirnos hasta tocar con los pies el suelo.\nHoy seremos una cuadrilla de “atrevidos”',intencionada:'“La máquina come miedos”, Vamos a crear la maquina come miedos, para ello, cada uno con un churro ira nadando como diga el monitor, luego dejaran los churros encima del tapiz, y cogerán la tabla y nadarán como indique el monitor, y dejarán las tablas encima del tapiz, luego tirarán los aros sumergibles uno por cada niño y los recogerán y los dejarán encima del tapiz, con ese material construirán la maquina come miedos.\nTal vez luego les gustaría salir a navegar en la máquina',reflexion:'¿Cómo nos hemos sentido intentando vencer nuestros miedos en la piscina?'},
{id:'S41-67_urte',cod:'S41',nom:'LA SALUD Y LOS ALIMENTOS, QUE COMEMOS Y LA COMIDA SALUDABLE',nom_es:'LA SALUD Y LOS ALIMENTOS, QUE COMEMOS Y LA COMIDA SALUDABLE',adina:'6-7 urte',inst:'Nata 2',pto:'Sentados/as en la grada',materiala:['Fotos plastificadas de comidas','tipos de reinos','2 tapices'],arranque:'“Saltos de las frutas”\nSi el profesor dice “plátano”, saltamos “palillo”, si el profesor dice “manzana” saltamos “bomba”, y si dice “kiwi”, saltamos “de cabeza”.',intencionada:'“MASTERCHEF”\nNos vamos a convertir en chef y vamos a cocinar cuatro platos muy ricos. Lentejas, plato combinado, una ensalada de frutas y un bizcocho. En la mitad de la piscina pegada al tapiz estará la foto del plato que queremos lograr, y en nuestro punto de encuentro estarán los ingredientes, los niños tendrán que coger los ingredientes de en uno, desplazarse y colocarlo debajo del plato correspondiente.\n¿Ordenamos los ingredientes de acuerdo al reino al que pertenecen?\nEn nuestro punto de encuentro, tenemos otro tapiz apoyado en la pared, para dividir los alimentos, según su procedencia, hablamos brevemente de los reinos que conocemos: reino animal, reino vegetal y reino mineral, seguidamente les proponemos ordenar los alimentos según al reino al que pertenecen.\nRecogemos entre todas/os las fichas en el tapiz para el siguiente grupo.',reflexion:'Hablamos de los alimentos que a ellos les gusta y de los que creen que son saludables.'},
{id:'S42-67_urte',cod:'S42',nom:'NUESTRO ENTORNO: Durangaldeko herriak',nom_es:'NUESTRO ENTORNO: Durangaldeko herriak',adina:'6-7 urte',inst:'Nata 2',pto:'Sentados/as en el muro fuera del agua',materiala:['14 cubos de agua','12 vasos','12 churros amarillos pequeños','12 tablas pequeñas'],arranque:'Primero tendrán que ir sentados/as en el churro y con la tabla en las manos, sólo mover las piernas como la bicicleta. Dos veces hasta la mitad y vuelta. Después echaremos los vasos al agua y después cada alumno/a debe coger uno y llevarlo encima de la tabla hasta la mitad y volver.',intencionada:'¿Conocemos los pueblos de alrededor? Para ello deberan rellenar los cubos (que tendrán los pueblos pegados) con los vasos de agua, entre todos/as. Estarán en las rejillas. Procuraremos que los/las niños/as no salgan del agua. Los desplazamientos serán hasta la mitad de la piscina y vuelta.\nLos desplazamientos serán de distintas maneras:\nTÉCNICA de ESTILOS: con churro (caballito: BRAZOS/MANOS BRAZA), con tabla (crol: brazos, pies, pies + brazos), camarero (tabla + churro + vaso).',reflexion:'Conocer entre todos/as los pueblos cercanos a donde vivimos.'},
{id:'S43-67_urte',cod:'S43',nom:'Entorno: ríos',nom_es:'Entorno: ríos',adina:'6-7 urte',inst:'NATA2',pto:'Sentados/as en la grada',materiala:['Tablas','algas','txurros'],arranque:'En la piscina NATA2 hablamos de los ríos, ¿dónde nacen y dónde mueren? ¿Cómo se forman los ríos? ¿De dónde sale el agua que forma los ríos? ¿Cuál es la importancia que tienen los ríos en nuestra vida? ¿Qué peligros existen en los ríos? ¿Por qué debemos tener cuidado cerca de los ríos? ¿Qué ríos pasan por Durango?',intencionada:'Al lado de este edificio en el rio Ibaizabal tenemos una presa. ¿Para qué se usaban estas presas? Estas eran muy importantes hace unos años. Se podían usar para canalizar agua para mover un molino donde se molía el grano de cereal para poder hacer harina. También fueron usados para crear electricidad e incluso para canalizar agua para regadíos. Explicamos con unas imágenes como funciona un molino.\nConstruimos el molino',reflexion:''},
{id:'S44-67_urte',cod:'S44',nom:'Deportes acuáticos: aquarunning y relevos',nom_es:'Deportes acuáticos: aquarunning y relevos',adina:'6-7 urte',inst:'NATA2',pto:'Sentados/as en el muro de fuera',materiala:['12 cinturones de aquagym','2 vasos','2 cubos'],arranque:'Ponemos un cinturón a cada alumno/a, ajustándoselo bien apretado. Les explicamos la técnica de correr: punta-talón. Estirar la pierna hacia adelante, llevándola estirada hacia atrás, y doblar la rodilla elevando el talón por atrás.\nHacen hasta la mitad de la piscina y vuelven por el agua.\nHacemos la clase como en aquagym en piscina profunda, con desplazamientos variados:\nCon los brazos uno a uno dentro del agua, como corriendo.\nCon los dos brazos estirados delante, y sólo piernas.\nCon solo un brazo quieto estirado delante, y el otro moviendo. Cambiar de brazo\nCon las dos manos encima de la cabeza.\n…',intencionada:'Carrera de relevo acuática\nSe dividen los/las niños/as en dos grupos colocados en fila, el objetivo del juego es que cada grupo logre llenar un cubo con el agua que han transportado por dentro del agua. Se desplazan hasta la mitad por el agua, salen por la escalera, y vuelven por fuera hasta el cubo, Al vaciar el vaso, sale el/la siguiente participante.',reflexion:'Inicio al aquarunning y actividad en equipo en los relevos.'},
{id:'S45-67_urte',cod:'S45',nom:'LARRIALDIAK',nom_es:'LARRIALDIAK',adina:'6-7 urte',inst:'Nata 2',pto:'Harmailen aldea',materiala:['12 taula','zulodun 12 tapiz','6 txurro luzeak eta 6 konektore'],arranque:'Uretara sartzeko modu desberdinak frogatuko ditugu. Bitartean, SOROSLEEN SALTOA ere egingo dugu (burua urperatu gabe geldituz).',intencionada:'Gaurkoan Igerilekuko sorosle ausartak izango gara!\nBihotz taupadak sentitu. Bihotzean/lepoan. Azkar doaz? Astiro?\nDesplazamendu desberdinak:\n- Igerian burua kanpoan, krol, bizkar...\n- Arrastreak: mamuekin edo zulodun tapizekin.\nBenetako froga. Bikoteka; bat soroslea eta bestea biktima. Biktimak erdian laguntza eskatuko du, soroslea berarengana joan eta elkargunerarte eramateko gai izango al da?. (Aukeran; laguntza eskatzen dagoena txurro batekin egon ahal da)\nFlotagailuekin laguntzen: Txurro luzeak eta konektoreak elkar-lotuta, flotagailu bat moduan erabiliko dituzte. Bikoteka, batek uretatik laguntza eskatuko dio, eta bestea soroslea izanda, bere bila joango da flotagailuarekin, eta lagunduko du ertzeraino heltzen. Gero aldatuko dituzte funtzioak.\nFlotabilitateko ariketak lasaitasunera itzuliz: izarra gora ta behera begira, bola,bola+izarra...',reflexion:'Une ezberdinetan bihotz taupadak nabaritzeko aukera izan dezakegu. Zer dio gure bihotzak? Arin doa? Lasai?\nHOBETZEKO'},
{id:'S47-67_urte',cod:'S47',nom:'Durangoko Oka!!!',nom_es:'Durangoko Oka!!!',adina:'6-7 urte',inst:'Nata 2',pto:'Sentados/as en la grada',materiala:['Dado números','dado estilos','tablero de la oca','fichas avatares','1 mesa'],arranque:'Salto desberdinak beroketa moduan begiralearen ardurapean.',intencionada:'Bikoteka jarriko gara. Taldea egoki ikusi ezkero banaka.\nFitxa aukeratuko dugu lehenengo.\nOkaren jolasa, mahaiaren gainean egongo da. Zenbakien dadoa botako dute lehengo, beraien fitxa mugitzeko eta igeriketa estiloen dadoa bigarren, zelan joan behar diren jakiteko.\nIgerian buelta bat egin beharko dute dadoa berriro bota ahal izateko. Erortzen diren laukiaren irudia zer den jakiten saiatu beharko dira.\nGainontzean Oka-ren arauak jarraitu.\n+ Klasea pentsatu baino arinago bukatuz gero, Oka-ri beste buelta bat emango diogu, baina oraingoan kontrako noranzkoan.',reflexion:'Trabajo de diferentes estilos de natación y conocimiento de lugares de Durango mediante el juego de la oca.'},
{id:'S48-67_urte',cod:'S48',nom:'Tartaloren etxea',nom_es:'Tartaloren etxea',adina:'6-7 urte',inst:'Nata 2',pto:'Sentados/as en la grada',materiala:['12 pull-boys','12 tablas pequeñas','aros sumergibles (alrededor del aro grande)','aro grande lastrado con pesa (ojo de TARTALO)'],arranque:'Juego libre 5´',intencionada:'Vamos a hacerle a Tartalo una casa. Para ello usaremos tablas pequeñas, pull-boys.\nPodemos hacer la casa en horizontal (en el muro) o en vertical (podemos apoyar contra la pared)\nEn cada vuelta, cambiando de estilo, meter algo de técnica utilizando tabla, pull,…\nProcuraremos, de vez en cuando pasar por el aro, lo que simulara en ojo de Tartalo. Cada vez que pasemos cogeremos un aro, que estarán alrededor del aro lastrado.',reflexion:''},
{id:'S49-67_urte',cod:'S49',nom:'Las estaciones/épocas del año',nom_es:'Las estaciones/épocas del año',adina:'6-7 urte',inst:'Nata 2',pto:'Sentados/as en el muro fuera del agua',materiala:['fichas sumergibles números','24 churros','12 churros finos amarillos','aro amarillo grande','2 tapices','12 tabla azul grande','24 tablas pequeñas'],arranque:'En el borde de la piscina haremos saltos pero estos dependerán de la estación del año en la que sucedan los hechos que nosotros vamos diciendo.\nEjemplo:\nInvierno: salto de bomba\nPrimavera: saltar y nadar hasta la corchera\nVerano: saltar de cabeza (el que no sepa de palo)\nOtoño: salto con las manos encima de la cabeza',intencionada:'En un lado de la piscina sobre el tapiz tenemos una tabla grande, 2 pequeñas, 2 churros, 2 picas redondas (tipo moneda) y un aro grande.\nCon todo esto deberemos hacer una representación de lo que sucede a un campo con un árbol durante el año.\nEn la otra esquina de nuestra zona sobre otro tapiz iremos llevando los diferentes elementos que necesitaremos para representar la escena.\nPrimero será inviernos y llevaremos las tablas grandes y los churros.\nCon las tablas grandes haremos el suelo y de allí saldrá un árbol con varios churros formaremos el tronco y con otros las ramas. Cuando tengamos esto completado explicamos como en invierno los arboles no tienen hojas y no hay flores en el campo.\nDespués llega la primavera y empiezan a salir las hojas en el árbol y las flores en el suelo.(tablas pequeñas y picas redondas) Transportaran estos para crear la segunda escena.\nPara representar el sol del verano llevara un aro grande amarillo y unos churros finos amarillos.\nPor último llega otoño y se caen las hojas del árbol. Retiramos las flores y en cada vuelta tiraran una de las hojas para terminar con la 4ª escena.\nPara terminar repetiremos el juego de los saltos sin volver a explicar cuál era el salto que tienen que hacer con cada evento que digamos con el objetivo de que trabajen la memoria.',reflexion:'Trabajamos el conocimiento de la estación y la rapidez a nivel cognitivo.'},
{id:'S50-67_urte',cod:'S50',nom:'SENTIMENDUAK LANTZEN',nom_es:'SENTIMENDUAK LANTZEN',adina:'6-7 urte',inst:'Nata2',pto:'Sentados/as en el muro fuera del agua',materiala:['Fichas de sentimientos','fichas de ‘gutxitan-batzutan-askotan’','2 tapiz pequeños','1 tapiz grande'],arranque:'Realizaran una serie de saltos en fila y desplazamiento hasta la mitad. Cada uno/a saltará como quiera. Antes de cada salto, cada niño/a dirá un sentimiento. Así seguiremos hasta que no se les ocurra ninguno más.',intencionada:'Tendremos un tapiz pequeño encima del muro de la piscina y el otro tapiz enfrente de la segunda escalera con las fichas de los sentimientos boca abajo.\nLos/las alumnos/as deben realizar el trayecto de ida y vuelta por el agua, desplazándose como quieran y trayendo una ficha en la mano cada vez.\nCuando traigan las fichas, deberán dejarlas en el tapiz que esta encima del muro y las clasificarán por tipo de sentimiento.\nCada uno/a deberá decir cómo se suelen sentir normalmente y porqué.\nTendremos preparado en el tapiz grande junto a la pared más cercana, las palabras ‘Gutxitan – batzutan - askotan’, separadas entre sí.\nAhora deberán coger una ficha con la que ellos/as se sientan identificados se desplazarán hasta la segunda escalera y volverán andando por fuera y colocarán la ficha debajo del cartel que vean adecuado.\nAl final, entre todos/as comentamos cuando se sienten de una manera determinada y si sabrían explicarlo.',reflexion:'Conocimiento de los sentimientos y comentar brevemente su explicación.'},
{id:'S51-67_urte',cod:'S51',nom:'JUEGO CON MIS SENTIDOS: LA VISTA',nom_es:'JUEGO CON MIS SENTIDOS: LA VISTA',adina:'6-7 urte',inst:'Nata 2',pto:'Sentados/as la grada.',materiala:['Tarjetas de memoria (color + palabra)','fichas sumergibles','cuerda con ventosa','1-2 aros grandes sumergibles'],arranque:'“¿NOS FUNCIONA LA MEMORIA?”\nRealizaremos diferentes saltos para después nadar hasta la corchera y volver. En cada salto les enseñaremos una “tarjeta de memoria” que tendrán que recordarla al salir. Además de la última tarjeta tendrán que recordar también las anteriores. ¿Cuántas somos capaces de memorizar?\nDependerá del grupo el nº de tarjetas y como utilizarlas (solo color/color+palabra)',intencionada:'Juego “CONTAR FICHAS”\nColocaremos las fichas dentro del agua en el fondo, alguna encima de la mesa. Contamos las que hay de cada color.\nEn cada vuelta iremos nadando por la cuerda intentando pasar también por el aro. Vuelven desplazándose boca arriba. Al llegar a la zona de la mesa nos sumergiremos para poder observar la ficha y detectar cuantas fichas hay del color que nosotros/as les digamos.\nVamos a por otra vuelta.\nE\nCuando acabemos podemos poner en común si coincidimos o no en las cosas que hemos encontrado.',reflexion:'Buceo\nVista\nMemoria\nSaltos\nDivertido'},
{id:'S53-67_urte',cod:'S53',nom:'EDUCACIÓN VIAL',nom_es:'EDUCACIÓN VIAL',adina:'6-7 urte',inst:'Nata2',pto:'Sentados/as en la grada',materiala:['12 Picas azules','12 churros largos','plantilla tráfico 6-7 años','fichas de tráfico de 6-7 años','semáforo','2 tapices pequeños','5 algas','1 mancuerna de aquagym con una goma','una pesa'],arranque:'Cada alumno/a con una pica y un churro, hará 4 ida/vuelta hasta la mitad, en modo bicicleta, con los brazos estirados y moviendo sólo las piernas. Les decimos, que en bicicleta también hay que utilizar casco, y seguirán las normas de circulación: irán por la derecha, y para adelantar por la izquierda.',intencionada:'Dividimos el hueco de la piscina en dos, con las algas haciendo de raya de carril, al final ponemos la mancuerna de aquagym al fondo a modo de rotonda. El/la monitor/a, les dará el paso con el semáforo, a la hora de entrar en el agua.\nTendrán las fichas de tráfico boca abajo encima de un tapiz pequeño encima de la grada, y los/las alumnos/as deben levantar dos fichas y deben acertar con dos fichas iguales. Al levantarlas correctamente irán por el carril creado en la calle por la derecha y vuelven por la izquierda. Si no aciertan, deberán de circular en bicicleta.\nAl terminar, hacemos un repaso de las señales, ordenando las fichas por tipos de señales (peligro, prioridad, obligación, prohibición), llevándolas desplazándose hasta la mitad, dar la vuelta en la rotonda y volver. Para ello, tendremos el otro tapiz pequeño preparado con los letreros de los tipos de señal, para que las vayan dejando clasificadas.',reflexion:'Emplear creativamente los diferentes estilos de natación.\nCuriosidad por las normas sociales.\nIdentificación de comportamientos socialmente adecuados.'},
{id:'S54-67_urte',cod:'S54',nom:'Nork ahal du?',nom_es:'Nork ahal du?',adina:'6-7 urte',inst:'Nata2',pto:'Sentados/as en la grada',materiala:['Tapiz','36 fichas de colores','12 tablas medianas','12 palos azules','12 pelotas de ping-pong','6 pelotas'],arranque:'Primero echaremos las tablas al agua y los/as niños/as tendrán que coger una tabla cada uno/a y desplazarse hasta la mitad y vuelta por el agua con la tabla en la cabeza, evitando que se caiga.\nDespués, echamos las fichas de colores sumergibles al agua y cada niño/a debe conseguir 6 fichas diferentes. Quién no pueda, será ayudado por quién termine primero.\nUna vez todos/as tienen 6 fichas, las colocarán encima de la tabla de cada uno/a.',intencionada:'Echamos las pelotas de ping-pong al agua y los/las niños/as deberán de desplazarse hasta la mitad y vuelta, soplando una pelota cada uno/a. Y la dejarán en la tabla de cada uno/a\nEchamos los 12 palos azules, y cada niño/a se lanzará al agua en busca de un palo, y volverá al punto de partida.\nAhora cada niño/a deberá desplazarse muy despacio boca-arriba e intentarán llevar el palo en la palma de la mano haciendo equilibrio.\nA la vuelta dejan el palo con sus cosas.\nPara terminar, ponemos a la clase por parejas, y cada pareja debe desplazarse hasta la mitad y vuelta por el agua con una pelota, sujetándola sólo con la frente.',reflexion:'Coordinación y equilibrio. Compañerismo y diversidad de actividades.'},
{id:'S55-67_urte',cod:'S55',nom:'Saioa S55',nom_es:'Saioa S55',adina:'6-7 urte',inst:'Nata 2',pto:'NataII-ko harmailan',materiala:['trikuharriaren argazkia','neberaren argazkia','3 taula ume bakoitzeko','pieza laukiak eta pieza flotanteak'],arranque:'Banakako, binakako, hirunakako... saltoak egingo dituzte piztina erdiraino joan etorriak eginez. Igerian nahi duten bezala egingo dituzte joan etorriak. Saltoak egin baino lehen Durangoko toki bat aipatu beharko dute.',intencionada:'Nebera\nGaldetuko dugu ia ezagutzen duten Neberondoko nebera edo Urkiolakoa. Badakite zertarako erabiltzen zen?\nIrudi batzuen laguntzarekin azalduko dugu ez dakienarentzat eta gurea eraikiko dugu pieza laukiekin borobil altu bat egiten (ikusi argazkia). Gero lehen egiten zen bezala elurrarekin beteko dugu. Elurra irudikatzeko pieza flotanteak erabiliko ditugu. (beste edozein material erabil daiteke)\nTrikuharria\nTrikuharria zer den azalduko dugu. (argazki bat daukagu) Zer erabilpen ote du? Umeek bere hipotesiak azal ditzatela. Guk gero dauden azalpen ezberdinak emango ditugu. Ezagutzen al dugu trikuharriren bat.\nAntzerako eraikuntzak munduko beste leku batzuetan ere badaude. Ezagutzen ditugu? Erresuma batuan dago famatuena den mota honetako eraikuntza, ezagutzen dugu?\nStonehenge (irudia erakutsi)\nGure trikuharria eraikiko dugu 3 taula erabilita (ikusi argazkia)\nHobetu beharrekoa',reflexion:''},
{id:'S56-67_urte',cod:'S56',nom:'Sentidos',nom_es:'Sentidos',adina:'6-7 urte',inst:'Nata 2',pto:'Sentados/as en la piedra, fuera del agua',materiala:['12 tablas','churros largos','aros pequeños'],arranque:'El oído: saltamos todos al oír al monitor.\nLa vista: saltamos todos al ver la señal que nos hará el monitor.\nEl tacto: saltamos todos cuando el monitor nos toque,\nEl olfato: nos tiramos todos/as como queramos tapándonos la nariz para no oler nada.\n+ ¿Cual falta?',intencionada:'Echar los aros al fondo.\nVISTA: Desplazamientos con tabla y pies, e introduciendo la cabeza en el agua y debemos contar cuantos aros hay en el fondo.\nRealizar otra vuelta y contar cuantos aros hay de cada color.\nRecoger los aros.\nTACTO: Desplazarnos solos, luego agarrados a los compañeros de una pierna y de las dos piernas. Cambiar.\nDesplazamientos de espalda con tabla, moviendo los brazos sin sacarlos en ningún momento del agua.\nTumbados encima de la tabla, sólo pies y luego con brazos también.\nOIDO: Sentados en los churros a caballo moveremos los dos brazos a la vez remando para desplazarnos de un lado al otro.\nAcabamos con unos largos a crol y espalda.',reflexion:''},
{id:'S57-67_urte',cod:'S57',nom:'DESDE QUE NOS LEVANTAMOS HASTA QUE NOS VAMOS A LA CAMA',nom_es:'DESDE QUE NOS LEVANTAMOS HASTA QUE NOS VAMOS A LA CAMA',adina:'6-7 urte',inst:'Nata 2 y recreativa',pto:'Grada Nata 2',materiala:['12 churros cortos','12 tablas grandes','12 tapices pequeños'],arranque:'Nos vamos a la piscina irregular después de la ducha donde haremos unas carrerillas y unos saltos en carrera intentando salpicar mucho, para despertarnos bien, puesto que nos acabamos de levantar, entrar por una escalera y salir por la otra.',intencionada:'Nos ponemos en el borde Nata 2 y vamos a realizar una serie de saltos, si alguna no puede sentada en el bordillo (saltos haciendo mímica: limpiando y aseándonos y desayunando).\nNos vamos al cole: Nos desplazamos en autobús (esto quiere decir que vamos todos juntos y en fila con los churros).\nEstudiamos; necesitamos carpetas (Tablas). Haremos otros tres desplazamientos de diferentes maneras con nuestros libros (tablas).\nNos vamos al recreo (tres saltos de distintas maneras y nos divertimos).\nNos volvemos para casa, esta vez nos volvemos andando (sin material), diferentes desplazamientos.\nPara acabar nos vamos a la cama, cogemos los tapices pequeños y nos desplazamos primero tumbados boca abalo y después boca arriba, para simular que dormimos.\nUltimo juego: con los tapices pequeño cada vez que pite el monitor habrá que cambiarlo con un compañero.',reflexion:''},
{id:'S58-67_urte',cod:'S58',nom:'Multi-ur jarduerak',nom_es:'Multi-ur jarduerak',adina:'6-7 urte',inst:'NATA2',pto:'Sentados/as en la grada',materiala:['6 churros largos','6 tablas grandes','6 balones','12 alfombras mágicas'],arranque:'Primero realizarán un calentamiento de cuatro veces hasta la mitad de la calle y vuelven andando por fuera, de la forma que quieran.',intencionada:'En la sesión de hoy desarrollaran diferentes actividades acuáticas. Para ello se colocarán en parejas, y después de cada ejercicio cambiarán de pareja. Realizarán dos veces cada ejercicio hasta la mitad de la calle y volverán andando por fuera.\nPatada crol con brazos estirados en churro largo. Trabajarán también la respiración.\nCon el churro debajo de la cabeza de espaldas, realizarán patada espalda.\nUno/a llevará la tabla y realizará crol con brazos/piernas y su pareja le observará que tal lo hace.\nCogerán ahora un balón y se desplazarán hasta la mitad y vuelta por el agua, realizando pases de waterpolo, practicando para una próxima sesión de waterpolo.\nAhora cogerán una alfombra cada uno/a:\nSe desplazarán encima de la alfombra como si fuera una tabla de surf, y moverán sólo las piernas.\nAhora moverán sólo los brazos.\nPara terminar, moverán piernas y brazos.\nComentamos las diferentes actividades que han hecho y cuál les ha gustado más.',reflexion:'Diferentes desplazamientos con diferentes materiales, compañerismo y relacionándose todos/as con todos/as.'},
{id:'S59-67_urte',cod:'S59',nom:'Feria y parques',nom_es:'Feria y parques',adina:'6-7 urte',inst:'Nata 2',pto:'Sentados/as en la grada',materiala:['12 tablas pequeñas','12 tablas grandes','aros sumergibles','12 pull-buoys','la alfombra'],arranque:'Cada niño/a antes de hacer una vuelta (dos en total), tendrá que decirnos su libro favorito y su canción o grupo de música favorito.\nActividad de intencionada:\nNos movemos por el pueblo en bicicleta y nos vamos a ir a comprar lo necesario para hacer unas baldas. Saltarán de la punta contraria a la habitual e irán haciendo bicicleta hasta su sitio.\nDejamos churros y cogemos las tablas grandes y los pull-buoys, y crearemos unas baldas junto al aro salvavidas.\nConstruida nuestra balda, cogeremos las bicis y nos iremos hasta la feria a comprar libros y discos.\nTiraremos los discos para que buceen y los dejen en las baldas. Y los libros (tablas pequeñas) aprovecharemos para que naden de diferentes formas.\n(Pies / brazos, Crol/braza/espalda)\nUna vez comprado y ordenado las baldas, nos podemos ir a jugar al parque (que nos digan donde suelen ir) cogemos la bici y vamos hasta nuestro parque.\nAcabaremos la sesión jugando con la alfombra (como harían en un parque).',intencionada:'',reflexion:''},
{id:'S60-67_urte',cod:'S60',nom:'UR-LARRIALDIAK',nom_es:'UR-LARRIALDIAK',adina:'6-7 urte',inst:'Nata 2',pto:'Sentados/as en la grada',materiala:['12 tablas grandes. 2 tapices grandes','6 aletas de tiburón'],arranque:'Colocaremos al grupo por parejas y uno/a de ellos/as llevará colocado una aleta de tiburón. Uno/a hace de tiburón y otro/a escapa de él. Cambian de rol al de 4 minutos aproximadamente.',intencionada:'El ataque del tiburón\nEstá todo el grupo dentro del agua (menos uno/a) en una playa haciendo surf con nuestras tablas por la mitad de la calle, hasta que el socorrista (monitor/a) avista a un gran tiburón blanco. El tiburón entrará al agua en busca de sus presas a intentarles coger. (El tocar es el ataque del tiburón), y termina cuando el tiburón a cogido a todos/as.\nEl Naufrago\nPondremos los dos tapices grandes en el otro extremo de la piscina donde habrá seis náufragos que salten desde la orilla y se suban encima, 3 en cada tapiz, para que después el resto del grupo salte y los traiga hasta el punto de salida.\nDespués cambian de rol. (Crear un poco los grupos por nivel).',reflexion:'Trabajo en equipo y compañerismo. Conseguir que se desenvuelvan decentemente en el medio acuático.'},
{id:'S61-67_urte',cod:'S61',nom:'BIRZIKLETA',nom_es:'BIRZIKLETA',adina:'6-7 urte',inst:'NATA II',pto:'Grada de piedra',materiala:['12 palos azules','12 churros pequeños','6 churros grandes','12 tablas grandes','12 tablas pequeñas','Tapiz grande (al lado de la escalera)'],arranque:'Haremos diferentes saltos y nos desplazaremos del lateral de la piscina hasta la corchera de diferentes maneras (no se puede ir y volver de la misma manera)',intencionada:'TIRAR, TODO O POR PARTES, EL MATERIAL AL AGUA\nDesde fuera de la piscina a la escalera a la mitad nos desplazamos de diferentes maneras para transportar el material.\nChurro pequeño (caballito)\nChurro grande (parejas y de espalda)\nTablas pequeñas (mirando hacia abajo y metiendo la cabeza)\nTablas grandes (sentados encima de la tabla o tumbados)\nPalos azules (palo entre las piernas, mirando hacia arriba y sin sacar los brazos)\nTapiz grande (último desplazamiento, lo haremos todos a la vez): una vez transportado todo el material nos disponemos a realizar una gran casa.\nLos desplazamientos después de dejar el material deben de ser nadando.\n** Si hubiera tiempo devolverán el material al agua para dejar la sesión preparada para el siguiente grupo.',reflexion:''},
{id:'S62-67_urte',cod:'S62',nom:'Lamia',nom_es:'Lamia',adina:'6-7 urte',inst:'Nata 2',pto:'',materiala:['Fotografía de ‘lamia’','tapiz largo','12 tablas grandes','12 pull buoys','figuras flotantes de colores','palos azules'],arranque:'Comenzamos con diferentes saltos desde el tapiz largo que sujetaremos nosotros/as, y se desplazarán hasta la mitad.',intencionada:'Descripción: ‘lamia’: este conocido personaje mitológico es mitad mujer mitad animal. La parte superior del cuerpo de Lamia es de una hermosa mujer y las extremidades inferiores pueden ser como las de una gallina, un pato o una cabra. Sin embargo, en la zona costera, la parte inferior es como la de un pez.\nEntre sus ocupaciones destacan: hilar con rueca y huso; construir dólmenes, puentes y casas; y lavar la ropa por la noche. Pero la actividad que más agrada a Lamia es peinar su larga melena, con un peine de oro, a la orilla de ríos o lagunas. Habita en cuevas, remansos de arroyos, en manantiales y estanques.\nVan a actuar como las ‘lamiak’, que viven en ríos limpio y este donde estamos, está un poco sucio. Van a limpiar el rio entre todos/as. Para ello llenamos el “rio” de material (churros, palos azules y figuras flotantes) y los familiares de los/as niños/as ayudarán también en la limpieza.\nSacarán el material de uno en uno y lo ordenarán por tipo de material, para ello los/las niños/as se desplazarán diferentes formas.\nDespués de limpiar el “rio”, ¿ha aparecido ‘lamia’?',reflexion:'Concienciar a los/las niños/as de mantener limpio todo lo que nos rodea.'},
{id:'S63-67_urte',cod:'S63',nom:'La tienda de ropa',nom_es:'La tienda de ropa',adina:'6-7 urte',inst:'Nata2',pto:'Sentados/as en la grada',materiala:['12 tablas','1 tapiz','fotos de ropa','dinero'],arranque:'Saltos desde el bordillo, si el monitor dice “pantalones”, tienen que ir nadando hasta la corchera, si el monitor dice “camiseta”, tienen que ir nadando de espaldas, si el monitor dice “chaqueta” irán hasta la corchera nadando a braza.',intencionada:'Hoy iremos a la tienda de ropa a comprar, para eso designaremos a un niño que será el vendedor, y repartiremos el dinero que lo dejaran en su maleta mientras estamos nadando. Cada niño tendrá una tabla que será su maleta y dinero. Solo podrán comprar ropa los que han hecho un largo ¡bien hecho! El vendedor dirá cuánto cuesta cada prenda y los niños pagarán con su dinero si hay que dar vueltas el vendedor dará las vueltas. Cada prenda comprada la pondrán en su maleta, y volverán a hacer otro largo que les habilitará a comprar otra prenda.\nCada 2 vueltas cambiamos de vendedor o podrá serlo el propio monitor.',reflexion:''},
{id:'S64-67_urte',cod:'S64',nom:'Waterpolo',nom_es:'Waterpolo',adina:'6-7 urte',inst:'Nata 1',pto:'Fuera del agua sentadas/os en el muro.',materiala:['6 balones','porterías de waterpolo con corchera','12 tablas medianas'],arranque:'Enviamos a las/los niñas/os a realizar 4 desplazamientos hasta la mitad de la piscina y volver andando por fuera.',intencionada:'Todas/os nos sentamos en el muro y explicamos la patada de waterpolo.\nDespués practicamos esa patada dentro del agua, y hacemos unas series de 30”-20”-10”. Practicaremos pases por parejas o tríos.\nColocamos la media corchera antes de la 2ª escalera y enganchamos una portería. La otra portería la ponemos en el otro extremo encima del borde de la piscina.\nTenemos el campo de waterpolo preparado hasta terminar las clases de 6-7 años del día.\nExplicamos las normas básicas del waterpolo. Hacemos 2 equipos y partido de 2 partes de 5’',reflexion:'Inicio al waterpolo y juego en equipo.'},
{id:'S65-67_urte',cod:'S65',nom:'Conociendo el reloj',nom_es:'Conociendo el reloj',adina:'6-7 urte',inst:'NATA2',pto:'Fuera del agua, en la piedra.',materiala:['Tablas grandes','tapiz grande','plantillas para las horas','fichas de horas'],arranque:'Todos/as los/las alumnos/as se sientan en la piedra y les explicamos cómo entender un reloj. La aguja pequeña indica las horas, la aguja más grande indica los minutos. Les decimos unos ejemplos de horas.',intencionada:'Repartimos una tabla y una plantilla vacía a cada alumno/a. Tienen unos relojes de ejemplo, y ellos/as tienen que decir las horas de los relojes. Memorizan un reloj, diciendo la hora correcta.\nPara ello tienen un tapiz en el suelo, después de la puerta de emergencia de NATA2. Encima del tapiz, tienen preparadas las fichas con los números.\nLos/las alumnos/as se desplazan hasta la segunda escalera, salen por la escalera y van al tapiz. Cogen una ficha de horas, para completar la hora que marca el reloj analógico de la ficha de encima de la tabla, y completar su plantilla. Vuelven nadando.\nDeben de realizar los viajes necesarios, para completar la plantilla correcta.\nSi no traen la hora correcta, vuelven nadando y la cambian.\nQuién termine antes, ayuda a los/las demás a leer el reloj.',reflexion:''},
{id:'S66-67_urte',cod:'S66',nom:'DURANGO – URKIOLA – POL POL – ANBOTO IBILALDIA!',nom_es:'DURANGO – URKIOLA – POL POL – ANBOTO IBILALDIA!',adina:'6-7 urte',inst:'Nata 2',pto:'Harmailen aldea',materiala:['2 tapiz handi (6 ume tapiz bakoitzeko)','3 kubo','12 edalontzi','uztai handiak eta urpeko fitxak'],arranque:'Oinez eta korrika ibiliko gara ibilaldiak beroketak eginez',intencionada:'Gaurkoan ibilaldi bat egitera joango gara. Ibilaldi hau etapa ezberdinetan banatuko dugu. Etapa bakoitza egiten dugula simulatzeko modu desberdinetan egingo dugu igeri teknika sartzeko aprobetxatuz. Eta toki bakoitzean aurkitzen dugun berezitasunaren arabera froga bat egin beharko dugu denon artean.\nDurango –Urkiola. (Igerian)\nBerezitasuna; Eliza aurrean dagoen “meteoritoa”. Kondairak dio bere inguruan 7 buelta emanez gero mutil/neskalaguna aurkituko duzula.\nFroga: Taldeka tapiz handia (meteoritoa) denen artean erdirarte eraman eta bertan 7 aldiz bira araziko dugu. Gero berriz buelta.\nUrkiola - Pol Pol(Igerian)\nBerezitasuna; Pol-Poleko iturria. Ur minerala ematen duen 3 txorrotako iturri bat da.\nFroga: 3 kubo egongo dira uretatik kanpo denen artean eta basoen laguntzaz bete beharko dituztenak. Gure iturria izango da.\nPol pol–Anboto(Igerian)\nBerezitasuna; Anbotoko Mariren kobazuloa. Kondairak dio kobazuloan Mari bizi dela eta bertatik atzeraka irten behar garela beti berarekiko errespetua erakutsiz, bestela bertan geldituko garela betirako.\nFroga: Uztai handiak egongo dira uretan kobazuloaren sarrera izango direnak. Denen artean igerilekuan dauden urpeko fitxak atera behar dituzte banan banan baina uretatik irten orduko uztaietari kobatetik atzeraka pasatu beharko dira. Lortuko ote dute?',reflexion:'HOBETZEKO GAUZAK'},
{id:'S67-67_urte',cod:'S67',nom:'DGT – Dirección General de Tráfico',nom_es:'DGT – Dirección General de Tráfico',adina:'6-7 urte',inst:'Nata2',pto:'Fuera de la piscina donde está el flotador.',materiala:['12 picas azules','12 churros largos','fichas de tráfico de 6-7 años','1 tapiz','algas','12 tablas azules pequeñas'],arranque:'Cada alumno/a con una pica y un churro, hará 4 idas/vueltas hasta la mitad, en modo bicicleta, con los brazos estirados y moviendo sólo las piernas. Les decimos, que en bicicleta también hay que utilizar casco y que tienen que respetar las señales de tráfico igual que cualquier medio de transporte.\nIrán por la derecha y para adelantar por la izquierda.',intencionada:'Dividimos la piscina en dos, con las algas haciendo la raya del carril.\nEl/la monitor/a, les dará el paso con el semáforo, a la hora de entrar en el agua.\nTendrán diferentes señales mezcladas en el muro. Las llevarán montados en bicicleta hasta la 2ª escalera y las pegarán en el tapiz que estará fuera. Volverán montados/as en bicicleta por su carril.\nDeberán de coger una señal diferente en cada viaje.\nAl terminar, hacemos un repaso de las señales, ordenando las fichas por tipos de señales (peligro, obligación, prohibición).\nPara finalizar tienen que fabricar un paso de cebra en el suelo con las tablas y explicamos para qué es y cuál es la forma correcta de utilizar.',reflexion:'Los/las niños/as van conociendo las señales de tráfico, saber cómo son y qué significan, y lo que significa un paso de cebra.'},
{id:'S68-67_urte',cod:'S68',nom:'URETAKO KIROLAK',nom_es:'URETAKO KIROLAK',adina:'6-7 urte',inst:'NATA 2',pto:'Sentados/as en la grada',materiala:['2 tapices grandes','churros pequeños (que no estén muy doblados)','12 tablas medianas (rectangulares)','12 picas azules','aros sumergibles'],arranque:'Empezaremos la sesión realizando un calentamiento de 4 estilos de natación:\nCrol, braza, espalda, buceo\nHasta la mitad y vuelta por el agua.',intencionada:'Daremos pinceladas de diferentes deportes que se puedan realizar en la piscina. No tenemos mucho tiempo para adentrarnos en todos ellos, por lo que más o menos haremos unos 5-10 minutos en cada uno de ellos.\nPaddle-Surf: Dividiremos el grupo en dos. Cada grupo irá sobre un tapiz y tendrán que hacer relevos dando vuelta a un aro sumergible que se encontrará en mitad de la piscina. Los niños para que se puedan propulsar, podrán utilizar bien churros pequeños o tablas medianas (las rectangulares).\nPesca submarina: Cada niño utilizará una pica azul como si fuera un arpón. En el fondo de la piscina habrá aros pequeños sumergidos. Tendrán que bajar hasta el fondo, tocar un aro con el arpón simulando que pescan un pez y guardaran los aros metiendo en la otra mano a lo largo del brazo. Así hasta que se acaben todos los aros y finalmente veremos quien ha sido el mejor pescador.\nGimnasia acuática: Dividimos el grupo en dos. Les daremos unos pequeños pasos y ejemplos de diferentes saltos y movimientos en el agua. Después en 5 minutos y para que no pasen mucho tiempo y se cojan frio, tendrán que diseñar una corta coreografía. Mientras ellos preparan, nosotros tendremos tiempo para ir a por el equipo de música y así poner sonido a las coreografías de los niños.',reflexion:''},
{id:'S69-67_urte',cod:'S69',nom:'Hondartzara goaz',nom_es:'Hondartzara goaz',adina:'6-7 urte',inst:'Nata 2',pto:'',materiala:['12 tablas grandes','12 colchonetas individuales','fichas sumergibles','12 cubo para las fichas','piezas cuadradas'],arranque:'Preparemos las cosas para ir a la playa, lo primero es preparar la mochila, una tabla será la mochila, para ello iremos nadando con la tabla ida y vuelta y dejamos la tabla en el muro.\nJugaremos con nuestra imaginación, preguntaremos a los niños que se necesita llevar a la playa ej. (toalla, crema, sombrilla, chanclas, jostailuak), iremos nadando hasta la mitad y volveremos con “algo” imaginario y lo colocaremos en la tabla.',intencionada:'Cuando tengamos todo lo que necesitamos para ir a la playa, cogeremos la tabla y haremos 4 largos para llegar a la playa. (4 o los que considere el monitor)\nHondartzan gaude! En la playa lo primero que tenemos que hacer es darnos crema. ¿Qué podemos hacer?, jugaremos en el agua, nadamos, nos tiramos de cabeza, les enseñamos a los niños la entrada al agua de cabeza.\n¡a tomar el sol!, les daremos a cada niño una colchoneta individual y tomaremos el sol, (intentaremos desplazarnos boca arriba y boca abajo encima de la colchoneta).\n¡Recogeremos txirlas!, tiraremos fichas al fondo de la piscina y las cogeremos y las dejaremos dentro de un cubo.\nPor último, vamos a hacer un casillo de arena. Con las piezas cuadradas la traeremos desde el otro extremo de nuestra zona y aremos un gran castillo.',reflexion:''},
{id:'S70-67_urte',cod:'S70',nom:'Rescate y pesca',nom_es:'Rescate y pesca',adina:'6-7 urte',inst:'Nata 2',pto:'Sentados/as en la grada fuera del agua',materiala:['3 flotadores SOS para arrastre','24 palos azules','pasarela','aros sumergibles','12 tablas medianas'],arranque:'Haremos 3 equipos: 2 en el agua agarrándose a los flotadores y los otros 2 equipos desde fuera agarrando la cuerda.\nHarán una carrera entre los dos equipos. ¿Quién ganará? Luego cambiaremos los equipos y los que han estado fuera estarán dentro, y al revés.',intencionada:'LOS PECES TIENEN HAMBRE:\nEcháremos las piezas azules al agua y nos imaginaremos que es la hora de comer.\nPara poder coger la comida tenemos que nadar hasta ella. Saltaremos por la pasarela e intentaremos coger las piezas azules. Cogeremos de una en una y en cada viaje nadaremos de distinta manera. Dejaremos el material en el muro.\nLA HORA DE LA SIESTA:\nDespués de tanto comer tenemos que echar la siesta, estamos tan cansados que necesitamos dormir. Haremos el muerto, dormiremos boca abajo, bola, de lado, encogidos, estirados… De todas las maneras que se nos ocurran. El monitor marcara el tiempo que estarán en cada postura.\nSEGUIMOS HAMBRIENTOS:\nCon tabla TECNICA DE…\nRESPIRACION DE CROL COORDINANDO CON BRAZO\nCOORDINACION BRAZOS/PIES ESPALDA\nHacen txiribueltas: CONTRA LA PARED Y SALIDA…. (CROL)',reflexion:''}

function todayISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

// Cliente REST minimalista (sin librería externa para mantener el HTML autocontenido)
const SB = {
  online: navigator.onLine,
  pendingOps: [],  // operaciones a enviar cuando vuelva conexión
  syncStatus: 'idle', // idle | syncing | error
  lastSyncError: null,
  
  url(path) { return `${SUPABASE_URL}/rest/v1${path}`; },
  
  headers(extra = {}) {
    return {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      ...extra
    };
  },
  
  async req(method, path, body = null, extraHeaders = {}) {
    if (!this.online) {
      return { error: 'offline', queued: true };
    }
    try {
      const opts = { method, headers: this.headers(extraHeaders) };
      if (body !== null) opts.body = JSON.stringify(body);
      const r = await fetch(this.url(path), opts);
      if (!r.ok) {
        const txt = await r.text();
        console.warn(`[Supabase ${method} ${path}] ${r.status}:`, txt);
        return { error: txt, status: r.status };
      }
      const ct = r.headers.get('content-type') || '';
      if (ct.includes('application/json')) {
        return { data: await r.json() };
      }
      return { data: null };
    } catch (e) {
      console.warn(`[Supabase ${method} ${path}] network error:`, e.message);
      return { error: e.message };
    }
  },
  
  // GET de tabla con filtros opcionales
  async select(table, filter = '') {
    const path = `/${table}?select=*${filter ? '&' + filter : ''}`;
    return this.req('GET', path);
  },
  
  // INSERT (upsert por defecto via on_conflict)
  async upsert(table, row, conflictKey) {
    const path = `/${table}${conflictKey ? `?on_conflict=${conflictKey}` : ''}`;
    return this.req('POST', path, row, {
      'Prefer': 'resolution=merge-duplicates,return=representation'
    });
  },
  
  // UPDATE
  async update(table, filter, patch) {
    return this.req('PATCH', `/${table}?${filter}`, patch, {
      'Prefer': 'return=representation'
    });
  },
  
  // DELETE
  async del(table, filter) {
    return this.req('DELETE', `/${table}?${filter}`);
  },
  
  setStatus(s, err = null) {
    this.syncStatus = s;
    this.lastSyncError = err;
    const el = document.getElementById('sync-indicator');
    if (el) {
      el.dataset.status = s;
      const dot = el.querySelector('.sync-dot');
      const lbl = el.querySelector('.sync-lbl');
      if (s === 'syncing') { dot.style.background = 'var(--warn)'; lbl.textContent = 'Gordetzen...'; }
      else if (s === 'error') { dot.style.background = 'var(--red)'; lbl.textContent = 'Errorea'; el.title = 'Errorea: ' + (err || ''); }
      else if (s === 'offline') { dot.style.background = 'var(--txtm)'; lbl.textContent = 'Offline'; }
      else { dot.style.background = 'var(--gl)'; lbl.textContent = 'Sinkronizatuta'; }
    }
  }
};

const DB = {
  g(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},
  s(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
  // Sessions: overlayed user edits/additions on top of SESSIONS constant
  _customKey:'ne5_sess_custom',   // {id: overrideObject}
  _deletedKey:'ne5_sess_deleted', // [id,...]
  _newKey:'ne5_sess_new',         // [newSessionObject,...]
  sessions(){
    const custom=this.g(this._customKey,{});
    const deleted=this.g(this._deletedKey,[]);
    const news=this.g(this._newKey,[]);
    const base=SESSIONS.filter(s=>!deleted.includes(s.id)).map(s=>custom[s.id]?{...s,...custom[s.id]}:s);
    return[...base,...news];
  },
  saveSession(ss){
    const isBase=SESSIONS.some(s=>s.id===ss.id);
    if(isBase){
      const c=this.g(this._customKey,{});c[ss.id]=ss;this.s(this._customKey,c);
    }else{
      const news=this.g(this._newKey,[]);
      const i=news.findIndex(s=>s.id===ss.id);
      if(i>=0)news[i]=ss;else news.push(ss);
      this.s(this._newKey,news);
    }
    // Sync a cloud (background)
    syncSessionToCloud(ss, isBase);
  },
  deleteSession(id){
    const isBase=SESSIONS.some(s=>s.id===id);
    if(isBase){
      const del=this.g(this._deletedKey,[]);if(!del.includes(id))del.push(id);this.s(this._deletedKey,del);
      // Sync deletion
      syncDeletedSessionToCloud(id);

      const news=this.g(this._newKey,[]).filter(s=>s.id!==id);this.s(this._newKey,news);
      syncDeleteSessionFromCloud(id);
    }

    const nums=all.map(s=>{const m=(s.cod||'').match(/^S(\d+)$/);return m?parseInt(m[1]):0;});

async function syncEvalToCloud(ev) {
  if (!SB.online) return;
  SB.setStatus('syncing');
  // Limpiar campos undefined/null que la BBDD podría rechazar
  const row = {
    eid: ev.eid,
    sid: ev.sid,
    mon: ev.mon,
    data: ev.data,
    zailtasuna: ev.zailtasuna ?? null,
    iraupena: ev.iraupena ?? null,
    parte: ev.parte ?? null,
    maila: ev.maila ?? null,
    materiala: ev.materiala ?? null,
    ikaskuntza: ev.ikaskuntza ?? null,
    global: ev.global ?? null,
    ohar: ev.ohar ?? null,
  };
  const r = await SB.upsert('evals', row, 'eid');
  if (r.error) { SB.setStatus('error', r.error.slice(0,60)); }
  else { SB.setStatus('idle'); }
}

async function syncDeleteEvalFromCloud(eid) {
  if (!SB.online) return;
  SB.setStatus('syncing');
  const r = await SB.del('evals', `eid=eq.${encodeURIComponent(eid)}`);
  if (r.error) SB.setStatus('error', r.error.slice(0,60));
  else SB.setStatus('idle');
}

async function syncIdeaToCloud(idea) {
  if (!SB.online) return;
  SB.setStatus('syncing');
  // El id local (i01, etc.) lo metemos como id si es uuid; si no, dejamos que Supabase genere uno
  const row = {
    mon: idea.mon,
    sid: idea.sid || null,
    txt: idea.txt,
    est: idea.est || 'pendiente',
    data: idea.data || new Date().toISOString().split('T')[0],
  };
  // Solo añadir id si es UUID
  if (idea.id && idea.id.length === 36 && idea.id.includes('-')) row.id = idea.id;
  const r = await SB.upsert('ideas', row);
  if (r.error) { SB.setStatus('error', r.error.slice(0,60)); }
  else { 
    SB.setStatus('idle');
    // Si nos devuelve id real de Supabase, actualizamos el local
    if (r.data && r.data[0] && r.data[0].id) {
      const arr = DB.ideas();
      const idx = arr.findIndex(x => x.id === idea.id);
      if (idx >= 0 && arr[idx].id !== r.data[0].id) {
        arr[idx].id = r.data[0].id;
        DB.s('ne3_ideas', arr);
      }
    }
  }
}

async function syncIdeaStatusToCloud(id, est) {
  if (!SB.online) return;
  // Solo si el id parece UUID (sino es local sin sync aún)
  if (!id || id.length !== 36 || !id.includes('-')) return;
  SB.setStatus('syncing');
  const r = await SB.update('ideas', `id=eq.${id}`, { est });
  if (r.error) SB.setStatus('error', r.error.slice(0,60));
  else SB.setStatus('idle');
}

async function syncDeletedSessionToCloud(sid) {

  SB.setStatus('syncing');
  const r = await SB.upsert('deleted_sessions', { sid, deleted_by: S.user || 'unknown' }, 'sid');

}

async function syncDeleteSessionFromCloud(sid) {
  if (!SB.online) return;
  await SB.del('session_overrides', `sid=eq.${sid}`);
  await SB.del('deleted_sessions', `sid=eq.${sid}`);
}

// Sync inicial: traer datos de Supabase y mergear con localStorage
async function syncFromCloud() {
  if (!SB.online) return;
  SB.setStatus('syncing');
  
  try {
    // 1. Evals
    const evR = await SB.select('evals');
    if (evR.data) {
      const local = DB.evals();
      const cloudByEid = {};
      evR.data.forEach(e => { cloudByEid[e.eid] = e; });
      // Merge: cloud wins (es la fuente de verdad)
      const merged = [...evR.data];
      // Conservar locales que aún no se han subido
      local.forEach(l => {
        if (!cloudByEid[l.eid]) merged.push(l);
      });
      DB.s('ne3_evals', merged);
    }
    
    // 2. Ideas
    const idR = await SB.select('ideas');
    if (idR.data) {
      DB.s('ne3_ideas', idR.data);
    }
    
    // 3. Session overrides
    const soR = await SB.select('session_overrides');
    if (soR.data) {
      const custom = {};
      soR.data.forEach(r => {
        custom[r.sid] = {
          nom: r.nom, nom_es: r.nom_es, inst: r.inst, pto: r.pto,
          materiala: r.materiala, arranque: r.arranque,
          intencionada: r.intencionada, reflexion: r.reflexion,
        };
      });
      DB.s(DB._customKey, custom);
    }
    
    // 4. Deleted sessions
    const dsR = await SB.select('deleted_sessions');
    if (dsR.data) {
      DB.s(DB._deletedKey, dsR.data.map(r => r.sid));
    }
    
    SB.setStatus('idle');
    return true;
  } catch (e) {
    SB.setStatus('error', e.message);
    return false;
  }
}

let _bigSaveTimer=null;
function showBigSave(titulo='Gorde da!',descripcion='Hodeian sinkronizatzen...',duracion=1600){
  const big=document.getElementById('bigsave');
  const bg=document.getElementById('bigsave-bg');
  const t=document.getElementById('bigsave-t');
  const d=document.getElementById('bigsave-d');
  if(!big||!bg)return;
  if(t)t.textContent=titulo;
  if(d)d.textContent=descripcion;

    bg.classList.remove('show');
  },duracion);
}

// Title case para nombres: "KOLOREAK" → "Koloreak", "ASTE SANTUKO OPORRAK" → "Aste santuko oporrak"
// Mantiene el original si ya está en capitalización mixta (ej. "Nire ipuinak")
// Preserva siglas conocidas (SOS, ABC, AEIOU, etc.)
const PRESERVE_UPPER=new Set(['SOS','ABC','AEIOU','ABCD','OK','SP','FC','TV','DVD','USB','PDF','CD','ONG']);
function titleCase(s){
  if(!s||typeof s!=='string')return s;
  const letters=s.replace(/[^A-Za-zÁÉÍÓÚÑÇÜáéíóúñçü]/g,'');
  if(letters.length<3)return s;
  const isAllCaps=letters===letters.toUpperCase();
  if(!isAllCaps)return s;
  return s.split(/(\s+|[-/.:;!?])/).map((part,i,arr)=>{
    if(/^\s+$/.test(part)||/^[-/.:;!?]+$/.test(part))return part;
    if(!part)return part;
    if(PRESERVE_UPPER.has(part))return part;
    // Primera palabra de la frase: primera letra mayús
    const isFirst=i===0;
    // Tras punto/coma/etc.: primera letra mayús también
    let isAfterSentence=isFirst;
    if(!isFirst){
      for(let j=i-1;j>=0;j--){
        const p=arr[j];
        if(!p||/^\s+$/.test(p))continue;
        if(/[.:;!?]/.test(p)){isAfterSentence=true;break}
        break;
      }
    }
    if(isAfterSentence)return part.charAt(0).toUpperCase()+part.slice(1).toLowerCase();
    return part.toLowerCase();
  }).join('');
}

// Aplica titleCase a los nombres de las sesiones al cargar (solo en memoria, no modifica datos originales)
SESSIONS.forEach(s=>{
  if(s.nom)s.nom=titleCase(s.nom);
  if(s.nom_es)s.nom_es=titleCase(s.nom_es);
});

function myEntries(day){
  return DB.entries().filter(e=>e.data===day&&(S.role==='admin'||e.mon===S.user));
}

function evalPct(){
  const all=DB.entries();const evs=DB.evals();
  const mine=all.filter(e=>S.role==='admin'||e.mon===S.user);
  const done=mine.filter(e=>evs.find(v=>v.eid===e.id));
  return mine.length>0?Math.round(done.length/mine.length*100):0;
}

    }[S.view]||aHome);
    html=aShell(viewFn);

    const viewFn=({

      library:vLibrary, ideas:vIdeas, assistant:vAssistant, reports:vReports,

function vReports(){
  const evals=DB.evals(),entries=DB.entries(),sessions=DB.sessions();
  if(!evals.length)return`${nav('reports')}${hdr('',false)}<div class="main fu"><div class="empty"><div class="empty-i">📊</div><div class="empty-t">Oraindik baloraziorik ez</div><div style="font-size:13px;color:var(--txtm);margin-top:6px">Begiraleak balorazioak egin ondoren agertuko dira</div></div></div>`;
  const wg=evals.filter(e=>e.global);
  const avg=wg.length?(wg.reduce((a,e)=>a+(e.global||0),0)/wg.length).toFixed(1):'—';
  const crits=['zailtasuna','iraupena','parte','maila','materiala','ikaskuntza'];
  const critL=['Zailtasuna','Iraupena','Parte-hartzea','Mailaren egok.','Materiala','Ikaskuntza'];
  return`
${nav('reports')}
${hdr('',false)}
<div class="main fu">
  <div class="sh">Laburpena</div>
  <div class="g3" style="margin-bottom:16px">
    <div class="mc"><div class="mv">${evals.length}</div><div class="ml">Baloratuta</div></div>
    <div class="mc"><div class="mv">${avg}</div><div class="ml">Batez beste ★</div></div>
    <div class="mc"><div class="mv">${entries.length}</div><div class="ml">Saio guztira</div></div>
  </div>
  <div class="sh">Irizpideak</div>
  <div class="card">
    ${crits.map((c,i)=>{
      const vs=evals.filter(e=>e[c]!==undefined).map(e=>e[c]);
      const av=vs.length?(vs.reduce((a,b)=>a+b,0)/vs.length):0;
      const col=av>=1?'var(--gl)':av>=0?'var(--b)':'var(--red)';
      return`<div class="bw"><div class="bl"><span>${critL[i]}</span><b>${av.toFixed(1)}</b></div>
      <div class="bt"><div class="bf" style="width:${(av+2)/4*100}%;background:${col}"></div></div></div>`;
    }).join('')}
  </div>
  <div class="sh">Begiraleka</div>
  <div class="card">
    ${MONITORS.map(m=>{
      const me=evals.filter(e=>e.mon===m);if(!me.length)return'';
      const mg=me.filter(e=>e.global);
      const mav=mg.length?(mg.reduce((a,e)=>a+e.global,0)/mg.length).toFixed(1):'—';
      return`<div class="mat-item">
        <div style="width:34px;height:34px;border-radius:50%;background:var(--g3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:var(--g2);flex-shrink:0">${m}</div>
        <div style="flex:1"><div style="font-weight:800;font-size:14px">${m}</div><div style="font-size:12px;color:var(--txtm)">${me.length} balorazioak</div></div>
        <div style="color:var(--warn);font-weight:900">★ ${mav}</div>
      </div>`;
    }).join('')}
  </div>
  <div class="sh">Azken iruzkinak</div>
  <div class="card">
    ${evals.filter(e=>e.ohar).slice(-4).map(ev=>{
      const en=entries.find(e=>e.id===ev.eid),ss=sessions.find(s=>s.id===ev.sid);
      if(!ss||!en)return'';
      return`<div style="padding:9px 0;border-bottom:1px solid var(--bdr)">
        <div style="font-size:11px;color:var(--txtm);margin-bottom:3px;font-weight:700">${ev.mon} · ${ss.nom} · ${en.data}</div>
        <div style="font-size:13px;font-weight:600;color:var(--txt)">${ev.ohar}</div>
      </div>`;
    }).join('')||'<div style="font-size:13px;color:var(--txtm)">Oraindik iruzkinik ez</div>'}
  </div>
  <button class="btn btn-o" id="export-btn" style="margin-top:8px">📄 Txostena esportatu (.txt)</button>
</div>`}

  const todayEntries=all.filter(e=>e.data===TODAY);
  const avgStar=evals.filter(e=>e.global).length?(evals.filter(e=>e.global).reduce((a,e)=>a+e.global,0)/evals.filter(e=>e.global).length).toFixed(1):'—';
  const pending=ideas.filter(i=>i.est==='pendiente').length;
  const pct=wkEntries.length?Math.round(wkEvals.length/wkEntries.length*100):0;

  // Latest evaluations
