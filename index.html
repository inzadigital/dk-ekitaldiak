{id:'S48-3_urte',cod:'S48',nom:'ANBOTOKO MARI',nom_es:'ANBOTOKO MARI',adina:'3 urte',inst:'recreativo / infantil',pto:'Z.P.P Infantil',materiala:['8 fantasmas (dejarlos en nata I','pollete blanco)','aro grande que flota','ISLA'],arranque:'Juegos en infantil',intencionada:'Recreativa: Anbotoko dama, Mari, vive en Anboto. Subiremos a Anboto y entraremos en su cueva.\nDaremos un par de vueltas con el fantasma lo que simulara la subida a Anboto. Una vez allí (fuera de la recreativa, en la zpp, punto de encuentro) haremos unos saltos a la isla sin material e iremos hasta la escalera, a poder ser sin material y metiendo la cabeza.\nPara poder entrar en la cueva de mari (aro) tendremos que hacer tres saltos sin desplazamiento (saltar-subir)… ¿los harán todos a la vez?\nHaremos dos vueltas entrando por el aro (salto+isla+aro+escalera).\nCogeremos los fantasmas y bajaremos de Anboto para volver a la piscina pequeña (y así dejar los fantasmas en pollete nata I, para el siguiente grupo)',reflexion:''},
{id:'S49-3_urte',cod:'S49',nom:'YA LLEGÓ LA PRIMAVERA',nom_es:'YA LLEGÓ LA PRIMAVERA',adina:'3 urte',inst:'Piscina infantil y recreativa',pto:'Fuera de la piscina, al lado de la escalera.',materiala:['Fichas de ropas (ej. 2 x niño) tapiz','churros','8 aros'],arranque:'En la piscina pequeña, colocaremos un tapiz contra la pared. Dividiremos el tapiz en cuatro partes. Cada parte será una estación diferente. En cada estación iremos colocando imágenes que tengan relación con cada una de ellas.\nPARA HACERLO MÁS FÁCIL PODREMOS DIVIDIR EL TAPIZ EN DOS PARTES: INVIERNO Y VERANO\nSabemos en qué época del alimentamos ahora?',intencionada:'En la piscina recreativa. Pondremos los aros, chapas y palos azules sobre un tapiz. Serán flores y frutas que tenemos que recoger del jardín y la huerta. Tendrán que recogerlas y depositarlas en el cubo, que será la cesta bonita de mimbre.',reflexion:''},
{id:'S50-3_urte',cod:'S50',nom:'ASTE SANTUKO OPORRAK',nom_es:'ASTE SANTUKO OPORRAK',adina:'3 urte',inst:'Igerileku txikia eta ertainean',pto:'',materiala:['8 txurro horiak','8 taula','8 pull-boing','8 palito urdin','8 edarontzi','8 kubo','8 palak'],arranque:'',intencionada:'',reflexion:''},
{id:'S51-3_urte',cod:'S51',nom:'ANIMALIAK IGERIAN',nom_es:'ANIMALIAK IGERIAN',adina:'3 urte',inst:'Umeen igerilekua eta jolas-igerilekua (“recreativa”)',pto:'2. eskailera ondoan',materiala:['Koloretako dadoa 6 animalia ezberdineki','uztai handia','marrazo hegatsak'],arranque:'',intencionada:'Dadoaz baliatuko gara noizbehinka jaurti eta ia zein animalia tokatzen den ikusteko. Animalia hoiek bezala igerian egiteko gai izango ote gara??\nIzurdeak bezala ibiltzean hegatsak edo uztaiak erabili ahal ditugu adibidez.',reflexion:''},
{id:'S52-3_urte',cod:'S52',nom:'LAMIAK',nom_es:'LAMIAK',adina:'3 urte',inst:'I. txkia eta I. ertaina.',pto:'recre, eskaileretan',materiala:['Lamiaren argazkia','taula handi 1','Txirrista','irla','8 uztai txiki','+/- 32 flotatzen duten panpintxoak'],arranque:'',intencionada:'',reflexion:''},
{id:'S53-3_urte',cod:'S53',nom:'RECONOCER FIGURAS PLANAS',nom_es:'RECONOCER FIGURAS PLANAS',adina:'3 urte',inst:'Piscina Recreativa, piscina infantil',pto:'Bordillo.',materiala:['figuras de círculo','triángulos','cuadrados flotantes','mesa','churros'],arranque:'',intencionada:'En la piscina recreativa, colocamos la caja con las figuras geométricas, y los niños irán pegando en la pared, los cuadrados por un lado, los triángulos con otro y los círculos en otro, y en el agua harán un pequeño circuito que determinará el monitor.',reflexion:'que aprendan a reconocer las diferentes figuras planas, mientras siguen adquiriendo habilidades acuáticas.'},
{id:'S54-3_urte',cod:'S54',nom:'MIS CUENTOS EN LA PISCINA: LA LIEBRE Y LA TORTUGA',nom_es:'MIS CUENTOS EN LA PISCINA: LA LIEBRE Y LA TORTUGA',adina:'3 urte',inst:'Piscina infantil y piscina recreativa',pto:'El tapiz grande, fuera del agua',materiala:['Dibujos plastificados de la liebre','la tortuga','churros','tapiz','fantasmas'],arranque:'En la piscina infantil pegaremos las fichas de la liebre y la tortuga en el murito. Jugamos a imitar los movimientos de los 2 animales. La liebre dando saltos y la tortuga a 4 patas y despacio.',intencionada:'En la piscina recreativa contamos en cuento de la liebre y la tortuga (atrás):\nSaltos, carrera entre todos con los fantasmas y cuando el monitor diga stop: se pararán y apoyarán la cabeza en el fantasma simulando la siesta. Luego seguimos moviéndonos, primero muy despacio y cada vez más rápido para llegar a la meta.\nLa liebre siempre se reía de la tortuga, porque era muy lenta y ella muy rápida.\n-Bueno -contestó la tortuga-, soy lenta, pero siempre llego al final. Hacemos una carrera.\nLa liebre salió corriendo, y la tortuga se quedó atrás. Cuando echó a andar, la liebre ya se había perdido de vista.\n¿Para qué voy a correr? Mejor descanso un rato, pensó la liebre. Se tumbó al sol y se quedó dormida, soñando en que iba a ganar.\nLa tortuga siguió avanzando muy despacio. A mediodía pasó junto a la liebre, que dormía al lado del camino. Ella siguió pasito a paso.\nCuando la liebre se despertó miró hacia atrás y se rió porque no vio a la tortuga y fue corriendo a la meta para recoger su premio.\nPero mientras dormía la tortuga le adelanto y gano la carrera.\n-Has hecho trampa. Todo el mundo sabe que corro más que tú.\n-¡Oh! -dijo la tortuga- Pero ya te dije que yo siempre llego. Despacio pero seguro”.',reflexion:'¿Por qué ha ganado la tortuga?'},
{id:'S55-3_urte',cod:'S55',nom:'JUGAMOS CON MIS SENTIDOS: ¿NOS FIAMOS?',nom_es:'JUGAMOS CON MIS SENTIDOS: ¿NOS FIAMOS?',adina:'3 urte',inst:'piscina infantil y recreativa',pto:'Tapiz exterior: escalera Z.P.P.',materiala:['Tapiz','churros','32 bloques flotantes (4 rojos','4 naranjas incluidos)'],arranque:'Cogeremos bloques flotantes y las tiraremos al agua (Infantil). Tenemos que dejar en el agua solo las figuras ROJAS y NARANJAS. El resto las meteremos en el cubo. Dejaremos 4 de cada color. Cada niño cogerá una figura del color que quiera (Rojo/Naranja)\nExplicaremos en el punto de encuentro la actividad intencionada',intencionada:'(Recreativa zona poco profunda)\n“¿TE FIAS DE MI?”\nEl profesor trabajara de forma individua el trayecto del borde a la isla. 1º con los ojos abiertos y luego con los ojos cerrados. Haremos el trayecto en caballito\nLES EXPLICAREMOS QUE RECOGEREMOS SIEMPRE EL MATERIAL DE UNO EN UNO, NO SE PUEDEN TRANSPORTAR MAS A LA VEZ\nJuego “NO OIMOS NADA, LA PISCINA ESTA ROTA…”\nDividimos el grupo en dos. Unos llevaran las figuras rojas y otros las naranjas encima de la cabeza.\nHaremos parejas Rojo-Naranja y uno llevara al otro desde el bordillo hasta la isla. El arrastrado llevara los ojos cerrados. El que arrastra abiertos.\nUna vez en la isla Todos Juntos empezaremos a gritar (suave) mientras metemos la cabeza, hasta la altura de los ojos, como si fuéramos cocodrilos. ¿Qué ha pasado? Se ha roto la piscina. ¡Dentro del agua no se oye nada!!!!! Y volveremos a sacar la cabeza mientras gritamos y se volverán a oír los gritos.\nRepetimos un par de veces lo mismo\nJuego “NOS VAMOS DE EXCURSION”\nCogeremos el churro y el profesor les dirá que vamos de excursión. Nos meteremos por un túnel. Para ello haremos un tren donde agarraremos el churrio del compañero de delante. TODOS CERRARAN LOS OJOS y el profesor les llevará muy cerca del bordillo. Una vez cerca, 1 m aprox y a ciegas tendrán que encontrar, POR MEDIO DEL TACTO la salida: ¿¿¿hemos llegado???? Abrir los ojos',reflexion:'¿Cómo lo han pasado? ¿Qué han sentido? ¿A dónde han ido cuando hemos ido de excursión con los ojos cerrados?\nTrabajo individual y de grupo'},
{id:'S56-3_urte',cod:'S56',nom:'LAS ESTACIONES: A DISFRUTAR DEL BUEN TIEMPO',nom_es:'LAS ESTACIONES: A DISFRUTAR DEL BUEN TIEMPO',adina:'3 urte',inst:'Recreativa',pto:'Infantil',materiala:['8 Cubos','rastrillos','colchoneta','churros'],arranque:'Jugar un poco como si fuera la playa, con los cubos y los rastrillos',intencionada:'Para ir a la playa cogemos la bici y nos vamos. Un a vez allí saltaremos de diferentes formas, nos desplazaremos de diferentes formas y miraremos si vemos algún pez en nuestra playa.\nPara volver regresaremos en barco con la colchoneta.',reflexion:''},
{id:'S57-3_urte',cod:'S57',nom:'NUMEROS',nom_es:'NUMEROS',adina:'3 urte',inst:'Recreativa',pto:'Bordillo / Fuera de la piscina',materiala:['Tapiz','mesas','churros','20 fichas sumergibles de números (del 1 al 5)'],arranque:'',intencionada:'Crear una secuencia numérica del 1 al 5 encima del tapiz, mientras hacemos un pequeño circuito que determinará el monitor.',reflexion:''},
{id:'S58-3_urte',cod:'S58',nom:'PAISAJES Y ENTORNOS: DE PASEO POR BILBAO',nom_es:'PAISAJES Y ENTORNOS: DE PASEO POR BILBAO',adina:'3 urte',inst:'Piscina irregular',pto:'Tapiz fuera del agua',materiala:['8 churros amarillos','churros','8 pullboy','tapiz','16 vasos'],arranque:'En la piscina infantil, con churros amarillos finos, les hacemos un nudo y les decimos que somos motos y tenemos que ir por la carretera moviendo las piernas, el churro es el volante de nuestra moto y el gorro nuestro casco, (antes de salir por la carretera en moto hay que ponerse el casco).',intencionada:'(en piscina irregular)\nCon la moto nos vamos a la gran ciudad, ¿Qué gran ciudad tenemos cerca de Durango? Bilbao, ¿y si nos vamos a Bilbao en moto?, nos metemos en la piscina irregular y andamos en la piscina en nuestro espacio.\nEn una gran ciudad hay muchos coches, recorremos Bilbao en coche con un pullboy en la mano a modo de volante y batiendo pies (es el motor del coche). Quién no pueda sin churro, que lleve el churro.\n¿Y si recorremos Bilbao en bicicleta?, con el churro entre las piernas\n¿Hay trenes en Bilbao?, cogemos el churro del compañero de adelante y formamos un trencito, ¿Quién es el maquinista?, ¿cambiamos de maquinista?\n¿Y en autobús?, nos subimos en el tapiz y hablamos de que en Bilbao hay grandes edificios como la torre y muchos puentes.\n¿Construimos todos juntos una torre con pullboys y vasos encima del tapiz?',reflexion:''},
{id:'S59-3_urte',cod:'S59',nom:'KOLOREAK',nom_es:'KOLOREAK',adina:'3 urte',inst:'Infantil y recreativa',pto:'En la piscina pequeña',materiala:['Aros grandes (3 colores','amarillo','rojo','verde)Fotos del semáforo','cubos (mismos colores)','pelotas (solo 3 colores','8 de cada color)'],arranque:'En la piscina infantil reunimos a los niños y les explicamos que es un semáforo y para que sirve. Jugamos a decir el color en alto y depende del color tendrán que hacer una acción que ya les hemos dicho antes. Por ejemplo: ROJO = stop, AMARILLO = girar sobre nosotros, VERDE= tobogán.',intencionada:'Con los Aros grandes puestos en el suelo y un cubo del mismo color dentro del aro, les diremos que vamos a entrar al agua de formas diferentes. VERDE= Sentado, AMARILLO= de pie y ROJO= saltando ellos solos. ( cada grupo es diferente por lo que en cada grupo será el monitor quien elija como entraran al agua) y una vez en el agua cogerán la pelota del color que quieren entrar al agua.',reflexion:''},
{id:'S60-3_urte',cod:'S60',nom:'VESTIMOS AL FANTASMA',nom_es:'VESTIMOS AL FANTASMA',adina:'3 urte',inst:'Infantil',pto:'Infantil',materiala:['churros','8 tablas','colchoneta','una caja con dibujos de'],arranque:'En la infantil le preguntaremos si saben que ropa nos ponemos en invierno y cual, en verano, con preguntas como: ¿os pondríais chancletas en invierno? Y les enseñamos la ropa de invierno.',intencionada:'Jugamos con los fantasmas: Vamos a coger cada uno un fantasma y nos vamos a ir a la recreativa a jugar y desplazarnos con él.\n¿Nuestro amigo el fantasma necesita ropa?: Ponemos dos fantasmas y una caja llena de ropas contra la pared. Un fantasma será EL FANTASMA DE VERANO, y el otro EL FANTASMA DE INVIERNO. Los niños saltarán al agua e irán cogiendo ropa de la caja para después vestir cada fantasma como corresponda.\nPodremos varias los saltos, los desplazamientos, el material según el nivel del grupo.',reflexion:''},
{id:'S61-3_urte',cod:'S61',nom:'Formas: cuadrado',nom_es:'Formas: cuadrado',adina:'3 urte',inst:'Recreativa (parte poco profunda)',pto:'Fuera del agua',materiala:['Churros','bloques cuadrados','rectangulares flotantes (la mitad)'],arranque:'Cada alumno/a con un churro, desplazamientos variados.',intencionada:'Tenemos figuras cuadradas y rectangulares flotantes al lado de la segunda escalera, y los/las alumnos/as se desplazan desde la primera escalera. Cogen una figura y la llevan desplazándose por el agua hasta al lado de la primera escalera (parte más ancha donde se sientan los/las niños/as).\nAllí van construyendo un cuadrado gigante, con las figuras que van llevando.\nCuando han terminado de llevar todas las figuras, sentamos a todos/as entre la primera y la segunda escalera, y sin churro, ayudamos de uno/a en uno/a a desplazarse hasta la corchera y vuelta.',reflexion:''},
{id:'S62-3_urte',cod:'S62',nom:'Animales Marinos',nom_es:'Animales Marinos',adina:'3 urte',inst:'Piscina pequeña y recreativa',pto:'Piscina pequeña',materiala:['Churros','10 discos sumergibles','2 aros grandes','8 pelotas'],arranque:'Nos encontramos en la piscina pequeña y nombramos animales marinos que conocemos: delfines, ballenas, belugas……\nY hablamos de las cosas características que hace cada uno: ballena echa agua por la joroba, el delfín juega mucho, la beluga habla bajo del agua con ondas….. intentaremos imitarlos.',intencionada:'Jugaremos con las pelotas como hacen los delfines haciendo pases también pasaremos por el aro grandes. Con el churro bajo los brazos o a caballito.\nHaremos saltos dentro del aro, de diferentes formas.\nEcharemos en la isla los discos para buscarlos.\nIntentaremos oír debajo del agua\nVolvemos a la piscina pequeña para seguir jugando.',reflexion:''},
{id:'S63-3_urte',cod:'S63',nom:'FORMAS',nom_es:'FORMAS',adina:'3 urte',inst:'Piscina infantil e irregular',pto:'Piscina chapoteo',materiala:['Churros','flotantes de diferentes formas','colores (amarillos','azules)','tapiz amarillo','txirrista'],arranque:'Jugamos en la infantil: ¿metemos la cara en el agua?',intencionada:'En la piscina recreativa (Z.P.P): txirristatik salto y salir por la segunda escalera, llevaremos las fichas flotantes hasta la colchoneta donde separaremos por formas las figuras.\nSaltos sin churro',reflexion:''},
{id:'S65-3_urte',cod:'S65',nom:'JANARIAK',nom_es:'JANARIAK',adina:'3 urte',inst:'Igerileku txikia eta ertainean',pto:'',materiala:['Tapiz handia','ispilua eta txurroak'],arranque:'Taula handitik era desberdinetan pasatu eta uretara salto egingo dute. Hau egiten dauden bitartean gozaltzeko zer jaten duten galdetuko diegu. Fruta, ogia, esnekiak etab jatea komenigarriak direla esango diegu. Eta kominigarriak ez direnak aipatuko ditugu ez jateko aholkatuz.\nAusnarketa:\nIgerileku ertainean danak uretara salto egin eta gero taula handia mahai bezala erabiliko dogu eta mahaiaren inguruan jarriko gara bazkaria, merienda eta afariari buruz hitz egiteko. Zein den beraiek duten janaririk gogokoena galdetuko diegu.\nBukatzeko salto batzuk egingo dituguz. Bakoitzak gozarian, bazkarian, meriendan edo eta afarian jaten duten zerbait aipatuz. Salto egiterakoan ispiluan ikusiko gara?',intencionada:'',reflexion:''},
{id:'S66-3_urte',cod:'S66',nom:'ZONALDEKA JOLASEAN.',nom_es:'ZONALDEKA JOLASEAN.',adina:'3 urte',inst:'Igerileku txikia eta jolas-igerilekua',pto:'',materiala:['Tirolinako soka','urpeko soka','txirrista','uztai handiak','uztai txikiak','irla eta 2 mahai'],arranque:'Igerileku txikian flotabilitateko ariketak (izarra, goraka, beheraka...) eta ur azpiko fitxak jasotzen ibiliko gara (burua sartuz)',intencionada:'4 urtekoen saioa aprobetxatuko dugu gure 3 urteko umeekin ere frogatzeko.\nHona hemen 4 urtekoen saioaren zonaldekako eskema:\n1 2 3\n1.- URPEKO ZONALDEA: Uztairen bat hartuko ete dute? Edo uztaitik pasatuko ote dira?\n2.- DESPLAZAMENDU ETA SALTOEN ZONALDEA: Txirrista aprebetxatu dezakegu.\n3.- SOKEN ZONALDEA: Nor ausartuko da tximinoen bezala sokatik joaten?',reflexion:''},
{id:'S67-3_urte',cod:'S67',nom:'FRUTAK',nom_es:'FRUTAK',adina:'3 urte',inst:'Infantil y Recreativa',pto:'En el tapiz al lado de NATA1',materiala:['figuras flotantes amarillos (plátanos)','verdes (manzanas)','churros'],arranque:'Jugamos en Infantil.',intencionada:'Vamos a la compra en bicicleta (zaldia). Compraremos plátanos y manzanas. Haremos desplazamientos por la tienda (sin txurro el que pueda y el que no con txurro bajo brazos). Cuando hayamos comprado lo suficiente, volvemos a casa y, puff! Que cansado estoy, voy a tumbarme en el sofá (izarra)',reflexion:'Enseñamos un poco las figuras de los números y que vayan reconociendo cómo se llaman y su orden.'},
{id:'S68-3_urte',cod:'S68',nom:'FORMAS: HACEMOS UNA CASA',nom_es:'FORMAS: HACEMOS UNA CASA',adina:'3 urte',inst:'Recreativa',pto:'Al lado de la segunda escalera',materiala:['Churros','cuadrados/rectángulos flotantes (2º escalera)','tobogán'],arranque:'Desplazamientos variados desde la primera escalera hasta la segunda escalera (Z.P.P).',intencionada:'Ponemos el tobogán en la segunda escalera, y los/las niños/as van cogiendo una figura y bajan por el tobogán. Se desplazan hacia la primera escalera. Salen por ella y al lado de la escalera, van haciendo una casa entre todos.\nBajar por el tobogán sin txurro\nDesplazamientos con/sin txurro',reflexion:''},
{id:'S69-3_urte',cod:'S69',nom:'EL POLO NORTE Y LOS INUITS',nom_es:'EL POLO NORTE Y LOS INUITS',adina:'3 urte',inst:'',pto:'',materiala:[],arranque:'',intencionada:'',reflexion:'Niños:\n¿Qué pueblo habita en las regiones del polo norte? ¿Dónde viven?\n¿Ha sido divertido?\n….\nEducador\n¿Todos meten la cabeza estas alturas de la temporada?\n¿Todos entran al agua sin ayuda?\n¿El grupo en general es más independiente a la hora de realizar las actividades/tareas?\n….'},
{id:'S70-3_urte',cod:'S70',nom:'OPORRAK HELDU DIRA!',nom_es:'OPORRAK HELDU DIRA!',adina:'3 urte',inst:'Piscina infantil / piscina recreativa',pto:'Fuera del agua',materiala:['cubos de espuma'],arranque:'Primero jugamos un poco en la piscina infantil. Nos tiramos por el tobogán y explicamos que este es el último día del curso y que pronto tendrán vacaciones y no tendrán que ir al colegio.',intencionada:'Vamos a la recreativa y explicamos que en verano se puede ir a la playa. Vamos a bañarnos en la playa. Nadamos de diferentes maneras y jugamos en el agua.\nDespués de jugar un rato en el agua vamos a hacer un castillo de arena, cogeremos los cubos de espuma e iremos levantando un bonito castillo. Dejamos la caja en un lado de nuestra zona y nos desplazamos con el cubo hasta el final donde haremos el castillo.\nCuando terminemos volveremos a jugar en el agua nadando y saltando.\nTerminaremos despidiéndonos de los niños hasta el próximo curso.',reflexion:''},
{id:'S01-4_urte',cod:'S01',nom:'DE VUELTA A MI PISCINA',nom_es:'DE VUELTA A MI PISCINA',adina:'4 urte',inst:'Piscina infantil',pto:'Grada cartel 4 Urte',materiala:['Gorros (con el nombre de cada niño)','2 tapices','1 pelota'],arranque:'Para presentarnos y conocernos: colocaremos unos tapices en el suelo, al lado de la escalera de la piscina infantil y nos sentaremos en corro. El profesor será el primero en presentarse y se colocara el gorro con su nombre en la cabeza. Después cogerá una pelota y la tirará al centro y al niño que más cerca le quede la cogerá y dirá su nombre para después volver a tirársela al profesor. Este, colocara el gorro con el nombre del niño envolviendo la pelota y se la volverá a tirar para que se la ponga. El niño le tirara la pelota a quien quiera que no tenga gorro para que diga en alto su nombre y se repita todo otra vez…El ejercicio acaba cuando todos tengan el gorro puesto.',intencionada:'- “De paseo en tren”: El profesor será el maquinista y haremos el tren para dar un paseo por todos los rincones que nos interesa que conozcan, Ejm: wc, zona del material (tocaremos, veremos y nombraremos los distintos tipos de material que tenemos y que utilizaremos en los cursillos), NATA I, NATAII, piscina irregular, piscina pequeña, duchas…\n- “Vamos a mojarnos en las duchas”: En la ducha nos mojaremos partes del cuerpo: pies, manos, piernas, brazos, culos, espaldas, tripas… Todo el cuerpo a la vez…. Correremos por el pasillo de duchas encendidas…\n- Un último juego: En la piscina pequeña, cogeremos un tapiz y mientras los niños la sujetan, uno pasara por encima diciendo su nombre y así sucesivamente hasta pasar todos por encima. Repetiremos pero cambiando la forma de pasar: de pie, para atrás, rodando, por debajo (la colchoneta la sujetaran por encima de sus cabezas) El profesor hará lo mismo que el resto.',reflexion:'Mientras nos colocamos las chancletas, les preguntaremos si lo han pasado bien, si les ha gustado, si se han aprendido el nombre del profe o de algún otro niño, si quieren volver….'},
{id:'S02-4_urte',cod:'S02',nom:'De vuelta a mi piscina. Empieza el curso',nom_es:'De vuelta a mi piscina. Empieza el curso',adina:'4 urte',inst:'Piscina infantil,piscina recreativa.',pto:'Piscina infantil.',materiala:['Churros','10 pelotas de colores','un churro largo (canasta)','2tapices','1 mesa','diferente material (tablas pequeñas','aros','tubos azules...)'],arranque:'Piscina infantil\nCada niño jugará con su pelota intentando encestar en la canasta situada debajo del cristal. (Podemos poner 2 canastas)',intencionada:'Piscina irregular\nEn un tapiz atado a la corchera, en la zona poco profunda, habrá diferente material (tablas, aros…). Con un churro, e meten al agua por el lado, si se atreven y si no les ayudamos a bajar, nos desplazaremos hasta donde está el tapiz con el material, cogeremos uno y saldremos de la escalera para dejar el material encima del otro tapiz, que esta fuera, al lado de la puerta de emergencia. Aprovecharemos cada vuelta para desplazarnos de diferentes maneras. Tendremos como apoyo la isla y una mesa sumergida.\nPara acabar, intentaremos realizar unos saltos. Cuantos se han animado a saltar sin churro?',reflexion:'¿Nos resulta fácil desplazarnos de diferentes maneras?'},
{id:'S03-4_urte',cod:'S03',nom:'Formas',nom_es:'Formas',adina:'4 urte',inst:'Piscina infantil ,Piscina irregular',pto:'Piscina infantil',materiala:['Tapiz','churros','tablas','aros de colores'],arranque:'piscina infantil\nEn la piscina infantil, mientras el monitor les motiva e incita a que exploren diferentes ejercicios sencillos como gatear, tocar el suelo con las manos, meter la boca o la cabeza en el agua, estrella…..explicamos las formas más sencillas, un circulo, un cuadrado y un rectángulo.',intencionada:'Piscina irregular\nEn el tapiz hacemos diferentes formas con el material, y ya dentro del agua, en la zona poco profunda, intentaremos realizar diferentes formas con material diverso entre todos. Podremos hacer un circulo gigante con los churros? Un cuadrado? Y un rectángulo? Luego, avanzamos todos a la vez hacia la zona profunda, con el churro, hacia delante, atrás, caballito…y si alguno es capaz de avanzar sin churro, un ratito sin el',reflexion:''},
{id:'S04-4_urte',cod:'S04',nom:'2020/09/16',nom_es:'2020/09/16',adina:'4 urte',inst:'Piscina infantil, piscina recreativa.',pto:'Fuera de la piscina al lado de la escalera infantil.',materiala:['Churros','pelota','objetos flotantes (amarillos','azules)','tablas','tapiz'],arranque:'piscina infantil\nCompartimos con el grupo de 3 años que está en la infantil.\nDesplazamientos varios: tirar una pelota e ir a por ella',intencionada:'En la zona poco profunda de la recreativa pasaremos por encima de las diferentes islas (mesa y rosa). Las habremos colocado un poco separadas las unas de las otras creando un pequeño recorrido que terminamos en las escaleras. Si alguno quiere lo puede hacer sin churro.\nNos ponemos caballito con churro y nos desplazaremos hasta la otra punta de la recreativa. Pasando la pelota de adelante a atrás. El ultimo de la fila cuando recoge la pelota pasa delante y vuelve a iniciar el juego.\nVariante; Un rondo pasando la pelota\nTiramos objetos flotantes a la piscina, en la zona poco profunda y los niños deberán recogerlos y pegarlos en el tapiz creando unos bonitos dibujos. Cada vuelta solo podrán coger un objeto.',reflexion:'Sabemos el nombre del profesor y compañeros? Sabemos jugar entre todos como para hacer un rondo?'},
{id:'S05-4_urte',cod:'S05',nom:'A,B,C',nom_es:'A,B,C',adina:'4 urte',inst:'Piscina infantil, piscina recreativa',pto:'zona poco profunda de la recreativa',materiala:['aros','isla','churros','tapiz','picas azules'],arranque:'Piscina infantil\nComenzamos haciendo desplazamientos, perrito, saltando, mirando hacia arriba…., y recogiendo los aros que estarán sumergidos',intencionada:'Piscina irregular\nRealizamos diferentes desplazamientos hasta la 3ª escalera que estarán relacionados con las letras\nA: caballito B: patada crol con el churro C: patada espalda con el churro\nLanzamos las picas azules al agua en la zona poco profunda y los alumnos deberán recogerlas con el churro puesto o el que pueda sin churro, una a una para posteriormente fuera del agua, en el tapiz que esta al lado de la puerta de emergencia, tratar de representar con ellas las letras A,B y C ( se puede hacer por parejas, individualmente o en grupo)',reflexion:''},
{id:'S06-4_urte',cod:'S06',nom:'Saioa S06',nom_es:'Saioa S06',adina:'4 urte',inst:'Piscina infantil, piscina irregular',pto:'Escaleras de infantil',materiala:['Churros','tablas','pull boys','formas flotantes ( cuadrados','rectángulos) de colores','2 tapices','mesa'],arranque:'Piscina infantil\nSomos animales, nos vamos a desplazar por la piscina con las manos por el suelo y boca abajo (cocodrilos), después boca arriba (ballenas), nos desplazaremos dando saltos (ranas) y lanzándonos y poniéndonos de pies (delfines).',intencionada:'Piscina irregular\nNos vamos a conocer el mar, desde donde saldremos de una playa eligiendo nuestra embarcación ( churro o tabla), llegaremos a una pequeña isla (cajón) en la que descansaremos y después nos dirigiremos a otra isla más grande (Tapiz) en la que rescataremos un montón de animales (figuritas) que sufrieron un naufragio. Intentaremos que el tapiz con las figuras este en la zona profunda. Salimos por la 3ª escalera o los menos atrevidos por la 2ª\nEstas figuras los ordenaremos por colores y formas, pegándolos en la playa (tapiz fuera del agua).',reflexion:'Seguimos conociendo nuestra piscina y nuestro material , también las figuras y los colores.'},
{id:'S07-4_urte',cod:'S07',nom:'Números',nom_es:'Números',adina:'4 urte',inst:'Piscina infantil, piscina Recreativa',pto:'En la escalera de infantil',materiala:['Números flotantes','churros'],arranque:'Piscina infantil\nSegún van haciendo unos desplazamientos, para delante, hacia arriba a lo perro, les vamos preguntando hasta donde saben contar, utilizando los dedos de las manos, pies. Y vamos contando entre todos, tanto en euskera, como en castellano\nCuando salgamos de la infantil para ir a la irregular, a la hora de darles los churros, lo mismo, vamos contando los churros en alto.',intencionada:'Piscina irregular\nSeparamos los números (la parte exterior e interior), y los/las niños/as se van a desplazar con el churro desde la segunda escalera a la tercera escalera (parte profunda), llevando la parte exterior, y lo pegan en el tapiz que estará en el poyete de Nata 1. Les animamos para que en cada desplazamiento cambien el estilo: hacia delante, atrás, caballito\nUna vez llevado todas las partes exteriores de las fichas, llevaran de uno en uno, la parte interior de los números, y los pondrán cada uno/a en su sitio.\nCuando han llevado y completado todos los números, saldremos todos/as del agua y dejarán los churros en una esquina.\nLes ayudamos a ordenar los números.\nPara terminar la sesión, les volvemos a sentar en el borde, y ahora sin material, harán medio largo, ayudándoles nosotros/as. Repetirán un par de veces si vamos bien de tiempo. Les animamos a que hagan saltos desde el bordillo al agua',reflexion:'Enseñamos un poco las figuras de los números y que vayan reconociendo cómo se llaman y su orden.'},
{id:'S08-4_urte',cod:'S08',nom:'Tráfico',nom_es:'Tráfico',adina:'4 urte',inst:'Piscina infantil, piscina recreativa',pto:'Al lado de la escalera infantil',materiala:['Churros','piezas flotantes cuadradas de color rojo','verde','amarillo','foto o dibujo del semáforo','tapiz pequeño'],arranque:'piscina infantil\nDesplazamientos varios, y a la vez explicándoles el funcionamiento de un semáforo, practicando con ellos. Cuando el profesor dice ¨verde¨, se empiezan a mover. Si dice ¨rojo¨ se tienen que parar. Si dice ¨amarillo¨ atentos, porque se tienen que ir parando, y así en cada desplazamiento.',intencionada:'piscina irregular\nLos/las alumnos/as harán desplazamientos con el churro delante, simulando que van andando, y caballito simulando que van en bicicleta.\nSe desplazarán desde la segunda escalera hasta la tercera escalera (parte profunda). Saldrán por la escalera, e irán andando hasta la 2ª escalera.\nPonemos la ficha-foto del semáforo, en la tarima de NATA1, y las piezas de colores al lado de la 2ª escalera encima de un tapiz.\nLos/las alumnos llevarán desde la segunda escalera hasta la tercera escalera los cuadrados de colores de uno en uno, y los van dejando encima de la tarima de NATA1. Les vamos variando de estilo en cada desplazamiento. Los últimos desplazamientos el que quiera sin churro, y también les animamos a que salten del bordillo.\nDespués de llevarlos, los ordenarán los colores que se utilizan en los semáforos.\nCada uno deberá formar un semáforo.\nRojo / amarillo / verde.',reflexion:'Les explicamos de nuevo y les enseñamos los colores de un semáforo, y lo que significa cada uno. Tanto los vehículos como los peatones, deben respetarlos.'},
{id:'S09-4_urte',cod:'S09',nom:'Saioa S09',nom_es:'Saioa S09',adina:'4 urte',inst:'Piscina infantil, piscina recreativa',pto:'Escalera junto a la infantil',materiala:['Tobogán','colchoneta','fichas sumergibles','tablas','churros'],arranque:'piscina infantil\nDesplazamientos varios, y a la vez les vamos preguntando que parques de Durango conocen, y a cual suelen ir a jugar.\nLes animamos a que vayan cogiendo las fichas sumergubles, metiendo la cabeza',intencionada:'piscina irregular\nHoy iremos a jugar a nuestro parque favorito de Durango . Para ellos cogeremos la bici (Churros) y saltaremos en la 3ª escalera al agua e iremos hacia la zona poco profunda. Allí dejamos los churros e intentaremos coger los sumergibles, animandoles a que metan la cabeza\nHoy nos toca saltar, hacer volteretas y correr por el parque, y para ello utilizaremos la colchoneta. Haremos saltos variados, que corran por la colchoneta que hagan volteretas…etc.\nTambién tenemos el tobogán, nos tiraremos por él y recogeremos las tablas que hemos tirado antes al agua y haremos un castillo ( simulando una castillos de arena), en la colchoneta que dejamos al lado del tobogan. Aprovechando que tienen que recoger las tablas y dependiendo del nivel del grupo, podemos hacer largos diferentes.\nPor ultimo cogeremos las bicis (churros) y nos iremos a la piscina pequeña.',reflexion:'Antes de irnos del parque (p.irregular) hay que explicar a los niños que hay que dejar toda la piscina limpia y el material ordenado, tal como tienen que dejar el parque cuando se van a casa'},
{id:'S10-4_urte',cod:'S10',nom:'Formas: cruz',nom_es:'Formas: cruz',adina:'4 urte',inst:'Piscina infantil, piscina recreativa',pto:'Escalera p.infantil',materiala:['Churros','figuras cuadradas','rectangulares flotantes','tobogán. 2 tapices','2 mesas'],arranque:'piscina infantil\nDesplazamientos variados, intentando que hagan formas diferentes: estrella(cruz) hacia abajo, hacia arriba, bola, palillo…en cada desplazamiento',intencionada:'Piscina irregular\nPonemos el tobogán a la derecha de las segunda escalera, un tapiz con las figuras en la 2º en la 3ª escalera, en la tarima de nata 1. Los/las alumnos/as van cogiendo una figura y se deslizan por el tobogán. Se desplazan hacia la tercera escalera. Salen por ella y al lado de la escalera, van haciendo una cruz con 2 cuadrados y 1 rectángulo.\nEn un principio desplazamientos con el churro, cambiando de estilo en cada vuelta, y mas adelante sin churro, el que quiera o pueda. Tendran las 2 mesas para descansar\nSi sobran piezas y tiempo, van haciendo otra cruz.',reflexion:'Explicarles diferentes formas de hacer una cruz'},
{id:'S11-4_urte',cod:'S11',nom:'Números',nom_es:'Números',adina:'4 urte',inst:'Piscina infantil, piscina  Recreativa',pto:'',materiala:['Dado con imágenes de animales','aros sumergibles','conos (4)','4 fichas plastificadas con los números: 5'],arranque:'piscina infantil\nMientras que chapotean y hacen desplazamientos varios, vamos repasando los números, del 1 al 10, al 20, hasta donde sepan, contando los dedos, personas, extintores….',intencionada:'Piscina irregular\nEn la zona no profunda:\nTirarán el dado y nadarán de acuerdo al animal que sale en el dado desde el bordillo hasta la corchera, ej. Si sale el delfín nadarán como un delfín, si sale una ranita, nadarán como una ranita, podrán nadar desde el bordillo hasta la corchera y volver\nTiramos los aros\nDeberán colocar los aros en los conos, según los números que estarán indicados, 5, 7, 10, 12, colocarán un aro en los conos hasta completar el número que se les indica. Si alguno no es capaz de coger aros animar que se ayuden unos a otros\nSi lo hacen con facilidad en la zona no profunda, llevamos los conos entre la 2º y 3ª escalera y probamos en la zona profunda con desplazamientos entre las 2 escaleras.\nAntes de irnos a la piscina infantil volvemos a contar los aros de cada cono y repasamos los números',reflexion:'¿Hasta qué numero saben? ¿Son capaces bucear en zona profunda? ¿Son capaces de ayudarse entre ellos para coger aros?'},
{id:'S12-4_urte',cod:'S12',nom:'Saioa S12',nom_es:'Saioa S12',adina:'4 urte',inst:'Piscina infantil,piscina recreativa',pto:'Fuera de la piscina infantil',materiala:['Churros','tablas pequeñas','pull boys','2 mesas'],arranque:'Piscina infantil\nImitar el nado de diferentes animales, ¿como nadaría un delfín,? y ¿un pulpo?, cangrejo, mono, perro, rana, etc..haciendo desplazamientos.',intencionada:'Piscina irregular\nEn la zona no profunda Cada niño y en orden piensa y dice el nombre de un animal, y tienen que saltar e ir hasta la 2º escalera, imitando al animal. En cada salto y desplazamiento va alternándose el niño que dice el animal. ( No vale repetir animal)\nPasamos a la zona profunda y repiten lo mismo, pero aquí cada niño puede utilizar el material que quiera ( churro, tabla, pull, o sin nada)para desplazarse entre las 2 escaleras pero siempre intentando imitar al animal.',reflexion:'Que animal les gusta mas? Son capaces de hacer caso al niño que esta diciendo el animal a imitar?.Que tal imtando a cada animal (imaginación) ¿'},
{id:'S13-4_urte',cod:'S13',nom:'Entornos: ríos',nom_es:'Entornos: ríos',adina:'4 urte',inst:'Piscina infantil, piscina irregular',pto:'Escalera p.infantil',materiala:['Churros','tobogán','tirolina','cuerda sumergida','pasarela(en p. infantil)'],arranque:'Piscina infantil\nLes explicamos que la piscina es un rio y deben de atravesar de un lado al otro. Luego la pasarela es un puente del que no se pueden caer al rio. Intentan en equilibrio no caerse, a gatas o de pie',intencionada:'Piscina irregular\nEn la piscina parte poco profunda, hablamos de los ríos donde nacen y donde mueren, e intentan atravesar el rio, explicando que hay una isla en el medio.\nPonemos el tobogán en la 2ª escalera, hacia la parte profunda, y hacemos que bajen por el tobogán y se desplacen con el churro hacia la 3ª\nHacemos un rio en la piscina con las corcheras, tirando varios churros grandes al agua…, y tienen que pasear por rio nadando en diferentes estilos y formas.\nPara acabar desde la 3ª escalera, van por la tirolina hasta pasar la corchera por encima( a otro rio ) y volver, soltando la cuerda y pasando la corchera por debajo. Repiten varias veces.',reflexion:'Conocen algún rio?, alguno de Durango?. Han aprendido donde nacen y donde desembocan.Saben si el agua sabe igual que el del mar?'},
{id:'S14-4_urte',cod:'S14',nom:'isatsaren ipuina',nom_es:'isatsaren ipuina',adina:'4 urte',inst:'Piscina infantil, Piscina Recreativa',pto:'tapiz',materiala:['2 tapices','churros','tablas pequeñas','tobogán','mesa','aros pequeños','cubo con las colas de los animales','animales pegados en el tapiz'],arranque:'Piscina infantil\nMientras que chapotean y se mueven de un lado al otro les vamos preguntando que animales conocen, y si tienen rabo o no. Les tiramos unos aros para que vayan cogiendo y les vamos preguntando si los animales acuáticos tienen rabo',intencionada:'Piscina irregular\nNos juntamos en el punto de encuentro y les contamos el cuento:\n“Aspaldi aspaldian animali batek ere ez zuen isatsik, zaldiak ez zeukan buztana, ezta izurdeak, ezta baleak, ezta txakurrak, ezta katuak, ezta kokodriloak.\nAnimali batek ere ez, ez zeukan isatsik.\nEgun batean, isatsez beteriko gurdi bat zeukan saltzaile bat agertu zen, animaliek jakin zutenean, oso pozik jarri ziren.\nZaldiak esan zuen erosiko zuen isatsarekin gainean jartzen zitzaizkion euli guztiak uxatuko zituela, tximuak berriz, zuhaitzetako adarretan eskegiko zela esan zuen eta arrainek buztanarekin azkarrago igeri egingo zutela esan zuten.\nAnimaliak buztana edukitzeko irrikatan zeudenez, korrika joan ziren saltzailerengana eta hartu zuten lehenengo isatsa erosi zuen bakoitzak, horrela, tximuak kokodrilo isatsa izan zuen, kokodriloak zaldi isatsa, zaldiak txerri isatsa eta txerriak tximuarenak.\nAnimali bakarrak ere ez zuen balio zion isatsa, horregatik animali guztiak oso triste jarri ziren, isatsa izan arren ezertarako balio ez zielako.\nLagunduko diegu animaliei pozik jartzen?, jarriko diegu animali bakoitzari tokatzen zaion isatsa?”\nCogerán una cola del cubo, que estará al lado de la 2ª escalera, bajaran por el tobogán e irán nadando hasta la otra punta de la piscina, saldrán por la escalera y en el tapiz, fuera del agua, estarán los animales, le colocaran la cola al animal correcto. Utilizaran churro y una tabla\nAhora, tendrán que nadar imitando a los animales de nuestro cuento, bajando del tobogán hasta la 3ª escalera',reflexion:'¿Cómo nadaría un pez?, y ¿un cocodrilo y un caballo? ¿Han aprendido para qué sirve el rabo en los animales?\n¿Han atendido al cuento? (es el primer cuento que les contamos esta temporada)'},
{id:'S15-4_urte',cod:'S15',nom:'Entorno',nom_es:'Entorno',adina:'4 urte',inst:'Piscina infantil, piscina recreativa',pto:'En la escalera de piscina infantil',materiala:['Fotos de Durango','churros','tablas pequeñas','2 tapices'],arranque:'Piscina infantil\nMientras los niños van haciendo unos desplazamientos vamos explicando las características de nuestro pueblo Durango, que tiene muchos parques, jardines, calles, ríos, etc...',intencionada:'Piscina irregular\nEn la zona poco profunda cada niño debe decir un sitio de Durango que conozca o le guste, saltar e ir hasta la 2ª escalera. Repetimos varias veces preguntándoles a que escuela van, parque van, donde viven...\nDesde la 2ª escalera donde estará un tapiz con fotos de Durango, irán llevando una a una las fotos hasta la 3ª escalera, al tapiz que estará en la tarima de Nata1, con ayuda del churro, más adelante con tabla y luego sin material. Cuando acaben con las fotos les juntamos y vamos preguntando si conocen los sitios de las fotos.\nEntre la 3ª escalera y la pared, saltan diciendo los sitios que han conocido hoy de Durango, van hasta la corchera y vuelven. Cada salto, intentamos que sea diferente, como el estilo de nado.',reflexion:'¿Conocen Durango? ¿Saben explicar donde viven o a que escuela van?'},
{id:'S16-4_urte',cod:'S16',nom:'Mis cuentos en la piscina',nom_es:'Mis cuentos en la piscina',adina:'4 urte',inst:'Piscina infantil, piscina recreativa',pto:'Escalera parte profunda.',materiala:['Churros','tablas pequeñas','algas','tapiz'],arranque:'Piscina infantil\nMientras que chapotean explicamos la sesión: escenificación del cuento,( Uga, la tortuga). Les animamos a que se desplazen como tortugas, cambiando de sentido, mirando hacia abajo, hacia arriba..',intencionada:'Piscina irregular\nDesarrollo del cuento : Uga la tortuga.\nErase una vez una tortuga que se llama Uga que vivía en una charca la cual estaba muy sucia. La gente echaba basura al agua y Uga no podía ir a buscar comida.\nEn la zona poco profunda echamos las algas al agua y seguido las tablas. En este caso, los alumnos/as son las tortugas, y las tablas son la basura. Tienen que limpiar el agua, recogiendo las tablas, para poder ir a buscar la comida.\nRecogen las tablas y crean una cabaña en el tapiz que esta al lado de la 2º escalera, para guardar la comida de las tortugas, intentando hacer equipos de dos.\nRecogen las algas, y las guardan en la cabaña. También en equipo.\nCon todo limpio, se echan a nadar y comprueban que no hay más comida.\nVamos para la zona profunda y volvemos a echar las algas y las tablas, para que realicen varios viajes( el que necesite churro, con el ) desde la 2ª a la 3ª escalera. De nuevo hacen una cabaña, pero ahora entre todos',reflexion:'Han entendido que se debe dejar la charca limpia, y la basura(material) ordenado? Son capaces de trabajar por parejas o en equipo?\nCogen con facilidad las algas en la zona profunda?'},
{id:'S17-4_urte',cod:'S17',nom:'Saioa S17',nom_es:'Saioa S17',adina:'4 urte',inst:'Piscina infantil, piscina recreativa',pto:'Escalera p.infantil',materiala:['figuras rectangulares','cuadradas flotantes','2 mesas','aros lastrados (simularan paseo hasta las cruces)','3 tapices de agujeros (donde haremos la construcción)'],arranque:'piscina infantil\nMientras juegan les vamos preguntando si conocen urkiola y las 3 cruces, y les vamos explicando ese entorno',intencionada:'Piscina irregular\nEn la zona poco profunda realizan varios saltos en forma de cruz, y van hasta la 2º escalera\nEn la zona profunda ,vamos a Urkiola de paseo. Allí tendremos que crear las 3 cruces, en los 3 tapices que estarán en la tarima de nata 1,(en horizontal o vertical) con los cubos de colores, que estarán en la entrada de la 2º escalera. De ahí van hasta la 3ª escalera llevando en cada vuelta una pieza y en un estilo diferente.\nIntentamos que hagan varias cruces diferentes\nCada monitor montara su circuito dependiendo del nivel de los grupos, con los aros lastrados y las mesas.',reflexion:'Conocen el entorno? Conocen mas montes? Son capaces de realizar cruces diferentes?'},
{id:'S18-4_urte',cod:'S18',nom:'LAS ESTACIONES/ÉPOCAS DEL AÑO',nom_es:'LAS ESTACIONES/ÉPOCAS DEL AÑO',adina:'4 urte',inst:'Piscina infantil Piscina Recreativa',pto:'Fuera del agua, junto al tapiz con el árbol.',materiala:['2 tapices grandes','2 fantasmas (“el tronco del árbol”)','hojas de colores plastificadas','pasarela','aros pequeños','un cubo. CIRCUITO: Pasarela','Tapiz atado al bordillo','Aro de media flotabilidad','tablas pequeñas (o cualquier objeto)','un churro largo con un conector'],arranque:'Piscina infantil\nJugaremos al “Un dos tres Calabin calavera”',intencionada:'- “El árbol en otoño”: Piscina Irregular. Vamos a crear entre todos 2 árboles con sus hojas. Para ello contamos con 2 tapices grandes, “el tronco” (fantasma) y un cubo lleno de hojas de colores. Montaremos nuestro árbol encima del tapiz. Este será nuestro punto de encuentro. Pero ha llegado el otoño a nuestra piscina, ¿Qué le pasará a nuestro árbol? Iremos deshojando poco a poco el árbol llevando cada uno una hojita hasta el cubo ahora situado en la 3ª escalera, encima de la tarima. Tendrán que volver al árbol y coger otra hoja hasta que desaparezcan. (Una vez que han ido una vez a recoger las hojas de forma individual, en las siguientes lo haríamos por parejas, cambiando tantas veces como se pueda de pareja. Igualmente en cada viaje podemos cambiar la forma de desplazarnos o de traer el material.)\n- “Nos vamos al sur”: Les explicaremos a los niños que en otoño, antes de que llegue el invierno, muchos pájaros se marchan muy lejos en busca de comida y mejor tiempo. En ese viaje tan largo tienen que hacer frente a muchas adversidades. Es entonces cuando nos vamos a convertir en PAJAROS. Nos vamos de viaje…\nPara simular el viaje montaremos el siguiente circuito, el cual tendrán que atravesar para llegar a su paraíso…\nPara llegar a las tierras cálidas daremos 2 vueltas al circuito. La primera vuelta la darán como quieran. En la segunda vuelta les contaremos q hace mucho viento y que tendrán que dar por lo menos un giro (eje transversal o longitudinal) en cada estación. HEMOS LLEGADO AL PARAISO!!\n- “Comemos y descansamos al sol”: Iremos a la parte poco profunda de la piscina irregular, este es nuestro paraíso. Aquí tenemos comida (aros) que tendremos que recolectar fuera del agua. Una vez de comer bien es la hora de descansar. ¿Somos capaces de dormir en el agua sin movernos?',reflexion:'¿Conocen las estaciones del año? ¿Cómo se arreglan por parejas? ¿Qué tal se arreglan en el circuito?'},
{id:'S19-4_urte',cod:'S19',nom:'EL MUNDO DE LOS ANIMALES Y SUS HABITATS',nom_es:'EL MUNDO DE LOS ANIMALES Y SUS HABITATS',adina:'4 urte',inst:'Piscina infantil y recreativa',pto:'Escalera piscina infantil',materiala:['Aletas de tiburón','isla','algas','pasarela (p.infantil)','aros','tubos azules'],arranque:'(Infantil)\nProcuraremos pasar por la pasarela de distintas maneras. A gatas, de rodillas sin tocarla con las manos, de pie, por debajo,…. En equilibrio',intencionada:'(Recreativa)\nJuego “TIBURONES Y DELFINES”\nNos pondremos las aletas de tiburón\nEn la zona poco profunda:\nImitaremos a los animales.\nEcharemos todos los tubos azules (Peces) al agua y tendremos que nadar de un lado al otro intentando tocar lo menos posible los peces.\nMiraremos al fondo marino donde habrá aros, algas,…\nTenemos hambre. Tendremos que pescar nuestra comida. Cogeremos los peces y los llevaremos a la orilla para comérnoslos.\nJuego “TIBURONES CONTRA DELFINES”\nEn la zona profunda\nPara ello haremos una carrera entre delfines y tiburones por lo tanto haremos 2 grupos. La mitad serán tiburones y la otra mitad delfines.\nTiraremos la comida (aros, tubos azules) entre las 2 escaleras ¿Quiénes comerán más? ¿Quiénes estarán más hambrientos?\nAl final haremos un recuento de la comida y dejaremos todo ordenado',reflexion:'Buceo\nVista(Mirar pero no tocar la comida)\nMemoria (contar la comida)\nSaltos\nDivertido\nTrabajo individual y de grupo (¿Qué tal se han arreglado en grupos?)'},
{id:'S20-4_urte',cod:'S20',nom:'LA SALUD Y LOS ALIMENTOS',nom_es:'LA SALUD Y LOS ALIMENTOS',adina:'4 urte',inst:'Piscina infantil, piscina recreativa.',pto:'Al lado de la escalera, en la puerta de emergencia',materiala:['Tapiz','fotos de alimentos','cuatro cubos','churros para los que les hace falta'],arranque:'Saltos individuales: Dos saltos diciendo en voz alta alimentos que comen en el desayuno, dos saltos con alimentos que comen en el almuerzo, dos saltos con alimentos que comen en la merienda y dos saltos con alimentos que comen en la cena.',intencionada:'Tapiz situado al lado de la 3ª escalera donde salen los niños/as del agua. Encima del tapiz estarán las fotos de los alimentos, cada niño/a cogerá una foto y llevara andando a la otra escalera donde estarán situados cuatro cubos. Estos cubos estarán vacíos y el monitor les dirá en cual tiene que meter los alimentos relacionados con el desayuno, almuerzo, merienda y cena. En cada vuelta entraran al agua y nadaran como el monitor les pida.\nA medida que vienen con las fichas les explicamos cada alimento y si saben diferenciarlos, y cuales son saludables y cuales no',reflexion:'¿Son capaces de diferenciar alimentos?'},
{id:'S21-4_urte',cod:'S21',nom:'DURANGO – URKIOLA – POL POL – ANBOTO IBILALDIA!',nom_es:'DURANGO – URKIOLA – POL POL – ANBOTO IBILALDIA!',adina:'4 urte',inst:'Nata 2',pto:'1.go eskailera ondoan.',materiala:['Mahai bat + pesa lotuta','3 kubo','10 baso eta tapiz handia'],arranque:'Oinez, korrika eta saltoka ibiliko gara ibilaldirako beroketak eginez.',intencionada:'Gaurkoan ibilaldi bat egitera joango gara. Ibilaldi hau etapa ezberdinetan banatuko dugu. Etapa bakoitza egiten dugu lasimulatzeko modu desberdinetan egingo dugu igeri. Eta toki bakoitzean aurkitzen dugun berezitasunaren arabera, froga bat egin beharko dugu denon artean.\n1.- Durango –Urkiola. (Igerian)\nBerezitasuna: Eliza aurrean dagoen “meteoritoa”. Kondairak dio bereinguruan 7 buelta emanez gero mutil/neskalaguna aurkituko duzula.\nFroga: Ur-azpian mahai bat dago flotatzen duen pesa bat lotuta duena, hau izango da guremeteoritoa. Honi eman beharko dizkiogu 7 buelta igerilekutik ateraa urretik.\n2.- Urkiola - Pol Pol(Igerian)\nBerezitasuna; Pol poleko iturria. Ur minerala ematen duen 3 txorrotakoi turri bat da.\nFroga: 3 kubo egongo dira uretatik kanpo. Denen artean eta basoen laguntzaz bete beharko dituztenak. Gure iturria izango da.\n3.- Pol pol–Anboto(Igerian)\nBerezitasuna; Anbotoko Marinkoba. Kondairak dio koban Mari bizi dela eta bertatik atzeraka irten behar garela beti berarekiko errespetuaerak utsiz, bestela bertan geldituko garela betirako.\nFroga: Tapiz bat jarriko dugu igerileku iskinan eta bertatik atzeraka ibiliko gara uretara salto eginez.\nErreflexioa\nEzagutzen zuten ibilaldi hau? Lekuak?',reflexion:''},
{id:'S22-4_urte',cod:'S22',nom:'Saioa S22',nom_es:'Saioa S22',adina:'4 urte',inst:'Piscina recreativa',pto:'1ª Escalera piscina irregular',materiala:['Churros','aros pequeños','cono','mesa','2 tapices','fichas de acciones'],arranque:'En la zona poco profunda, tiramos aros y con diferentes saltos cogen y salen por la 2ª escalera\nEn la zona profunda, ponemos una mesa con un cono encima posada en el agua de modo que retenga aire debajo y se quede flotando. Repartiremos los aros que tenemos entre los niños y lanzaran desde fuera, intentando meterlos en el cono. Cuando acaban, les decimos que salten a recoger los que han fallado y repetimos 2-3 veces.',intencionada:'Tendremos unas fichas preparadas con diferentes acciones. En una ficha tendremos una imagen de la acción y en otra la acción escrita con otra pequeña imagen relacionada como ayuda.Ejemplo:\n‘‘Saltar\'\' \'\'gritar\'\' \'\'Nadar\'\' \'\'Leer\'\' comer\'\' \'\'pintar\'\'\nVemos las fichas y emparejarlas primero en el tapiz que está en la tarima de Nata 1 para que las conozcan. Después todas estas fichas las pondremos al lado de la 2ª escalera en otro tapiz boca abajo. Dependiendo del nivel del grupo podemos separar los dibujos de las palabras y reducir o aumentar y aumentar o reducir el número de fichas.\nLos niños tendrán que realizar un recorrido que les plantaremos y por cada vuelta podrán levantar 2 fichas. Cada vuelta nadan de diferente estilo. Si son pareja las apartaran y si no lo son las volverán a dejar boca abajo. Cuando tengamos todas las parejas hechas entre todos clasificaremos las conductas en \'\'correctas\'\' o \'\'incorrectas\'\' debatiendo las razones. Si vemos que no participan todos pediremos, que se ayuden entre ellos.',reflexion:'¿Los niños asimilan comprendiendo los motivos por lo que son correctas o incorrectas las diferentes conductas en lugar de ser solo receptores de órdenes? ¿Les ha costado emparejar las fichas? Trabajamos la memoria, la compresión lectora y las asociaciones de conceptos.\nEjemplo de recorrido. Se puede modificar'},
{id:'S23-4_urte',cod:'S23',nom:'MIS CUENTOS EN LA PISCINA',nom_es:'MIS CUENTOS EN LA PISCINA',adina:'4 urte',inst:'Piscina recreativa',pto:'1ª escalera, fuera del agua',materiala:['2 tapices grandes','dibujos plastificados de la liebre','la tortuga','churros','4 pull-boys'],arranque:'Zona poco profunda\nPegaremos las fichas de la liebre y la tortuga en el tapiz. Poniendo otro tapiz en el borde jugamos a imitar los movimientos de los 2 animales. La liebre dando saltos y la tortuga a 4 patas y despacio. De este modo se meterán en el agua imitando a estos animales.',intencionada:'Zona profunda\nLos desplazamientos entre la 2ª y 3ª escalera\nContamos a los niño el cuento (Sin enrollarnos en exceso):\nLa liebre siempre se reía de la tortuga, porque era muy lenta. —¡Je, ¡el En realidad, no sé por qué te molestas en moverte -le dijo.\n-Bueno -contestó la tortuga-, es verdad que soy lenta, pero siempre llego al final. Si quieres hacemos una carrera.\n-Debes estar bromeando -dijo la liebre, despreciativa- Pero si insistes, no tengo inconveniente en hacerte una demostración.\nEra un caluroso día de sol y todos los animales fueron a ver la Gran Carrera. El topo levantó la bandera y dijo: -Uno, dos, tres… ¡Ya!\nLa liebre salió corriendo, y la tortuga se quedó atrás, tosiendo en una nube de polvo. Cuando echó a andar, la liebre ya se había perdido de vista.\nAquí con un churro y la ficha de la liebre imitaremos sus desplazamientos. Saltos.\n“¡Je, je! ¡Esa estúpida tortuga!”, pensó la liebre, volviéndose\n“¿Para qué voy a correr? Mejor descanso un rato.”\nAsí pues, se tumbó al sol y se quedó dormida, soñando con los premios y medallas que iba a conseguir.\nMientras pondremos 4 pull-boys para imitar los pasos de la tortuga. Planteamos a los niños un desplazamiento por el agua y con cada desplazamiento podrán dar un paso de la tortuga. Seguimos hasta donde esta la liebre.\nLa tortuga siguió toda la mañana avanzando muy despacio. La mayoría de los animales, aburridos, se fueron a casa. Pero la tortuga continuó avanzando. A mediodía pasó ¡unto a la liebre, que dormía al lado del camino. Ella siguió pasito a paso.\nY seguimos hasta donde está la meta y cuando estamos a punto de llegar:\nFinalmente, la liebre se despertó y estiró las piernas. El sol se estaba poniendo. Miró hacia atrás y se rió:\n—¡Je, ¡el ¡Ni rastro de esa tonta tortuga! Con un gran salto, salió corriendo en dirección a la meta para recoger su premio.\nPero cuál no fue su horror al ver desde lejos cómo la tortuga le había adelantado y se arrastraba sobre la línea de meta. ¡Había ganado la tortuga! Desde lo alto de la colina, la liebre podía oír las aclamaciones y los aplausos.\n-No es justo -gimió la liebre- Has hecho trampa. Todo el mundo sabe que corro más que tú.\n-¡Oh! -dijo la tortuga, volviéndose para mirarla- Pero ya te dije que yo siempre llego. Despacio pero seguro.',reflexion:'Valoramos cual es la razón por la que a ganado la tortuga. Cual es la cualidad y actitud adecuada? Ven la diferencia?'},
{id:'S24-4_urte',cod:'S24',nom:'DIAS DE LA SEMANA',nom_es:'DIAS DE LA SEMANA',adina:'4 urte',inst:'Piscina infantil, piscina irregular',pto:'Grada',materiala:['Aros','fantasmas','2 mesas','2 aros grandes sumergibles'],arranque:'Grada y p. infantil\nMientras pasamos lista preguntamos que dia de la semana es.Es normal que en esta edad todavía no sepan. Entramos a la piscina infantil y mientras juegan explicamos que la semana tiene 7 dias, 5 hay que ir a la ikastola, 2 para jugar y vamos cantando entre todos: astelehena, asteartea….',intencionada:'En la zona poco profunda:\nHacen 7 saltos diferentes, intentando en cada salto que vayan diciendo los días de la semana\nEn la zona profunda\nSeguimos explicando los días, diciéndoles que 5 dias ikastola, 2 dias jai, y asi en cada dia de la semana tienen que hacer una actividad diferente\nAstelehena: En la 2º escalera tiramos los aros a la rampa, saltan, cogen y sale por las escaleras que están enfrente, pasando la corchera\nAsteartea: Saltan en la 2ª escalera y hasta la 3ª nadando como quieran\nAzteazkena:Lo mismo pero pasando por entre los aros sumergibles\nOsteguna: Cogen los mamuak, y un par de idas y vueltas en estilos diferentes\nOstirala: Desde la 2ª a la 3ª escalera, varias vueltas nadando, intentando en cada vuelta que cambien de estilo\nLarunbata: Jai eguna!! Saltos en la 3ª escalera\nIgandea: Jai eguna!!! Vamos a la p.infantil',reflexion:'Han aprendido los días de la semana? Se han quedau con los días de ikastola y los días de fiesta?'},
{id:'S25-4_urte',cod:'S25',nom:'Durangoko tokiak: Euskararen egunean  Parkera goaz.',nom_es:'Durangoko tokiak: Euskararen egunean  Parkera goaz.',adina:'4 urte',inst:'Recreativa',pto:'en la recreativa junto a la infantil',materiala:['Tobogán','colchoneta','fichas sumergibles','tablas','churros'],arranque:'Hoy iremos a jugar a nuestro parque favorito de Durango ( preguntarles cual es). Para ellos cogeremos la bici (Churros) y saltaremos al agua e iremos hacia la zona poco profunda. Allí dejamos los churros e intentaremos coger los sumergibles.',intencionada:'Ahora nos toca saltar, hacer volteretas y correr por el parque, y para ello utilizaremos la colchoneta. Haremos saltos variados, que corran por la colchoneta que hagan volteretas…etc.\nTambién tenemos el tobogán, nos tiraremos por él y recogeremos las tablas que hemos tirado antes al agua y haremos un castillo ( simulando una castillos de arena). Aprovechando que tienen que recoger las tablas y dependiendo del nivel del grupo, podemos hacer largos diferentes.\nPor ultimo cogeremos las bicis ( churros) y nos iremos a la piscina pequeña.',reflexion:''},
{id:'S26-4_urte',cod:'S26',nom:'BASAJAUN',nom_es:'BASAJAUN',adina:'4 urte',inst:'Recreativa',pto:'En la recreativa junto a la infantil',materiala:['10 flotantes verdes (V)','10 Morados (M)','10 Amarillos(A)','10 vasos','pasarela (2ª escalera)','mesas','aros lastrados'],arranque:'Juego libre 5´ en la zona poco profunda mientras vienen los de 3 años.',intencionada:'***TIRAR TODO EL MATERIAL AL AGUA***\n(1ª Vasos Z.P.P./2ºFlotantes Z.P.)\nEl bosque está muy sucio y tenemos que limpiarlo para poder encontrar la casa de Basajaun… “Basajaun es el Señor del Bosque” y no le gusta que esté sucio. Tenemos que limpiar toda la zona.\n1º TIRAR VASOS: recoger los vasos y hacer una torre, que será su casa. Colocaremos los vasos en la tarima blanca de Nata I\n2º TIRAR FLOTANTES: Pasarela-mesa-aro-mesa.\nHaciendo el recorrido, saliendo desde la 2º escalera, iremos recogiendo los flotantes para cercar la casa de Basajaun y así no volver a mancharla.\nCon los flotantes haremos:\nAMARILLO: PASILLO A CASA (Bidea)\nVERDE: JARDIN\nMORADO: VALLA JARDIN',reflexion:''},
{id:'S27-4_urte',cod:'S27',nom:'jarrera',nom_es:'jarrera',adina:'4 urte',inst:'Piscina recreativa e infantil',pto:'En la irregular junto a la infantil.',materiala:['Churros','figuras  flotantes','pulls'],arranque:'Nos encontramos en la piscina infantil. El profesor hará de Olentzero o MariDomingi. El niño se sentará en sus piernas y le contará que tal se ha portado durante el curso de natación los diferentes días. Después le pedirá un regalo (figura), que se encontrarán al otro lado de la piscina. El Olentzero o Mari Domingi le dará permiso para que vaya a recogerlo.',intencionada:'En la piscina recreativa, los niños harán de Olentzero o de Mari D. Montados en churros simulando que es el burro, prepararan las figuras para repartirlas a los niños que hayan tenido una buena "jarrera" durante el año, de un lado de la piscina a la otra.\nCuando esten todas las figuras encima del tapiz, transportaran entre todos los regalos, pero... se les pierden por el camino! El/la monitora tirara todos los regalos al agua y los crios los tendran que sacar del agua para poder repartirlos a los niños a la noche!',reflexion:''},
{id:'S28-4_urte',cod:'S28',nom:'FAMILIAK ETA UMEAK',nom_es:'FAMILIAK ETA UMEAK',adina:'4 urte',inst:'Piscina Infantil y recreativa',pto:'Sentados/as en la grada, sitio de 4 años.',materiala:['Churros','figuras flotantes','10 fantasmas','tapiz amarillo'],arranque:'Piscina infantil\nEmpezamos en la piscina infantil, para que los/las niños/as se suelten un poco con los/las padres/madres. Todos, niños y familiares metemos la cabeza, hacemos la estrella hacia abajo, hacia arriba,\nDespués repartimos un churro a cada alumno/a y vamos a la piscina recreativa, parte poco profunda.',intencionada:'Piscina recreativa\nSentamos a todos/as los/as niños/as en el borde de la piscina, en la zona poco profunda, y los padres/madres se meten en el agua.\nUnos desplazamientos entre la 1ª y 2ª escalera,con y si churro, para que vean cómo van los/las niños/as.\nPaszmos a la zona profunda. Tenemos el tapiz amarillo, en la tarima de Nata 1, y la caja con las figuras flotantes al lado de la segunda escalera. Tanto los padres/madres como los/las niños/as fuera en la segunda escalera, van cogiendo una figura flotante cada viaje, se desplazan por el agua y salen enfrente por la 3ª escalera,al tapiz y lo pegan en él. Vuelven y cogen otro.\nPrimero unas vueltas con churro y luego cada niño/a con su padre/madre sin churro.\nCogen un mamúa entre el niño y el padre/madre y desplazamientos, turnándose entre ellos, quien va montado y quien ayuda desde dentro del agua, cambiando de posición el que va montado. Mirando hacia arriba, hacia abajo, sentado..',reflexion:'Que tal en familia?.Por parejas? Hemos notado diferencia de comportamiento en el agua del niño con o sin su familiar al lado?'},
{id:'S29-4_urte',cod:'S29',nom:'Números',nom_es:'Números',adina:'4 urte',inst:'Recreativa',pto:'En la recreativa junto a la infantil.',materiala:['Números flotantes','churros','Tapiz'],arranque:'Separamos los números (la parte exterior e interior), y los/las niños/as se van a desplazar desde la segunda escalera a la tercera escalera (parte profunda), llevando la parte exterior, y lo pegan en el tapiz que estará al lado de NATA1.',intencionada:'Una vez llevado todas las partes exteriores de las fichas, llevaran de uno en uno, la parte interior de los números, y los pondrán cada uno/a en su sitio.\nCuando han llevado y completado todos los números, saldremos todos/as del agua y dejarán los churros en una esquina. Intentaremos que cada vez naden de una forma diferente.\nLes ayudamos a ordenar los números.\nPara terminar la sesión, les volvemos a sentar en el borde, y ahora sin material, harán medio largo, ayudándoles nosotros/as. Repetirán un par de veces si vamos bien de tiempo.',reflexion:'Enseñamos un poco las figuras de los números y que vayan reconociendo cómo se llaman y su orden.'},
{id:'S30-4_urte',cod:'S30',nom:'NEGUA',nom_es:'NEGUA',adina:'4 urte',inst:'Piscina infantil / piscina recreativa',pto:'En la recreativa junto a la infantil.',materiala:['aros','churros','fotos de prendas de ropa plastificadas','10 fantasmas','Tapiz grande'],arranque:'Jugaremos a pillar en la parte poco profunda, luego pasaremos a la parte profunda.',intencionada:'Colocamos los fantasmas en un extremo de la piscina, nosotros estamos en el medio de la piscina, les decimos a los niños que los fantasmas están sin ropa y tienen frio, y nosotros tenemos que abrigarlos con ropa de invierno, cogemos una foto plastificada de la cesta y tenemos que pegarla en el fantasma hasta cubrir todo su cuerpo., para ello, colocamos las prendas en un tapiz grande. Los niños van cogiendo ede una a una las prendas y desde aproximadamente la segunda escalera de la piscina, se desplazarán con un churro o sin churro y una tabla, y en la tabla llevarán la foto, saldrán por la escalera, visten al fantasma y vendrán andando hasta coger otra prenda.\nTienen que intentan diferenciar las prendas de invierno a las de verano, y al final de la sesión les explicamos la diferentes prendas.',reflexion:''},
{id:'S31-4_urte',cod:'S31',nom:'¿Cómo nadaría un elefante si estuviera en el agua',nom_es:'¿Cómo nadaría un elefante si estuviera en el agua',adina:'4 urte',inst:'Recreativa',pto:'tapiz',materiala:['Tapiz','mesa','fichas de animales','una tabla por niño','churros. Monitor en el agua'],arranque:'Desde el bordillo el monitor les enseñará diferentes fotos de animales y los niños tendrán que imitar su nado, Ej. Cuando el monitor les enseñe la foto del delfín los niños Irán nadando como delfines hasta la corchera y volverán, cuando les enseñe la foto del elefante lo mismo, “¿Cómo nadaría un elefante si estuviera en el agua”?',intencionada:'Las fichas de los animales, las colocaremos en un cubo, y les diremos que tenemos que llevarlos a pasear, para ello les daremos una tabla a cada uno, y una ficha de un animal, colocaran la foto encima de la tabla y lo trasladaran de un sitio a otro cuando salgan de la piscina lo pegaran en el tapiz que estará fuera de la piscina.\nPequeño circuito, saldrán de al lado de la escalera del medio, saltarán desde el bordillo, nadaran hasta donde está el monitor, y este les ayudara a hacer la estrella luego seguirán nadando hasta la mesa y de la mesa nadaran hasta la escalera.\nSaltos desde el bordillo, ¡hay que estar muy atento!, cuando el monitor diga 3, saltamos muy alto, muy lejos, bomba, con giro, palillo, y si el monitor en vez de decir 3 dice “chorizo” o “txakurra”, ¡cuidado ahí no hay que saltar!',reflexion:''},
{id:'S32-4_urte',cod:'S32',nom:'MENUA',nom_es:'MENUA',adina:'4 urte',inst:'Piscina irregular zona poco profunda y zona profunda.',pto:'En la irregular junto a la infantil.',materiala:['Tapiz grande','10 tablas','10 vasos','10 palotes azules','aros y/o números sumergibles','mesa','txirrista'],arranque:'Tiraremos todo a la piscina irregular en la zona poco profunda con la ayuda de los niños, después les explicaremos brevemente en que consiste el trabajo de hoy. Tienen que recoger todos los objetos, de uno en uno y en el orden que el profesor les diga, para preparar la mesa para poder comer en ella el menú que mas les guste. Ejemplo: La tabla grande haría la función de mantel, vasos, palotes azules (cubiertos), botellines de agua, tablas (platos), aros y/o números sumergibles (la comida)…. Cuando saquen todo cada uno se tendrá que preparar lo suyo encima del mantel y decidir que es lo que mas le gusta de primero , de segundo y postre.',intencionada:'Saltaran al agua, nadaran hasta la mesa y volverán nadando hacia la escalera. En cada vuelta nos tendrán que decir cual es el alimento que mas les gusta de primero, en la siguiente vuelta lo que mas les gusta de segundo y en la siguiente el postre. Después se tiraran por la txirrista ( de distintas maneras) y haremos lo mismo que en el anterior ejercicio pero esta vez nos diran lo que menos les gusta. Cada vez tienen que nadar de una manera distinta. Al final, entre todos tendrán que confeccionar un menú elegido por todos y nos lo comunicaran saltando tres veces todos a la vez.',reflexion:''},
{id:'S33-4_urte',cod:'S33',nom:'IPUINA',nom_es:'IPUINA',adina:'4 urte',inst:'Piscina irregular',pto:'En  la irregular junto a la infantil donde haremos el muro.',materiala:['10 aletas de delfín','10 pulls','1 aro grande lastrado','otro sin lastrar','las figuras cuadradas de diferentes formas','colores'],arranque:'Les colocaremos las aletas de delfín. En la zona poco profunda tendrán la isla, un aro grande, pulles y haremos un circuito. Saltaran al agua, nadaran como delfines hasta la isla, desde donde se tiraran de cabeza entrando por el aro que flota, después colocaremos el aro lastrado para que tengan que bucear y tengan que pasar por el. Haremos varias vueltas. En la última o últimas vueltas tendrán que llevar un pull en las manos, en la cabeza, entre las piernas…. Donde quieran.',intencionada:'En la zona profunda transportaran las figuras cuadradas flotantes para hacer un muro fuera del agua. Este muro nos separa de ser libres en el mar. Tendremos que derribarlo y para ello en cada vuelta elegirán una figura (cacho de muro) la cual tendrán que llevar de diferentes maneras hasta el otro lado y guardarla en su caja.\nPodremos utilizar los aros grandes para variar el recorrido o realizar diferentes saltos.\nAl final harán lo que más les apetezca como los delfines para poder ser más felices!!!',reflexion:''},
{id:'S34-4_urte',cod:'S34',nom:'Saioa S34',nom_es:'Saioa S34',adina:'4 urte',inst:'Recreativa',pto:'Piscina recreativa junto a la infantil.',materiala:['imágenes de alimentos (fruta','carne','pescado','verdura)','imágenes de la  carnicera','frutera','pescadera','pasarela','pelotas de pin-pon','vasos','churros','mesa','tapiz'],arranque:'Juego del copión: salta uno de una forma y el resto le tienen que copiar, así hasta que hagan todos del que inventa el salto. No pueden repetir salto, y si un niño se bloquea otro le puede decir una forma de saltar y el dar el salto.',intencionada:'- Nos vamos de compras, a la carnicería, pescadería y frutería. Pondremos en un tapiz fuera del agua (junto a la infantil) a los profesionales de estos 3 sectores y pondremos en la pasarela los alimentos que pueden vender (carne, fruta y pescado) y cada niño saltara desde la otra punta a coger un alimento. Pero les tendremos que decir que si cogen carne irán dando patada de crol, y si cogen pescado haciendo el caballito y si cogen fruta, boca arriba.\nUna vez hayan cogido una imagen deberán de pegarla debajo del profesional correspondiente.\n- Ahora pondremos junto a la pasarela tablas, imágenes de frutas, vasos y unos huevos (pelotas de Pin- Pon). Les diremos que tenemos que ir a comprar huevos, leche y fruta, ellos decidirán que comprar pero mínimo uno de cada. Dependiendo que compren, utilizaran un vaso (leche), una tabla (fruta) o pelotas (huevos).\nSaltaran desde la pasarela e irán hacia la colchoneta donde Pegaran las imágenes en la colchoneta, los huevos los dejaran en una caja y los vasos en el suelo llenos de agua para que al finalizar la compra hacer una pequeña guerra de agua.\nCada alimento una forma diferente de llevarlo\nLa leche de espaldas y el vaso sobre la tripa.\nHuevo soplando mientras hacen el caballito.\nTabla con la fruta, haciendo pies de crol/braza.',reflexion:'Han participado todos.\nHan seguido las indicaciones\n¿Hemos conseguido meter la cabeza?\nNivel independencia general del grupo.'},
{id:'S35-4_urte',cod:'S35',nom:'izarra',nom_es:'izarra',adina:'4 urte',inst:'Piscina recreativa',pto:'En la irregular junto a la infantil.',materiala:['Puzles de ballena cocodrilo','perro','tapiz','churros','aros','tobogán'],arranque:'En la parte poco profunda de la piscina recreativa, tiramos algunos aros y tendrán que ir a buscarlos, luego les ayudamos a hacer “izarra”.',intencionada:'Desde el tobogán que estará colocado al lado de la escalera del medio, les damos una pieza de los puzzles e irán nadando hasta la otra punta de la piscina y tendrán que armar el puzzle en la pared de la piscina infantil, cuando completen los animales, les animaremos a que los imiten.\n¿Cómo nadan los perros?, movemos los brazos y las piernas bien rápido como hacen los perros.\nLos cocodrilos andan por el agua, con la boca escondida y los ojos fuera, ¿andamos como andan los cocodrilos?, ¿entramos al agua como los cocodrilos?\nLas ballenas echan agua por encima de su cabeza, ¿cogemos agua con la boca y la echamos?\nImitamos mas animales...',reflexion:'¿Qué otro animal podemos imitar? Foca, tiburón, ranita?'},
{id:'S36-4_urte',cod:'S36',nom:'Saioa S36',nom_es:'Saioa S36',adina:'4 urte',inst:'Piscina irregular',pto:'En la recreativa junto a la infantil.',materiala:['Fotos de las 4 estaciones','tapiz grande','aro grande','churros','2 mesas'],arranque:'En la infantil les hablaremos de las cuatro estaciones y en cada estación que nombremos tendrán que nadar como les digamos.\nNos dirigiremos a la piscina irregular. Para ello, cada niño llevará un churro en cada mano e iremos haciendo como si fuéramos esquiando. Llegaremos a la piscina.\nJugar en la piscina recreativa,...',intencionada:'- Mi estación favorita:\nPrimavera: Estamos en primavera. Hacemos snow, ¿podremos poner el churro en los pies? ¿y uno en cada pie? Mejor el churro en las manos y vamos dando pies nos podemos ayudar con las manos.\nVerano: en caballo a la playa,....\nOtoño: Sin material iremos de mesa en mesa pasando por el aro grande.\nDependiendo de cómo venga cada grupo,...\nInvierno: Estamos en invierno y hace frio, nos ponemos la bufanda: ESPALDA',reflexion:''},
{id:'S37-4_urte',cod:'S37',nom:'MONTES',nom_es:'MONTES',adina:'4 urte',inst:'Piscina recreativa',pto:'En la recreativa junto a la infantil.',materiala:['Colchoneta','Tablas txikis','Churros','Pulls','Vasos','Figuras flotantes'],arranque:'Diferentes saltos desde la colchoneta, palillo, bomba, croqueta, voltereta… y salir.',intencionada:'Nos vamos al monte ¿qué necesitamos? Mochila (tabla), comida (figuras), agua (vaso), catalejos (Pullboy)….\nPondremos todo el material en la escalera del medio, y los alumnos tendrán que hacer varias vueltas con cada cosa.\nAprovechamos y metemos un poco de técnica. Ejemplo: Tabla, la primera vuelta hacia delante y moviendo brazos y la segunda de espalda.\nCuando tengan la mochila llena, con ayuda de un churro intentaran moverla por el agua sin que se les caiga nada.',reflexion:''},
{id:'S38-4_urte',cod:'S38',nom:'ANIMALIAK SAILKATZEN',nom_es:'ANIMALIAK SAILKATZEN',adina:'4 urte',inst:'Recreativa',pto:'En la irregular junto a la infantil.',materiala:['Churros','fichas animales (carpeta nº40)','tapiz pequeño','tapiz grande'],arranque:'Repartimos las fichas de los animales a los/las alumnos/as y las tienen que llevar de una en una, hasta un tapiz pequeño que está al lado de la 3ª escalera, y dejar las fichas encima del tapiz boca abajo.\nLos/las alumnos/as saltaran al agua al lado de la 2ª escalera de la piscina recreativa.',intencionada:'Una vez han llevado todas las fichas de animales hasta el tapiz pequeño, tendremos un tapiz grande apoyado en la tarima de NATA1, dividiendo a los animales de tierra, mar o aire.,\nLos/las alumnos/as van con/sin churro hasta el tapiz pequeño, cogen una ficha, la llevan y la pegan en el tapiz grande.\nAl terminar, vemos si lo han hecho bien y repasamos, preguntándoles cómo se llaman los animales.',reflexion:'Los/las alumnos/as van conociendo los animales, sus nombres y de qué familia son.'},
{id:'S39-4_urte',cod:'S39',nom:'EGUZKIA (MOZORRO EGUNA)',nom_es:'EGUZKIA (MOZORRO EGUNA)',adina:'4 urte',inst:'recreativa',pto:'En la irregular junto a la infantil',materiala:['Tapiz grande','churros','aros','palos azules','fichas de colores','vasos','txurros amarillos','aro grande amarillo. Aurpegia eguzkiz margotzeko margo horia'],arranque:'Eguzkiz margotuko gara? Mozorro eguna gertu dago eta!\nEn el medio de la piscina habrá un aro grande amarillo y varios churros finos amarillos. Los niños deberán coger entre todos el aro amarillo y después saltarán al agua a buscar de uno en uno los churros y llevarlos junto al aro. Vamos a dibujar un sol radiante con los churros y el aro!!!',intencionada:'En la piscina recreativa habrá churros (ramas), tablas (tronco), fichas de colores y vasos (hojas, pétalos y frutas), aros y palos azules (flores). Nuestro reto será recrear en el tapiz la influencia que tiene el sol en el crecimiento de la floracion. Para eso deberán de coger y llevar el material al tapiz y en él dibujar árboles con muchas hojas y frutas, y flores de todos los colores.\nDos cosas a tener en cuenta; 1.- Para recoger las piezas sumergibles tendremos que ir a la zona poco profunda en algún momento de la sesión. 2.- Puede que no haya mucho espacio en el tapiz para dibujar todo. Podremos recrearlo en el suelo...',reflexion:''},
{id:'S40-4_urte',cod:'S40',nom:'SUHILTZAILEAK',nom_es:'SUHILTZAILEAK',adina:'4 urte',inst:'Igerileku ertaina',pto:'',materiala:['10 kubo','10 baso','10 taula','sorosleen makila (edo txirrista)','konoa','uztai handi bat'],arranque:'Ertainean salto desberdinak kortzeraraino igeri egiten gorputza pixka bat berotu arte. Gero, ur azpian zenbat aguantatzen ote dugun frogatzen aritu gaitezke. Zenbat zenbatu dezakegu ur azpian?',intencionada:'Gu suhiltzaileak izanik sortu den SU HANDI BAT itzaltzera joan beharko gara. Materiale ezberdina erabiliko dugu su hori itzaltzeko:\nMaterialik Gabe: eskuekin, hankekin… nola itzali dezakegu?\nTaula bat\nEdalontzi bat\nBalde bat\n…\nSu handi hori Kono laranja bat izan daiteke. Barruan, mahai baten gainean edota kanpoan igerilekuaren izkina batean jar dezakegu.\nAdibidez; “2. Eskilara inguruan zai gaudela sua piztu denaren berria jaso dugu, momentuan dagokigun materiala hartu eta sorosleen makilatik ebatuta ziztu bizian uretara jeitsiko gara. Gero sua dagoen tokirarte igeri egin eta ahal dugun ur gehien botako diogu su horri. Goazen berriro hastera!”.\nBidea oztopatzen uztai handiren bat ere jar dezakegu bertatik pasa behar izan dezaten.\nOHARRA: Sorosleen makilarekin konpontzen ez bagara txirrista erabili dezakegu uretara sartzeko.',reflexion:''},
{id:'S41-4_urte',cod:'S41',nom:'NIRE EGUNEROKO EGINKIZUNAK',nom_es:'NIRE EGUNEROKO EGINKIZUNAK',adina:'4 urte',inst:'piscina pequeña y recreativa',pto:'En el poyete de Nata 1 junto  a la infantil.',materiala:['Churros','Tablas','tapices pequeños'],arranque:'Nos vamos a la piscina infantil después de la ducha donde haremos unas carrerillas y unos saltos en carrera intentando salpicar mucho, para despertarnos bien, puesto que nos acabamos de levantar, entrar por una escalera y salir por la otra.',intencionada:'Nos ponemos en el borde de la piscina irregular y vamos a realizar una serie de saltos, si alguna no puede sentada en el bordillo.(saltos haciendo mímica: limpiando y aseándonos y desayunando).\nNos vamos al cole: Nos desplazamos en autobús (esto quiere decir que vamos todos juntos y en fila con los churros).\nEstudiamos; necesitamos carpetas (Tablas). Haremos otros tres desplazamientos de diferentes maneras con nuestros libros (tablas).\nNos vamos al recreo (tres saltos de distintas maneras y nos divertimos).\nNos volvemos para casa, esta vez nos volvemos andando (sin material), diferentes desplazamientos.\nPara acabar nos vamos a la cama, cogemos los tapices pequeños y nos desplazamos primero tumbados boca abalo y después boca arriba, para simular que dormimos.\nUltimo juego : con los tapices pequeño cada vez que pite el monitor habrá que cambiarlo con un compañero.',reflexion:''},
{id:'S42-4_urte',cod:'S42',nom:'IPAR POLOA',nom_es:'IPAR POLOA',adina:'4 urte',inst:'Recreativa ( entre la primera y segunda escalera)',pto:'En recreativa junto a la infantil.',materiala:['colchoneta','churro','Fichas o aros sumergibles','2aros grandes ( los que se unden a distinto nivel)','mesas'],arranque:'Nos ponemos todos en el bordillo de la piscina y nombrando animales que vivan en el polo norte haremos saltos diferentes.',intencionada:'Nos quedaremos con algunos de los animales que hemos nombrado en la primera actividad, como son el oso, la morsa, la ballena jorobada, la beluga (parecido al delfín), y pingüinos.\nY nos moveremos como ellos:\nAndaremos como pingüinos.\nEntraremos al agua como las morsas(gateando/haciendo la croqueta sobre la colchoneta)\nNadaremos como los osos metiendo la cabeza para buscar peces que comer.\nNadaremos como las ballenas boca abajo y boca arriba.\njugaremos como las ballenas pasando, en la mitad del largo, por los aros grandes ( que ellos elijan por cual de los dos aros pasar)\nJugaremos a coger las fichas sumergibles como las belugas. (poner sobre las mesas en vez de en el suelo o llevar a la zona poco profunda, según el nivel del grupo)',reflexion:''},
