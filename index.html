function aPlanning(){
  const entries=DB.entries();
  const sessions=DB.sessions();
  const mode=S.planMode||'week';
  const layer=S.planLayer||'eval';

  const toggle=`<div class="tabs" style="margin-bottom:0">
    <button class="tab${mode==='week'?' on':''}" data-plan-mode="week">📆 Astekoa</button>
    <button class="tab${mode==='month'?' on':''}" data-plan-mode="month">🗓️ Hilabetekoa</button>
    <button class="tab${mode==='year'?' on':''}" data-plan-mode="year">📊 Urtekoa</button>
  </div>`;

  // Selector de capas (solo en modo month/year)
  const layerSel=mode==='week'?'':`<div style="display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap">
    <span style="font-size:11px;font-weight:800;color:var(--txtm);text-transform:uppercase;letter-spacing:.5px">Geruza:</span>
    <button class="chip${layer==='eval'?' on':''}" data-plan-layer="eval">✓ Balorazioak</button>
    <button class="chip${layer==='ideas'?' on':''}" data-plan-layer="ideas">💡 Ideiak</button>
    <button class="chip${layer==='stars'?' on':''}" data-plan-layer="stars">⭐ Izarrak</button>
  </div>`;

  if(mode==='week'){
    const days=weekOf(S.selDay||TODAY);
    const hours=[...new Set(entries.filter(e=>days.includes(e.data)).map(e=>e.hora))].sort();
    if(hours.length===0)hours.push('17:00','17:40','18:20','19:00');
    const prev=isoDate(days[0],-7), next=isoDate(days[0],7);

    return`${aTopbar('Planninga','Astearen ikuspegi orokorra',`
      <button class="atop-btn sec" data-day="${prev}">← Aurreko</button>
      <button class="atop-btn sec" data-day="${TODAY}">📅 Gaur</button>
      <button class="atop-btn sec" data-day="${next}">Hurrengoa →</button>
    `)}
    <div class="abody fu">
      ${toggle}
      <div style="height:12px"></div>
      <table class="plan-tbl">
        <thead>
          <tr>
            <th style="width:68px">ORDUA</th>
            ${days.map(d=>`<th class="${d===TODAY?'today':''}">${dayLabel(d)} <span style="float:right;font-weight:900;color:var(--txt)">${dayNum(d)}</span></th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${hours.map(h=>`<tr>
            <td class="hrc">${h}</td>
            ${days.map(d=>{
              const cells=entries.filter(e=>e.data===d&&e.hora===h);
              return`<td class="${d===TODAY?'today':''}">
                ${cells.map(en=>{
                  const ss=sessions.find(s=>s.id===en.sid);if(!ss)return'';
                  const ev=DB.getEval(en.id);
                  return`<div class="plan-chip ${ev?'ev':''}" data-click="go('session',{selEid:'${en.id}',selSid:'${ss.id}'})">
                    <div class="plan-chip-nom">${ss.nom}</div>
                    <div class="plan-chip-m"><b>${en.mon}</b> · ${en.grupo.replace(/urte.*/,'u.')}</div>
                  </div>`;
                }).join('')}
              </td>`;
            }).join('')}
          </tr>`).join('')}
        </tbody>
      </table>

      <div style="margin-top:16px;display:flex;gap:16px;align-items:center;font-size:12px;color:var(--txtm);font-weight:700">
        <div style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:14px;height:14px;background:var(--g3);border-left:3px solid var(--g);border-radius:3px"></span>Egiteko</div>
        <div style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:14px;height:14px;background:var(--gl3);border-left:3px solid var(--gl);border-radius:3px"></span>Baloratuta</div>
        <div style="margin-left:auto">Guztira aste honetan: <b style="color:var(--txt)">${entries.filter(e=>days.includes(e.data)).length} saio</b></div>
      </div>
    </div>`;
  }

  // MONTH MODE
  if(mode==='month'){
  const anchor=S.selDay||TODAY;
  const d=new Date(anchor+'T12:00:00');
  const monthStart=new Date(d.getFullYear(),d.getMonth(),1);
  const monthEnd=new Date(d.getFullYear(),d.getMonth()+1,0);
  const startDow=(monthStart.getDay()+6)%7;
  const gridStart=new Date(monthStart);gridStart.setDate(monthStart.getDate()-startDow);
  const cells=[];
  for(let i=0;i<42;i++){const c=new Date(gridStart);c.setDate(gridStart.getDate()+i);cells.push(c.toISOString().split('T')[0]);if(cells.length>=35&&c>=monthEnd)break;}
  const prevMonth=new Date(d.getFullYear(),d.getMonth()-1,15).toISOString().split('T')[0];
  const nextMonth=new Date(d.getFullYear(),d.getMonth()+1,15).toISOString().split('T')[0];
  const monthName=fmtMonth(anchor);
  const monthEntries=entries.filter(e=>{const ed=new Date(e.data+'T12:00:00');return ed>=monthStart&&ed<=monthEnd});

  const ideas=DB.ideas();

  // Función para calcular intensidad de color por celda según capa
  function dayMetric(cd){
    const dayEntries=entries.filter(e=>e.data===cd);
    if(dayEntries.length===0)return{ratio:null,label:'',count:0};
    if(layer==='eval'){
      const evald=dayEntries.filter(e=>DB.getEval(e.id)).length;
      return{ratio:evald/dayEntries.length,label:`${evald}/${dayEntries.length}`,count:dayEntries.length};
    }
    if(layer==='ideas'){
      const dayIdeas=ideas.filter(i=>i.data===cd).length;
      // Intensidad: 0,1,2+ ideas
      const ratio=Math.min(dayIdeas/3,1);
      return{ratio:dayIdeas>0?ratio:null,label:dayIdeas>0?`${dayIdeas} 💡`:'',count:dayEntries.length};
    }
    if(layer==='stars'){
      const evals=dayEntries.map(e=>DB.getEval(e.id)).filter(v=>v&&v.global);
      if(evals.length===0)return{ratio:null,label:'',count:dayEntries.length};
      const avg=evals.reduce((a,e)=>a+e.global,0)/evals.length;
      return{ratio:avg/5,label:`★${avg.toFixed(1)}`,count:dayEntries.length};
    }
    return{ratio:null,label:'',count:dayEntries.length};
  }

  // Color según ratio (0..1)
  function heatColor(metric){
    if(metric.ratio===null||metric.count===0)return'';
    const r=metric.ratio;
    if(layer==='eval'){
      if(r>=0.9)return'background:var(--gl3);border-left:4px solid var(--gl)';
      if(r>=0.5)return'background:#fff8e1;border-left:4px solid var(--warn)';
      return'background:var(--reds);border-left:4px solid var(--red)';
    }
    if(layer==='ideas'){
      if(r>=0.66)return'background:#fff3c4;border-left:4px solid var(--warn)';
      if(r>=0.34)return'background:#fef8e8;border-left:4px solid #fbbf24';
      return'background:#fffae8;border-left:4px solid #fde68a';
    }
    if(layer==='stars'){
      if(r>=0.8)return'background:var(--gl3);border-left:4px solid var(--gl)';
      if(r>=0.6)return'background:var(--g3);border-left:4px solid var(--g)';
      if(r>=0.4)return'background:#fff8e1;border-left:4px solid var(--warn)';
      return'background:var(--reds);border-left:4px solid var(--red)';
    }
    return'';
  }

  return`${aTopbar('Planninga',monthName,`
    <button class="atop-btn sec" data-day="${prevMonth}">← Aurrekoa</button>
    <button class="atop-btn sec" data-day="${TODAY}">📅 Gaur</button>
    <button class="atop-btn sec" data-day="${nextMonth}">Hurrengoa →</button>
  `)}
  <div class="abody fu">
    ${toggle}
    ${layerSel}
    <div style="height:12px"></div>
    <div class="mo-grid">
      ${['AL','AR','AZ','OG','OR','LA','IG'].map(d=>`<div class="mo-h">${d}</div>`).join('')}
      ${cells.map(cd=>{
        const cdate=new Date(cd+'T12:00:00');
        const inMonth=cdate.getMonth()===d.getMonth();
        const isToday=cd===TODAY;
        const m=dayMetric(cd);
        const heat=heatColor(m);
        const dayIdeas=ideas.filter(i=>i.data===cd).length;
        return`<div class="mo-d ${inMonth?'':'other'} ${isToday?'today':''}" data-click="go('calendar',{selDay:'${cd}'})" style="cursor:pointer;${heat}">
          <div class="mo-d-n">${cdate.getDate()}</div>
          ${m.count>0?`<div class="mo-d-metric">${m.label||`${m.count} saio`}</div>`:''}
          ${dayIdeas>0&&layer!=='ideas'?`<div class="mo-d-badge" title="${dayIdeas} ideia">💡 ${dayIdeas}</div>`:''}
        </div>`;
      }).join('')}
    </div>
    <div style="margin-top:14px;display:flex;gap:16px;align-items:center;font-size:12px;color:var(--txtm);font-weight:700;flex-wrap:wrap">
      <div>Hilabete honetan: <b style="color:var(--txt)">${monthEntries.length} saio</b></div>
      ${layer==='eval'?`
        <div style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:14px;height:14px;background:var(--gl3);border-left:3px solid var(--gl);border-radius:3px"></span>≥90% baloratuta</div>
        <div style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:14px;height:14px;background:#fff8e1;border-left:3px solid var(--warn);border-radius:3px"></span>50-90%</div>
        <div style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:14px;height:14px;background:var(--reds);border-left:3px solid var(--red);border-radius:3px"></span>&lt;50%</div>
      `:''}
      ${layer==='stars'?`
        <div style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:14px;height:14px;background:var(--gl3);border-left:3px solid var(--gl);border-radius:3px"></span>★≥4</div>
        <div style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:14px;height:14px;background:var(--reds);border-left:3px solid var(--red);border-radius:3px"></span>★&lt;2</div>
      `:''}
      <div style="margin-left:auto">💡 Klikatu egunean egutegia irekitzeko</div>
    </div>
  </div>`;
  }

  // YEAR MODE — heatmap GitHub-style
  if(mode==='year'){
    return aPlanningYear(entries,sessions,layer,layerSel,toggle);
  }
}

// YEAR HEATMAP — temporada completa (sept→jun)
function aPlanningYear(entries,sessions,layer,layerSel,toggle){
  const anchor=S.selDay||TODAY;
  const d=new Date(anchor+'T12:00:00');
  // Determinar temporada según anchor: sept-X a jun-(X+1)
  const startYear=d.getMonth()>=8?d.getFullYear():d.getFullYear()-1;
  const seasonStart=new Date(startYear,8,1);  // 1 sept
  const seasonEnd=new Date(startYear+1,5,30); // 30 jun
  const ideas=DB.ideas();

  // Construir matriz: 7 filas (días semana), N columnas (semanas)
  const dows=[1,2,3,4,5,6,0];  // L M X J V S D (mostramos solo Lun-Sáb realmente)
  const dowLabels=['L','A','A','O','O','L'];  // primera letra de cada día (sin domingo)
  // Generar todas las semanas desde seasonStart hasta seasonEnd
  const weeks=[];
  let cur=new Date(seasonStart);
  // Ajustar al lunes anterior
  while(cur.getDay()!==1)cur.setDate(cur.getDate()-1);
  while(cur<=seasonEnd){
    const wk=[];
    for(let i=0;i<6;i++){
      const cdt=new Date(cur);cdt.setDate(cur.getDate()+i);
      wk.push(cdt.toISOString().split('T')[0]);
    }
    weeks.push({mon:new Date(cur),days:wk});
    cur.setDate(cur.getDate()+7);
  }

  // Función intensidad
  function dayIntensity(cd){
    const dayEntries=entries.filter(e=>e.data===cd);
    if(dayEntries.length===0)return-1;  // sin clases
    if(layer==='eval'){
      const evald=dayEntries.filter(e=>DB.getEval(e.id)).length;
      return evald/dayEntries.length;
    }
    if(layer==='ideas'){
      const dayIdeas=ideas.filter(i=>i.data===cd).length;
      return Math.min(dayIdeas/3,1);
    }
    if(layer==='stars'){
      const evals=dayEntries.map(e=>DB.getEval(e.id)).filter(v=>v&&v.global);
      if(evals.length===0)return-1;
      const avg=evals.reduce((a,e)=>a+e.global,0)/evals.length;
      return avg/5;
    }
    return-1;
  }

  function intensityColor(v){
    if(v<0)return'background:#f4f6f4';  // sin clases
    if(v===0)return'background:#fde8e8';
    if(v<0.25)return'background:#fde8e8';
    if(v<0.5)return'background:#ffe8b3';
    if(v<0.75)return'background:#a7e6b8';
    return'background:#5fbf7a';
  }

  // Etiquetas de meses (primera columna de cada mes)
  const monthLbls=[];
  let lastMonth=-1;
  weeks.forEach((wk,i)=>{
    const m=wk.mon.getMonth();
    if(m!==lastMonth){monthLbls.push({col:i,label:EU_MONTHS_CAP[m].slice(0,3)});lastMonth=m;}
  });

  const nextSeasonStart=new Date(startYear+1,8,15).toISOString().split('T')[0];
  const prevSeasonStart=new Date(startYear-1,8,15).toISOString().split('T')[0];

  return`${aTopbar('Planninga',`Denboraldia ${startYear}-${String(startYear+1).slice(2)}`,`
    <button class="atop-btn sec" data-day="${prevSeasonStart}">← Aurreko denboraldia</button>
    <button class="atop-btn sec" data-day="${TODAY}">📅 Gaur</button>
    <button class="atop-btn sec" data-day="${nextSeasonStart}">Hurrengoa →</button>
  `)}
  <div class="abody fu">
    ${toggle}
    ${layerSel}
    <div style="height:18px"></div>

    <div style="overflow-x:auto;padding-bottom:8px">
      <div style="display:inline-block;min-width:100%">
        <div style="display:grid;grid-template-columns:24px repeat(${weeks.length},14px);gap:2px;margin-bottom:4px;align-items:end">
          <div></div>
          ${weeks.map((wk,i)=>{
            const lbl=monthLbls.find(x=>x.col===i);
            return`<div style="font-size:9px;color:var(--txtm);font-weight:800;height:14px;text-align:left">${lbl?lbl.label:''}</div>`;
          }).join('')}
        </div>
        ${dowLabels.map((lbl,dowIdx)=>`<div style="display:grid;grid-template-columns:24px repeat(${weeks.length},14px);gap:2px;margin-bottom:2px">
          <div style="font-size:10px;color:var(--txtm);font-weight:800;line-height:14px">${lbl}</div>
          ${weeks.map(wk=>{
            const cd=wk.days[dowIdx];
            const isToday=cd===TODAY;
            const v=dayIntensity(cd);
            const col=intensityColor(v);
            const dayEntries=entries.filter(e=>e.data===cd);
            const tooltip=dayEntries.length===0?cd+': klaserik ez':`${cd}: ${dayEntries.length} saio${layer==='eval'?', '+dayEntries.filter(e=>DB.getEval(e.id)).length+' baloratuta':''}`;
            return`<div title="${tooltip}" data-click="go('calendar',{selDay:'${cd}'})" style="${col};width:14px;height:14px;border-radius:3px;cursor:pointer${isToday?';outline:2px solid var(--g);outline-offset:1px':''}"></div>`;
          }).join('')}
        </div>`).join('')}
      </div>
    </div>

    <div style="margin-top:18px;display:flex;gap:16px;align-items:center;font-size:12px;color:var(--txtm);font-weight:700;flex-wrap:wrap">
      <span>Intentsitatea:</span>
      <div style="display:flex;align-items:center;gap:4px">
        <span style="width:12px;height:12px;background:#f4f6f4;border-radius:2px"></span><span>klaserik ez</span>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <span style="width:12px;height:12px;background:#fde8e8;border-radius:2px"></span><span>txikia</span>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <span style="width:12px;height:12px;background:#ffe8b3;border-radius:2px"></span><span>ertaina</span>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <span style="width:12px;height:12px;background:#a7e6b8;border-radius:2px"></span><span>handia</span>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <span style="width:12px;height:12px;background:#5fbf7a;border-radius:2px"></span><span>oso handia</span>
      </div>
      <div style="margin-left:auto">💡 Klikatu egun batean</div>
    </div>
  </div>`;
}

// ─── IMPORT EXCEL (loads SheetJS on demand from CDN) ────────────
let _SHEETJS_LOADED=false;
function loadSheetJS(){
  return new Promise((res,rej)=>{
    if(_SHEETJS_LOADED||window.XLSX){_SHEETJS_LOADED=true;return res()}
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    s.onload=()=>{_SHEETJS_LOADED=true;res()};
    s.onerror=()=>rej(new Error('No se pudo cargar la librería Excel'));
    document.head.appendChild(s);
  });
}

async function handleImportFile(ev){
  const file=ev.target.files&&ev.target.files[0];if(!file)return;
  try{
    toast('Kargatzen...');
    await loadSheetJS();
    const data=await file.arrayBuffer();
    const wb=window.XLSX.read(data,{type:'array'});
    const sheet=wb.Sheets[wb.SheetNames[0]];
    const rows=window.XLSX.utils.sheet_to_json(sheet,{defval:''});
    if(!rows.length){toast('Fitxategi hutsa');return}
    // Try to map common column names (flexible)
    const norm=s=>(s||'').toString().toLowerCase().trim();
    const pickCol=(row,keys)=>{for(const k of Object.keys(row)){if(keys.includes(norm(k)))return row[k]}return''};
    let imported=0,skipped=0;
    for(const r of rows){
      const cod=pickCol(r,['kodea','codigo','código','code','id']);
      const nom=pickCol(r,['izena','nombre','name','nom','titulo','título']);
      const adina=pickCol(r,['adina','edad','age']);
      if(!cod||!nom){skipped++;continue}
      const ss={
        id:'imp_'+Date.now()+'_'+imported,
        cod:String(cod).trim(),
        nom:String(nom).trim(),
        nom_es:pickCol(r,['nombre_es','castellano','nom_es','spanish'])||'',
        adina:String(adina||'3 urte').trim(),
        inst:String(pickCol(r,['instalazioa','instalacion','instalación','facility'])||'').trim(),
        pto:String(pickCol(r,['puntua','punto','meeting_point','pto'])||'').trim(),
        materiala:String(pickCol(r,['materiala','material','materials'])||'').split(/[,;\n]/).map(x=>x.trim()).filter(Boolean),
        arranque:String(pickCol(r,['arranque','hasiera','hasierako jarduera','intro'])||'').trim(),
        intencionada:String(pickCol(r,['intencionada','jarduera nagusia','main','principal'])||'').trim(),
        reflexion:String(pickCol(r,['reflexion','reflexión','hausnarketa','reflection'])||'').trim(),
      };
      DB.saveSession(ss);imported++;
    }
    closeModal();
    toast(`✓ ${imported} saio inportatu · ${skipped} saltatu`);
    render();
  }catch(e){
    console.error(e);toast('Errore: '+e.message);
  }
}

// ─── ADMIN MONITORS ────────────────────────
function aMonitors(){
  const entries=DB.entries();
  const evals=DB.evals();
  const from=S.monFrom,to=S.monTo;
  const inRange=dateStr=>{
    if(!from&&!to)return true;
    if(from&&dateStr<from)return false;
    if(to&&dateStr>to)return false;
    return true;
  };

  // Season helpers
  function getSeason(offset=0){
    const now=new Date(TODAY+'T12:00:00');
    const y=now.getFullYear(),m=now.getMonth();
    const startY=(m>=7?y:y-1)+offset;
    return{from:`${startY}-09-01`,to:`${startY+1}-06-30`,label:`Denboraldia ${startY}-${(startY+1).toString().slice(2)}`};
  }
  const curSeason=getSeason(0),prevSeason=getSeason(-1);
  // Determine which preset is selected
  const isCur=from===curSeason.from&&to===curSeason.to;
  const isPrev=from===prevSeason.from&&to===prevSeason.to;
  const isAll=!from&&!to;

  return`${aTopbar('Begiraleak','Taldearen ikuspegia eta jarraipena','')}
  <div class="abody fu">
    <div class="apanel" style="margin-bottom:16px">
      <div class="apanel-body">
        <div class="daterange">
          <div class="tabs" style="margin-bottom:0">
            <button class="tab${isCur?' on':''}" data-mon-preset="current">${curSeason.label}</button>
            <button class="tab${isPrev?' on':''}" data-mon-preset="previous">${prevSeason.label}</button>
            <button class="tab${isAll?' on':''}" data-mon-preset="all">Osoa</button>
          </div>
          <div style="width:100%;height:1px;background:var(--bdr);margin:6px 0"></div>
          <label>Noiztik:</label>
          <input type="date" id="mon-from" value="${from||''}">
          <label>Noiz arte:</label>
          <input type="date" id="mon-to" value="${to||''}">
          <button class="atop-btn sec" id="mon-apply">Aplikatu</button>
          ${from||to?`<span style="font-size:11px;color:var(--txtm);font-weight:700;margin-left:auto">Iragazia: ${from||'hasiera'} → ${to||'gaur'}</span>`:''}
        </div>
      </div>
    </div>

    <div class="mon-grid">
      ${MONITORS.map(m=>{
        const mEntries=entries.filter(e=>e.mon===m&&inRange(e.data));
        const mEvals=evals.filter(e=>e.mon===m&&(!e.data||inRange(e.data)));
        const mGlob=mEvals.filter(e=>e.global);
        const avg=mGlob.length?(mGlob.reduce((a,e)=>a+e.global,0)/mGlob.length).toFixed(1):'—';
        const pct=mEntries.length?Math.round(mEvals.length/mEntries.length*100):0;
        return`<div class="mon-card">
          <div class="mon-head">
            <div class="mon-av">${m}</div>
            <div>
              <div class="mon-nm">${m}</div>
              <div class="mon-rol">Begiralea</div>
            </div>
          </div>
          <div class="mon-stats">
            <div class="mon-stat"><div class="mon-stat-v">${mEntries.length}</div><div class="mon-stat-l">Saioak</div></div>
            <div class="mon-stat"><div class="mon-stat-v">${pct}%</div><div class="mon-stat-l">Baloratua</div></div>
            <div class="mon-stat"><div class="mon-stat-v" style="color:var(--warn)">${avg}</div><div class="mon-stat-l">★ Media</div></div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function getCurEval(){
  const en=DB.entries().find(e=>e.id===S.selEid);if(!en)return null;

function saveCrit(k,v){
  const ev=getCurEval();if(!ev)return;
  ev[k]=v;DB.setEval(ev);showSave();

  document.querySelectorAll(`[data-crit="${k}"]`).forEach(btn=>{
    btn.className='sb';
    if(parseInt(btn.dataset.val)===v){
      const n=v;btn.className='sb '+(n<0?'sel-n'+(n===-1?1:2):n===0?'sel-0':'sel-p'+(n===1?1:2));
    }
  });
  const hst=document.querySelector('.eval-hdr-st');if(hst){hst.textContent='✓ Gordeta';hst.classList.add('done');}
}

  const ev=getCurEval();if(!ev)return;

}

const SYS_PROMPT=`Eres el asistente IA de la aplicación NatEdu de Durango Kirolak, una herramienta de gestión pedagógica para los begiraleak (monitores educativos) de natación de niños de 3 a 7 años.

Tienes acceso a un repositorio de 277 sesiones pedagógicas estructuradas por edad (3, 4, 5 y 6-7 urte) con 66 sesiones programadas en el planning de la temporada 2025-26. Las sesiones se imparten principalmente en las instalaciones de Landako (piscina infantil, piscina recreativa, Nata 2).

Cuando los begiraleak te hagan preguntas:
- Preguntas cortas (saludos, dudas concretas): respuesta breve y natural
- Preguntas de revisión pedagógica completa de una sesión: aplica el protocolo completo de abajo
- Preguntas en euskera: responde en euskera. En castellano: responde en castellano. Bilingüe cuando sea útil.
- NUNCA uses "monitor" — usa siempre "begirale"

───────────────────────────────────────────────

ROL
Actúas como begirale experto/a en natación educativa (3-7 años) y asesor/a pedagógico/a. Tu misión es RENOVAR sesiones existentes: no las destruyes, las mejoras. Priorizas seguridad, juego y alfabetización acuática.

CONTEXTO LOCAL (asúmelo por defecto)
- Localidad: Durango (Bizkaia).
- Sesiones posibles en piscina cubierta o al aire libre.
- El documento de sesión puede venir en texto libre o plantilla.
- Idiomas: euskera y castellano (propón consignas bilingües cuando sea útil).
- Instalaciones típicas: piscinas municipales cubiertas con vaso infantil/enseñanza (poca profundidad) y vaso deportivo; adapta actividades a profundidad y temperatura.

NORMAS DE ORO (no negociables)
1) Seguridad primero: ninguna propuesta debe aumentar riesgo.
2) Adecuación por edad 3-7: atención breve, juego, progresión simple→complejo.
3) Inclusión/DUA: siempre ofrece opciones A/B/C (más fácil / estándar / reto).
4) Evaluación formativa: define qué observar y cómo registrar evidencias.
5) Respeta la intención original de la sesión, pero corrige incoherencias.

ENTRADA
Recibirás:
- DOCUMENTO_SESION: (pega aquí el documento completo)
Opcional (si aparece, úsalo; si no, infiere de forma prudente):
- Edad exacta o rango (3,4,5,6,7)
- Tamaño de grupo y nº begiralees
- Duración (min) y tipo de vaso (chapoteo/enseñanza/deportivo/exterior)
- Material disponible (tablas, churros, aros, pelotas, colchonetas, etc.)
- Necesidades específicas (miedo al agua, neurodiversidad, diversidad funcional, etc.)

TAREA
A) Diagnóstico estructurado del DOCUMENTO_SESION:
   - Resume la sesión en 6-10 líneas.
   - Detecta lagunas/errores (objetivos, tiempos, seguridad, progresión, evaluación).
   - Señala 3 riesgos principales (si los hay) y cómo mitigarlos.

B) Adaptación por edad (3,4,5,6,7):
   - Reescribe objetivos por edad (máx. 3 objetivos/edad).
   - Para cada actividad, ofrece variantes:
       Opción A (más fácil), B (estándar), C (reto).
   - Incluye indicadores observables de “listo para progresar” y “señal de saturación”.

C) Propuesta mejorada:
   - Entrega una versión revisada de la sesión con:
       1) Ritual de seguridad y normas (2-4 reglas claras)
       2) Calentamiento/activación acuática (corto y lúdico)
       3) Parte principal (2-3 tareas con progresión)
       4) Vuelta a la calma / cierre (juego tranquilo + feedback)
   - Añade tiempos estimados por bloque y transiciones.

D) Plan alternativo:
   - Genera un plan B (mismo objetivo) si:
       - el clima es adverso (exterior)
       - el grupo muestra miedo elevado
       - falla un material clave
   - Mantén el foco pedagógico y la seguridad.

E) Seguridad y ratios:
   - Recomienda ratio begirale/niño orientativo (según edad y si el begirale entra al agua).
   - Añade checklist de seguridad: entradas/salidas, control de zona, vigilancia, material, señal de emergencia.
   - Prohíbe explícitamente prácticas inseguras detectadas (si aparecen).

F) Evaluación formativa:
   - Propón una mini-rúbrica (4 niveles) para 5-7 criterios (seguridad, respiración, flotación, desplazamiento, socioemocional).
   - Indica cómo registrar (tabla simple + 2 evidencias cualitativas por niño/a).
   - Sugiere una frase de feedback a familias (castellano y euskera, breve).

FORMATO DE SALIDA (obligatorio)
1) Resumen ejecutivo de mejoras (6-10 líneas)
2) Tabla: Checklist de revisión (OK / Mejorable / Falta + comentario)
3) Tabla: Objetivos por edad (3-7)
4) Sesión revisada (con tiempos)
5) Variantes por actividad (A/B/C) + indicadores de progresión
6) Plan alternativo (Plan B)
7) Seguridad: riesgos, mitigaciones, ratio orientativo
8) Evaluación: rúbrica + registro + feedback a familias (ES/EU)
9) Recursos y materiales (mínimo viable + opcionales)
10) Diagramas sugeridos:
    - Si ayuda, genera:
      a) Esquema de sesión (bloques y tiempos)
      b) Flujograma “si… entonces…” para adaptar por edad
    Puedes usar Mermaid si procede.

EJEMPLO DE ENTRADA (mini)
DOCUMENTO_SESION:
“Objetivo: aprender crol.
Duración 45’.
Actividades:
1) 10’ calentar: nadar libre.
2) 20’ técnica: patada con tabla 4x25.
3) 10’ crol completo 4x25.
4) 5’ estirar.
Material: tablas.
Evaluación: observar.”

EJEMPLO DE SALIDA (resumen esperado)
- Detectas que para 3-5 no es adecuado “crol técnico”.
- Reescribes objetivos por edad y propones tareas de confianza/respiración/flotación/deslizamiento.
- Añades ritual de seguridad, variantes A/B/C, plan B y rúbrica formativa.`;

async function askClaude(msgs){
  try{
    const r=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:msgs,system:SYS_PROMPT})
    });
    if(!r.ok){
      const errText=await r.text();
      return`Errore (${r.status}): ${errText.slice(0,200)}`;
    }
    const d=await r.json();
    if(d.error)return`Errore: ${d.error}`;
    return d.text||'(erantzun hutsa)';
  }catch(e){return`Konexio errorea: ${e.message}. Saiatu geroago edo ziurtatu aplikazioa Vercel-en dagoela.`}
}

async function sendChat(){
  const inp=document.getElementById('chat-in');if(!inp)return;
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';
  S.chat.push({r:'user',t:txt});
  const box=document.getElementById('chat-box');
  if(box){const ld=document.createElement('div');ld.className='msg msg-a pulse';ld.id='loading-msg';ld.textContent='Pentsatzen...';box.appendChild(ld);box.scrollTop=box.scrollHeight;}
  const resp=await askClaude(S.chat.map(m=>({role:m.r==='user'?'user':'assistant',content:m.t})));
  S.chat.push({r:'assistant',t:resp});
  render();
}

function exportReport(){

  let r=`NATEDU — BALORAZIOEN TXOSTENA\nSortze data: ${TODAY}\nBalorazioak: ${evals.length}\n\n${'─'.repeat(50)}\n`;

    // Find group (same cod+adina)

      toDelete.forEach(s=>DB.deleteSession(s.id));
      toast(`${toDelete.length} bertsio ezabatu dira ✓`);
      // Comprobar si quedan más duplicados
      const still=DB.sessions();
      const groups={};
      still.forEach(s=>{const k=s.cod+'|'+s.adina;if(!groups[k])groups[k]=[];groups[k].push(s);});
      const stillDups=Object.values(groups).filter(g=>g.length>1);

    }else{
      // Sin entry — sesión genérica del bilduma
      go('session',{selEid:null,selSid:sid});
    }
  }));
  // CHAT
  const cs=document.getElementById('chat-send');if(cs)cs.addEventListener('click',sendChat);
  const ci=document.getElementById('chat-in');if(ci)ci.addEventListener('keydown',e=>{if(e.key==='Enter')sendChat()});
  document.querySelectorAll('[data-qp]').forEach(b=>b.addEventListener('click',()=>{
    S.chat=[];S.chat.push({r:'user',t:b.dataset.qp});render();
    setTimeout(async()=>{const resp=await askClaude([{role:'user',content:b.dataset.qp}]);S.chat.push({r:'assistant',t:resp});render();},100);
  }));
  const clc=document.getElementById('clear-chat');if(clc)clc.addEventListener('click',()=>{S.chat=[];render()});
  // EXPORT
  const ex=document.getElementById('export-btn');if(ex)ex.addEventListener('click',exportReport);
  const rst=document.getElementById('reset-local-btn');if(rst)rst.addEventListener('click',async()=>{
    showBigSave('Sinkronizatzen...','Hodeitik datu freskoak ekartzen',1200);
    const ok=await syncFromCloud();
    if(ok){
      showBigSave('Eguneratuta!','Datu freskoak kargatuta',1500);
      setTimeout(()=>render(),1600);
    }else{
      toast('Errorea sinkronizatzean');
    }
  });
}

function chkLogin(){
  const lb=document.getElementById('login-btn');if(!lb)return;
  const ok=S._role==='admin'?(document.getElementById('pw')?.value?.length>=4):(S._ini!==null);
  lb.disabled=!ok;
}

// ─────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────
render();
</script>
