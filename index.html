{id:'S43-4_urte',cod:'S43',nom:'el tronco del árbol',nom_es:'el tronco del árbol',adina:'4 urte',inst:'Piscina Recreativa',pto:'En la recreativa junto al tapiz con el árbol cerca de la infantil.',materiala:['Un tapiz grande','fantasma (“el tronco del árbol”)','hojas de colores plastificadas','un cubo. Aro de media flotabilidad'],arranque:'Piscina pequeña. Jugaremos al “1, 2, 3, Calabin calavera” tumbados en el agua.',intencionada:'- “El árbol en las diferentes estaciones”: Piscina Irregular. Vamos a crear entre todos un árbol con sus hojas. Para ello contamos con un tapiz grande, “el tronco” (fantasma) y un cubo lleno de hojas de colores. Montaremos nuestro árbol encima del tapiz. Este será nuestro punto de encuentro. Para ello cada niño cogerá una hoja, saltara al agua, hará un largo y lo ira poniendo en el árbol. ¡Es la primavera! ¿Qué le pasará a nuestro árbol? Iremos deshojando poco a poco el árbol llevando cada uno una hojita hasta el cubo, iremos nadando. Tendrán que volver al árbol y coger otra hoja hasta que desaparezcan. ¡Es el otoño! (Una vez que han ido una vez a recoger las hojas de forma individual, en las siguientes lo haríamos por parejas, cambiando tantas veces como se pueda de pareja. Igualmente en cada viaje podemos cambiar la forma de desplazarnos o de traer el material.) También se puede pasar buceando por el aro de media flotabilidad.',reflexion:'Les diremos que estamos en invierno y como es la secuencia de las estaciones.'},
{id:'S44-4_urte',cod:'S44',nom:'LAS DIFERENTES CONDUCTAS',nom_es:'LAS DIFERENTES CONDUCTAS',adina:'4 urte',inst:'Piscina recreativa',pto:'En la recreativa junto a la infantil',materiala:['Churros','aros pequeños','cono','mesa','tapiz','fichas de acciones'],arranque:'En la recreativa en la z.p.p. Ponemos una mesa con un cono encima en el agua. Repartiremos los aros que tenemos entre los niños y lanzaran desde el agua intentando meterlos en el cono. Cuando acaban, les decimos que recojan los que han fallado y repetimos 2-3 veces.',intencionada:'Tendremos unas fichas preparadas con diferentes acciones. En una ficha tendremos una imagen de la acción y en otra la acción escrita con otra pequeña imagen relacionada como ayuda. Ejemplo:\n‘‘Saltar\'\' \'\'gritar\'\' \'\'Nadar\'\' \'\'Leer\'\' comer\'\' \'\'pintar\'\'\nVemos las fichas y emparejarlas primero en el tapiz para que las conozcan. Después todas estas fichas las pondremos al lado de la piscina en un tapiz boca abajo. Dependiendo del nivel del grupo podemos separar los dibujos de las palabras y reducir o aumentar y aumentar o reducir el número de fichas.\nLos niños tendrán que realizar un recorrido que les plantaremos y por cada vuelta podrán levantar 2 fichas. Si son pareja las apartaran y si no lo son las volverán a dejar boca abajo. Cuando tengamos todas las parejas hechas entre todos clasificaremos las conductas en \'\'correctas\'\' o \'\'incorrectas\'\' debatiendo las razones. Si vemos que no participan todos pediremos la primera valoración directamente a cada niño de forma alternativa.\nCada uno por donde pueda/quiera\nFichas',reflexion:'Los niños asimilan comprendiendo los motivos por lo que son correctas o incorrectas las diferentes conductas en lugar de ser solo receptores de órdenes. Trabajamos la memoria, la compresión lectora y las asociaciones de conceptos.'},
{id:'S45-4_urte',cod:'S45',nom:'TIBURONES Y DELFINES',nom_es:'TIBURONES Y DELFINES',adina:'4 urte',inst:'Recreativa e infantil',pto:'En la recreativa junto a la infantil.',materiala:['Aletas de tiburón o de delfín (berriak)','isla','algas','pasarela en la p. infantil','aros','tubos azules'],arranque:'(Infantil)\nProcuraremos pasar por la pasarela de distintas maneras. A gatas, de rodillas sin tocarla con las manos, de pie, por debajo,….',intencionada:'(Recreativa)\nJuego “TIBURONES Y DELFINES”\nNos pondremos las aletas e imitaremosal tiburón y al delfín.\nEcharemos todos los tubos azules (Peces) al agua y tendremos que nadar de un lado al otro intentando tocar lo menos posible los peces.\nMiraremos al fondo marino donde habrá aros, algas,…\nJuego .A comer!!!\nTenemos hambre. Tendremos que pescar nuestra comida. Cogeremos los peces y los llevaremos a la orilla para comérnoslos. Nadando cada vez de una forma distinta.\n-Para ello haremos 2 grupos. ¿Quiénes estarán más hambrientos?\n-Podremos hacer lo mismo pero recogiendo la comida entre todos.\n-Podremos comer también las perlas, los aros,…. (Buceo)',reflexion:'Buceo\nVista\nMemoria\nSaltos\nDivertido\nTrabajo individual y de grupo'},
{id:'S46-4_urte',cod:'S46',nom:'DURANGOKO LEKUAK',nom_es:'DURANGOKO LEKUAK',adina:'4 urte',inst:'P. Irregularra',pto:'P.irregularraren 2. eskilararen ondoan.',materiala:['Txirrista','mahaiak','Txurro luzeak'],arranque:'Banakako saltoak Durangon ezagutzen dituzten tokiak aipatzen. Begiraleak ideiak eta adibideak emango dizkie. Adibidez nun ikasten duten, nun jolasten duten non bizi diren...galdetuz. Binakako taldeak ere egingo dira leku desberdinak batera adostuz eta salto egiterakoan besteei eta begiraleari aipatuz.',intencionada:'',reflexion:'Binakako taldeak egingo ditu begiraleak eta 2 aldiz aurrerantz, 2 aldiz atzerantz eta 2 aldiz zaldian egin eta gero binakako taldeak berantolatuko ditu, berriro ariketa berdinak eginez. Buelta bakoitzean beraien artean adostutako Durangoko leku desberdin batera joango dira.\nAriketak materialik gabe ere, egin daitezke.\nHobetu beharrekoa:'},
{id:'S47-4_urte',cod:'S47',nom:'JATETXERA',nom_es:'JATETXERA',adina:'4 urte',inst:'Recreativa junto a la infantil',pto:'',materiala:['Spaguettis: picas azules (10)','queso: flotantes amarillos (10)','carne picada: aros(10)','tomate o salsa (dos vasos de agua x encima)','mesas (2)','aro sumergible','colchoneta de agujero(1)'],arranque:'5´de juego libre',intencionada:'Vamos a ser COCINEROS por un día: haremos spaguettis con queso y carne picada, bañado con tomate!\nCircuito: mesa + aro (opcion) + mesa + salida por escalera\nEntre la escalera y la pasarela que divide recre e infantil pondremos una colchoneta con agujeros que sera la bandeja donde serviremos los macarrones\nA elegir como se hara la sesion, si te tira elmaterial al agua y se recoge, si se hace cogiendo desde fuera y llevandolo de uno en uno...\nPara terminar, un poco de tomate,… le echaremos a los spaguettis un poco de salsa (agua) con los vasos para darle un sabor especial.\nCuando este el plato listo lo llevaremos al restaurante (pollete blanco nata 1) entre todos',reflexion:''},
{id:'S48-4_urte',cod:'S48',nom:'FORMAK',nom_es:'FORMAK',adina:'4 urte',inst:'Piscina infantil / piscina recreativa',pto:'Fuera del agua',materiala:['palos azules','pulls','taula txikiak','aroak edo/eta pelotak','fichas con imágenes: Borobil 1','lauki1','iruki1','pullaren formako 1 eta lauki zuzen1 (txurro edo palote urdina)'],arranque:'Preguntamos a los niños cuales son las formas o figuras geométricas que conocen.\nHaremos un salto con cada figura geométrica que nombren los niños.',intencionada:'Tiraran al agua todas las formas y el/la profesora les ira diciendo la forma del objeto que tienen que sacar y la tendrán que ir colocando al lado de la ficha que corresponda. En cada salto o vuelta tendrán que nadar de una forma diferente.\nAl final corregimos y preguntamos si conocen más objetos con cada una de esas formas geométricas.',reflexion:''},
{id:'S49-4_urte',cod:'S49',nom:'MENDIAK',nom_es:'MENDIAK',adina:'4 urte',inst:'Piscina infantil e irregular',pto:'En la recreativa junto a la infantil',materiala:['Churros (quién necesite). Tapiz grande. 30 tablas (pequeños)','pulls'],arranque:'Jugaremos en la infantil teniendo en cuenta el tema de la sesion de hoy. Mendiak. Le haremos preguntas sobre este tema...',intencionada:'Tiramos 30 tablas pequeñas, el tapiz y los pulls a la piscina irregular. Cogemos el tapiz grande entre todos y los sacamos de la piscina y lo colocamos en el suelo y después hacemos diferentes saltos y vamos cogiendo las tablas y los pulls de una en una, nadando de forma que el o la profa nos diga y construimos una montaña sobre el tapiz.\nPreguntamos si conocen los montes cercanos (Urkiola, Pol Pol, Anboto, Mugarra, Oiz,…)',reflexion:''},
{id:'S50-4_urte',cod:'S50',nom:'GARRAIATZEKO ERA DESBERDINAK',nom_es:'GARRAIATZEKO ERA DESBERDINAK',adina:'4 urte',inst:'Pistina irregularra.',pto:'P. irregularrean P. txikiaren ondoan.',materiala:['mamuak','urperatzen diren aro handi 2'],arranque:'– “Zertan bidaiatzen dugu?”\nKorruan, galdetuko zaie zer garraiobide ezagutzen dituzten: autoa, trena, hegazkina, itsasontzia, urpekaria, globoa…\nUretan sartzeko jolasa:\nHaurrak uretara garraiobide bana imitatuz sartuko dira:\nHegazkina: jauzia besoak zabalik\nAutoa: sartu eta azkar mugitu ertzeraino\nTrena: sartu eta “txuku-txuku” eginez aurrera\nItsasontzia: sartu eta poliki mugitu flotatzen\nUrpekaria: sartu eta aurpegia busti / burua sartzen saiatu\nZati nagusia – “Garraiobideak ”\nZerutik doazenak\n“Mamuaren” gainean etzanda, hegan ariko balira bezala mugituko dira.\nLurretik doazenak\nUretan desplazamenduak lurreko garraiobideak imitatuz:\nAutoa: hankak azkar\nMotoa: are azkarrago mugitu\nTrena: ilaran, bata bestearen atzetik\nAutobusa: talde txikia\n. Uretatik eta ur azpitik doazenak\nUrpeko uztaiak jarriko ditugu, eta hauen bidez pasatzeko proposatuko diegu\n3. Amaierako jolasa – “Garraioen semaforoa”\nIrakasleak garraiobide bat esango du, eta haurrek dagokion ekintza egin beharko dute:\nHegazkina → besoak zabalik eta desplazatu\nAutoa → hankakadaka azkar\nItsasontzia → flotatu\nUrpekaria → burua sartu\nTrena → lagun baten atzetik joan\nDibertigarriago egiteko:\nBerdea = mugitu\nGorria = geldirik geratu\nHoria = poliki mugitu',intencionada:'',reflexion:''},
{id:'S51-4_urte',cod:'S51',nom:'En la piscina',nom_es:'En la piscina',adina:'4 urte',inst:'Piscina recreativa.',pto:'Escalera.',materiala:['Churros','figuras flotantes','pelotas de pin-pon','cuerda'],arranque:'Entramos al agua de la forma que quieran y se desplazan 4-5 metros, y vuelven a salir. Repiten varias veces.',intencionada:'Llevamos nadando de un lado a otro, las figuras flotantes, soplándolas.\nLo mismo, pero por parejas, agarrados de la mano.\nDelimitamos tantas zonas como parejas haya mediante churros, y echamos las pelotas de pin-pon al agua, y en parejas, soplándolas las tienen que llevar cada pareja a su zona.\nAtamos la cuerda a la corchera y a la pared mediante ventosa, o a la escalera. Los alumnos/as se tienen que desplazar hasta la cuerda nadando y con las manos se desplazan por la cuerda hasta el borde y salen del agua.\nNadan hasta la cuerda e intentan pasarla por debajo. Y salen por el borde.',reflexion:'Recogen todo el material utilizado y valoramos la sesión.'},
{id:'S52-4_urte',cod:'S52',nom:'MIS CUENTOS EN LA PISCINA',nom_es:'MIS CUENTOS EN LA PISCINA',adina:'4 urte',inst:'Piscina Recreativa',pto:'Fuera del agua, junto a las escaleras.',materiala:['2 tablas grandes','la isla (como apoyo)','20 churros (amarillos finos','normales)','20 pulls (“maderas”)','10 tablas (“piedras”)','5-6 aros lastrados'],arranque:'- “Salto de longitud”: Nos colocaremos en el borde de la piscina cada uno con un churro. El juego consiste en tirar el churro a una distancia donde creamos que somos capaces de saltarlo por encima o encima. ¿Hasta dónde podremos saltar? Lo probamos en 4 ó 5 saltos',intencionada:'Les vamos a explicar a los niños que hoy vamos a contar un cuento que conocen bien LOS TRES CERDITOS\n- “Jugamos felices” : Vamos a jugar libremente por la zona limitada con nuestros hermanos los cerditos, saltando, desplazándonos, sumergiéndonos…\n-“La casita de paja”: ¡Tenemos que construir nuestra casita de paja (churros) entre todos los cerditos! Ahora nos toca entrar al agua y recoger en cada vuelta un único churro para después apilarlo en el punto de encuentro. Nos desplazaremos CONSIGNA: -Cada entrada al agua deberá ser diferente.\n¡Cuidado llega el lobo! (el lobo será el monitor) y para que no coja a los cerditos se meterán en su casita.\nPara librarse del lobo tendrán que nadar hasta la orilla y salir fuera del agua. Una vez fuera romperemos entre todos la casita.\n-“La casita de madera”: Esta vez tiraremos las maderas de colores (pulls) al agua. Con los pulls en el punto de encuentro volvemos a hacer una nueva casa. CONSIGNAS: - Cada entrada al agua deberá ser diferente.\n- Nos moveremos con la boca dentro del agua\n¡Cuidado llega el lobo! Para librarse del lobo tendrán que nadar…\n- “La casita de piedra”: Vamos a tirar maderas (pulls), piedras (tablas) y piezas para la chimenea (aros lastrados) al agua.\nCONSIGNAS: - Cada entrada al agua será diferente y lo haremos por parejas - No se podrá transportar nada con las manos.\n¡Cuidado llega el lobo!... Para librarse del lobo tendrán que nadar…\n- “Volvemos a jugar felices”: Volvemos a jugar libremente alrededor de nuestra casa con nuestros hermanos los cerditos.',reflexion:'¿Hemos sido capaces de construir una casa resistente entre todos?'},
{id:'S53-4_urte',cod:'S53',nom:'LA SALUD Y LOS ALIMENTOS',nom_es:'LA SALUD Y LOS ALIMENTOS',adina:'4 urte',inst:'Piscina Irregular',pto:'Bordillo',materiala:['Tablas','Cubos','Figuritas','Aros','Tapiz o Pasarela'],arranque:'Saltamos al agua diciendo cada vez lo que hemos comido hoy ejemplo:\nLentejas\nPollo\nYogur,\netc',intencionada:'Nos vamos de compras al Mercado cogemos la bolsa (tabla) y vamos eligiendo de la estantería ( tapiz lleno de figuritas ,aros etc.) las cosas que queremos comprar, después nos dirigiremos a la caja con ellas(punto de encuentro en el bordillo) en el que le explicaremos a nuestro monitor las compras que hemos hecho.\nComo variante una segunda vez lo haremos en parejas y con carrito (cubos) en vez de Bolsa (tabla).\nCuando acabemos nos pondremos de acuerdo cual es la comida que nos va a gustar a todos y que nos la preparara nuestro monitor el siguiente día de piscina\neflexión: Estantería\nCOSAS A MEJORAR Comida',reflexion:''},
{id:'S54-4_urte',cod:'S54',nom:'PAISAJES Y ENTORNOS',nom_es:'PAISAJES Y ENTORNOS',adina:'4 urte',inst:'Piscina infantil, piscina irregular',pto:'Tapiz de salida',materiala:['Churros','tablas','pull buoys','tapiz','picas azules','perlas','fichas números sumergibles. Isla sumergible','tapiz en piscina irregular'],arranque:'piscina pequeña\nSomos animales, nos vamos a desplazar por la piscina pequeña con las manos por el suelo y boca abajo (cocodrilos), después boca arriba (ballenas),nos desplazaremos dando saltos (ranas) y lanzándonos y poniéndonos de pies (delfines).',intencionada:'Piscina irregular\nNuestro paisaje hoy es una isla:\nExplicamos e interrelacionamos para ver que saben sobre una isla(como es? ¿ que nos podemos encontrar?¿que podríamos comer?¿qué animales viven allí? etc.\nUna vez de haber explicado todo esto, el monitor lanzara diferentes objetos al agua y les diremos que estamos solos en la isla y que debemos recoger diferentes alimentos para sobrevivir:\nPicas azules: Plátanos\nTablas: tortugas\nPullbuoys: Cocos\nChurros grandes: Troncos para hacernos fuego.\nAros: peces\nPerlas: Erizos de mar\nChapas de colores: Langostas y cangrejos.\nPara recoger estos debemos meter la cabeza.\nHemos construido una balsa (tapiz) donde nos tumbaremos y moviendo los pies nos intentaremos desplazar, después colocaremos la isla hundida que nos hará de rocas para descansar y poder volver a la civilización realizando diferentes desplazamientos.(con o sin ayuda auxiliar).',reflexion:'Seguimos conociendo nuestra piscina y nuestro material, también las figuras y los colores.\nConocimiento de otro entorno y trabajo en equipo.'},
{id:'S55-4_urte',cod:'S55',nom:'EL TIEMPO METEOROLOGICO',nom_es:'EL TIEMPO METEOROLOGICO',adina:'4 urte',inst:'Recreativa',pto:'Entre la piscina infantil y la recreativa.',materiala:['hojas de la sesión','vocales','puzles','churros','tablas','fichas sumergibles'],arranque:'Diferentes salto, con o sin desplazamientos.',intencionada:'# Lo primero será hacer los diferentes puzles, uno por niño, después de cada largo los irán haciendo sobre la plataforma blanca de NATA1. Que cada uno identifique que es: sol, nieve, nublado, lluvia, viento y rayo.\nEjemplo: Saltar de palillo nadar sin materias de escalera a escalera coger una pieza del puzle y colocarla sobre la plataforma blanca situada en NATA 1\n# Una vez sepamos cada unos cual es, pasaremos a las hojas de la sesión y las rellenaremos (solo las vocales) de dos en dos. Necesitaran un poco de ayuda del monitor.\nQue cada monitor decidirá como hacen los largos para conseguir las fichas del puzle y las vocales.\nEjemplo: nada sin material, con churro, con tabla o tras conseguir una ficha sumergible.',reflexion:''},
{id:'S56-4_urte',cod:'S56',nom:'primavera',nom_es:'primavera',adina:'4 urte',inst:'Piscina recreativa',pto:'Borde de la piscina',materiala:['Tapiz','10 tablas','10 pulls','10 fantasmas','churros'],arranque:'Cada alumno/a debe llevar hasta el tapiz que está atado en la corchera un churro, una tabla y un pull. En cada viaje un solo elemento.',intencionada:'Desde la 2ª escalera, cada alumno/a con un fantasma, se desplaza hacia el tapiz y en cada viaje coge un elemento.\nDeben de tener una tabla, un churro y un pull.\nColocan el churro al fantasma como bufanda y hacen un viaje. Salen y le ponen un pull a la altura de la cabeza y hacen otro viaje.\nCogen una tabla y la colocan encima del fantasma.\nSe desplazan con la tabla, pull y churro, y los/as alumnos/as encima del fantasma.',reflexion:'En invierno hay que abrigarse más, porque hace frio, llueve y nieva, pero en la primavera hay que ir guardando la ropa de invierno.'},
{id:'S57-4_urte',cod:'S57',nom:'JUEGO CON MIS SENTIDOS',nom_es:'JUEGO CON MIS SENTIDOS',adina:'4 urte',inst:'piscina Recreativa',pto:'Entre la primera escalera y el tapiz',materiala:['Aros sumergibles','1 cubo','1 Tapiz grandes','2 algas','1 aro'],arranque:'Les vamos a contar que hoy hemos encontrado una BARITA MÁGICA en la piscina y nos hemos convertido en magos (los monitores). Vamos a jugar con la barita!! Realizaremos diferentes tipos de entrada; Lo harán al sentir la barita en la espalda (tacto), al ver mover la barita de una manera determinada (vista), al oír una palabra o un ruido acordado (oído)… Les daremos la barita y el poder a ellos para que propongan la manera de zambullirse en el agua.',intencionada:'Un paseo mágico\nP. Irregular. Nos juntamos todos en el punto de encuentro para enseñarles el recorrido que tenemos preparado para hoy. Parece sencillo pero les diremos que anden alerta porque el “Mago” (el monitor) tiene mucho poder…\nEl Circuito:\nP.E: Punto de Encuentro\n1.- Pasarela artística: tendrán que desplazarse como quieran por encima del tapiz.\n2.- Pasarela de tacto: pasarán de diferentes maneras por encima del tapiz, la consigna\nserá que deberán de mantener el contacto (con el tapiz) con… los pies, la tripa, el culo,\nla espalda… acabando en el agua.\n3.- Pasearemos entre los rayos (entre las algas sumergidas)\n4.- Subiremos encima de la isla e intentaremos recoger un aro que nos protegerá del mago (habrá aros en la mesa y en el suelo). Lo tendremos que llevar hasta el punto de encuentro y dejarlo dentro de un cubo.\n5.- Pasaremos por el Aro. Podemos introducir giros dependiendo del nivel de los niños.\nP.E.\nP.E.\nA por la siguiente vuelta... Estar atentos porque el mago os irá quitando el poder de…\nHablar: tendrán que llevar la boca dentro del agua (MUDOS)\nOír: un oído en el agua (SORDOS)\nMover una mano: solo podrán mover la otra\nMover un pie (o los dos?)\n…\n(Podemos quitar o dar esos poderes al grito de “Artzila Mortzila”, “Hiru zenbatzean, bat,bit a hiru”, “Abracadabra”… )\nY en la última vuelta el Mago les devolverá a su estado normal para que puedan seguir disfrutando',reflexion:'¿Ha sido fácil nadar sin esos poderes? ¿Cómo han nadado más a gusto?'},
{id:'S58-4_urte',cod:'S58',nom:'GRUFALOA',nom_es:'GRUFALOA',adina:'4 urte',inst:'Irregularrean',pto:'1. Eskilararen ondoan',materiala:['Ipuineko fitxak','pasarela txikia','taula handi 1','2 alga','uztai handi bat','2 mahai','9 mamuen aho (edo uztaitxo bana)','9 taula eta 9 baloi'],arranque:'Ur gutxiko aldean; izarra (goraka ta beheraka), bola, lurra ipurdiarekin ikutzen… jolastuko gara. Ea zer egiteko gai diren.',intencionada:'“Ipuina”: Elkargunean ipuina kontatzen hasiko gara. Pertsonai bat agertzen den bakoitzean “basoan” (zirkuitoa) zehar ibiliko gara.pertsonai bakoitzarekin erabiliko dugun materiala aldatuko delarik:\nAzeria: materialik gabe ibiliko gara basoan zehar\nHontza: mamuen aho bana (edo uztaitxo bana) eskuan eramanez\nSugea: taula banarekin\nGrufaloa: Baloi banarekin.',reflexion:''},
{id:'S59-4_urte',cod:'S59',nom:'Saioa S59',nom_es:'Saioa S59',adina:'4 urte',inst:'P. ertainean',pto:'Uztailak hartzen dituzten tokia',materiala:['Txurroak','mahai 1','uztailak','taula handi 1','txirrista( 3 urtekoekin erdibana) eta kono laranja 1'],arranque:'Salto eta joan etorri batzuk aurrerantz, atzerantz, zaldian,… haurraren edo taldeak daukan mailaren arabera. Luzerak igerilekuaren luzerakoak izango dira.',intencionada:'Txirrista 2.eskilararen ondoan jarriko dugu, hasieran 4 urteko umeekin erabiliko da eta klase bukaeran 3 urteko haurrak erabiliko baidute.\nAriketa: Txirristatik era desberdinetan botako dira eta beste aldean dagoen eskilaretatik irtengo dira kortzeraren azapitik pasatu ondoren. Igeriketa, animali desberdinak imitatzen egingo dute.\nAriketa: Uretara era desberdinetan salto egin, ur azpian dagoen uztail bat hartu, mahai gainera igo eta bertan dagoen konoan uztaila enzestatu. Berriro uretara salto eta kanpora.\nAriketa: Aurrekoan bezala, baina bakoitzean animalia desberdin bat imitatzen. Igela, balea, tximeleta, marrazoa, sugea, izarra…\nAriketa: Uztailak bukatzerakoan, ibilbidea alderantziz egin daiteke.\nAriketa: Taula handia igerilekuaren ertzean jarri (begiralea taula ebatzen dago) eta haurrak gainetik korrikan, belauniko, bolteretak egiten… uretara salto eta kanpora irtengo dira.',reflexion:''},
{id:'S60-4_urte',cod:'S60',nom:'ZONALDEKA JOLASEAN',nom_es:'ZONALDEKA JOLASEAN',adina:'4 urte',inst:'Igerileku txikia eta jolas-igerilekua',pto:'1 - eskailera artean, 2 - txirrista ingurua eta 3 - eskailera ondoa.',materiala:['Tirolinako soka','urpeko soka','txirrista','uztai handiak','uztai txikiak','irla eta 2 mahai'],arranque:'',intencionada:'Gaur saioa zonaldeka banatuko dugu, hona hemen eskema:\n1 2 3\n1.- URPEKO ZONALDEA: Uztai txikiak eta uztai handiak izango ditugu bertan.\n2.- DESPLAZAMENDU ETA SALTOEN ZONALDEA: Txirrista ere jarriko dugu. Salto ezberdinak eta desplazatzeko modu ezberdinak landuko ditugu bertan.\n3.- SOKEN ZONALDEA: Bi soka jarriko ditugu zonalde honetan. Bata, tirolina izango da, eta bestea urpean jarritako soka. Ea nola moldatzen diren soka hoien laguntzaz.',reflexion:''},
{id:'S61-4_urte',cod:'S61',nom:'AEIOU',nom_es:'AEIOU',adina:'4 urte',inst:'Recreativa',pto:'Fuera del agua (Entre la 2ª y la 3ª escalera)',materiala:['Plantilla tren “AEIOU”','churro quien necesite','10 tablas grandes','tapiz verde'],arranque:'Colocamos el tapiz verde encima de la tarima de nata1 y una tabla para cada niña/o, mientras les mandamos que hagan 4 veces de la 2ª escalera a la tercera unos desplazamientos de calentamiento.',intencionada:'Repartimos a cada niña/o la primera ficha del tren, y la llevan desplazándose desde antes de la 2ª escalera (para no molestar a los de 3 años), hasta la 3ª escalera, cambiando la forma de desplazamiento. Salen a fuera y dejan la ficha encima de la tabla de cada una/o. Les vamos dando las fichas de AEIOU de una en una y las llevan a su tabla, colocándolas en orden. Cuando les damos la ficha les preguntamos si saben cuál es.',reflexion:'Conocimiento de las vocales AEIOU.'},
{id:'S62-4_urte',cod:'S62',nom:'Saioa S62',nom_es:'Saioa S62',adina:'4 urte',inst:'Igerileku ertaina',pto:'',materiala:[],arranque:'Taldekako saltoak egin ditzakegu.',intencionada:'Gaur igeri egitean gure sentzumenek duten eragina bizituko dugu. Igeri egiteko zenbat modu ezberdin dauden konturatuko gara. EZAGUTZEN DITUZUE PARAOLINPIAR JOKOAK?\nGoazen frogatzera nola egin dezakegun igeri adib:\nBeso bakarrarekin. Besorik gabe…\nHanka bakarrarekin. Hankarik gabe…\nBegi batekin…\nHitzegin gabe. Entzun gabe…\n…\nKontutan izan luzerak egitean estilo ezberdinetan egin dezakegula lana.\nBukatzeko gure gorputz guztia erabiliz egingo ditugu zenbait luze. Igartzen ahal dugu ezberdintasunik?',reflexion:''},
{id:'S63-4_urte',cod:'S63',nom:'Quiero un perro pero ¿Cómo lo cuido?',nom_es:'Quiero un perro pero ¿Cómo lo cuido?',adina:'4 urte',inst:'Piscina recreativa',pto:'Escalera más cercana a nata 1',materiala:['Picas azules 1 por cada 2 niños','2 mesas','aros grandes lastre','fichas de alimentos (carne','pollo','arroz','chocolate o dulces','pan)','pelotas de colores pequeñas (4 por niño)'],arranque:'“Tienen que pasear 3-4 veces al día”\nNadarán entre las mesas como lo hacen los perros. 3 – 4 largos (número de veces que tienen que salir los perros al día)',intencionada:'Pondremos a los niños por parejas. 1 pica por pareja. Uno lanza la pica y el otro salta al agua, va a por él y lo trae. (Se puede proponer entradas al agua diferentes, que eviten meter la cabeza como los perros…)',reflexion:''},
{id:'S64-4_urte',cod:'S64',nom:'Saioa S64',nom_es:'Saioa S64',adina:'4 urte',inst:'piscina pequeña y recreativa',pto:'En el poyete de Nata 1',materiala:['Cuerda (tirolina)','mesa (isla)','aros pequeños','un aro grande'],arranque:'En la piscina pequeña simulando diferentes animales e imitándolos la cruzaremos de un lado a otro varias veces.',intencionada:'Estamos en la Ikastola y de repente suena la alarma de incendios… Hay que desalojar!!! Pero la puerta está atascada, nos lanzamos por la tirolina para saltar y dirigirnos al Patio (mesa sumergida) desde allí tendremos que hacer una pequeña inversión para conseguir las llaves de la puerta y poder salir….(Aro pequeño) y acto seguido saldremos por la puerta exterior de la Ikastola (aro grande).\nAcabaremos con unos saltos, solos, en pareja, trío y hasta todos/as juntos.',reflexion:''},
{id:'S65-4_urte',cod:'S65',nom:'Saioa S65',nom_es:'Saioa S65',adina:'4 urte',inst:'Recreativa.',pto:'Junto a la escalera de la piscina infantil.',materiala:['Hojas con series numéricas','números plastificados','churros','tablas','10 palos sumergibles','1 aro grande'],arranque:'10 saltos de diferentes formas, con o sin desplazamientos, y en cada salto decir en alto el número de salto.\nEjemplo: Primer salto bomba, antes de saltar decir uno, y así cambiando el salto y diciendo en alto hasta diez.',intencionada:'Dividimos al grupo en 2.\nPonemos las series numéricas sobre la plataforma blanca de NATA 1 y les explicamos que nuestro objetivo es que cada grupo tiene que ir rellenando la series numéricas (algunos necesitaran nuestra ayuda). Aprovecharemos para reforzar lo que más necesiten. Aquí cada monitor ira cambiando cada 2/3 largos lo que él crea que más necesita su grupo.\nEjemplo: Estrellita, pasar por el aro, recoger palos del fondo, nadar sin material o con él…etc.',reflexion:''},
{id:'S66-4_urte',cod:'S66',nom:'si fuésemos un cangrejo ¿como nadaríamos?',nom_es:'si fuésemos un cangrejo ¿como nadaríamos?',adina:'4 urte',inst:'recreativa',pto:'',materiala:['fichas de animales','mesas','pelotas','cesta flotante','tobogán'],arranque:'Los niños estarán en el bordillo y nadaran hasta la corchera, nosotros les enseñaremos la foto de los animales y los niños intentaran imitarlos en el agua. “si fuésemos un cangrejo ¿como nadaríamos?” Ej. Txakurra, delfín, pescado, medusa, arraina, pingüino, marrazo, igela, elefantea, tximinoa, balea eta abar.',intencionada:'Haremos un circuito, pondremos un tobogán en el bordillo, bajaremos por él, iremos nadando hasta la primera mesa, luego pasaremos por un aro, y nadaremos hasta la segunda mesa, ahí cogeremos una pelota e intentaremos encestar.\nDespués de 2 o 3 vueltas intentamos cambiar, la propuesta de nado, de espaldas, zaldia, etc.',reflexion:''},
{id:'S68-4_urte',cod:'S68',nom:'Lugares de Durango',nom_es:'Lugares de Durango',adina:'4 urte',inst:'Recreativa',pto:'Escalera enfrente a nata1',materiala:['10 churros','10 tablas pequeñas','6 tablas grandes','imágenes sitios Durango'],arranque:'Hablaremos de los sitios de Durango que más nos guste ir y porque. Cada vez que un/a niño/a dice un lugar, realizaran un desplazamiento como quieran, desde la 2ª escalera hasta la 3ª escalera.',intencionada:'Colocamos las tablas grandes con imágenes de lugares de Durango encima, y de cada lugar al siguiente van de la siguiente forma:\nDe Tabira al Santa Ana: Pies crol\nDe Santa Ana al Ayuntamiento: Pies espalda\nDel Ayuntamiento a Ezkurdi: Brazos crol\nDe Ezkurdi a Kurutziaga: Brazos espalda\nDe Kurutziaga a Landako: caballito con churro',reflexion:'Conocimiento de algunos lugares de Durango desplazándose de diferentes formas por el agua.'},
{id:'S69-4_urte',cod:'S69',nom:'Formas',nom_es:'Formas',adina:'4 urte',inst:'Recreativa',pto:'Entre la 2ª y la 3ª escalera',materiala:['Plantilla figuras geométricas','10 tablas medianas','churros'],arranque:'Primero 4 largos de calentamiento, sin material, salida un poco antes de la 2ª escalera para no molestar a los de 3 años, hacia la 3ª escalera. Desplazamientos variados.',intencionada:'Repartimos una tabla mediana a cada niña/o, harán dos largos de escalera a escalera y después la colocarán encima de la tarima blanca de NATA1. Encima de cada tabla les ponemos la plantilla con las letras de las formas geométricas, y primero las comentamos en voz alta, preguntando/explicando si conocen la forma y su nombre.\nDespués, repartimos las imágenes recortadas de colores para que en cada viaje lleven la ficha de una en una (círculo, cuadrado, rectángulo, triangulo, rombo y elipse), y las coloquen cada uno en su plantilla.',reflexion:'Conocimiento de las formas geométricas y sus nombres.'},
{id:'S70-4_urte',cod:'S70',nom:'Saioa S70',nom_es:'Saioa S70',adina:'4 urte',inst:'Igerileku txikian eta irregularrean',pto:'Soroslearen aulkiaren ondoan.',materiala:['Txurroak','panpinak','uztailak','taulak'],arranque:'Haurrei eskuak ondo garbitzearen garrantzia azalduko diegu, gaixotasunak etab ekiditzeko oso garrantzitsua delako.\nIgerileku txikian luzera batzuk egingo dituzte begiraleak esaten dien bezala. Hau guztia eskuak garbitu barik egingo dutenez ezin izango dute beraien aurpegiak ezta bere taldeko lagunak ikutu. Gorputza berotu ondoren begiralearen aurrean jarri (uretan) eta begiraleak eskuak ondo nola garbitzen diren azalduko die. Haurrak begiraleak egiten duena egingo dute.',intencionada:'',reflexion:'Igerileku irregularrean luzerak egingo dituzte, luzerak egiten berriro eskuak zikindu egingo dira eta luzera bakoitzaren ondoren eskuak garbitu egin behar dira. Era egokian garbitzen dira eskuak? Ondo garbitzen ez badira , berriro azaldu egingo diegu nola egin ondo egiten ikasi arte. Luzera bakoitzean eskuetan zerbait garraiatu beharko dute , horrela eskuak zikintzen bait dira.\nErreflexioa\nHobetzeko'},
{id:'S01-5_urte',cod:'S01',nom:'Una torre',nom_es:'Una torre',adina:'5 urte',inst:'P. recreativa y NATA 2',pto:'Tapiz exterior',materiala:['MATERIAL'],arranque:'Nos sentaremos en el bordillo y el profesor desde el agua los animará a que se metan en el agua para ver cuánto les cubre a cada uno.\n¿Quién se atreve a sentarse en el suelo? Intentaremos hacer unos saltos dentro del agua, tocar el suelo con las manos. (individual, parejas, tríos, todos juntos…)',intencionada:'Juego “Una torre”\nEntre todos echaremos los vasos al agua. Vamos a hacer una torre lo más alta posible.\nSaltar/entrar al agua, diciendo nuestro nombre y recogeremos un vaso hasta que no quede ninguno flotando.\nJuego “Más alto”\nHaremos lo mismo con las tablas. Las echaremos al agua siempre diciendo su nombre, y las recogeremos de uno en uno. Las tablas nos servirán de apoyo para volver al bordillo. Haremos otra torre una vez recogido todo el material\nJuego “Aún Más alto”\nLlevaremos el material largo a largo (vaso sobre tabla) para entre todos hacer una torre más alta.',reflexion:'¿Hemos construido? ¿Nos hemos conocido? Trabajo individual y de grupo'},
{id:'S03-5_urte',cod:'S03',nom:'Vacaciones de Verano',nom_es:'Vacaciones de Verano',adina:'5 urte',inst:'NATA 2                                                    Pto. de Encuentro:   Z. maletas',pto:'',materiala:[],arranque:'Vamos a saltar “todos juntos” de diferentes maneras:\nAgarrados de la mano hacia adelante\nAgarrados, comenzando por una esquina,\nUna bomba grande\nSentados en tren…',intencionada:'Estamos de vacaciones de verano y nos vamos\na disfrutarlas, por eso tenemos que hacer nuestras maletas.\nNos dirigimos a nuestro armario ropero (tapiz grande lleno de fotos plastificadas con cosas relacionadas verano, e invierno)\nRecogeremos de una en una todas las cosas que necesitemos para pasar el verano.\nLa trasladaremos hasta nuestra maleta. (Tabla).',reflexion:'Diferenciamos invierno y verano, trabajamos en equipo y nos hacemos nuestras maletas.'},
{id:'S04-5_urte',cod:'S04',nom:'Masterchef',nom_es:'Masterchef',adina:'5 urte',inst:'Nata 2     Pto. Encuentro:   tapiz',pto:'',materiala:['- Fotos de comidas   - 10 Tablas medianas – 10 churros'],arranque:'Si el profesor dice:\n“plátano” à “palillo”\n“manzana” à “bomba”\n“kiwi” à “de cabeza”.',intencionada:'Cocinar cuatro platos muy ricos.\nLentejas, plato combinado, bizcocho y una ensalada.\nEn la mitad de la piscina pegada a la pared estará la foto del plato que queremos lograr y en nuestro punto de encuentro estarán los ingredientes\nLos niños tendrán que\nCoger los ingredientes de uno en uno.\nLlevarlos nadando\nColocarlo debajo del plato correspondiente.',reflexion:'Hablamos de los alimentos que a ellos les gusta y de los que creen que son saludables.'},
{id:'S05-5_urte',cod:'S05',nom:'EL NAUFRAGIO',nom_es:'EL NAUFRAGIO',adina:'5 urte',inst:'Nata 2          Pto Encuentro: tapiz (que son los barcos)',pto:'',materiala:['2 tapices','fotos de alimentos','ropa','20 figuras Flotantes'],arranque:'Explicamos en que consiste un naufragio…\nPreparamos los barcos (tapices) con provisiones (alimentos, ropa…)',intencionada:'Zarpamos (los niños harán las veces de motor del barco) y simulamos un naufragio.\nEl monitor indicará qué estilo/forma de desplazamiento utilizar para recuperar cada cosa\nPRIMERO: nos ponemos todos a salvo fuera del agua y nos reunimos.\nSEGUNDO: Nos organizamos para recuperar los alimentos, la ropa y las cosas para la supervivencia.',reflexion:':\nHemos experimentado un naufragio y aprendido supervivencia\n¿Harías lo mismo que Tom?'},
{id:'S06-5_urte',cod:'S06',nom:'Foto-copiar',nom_es:'Foto-copiar',adina:'5 urte',inst:'Piscina Nata II     Pto. encuentro: tapiz',pto:'',materiala:['- 1 Pasarela (Escalera centro)','- 1 Tapiz','- 8 tablas pequeñas','- VASOS: - 5 azules - 4 amarillos - 2 rosas - 4 verdes - 3 naranjas - 3 morados','- FICHAS: - 4 amarillas - 2 azules - 1 naranja - 2 moradas - 1 verde - 2 rojas','- PULLs: - 2 amarillos - 1 verde - 1 rojo','- 3 fotos de las construcciones','-10 churros','DESARROLLO DE LA SESION'],arranque:'- Estando en el agua les diremos un color. Los que tengan ese color se subirán a la mesa. Los demás se mantendrán en el agua.\n- Diremos varios colores, sin tardar mucho.',intencionada:'Es importante que esté el material exacto preparado.\nEl material estará encima de la pasarela.\nSolo colocaremos encima de la pasarela el material de la foto que vamos a utilizar.\nLa actividad consiste en copiar exactamente la foto con la posición y los colores en el mismo sitio.\nSaltarán y vamos nadarán de la forma que diga el monitor.\nCogerán el material de a uno por niño.\nLo llevarán al punto de encuentro donde intentaremos copiar la imagen.',reflexion:'-\n-\n-'},
{id:'S07-5_urte',cod:'S07',nom:'LA PIRAMIDE',nom_es:'LA PIRAMIDE',adina:'5 urte',inst:'Recreativa, Nata 2         Pto Encuentro: Junto al tapiz',pto:'',materiala:['- 1 tapiz  - Fotos plastif. de comida   - Foto pirámide alimenticia'],arranque:'En la zona poco profunda.\nIremos mencionando diferentes alimentos\nAlimento sano: Flotamos boca arriba\nAlimentos perjudiciales: Nos escondemos debajo del agua',intencionada:'Haremos una asociación de colores con los colores y los alimentos (foto)\nCada niño tendrá que coger una foto de un alimento y llevarla a su destino de la manera que indique el monitor.\nAprovecharemos para meter técnica de nado.\nLes diremos a los niños que clasifiquen la comida dependiendo si lo comen "GUTXITAN" o "ASKOTAN" a la semana.\nCuando acabemos podremos valorar con ellos el resultado. (REFLEXIÓN)\nOHARRA: Dependiendo del grupo podremos añadir la flecha de "batzutan" para tener más opciones para clasificar los alimentos.',reflexion:'Hablamos de los alimentos que a ellos les gusta y de los que creen que son saludables.\n¿Comen sano?'},
{id:'S08-5_urte',cod:'S08',nom:'LETRAS',nom_es:'LETRAS',adina:'5 urte',inst:'Recreativa, Nata 2                         Pto. encuentro: Tapiz exterior (explicación)',pto:'',materiala:['1 tapiz','1 caja con los cubos flotantes de colores','20 aros','2 mesa','DESARROLLO DE LA SESIÓN'],arranque:'Lanzaremos los aros (en función del nivel zona prof. o poco prof.)\nPara entrar al agua tendrán que decir una palabra que empiece:\nPor “A”à recogerán los aros de color verde (p.e.)\nPor “B”à recogerán los aros de color amarillo (p.e.)\nPor “C”à recogerán los aros de color naranja (p.e.)\nHacer las letras que creáis necesarias…',intencionada:'Lanzamos al agua los cubos flotantes de colores\nTendrán que recogerlos uno a uno para llevarlos al tapiz.\nConstruirán un muro procurando que no haya cubos del mismo color juntos. ¿Seremos capaces de hacerlo?',reflexion:'-\n-\n-'},
{id:'S09-5_urte',cod:'S09',nom:'RÍOS Y CAUCES DE DURANGO',nom_es:'RÍOS Y CAUCES DE DURANGO',adina:'5 urte',inst:'',pto:'Junto a la cristalera',materiala:['10 Tablas','4 algas','10 animales flotantes','10 aros (2 de cada color)'],arranque:'Tras pasar lista, antes de la ducha, hablamos de los ríos donde nacen y por donde pasan.\n¿Qué río pasa por Durango? ¿Qué ríos conocéis?\n“El río Ibaizábal, a su paso por el Durango, recibe el caudal del río Mañaria, que atraviesa de Norte a Sur el municipio, y del arroyo Larrinagatxu”',intencionada:'Hacemos un río en la piscina con las algas, echaremos los animales y los aros.\nRecorrerán el “río” para ver la fauna que en ella habita…\nTienen que pasarlo nadando en diferentes estilos y formas.\nLes indicaremos\nUn pez (aro) de (x) color que tendrán que localizar.\nLos que no se sumergen pueden localizar los peces desde la superficie metiendo la cabeza...\nUna rana\nConejo\nEtc…\nCon y sin material. Marcando el monitor el estilo/técnica a trabajar.',reflexion:'Conocimiento de los ríos de alrededor.'},
{id:'S10-5_urte',cod:'S10',nom:'LAMIAK',nom_es:'LAMIAK',adina:'5 urte',inst:'',pto:'Nata II ko SOS ahulkiaren ondoan.',materiala:[],arranque:'Lista pasatzen dugun tokian\nBegiraleak Lamiei buruzko informazioa eta argazkia erakutziko die:\nLamia beste kulturetako ninfa edo sirena da.\nIbaietan bizi ohi dira\nIzaki ederrak dira emakume itxurakoa\nUrrezko orrazi batez orrazten du ilea.\nGorputzaren gohi partea gizakiarena dute eta beste erdia animaliarena:\nahate, ahuntz edo arrain batena izanik.\n2-.Nahia dugun iharduera:\nPasarela jarriko dugu hortik saltoak egin dezatela.\nLamiak erreka garbietan bizi ohi dira eta erreka bat zikin badago beste erreka garbiago batera joaten dira bizitzera.\nGure " erreka" materialagaz beteko dogu ( uztailak, makilak, laukitxoak ...) eta umaeak errekatik zaborra atera beharko dute.\nZaborra (materiala) banan-banan atera eta bakoitzean estilo edo era desberdinean atera beharko dute.\nErreka Garbitu eta gero, Lamia agertu da? Ia umeak erreken garbitasunarekin pixka bat kontzientziatzen ditugun!\n-Hausnarketa\n-\n-\n-\nAldaketak:\n_______________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________',intencionada:'',reflexion:''},
{id:'S11-5_urte',cod:'S11',nom:'BIRZIKLETA',nom_es:'BIRZIKLETA',adina:'5 urte',inst:'Recreativa y NATA II Pto. Encuentro:  piedra',pto:'',materiala:['- 20 Aros lastrados - 10 picas azules - 10 churros amarillos'],arranque:'Echaremos los aros lastrados y tendrán que pasar por todos sin tocarlos.',intencionada:'Hablaremos sobre el reciclaje.\nMarcaremos tres zonas donde dejar el material sobre el tapiz:\nAzul: papel cartón.\nAmarillo: plástico y envases\nVerde: vidrio\nTirar, todo o por partes, el material al agua\nSe desplazarán de diferentes maneras para transportar el material\nChurros amarillos pequeños (caballito)\nChurros amarillos grande (parejas y de espalda)\nPiezas verdes (encima de la cabeza sin que se caiga)\nTablas grandes azules (sentados encima de la tabla o tumbados)\nPicas azules (entre las piernas, mirando hacia arriba y sin sacar los brazos)\nTapiz grande (todos a la vez): Lo llevamos a la zona de inicio de recorrido donde volveremos a dejar el material para el siguiente grupo.',reflexion:'-\n-\n-'},
{id:'S12-5_urte',cod:'S12',nom:'Juego libre recreativa zona poco profunda.',nom_es:'Juego libre recreativa zona poco profunda.',adina:'5 urte',inst:'NATA 2',pto:'Cristalera.',materiala:['MATERIAL'],arranque:'Juego libre recreativa zona poco profunda.',intencionada:'Colocaremos en el bordillo, 3 conos, que simularan las 3 cruces.\nLos niños saltarán e intentarán coger los aros en el fondo (o en la mesa)\nTratarán de encestar los aros en los conos desde el agua',reflexion:''},
{id:'S13-5_urte',cod:'S13',nom:'UN ESPANTAPAJAROS EN MI PISCINA',nom_es:'UN ESPANTAPAJAROS EN MI PISCINA',adina:'5 urte',inst:'Nata 2                                    Pto. Encuentro: Tapiz exterior',pto:'',materiala:['6 (1 fantasma / 2 niños) -   20 pullboys por niño','6 cinturones Aquagym – 6 Churros largos','Dibujos estaciones 1/niño - 10 txurros','DESARROLLO DE LA SESIÓN'],arranque:'En el P.E. explicamos el juego:\nCada pareja se mete en el agua con su fantasma\nA la señal del profesor tendremos que cambiarlo con un compañero.\nHaremos 5 cambios y no podemos repetir de compañeros al cambiar.',intencionada:'Juego “VESTIMOS AL FANTASMA”:\nExplicación breve Estaciones con\nayuda de los dibujos\nColocaremos en cada lado del tapiz\nun dibujo de un árbol que simboliza\nlas estaciones del año.\nTiraremos todo el material al agua: fantasmas, pull-boys, churros grandes, cinturones. Tendrán que recogerlos del agua de uno en uno y ordenarlos en el tapiz por grupos.\nUna vez esté todo colocado cada alumno vestirá POR PAREJAS a su fantasma. Cada PAREJA como quiera (LIBRE)\nLlevarán por el agua el fantasma y para poder vestirlo, tendrán que:\nDar una vuelta completa a la piscina y colocarlo en el fantasma.\nPor el mismo recorrido dentro del agua, pero sin que se le caiga ningún elemento.\nDesnudaremos al fantasma y lo dejaremos todo el material en su sitio. Todo menos el fantasma',reflexion:'Autonomía para cambios en nata 2\nEstaciones del año\nAutonomía con material\nCompañerismo (Trabajo grupal)'},
{id:'S14-5_urte',cod:'S14',nom:'La vida de los nómadas o tuaregs',nom_es:'La vida de los nómadas o tuaregs',adina:'5 urte',inst:'NATA2                               Pto. Encuentro: Borde de la piscina.',pto:'',materiala:['- 10 Churros - 10 Balones pequeños (5 colores x 2) - 20 Aros -'],arranque:'Lanzaremos balones de distintos colores.\nDiremos un color.\nSaltarán al agua y tratarán de coger el balón que el monitor haya indicado.',intencionada:'Deberemos desplazarnos como nómadas o tuaregs montados en nuestros camellos(churros):\nSentados remando con una mano (izq., dcha., hacia atrás…)\nCon las dos manos (a la vez, alternos, hacia atrás…)\nManos quietas (a los lados, por encima cabeza, hacia atrás.)\nHemos llegado a nuestro Oasis… Tiempo para descansar…\nDesplazamientos de espalda, sin dormirnos\nCon el churro de almohada, moviendo fuerte los pies y sin sacar las manos del agua.\nEsta vez el churro debajo de las rodillas moviendo únicamente con los brazos. (los que tienen miedo, podrán utilizar dos churros axilas y rodillas)\nYa estamos listos. Es momento de buscar provisiones comida:\nCogerán la comida que ha caído en el agua del oasis:\nSacar del fondo: perlas (dátiles) y Aros pequeños (cocos)\nLos que no bucean aún, recogerán alimentos al cubo.',reflexion:'Iniciación a la técnica jugando, trabajo en equipo, conocimiento del desierto y su hábitat.'},
{id:'S15-5_urte',cod:'S15',nom:'El semáforo',nom_es:'El semáforo',adina:'5 urte',inst:'Nata II',pto:'lateral piscina (fuera), tapiz.',materiala:['verdes','rojos)'],arranque:'Vamos a jugar con t res colores diferentes, rojo, naranja y verde.\nLos niños que se meterán y estarán atentos al color que les enseñemos.\nEl verde: nos movemos sin parar por todo y sin tocar la pared.\nEl naranja que tendrán que realizar giros.\nEl rojo, que tendrán que mantenerse quietos donde estén.',intencionada:'Formaremos un arco iris entre todos con los vasos (estarán en el agua)\nDecidiremos entre todos el color del primer arco. Tendrán que:\nNadar desde aquí hasta la zona de los vasos,\nRecoger cada uno, uno y volver al punto de encuentro.\nFormaremos vaso a vaso el arco. No cambiaremos de arco/color hasta haber colocado todos los del color elegido.\nCuando acabemos todos los colores, recogeremos.\nTRABAJAR LA TÉCNICA EN FUNCION DEL GRUPO.',reflexion:'Cada pregunta del ejercicio anterior nos puede dar pie para hablar de muchas cosas. Estar atentos a sus respuestas.\n¿Sabemos cómo o cuando se forma un arco iris?'},
{id:'S16-5_urte',cod:'S16',nom:'KOLOREEKIN JOLASEAN',nom_es:'KOLOREEKIN JOLASEAN',adina:'5 urte',inst:'Nata 2         Elkargunea: Alde zabalean,',pto:'',materiala:['Margotuta dauden koloretako 5 globo (Larrosa','berdea','urdina','horia'],arranque:'Salto ezberdinak egingo ditugu.\nKolore bat aipatzean, kolore hori nonbaiten ukitu eta gero egin beharko dute salto.',intencionada:'Elkargunean umeari edo bikote bati (denek parte hartzeko aukera izan dezaten) kolore bat esango diogu belarrira.\nBeraiek kolorea esan gabe azaldu beharko die lagunei zein kolore den.\nAsmatzean, kolore hori dagoen tokira joan eta bertan dagoen materiala denen artean banatu beharko dute.\nLehengo joan etorria beraiek nahi duten bezala egingo dute,\nBigarrenean aldiz, begiraleak proposatuko die desplazatzeko modua, teknika sartzeko aprobetxatuz.\nKolore batekin bukatzean berriz ere elkartuko gara elkargunean beste kolore bat asmatu eta jolasean jarrai dezagun.\nHauek dira koloreak eta bakoitzari dagokion materiala:\nLARROSA: 12 Taula. BANAKAKO LANA\nBERDEA: 12 Txurro hori (estuak). BANAKAKO LANA\nURDINA: 6 fantasma. BINAKAKO LANA\nHORIA: 6 txurro luze. BINAKAKO LANA\nNARANJA: Taula handia. DENEN ARTEKO LANA.\nOHARRA: Materiale mota eta kantitateak begiraleak moldatu ahal ditu bere taldearen arabera. Beti ere ELKARREN ARTEKO LANA bultzatuz.\nAusnarketa :\nErraz asmatu ahal ditugu koloreak? Lagun ezberdinekin ados jartzeko eta dibertitzeko gai izan al gara?\nHOBETU BEHARREKOA:\n________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________',reflexion:''},
{id:'S17-5_urte',cod:'S17',nom:'Zein kolore daukat?',nom_es:'Zein kolore daukat?',adina:'5 urte',inst:'',pto:'',materiala:[],arranque:'Los niños tiran todo el material por la zona de la sesión.',intencionada:'Vista:\nLos niños se desplazan por la piscina.\nLes enseñaremos la ficha de un color\nIrán contando los que tengamos de ese color.\nCada largo variamos estilo/técnica/color/material\nOído:\nVamos ir diciendo nombres de frutas u objetos y deberán recoger del fondo un objeto del color que sea este.\nTacto:\nLos niños meterán la mano en los cubos.\nTratarán de adivinar el objeto que tienen dentro.\nIrán nadando a por las fichas y cogerán que te tenga la imagen del objeto.\nDespués de esto recogeremos los objetos que queden y los ordenaremos.',reflexion:'-\n-'},
{id:'S18-5_urte',cod:'S18',nom:'HORMIGAS',nom_es:'HORMIGAS',adina:'5 urte',inst:'',pto:'Piscina Nata 2, escalera del medio.',materiala:[],arranque:'Evolucionan de unos antepasados parecidos a las avispas.\nTienen 6 patas, antenas (para comunicarse, conocer el sabor y reconocer objetos)\nHay muchos tipos unas 22.000 y son muy listas.\nNormalmente viven en pequeñas cuevas naturales, viven en grupo.\nNo hay hormigas son la Antártida y algunas pequeñas islas.\nHay 3 tipos de hormigas: REINAS, MACHOS ó ZANGANOS Y OBRERAS\nSiempre trabajan en grupo y muy bien organizadas, se desplazan en fila.\nLas hormigas aunque sean muy pequeñas son muy fuertes, son capaces de levantar y transportar cosas 50 veces más pesadas que ellas mismas (casi como si un niño levantase un coche.).',intencionada:'Haremos dos grupos de hormigas:\nSe desplazarán en fila, una detrás de otra.\nLa hormiga reina/zángano, será la primera\ny determinara cómo se desplazan por la piscina\n(iremos cambiando la reina/zángano).',reflexion:''},
{id:'S19-5_urte',cod:'S19',nom:'CONSTRUIMOS ENTRE TODOS UN RELOJ',nom_es:'CONSTRUIMOS ENTRE TODOS UN RELOJ',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'Saltos desde el bordillo, a la cuenta de tres saltaremos desde el bordillo, luego cada uno, inventará un salto y los demás tendrán que imitarlo.',intencionada:'Tenemos un reloj como modelo al lado para que los niños lo miren si lo necesitan. Entre todos tenemos que construir un reloj, para ello, tendremos un circulo vacio que pegaremos en la pared y los niños en cada vuelta saldrán por las escaleras y cojerán un numero y lo colocarán en el sitio correcto dentro del circulo, para terminar colocarán las agujas. ¡¡¡¡Intentar no meter los números al agua!!!\nDespués que está montado, les enseñamos como se colocan las agujas cuando son las doce, cuando son las tres, cuando son las seis y cuando son las nueve.\nCuando el monitor pone en el reloj las 9, tenemos que nadar de espalada 1 largo, si coloca en las tres hay que nadar crol, intentando sacar los brazos de agua, si el monitor coloca el reloj en las 12, hay que hacer la estrella y si pone en las seis, nadarán como mas les guste\nVariante: A la una un largo de crol, a las dos, 2 largos espalda, a las 3 tres largos ranita, etc\nResumen\nDesplazamientos con diferente material\nSaltos',reflexion:''},
{id:'S02-5_urte',cod:'S02',nom:'Normas de la piscina',nom_es:'Normas de la piscina',adina:'5 urte',inst:'Nata 2 y recreativa',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'En la piscina recreativa, ponemos una mesa con un cono encima posada en el agua de modo que retenga aire debajo y se quede flotando. Repartiremos los aros que tenemos entre los niños y lanzaran intentando meterlos en el cono. Cuando acaban les decimos que salten a recoger los que han fallado y repetimos 2-3 veces.',intencionada:'Tendremos unas fichas preparadas con diferentes conductas por parejas. En una ficha tendremos una imagen de la acción y en otra la acción escrita con otra pequeña imagen relacionada como ayuda.\nEjemplo:\n‘‘Comer\'\' \'\'gritar\'\' \'\'Nadar\'\' \'\'Jugar\'\' \'\'ducharse antes\'\'\nTodas estas fichas las pondremos al lado de la piscina en un tapiz boca abajo. Dependiendo del nivel del grupo podemos separar los dibujos de las palabras y reducir o aumentar y aumentar o reducir el número de fichas. Podemos ver las fichas y emparejarlas primero en el tapiz para que las conozcan.\nLos niños tendrán que realizar un recorrido que les plantaremos y por cada vuelta podrán levantar 2 fichas. (El Monitor deberá ayudarles ya que con 5 años no leen.) Si son pareja las apartaran y si no lo son las volverán a dejar boca abajo. Cuando tengamos todas las parejas hechas entre todos clasificaremos las conductas en \'\'correctas\'\' o \'\'incorrectas\'\' debatiendo las razones. Si vemos que no participan todos pediremos la primera valoración directamente a cada niño de forma individual.',reflexion:'Los niños asimilan comprendiendo los motivos por lo que son correctas o incorrectas las diferentes conductas en lugar de ser solo receptores de órdenes. Trabajamos la memoria, la compresión lectora y las asociaciones de conceptos.\nResumen\nDesplazamientos con material\nTestear inmersiones\nConocer las normas de la piscina'},
{id:'S20-5_urte',cod:'S20',nom:'TRIATLOIA EGITERA GOAZ!!!',nom_es:'TRIATLOIA EGITERA GOAZ!!!',adina:'5 urte',inst:'Nata 2',pto:'',materiala:[],arranque:'Bakoitzak bere bizikleta egin beharko:\nUretan aurkituko dugun material ezberdinarekin.\nBuelta bakoitzean material bakarra ekarri ahal izanda…\nNon utziko ditugun erabakiko dugu.\nSobratu den materiala batu denon artean.',intencionada:'Beroketa:\nBerotzeko balio izago diguten desplazamendu ezberdinak egin. Beroketaren garrantzia azaldu…\nTriatloia hastera doa!: Ibilbidea erakutsiko diegu. Urkiola igoko al dugu?\nBuelta 1 Igerian\nBuelta 1 Bizikletan\nBuelta 1 Korrika',reflexion:''},
{id:'S21-5_urte',cod:'S21',nom:'Los viajes de Tom',nom_es:'Los viajes de Tom',adina:'5 urte',inst:'NATA2                              Pto. Encuentro: Borde de la piscina.',pto:'',materiala:['- 2 tapiz – 10 Churros  – 10 Tablas        – 10 Pulls –  20 Aros pequeños'],arranque:'Echar todo el material al agua.\nCUENTO:\n“Erase una vez un hombre que se llamaba Tom. Era médico de\nun barco y a menudo emprendía viajes que le llevaban a tierras muy lejanas. En uno de esos viajes, no podía ni imaginar cuán lejos le llevaría el barco ni qué asombrosas aventuras le aguardaban.\nDespués de muchos meses navegando, el barco se acercó a las costas de una tierra desconocida. De pronto estalló una terrible tormenta y el viento arrojó a su barco contra las rocas. Inmediatamente, el barco se partió en dos. Antes de que se hundiera, los tripulantes, aterrados, se tiraron por la borda. Sólo Tom consiguió nadar a través del furioso oleaje y llegar a tierra sano y salvo. Los otros marineros se ahogaron todos.\nTuvo que recoger el material que había por el agua para llegar a la orilla.',intencionada:'Formaremos 2 grupos:\n“Nos ponemos a salvo”:\nCada grupo (nadando) tiene que recoger el material llevando un tapiz.\n“Resguardémonos”:\nLlevarán a la orilla, y en la cueva (cristalera) prepararán una caseta con el material recogido.',reflexion:'Trabajo en equipo y supervivencia.\nMantener la piscina limpia y recoger el material.'},
{id:'S22-5_urte',cod:'S22',nom:'LONDRES',nom_es:'LONDRES',adina:'5 urte',inst:'NATA II',pto:'',materiala:['- 10 Txurros - 10 Tablas - 1 Mesa'],arranque:'Les explicamos que Londres está en Inglaterra que es una Isla\nVamos todos a la mesa en el agua y a ver si caben todos juntos sobre ella.',intencionada:'Tendrán que nadar imitando la forma del transporte que les digamos.\nA elegir por el por el monitor en función del nivel/grupo.\nMetro à Buceo\nPatinete à Nadando de pie encima de la tabla\nMoto à Churro entre las piernas\nAvión à Tabla en la tripa\nBici à Churro entre las piernas\nTaxi à Nadando con una mano fuera\nTren à Sobre el churro haciendo cadena\nTranvía à Avanzando con las manos por la corchera.\nAutobús à Sentados en la tabla lo harán nadando',reflexion:''},
{id:'S23-5_urte',cod:'S23',nom:'JUGAMOS CON MIS SENTIDOS',nom_es:'JUGAMOS CON MIS SENTIDOS',adina:'5 urte',inst:'NATA II                    Pto Encuentro: A determinar por monitor',pto:'',materiala:[],arranque:'Tiraremos las 10 tablas al agua.\nCogerán una y la sacarán moviendo los pies muy fuertes.\nLa tabla= Pizarra de cada uno\nTiraremos las 10 cosas diferentes al agua.\nDeberán coger una cosa. Lo llevarán sobre la cabeza.\n(Mientras, el monitor colocará una serie de fichas sobre cada tabla, boca abajo)\nEl segundo objeto= identificar la tabla de cada uno',intencionada:'Tendrán las fichas boca abajo. ¡No pueden mirarlas!\nTodas las series son distintas.\nEl profesor les dirá al oído (a cada uno) la ficha que tienen q buscar en el montón que está al otro lado del circuito.\nCIRCUITO: Por la pasarela, corriendo; irán por la cuerda y pasarán x dentro de los aros:\n1 ficha x vuelta.\n¿podrán hacer una txiribuelta dentro de cada aro?\nSi alguno termina antes que el resto, ayudara a algún compañero',reflexion:'-\n-\n-'},
{id:'S24-5_urte',cod:'S24',nom:'Liburu eta Disko  Azoka',nom_es:'Liburu eta Disko  Azoka',adina:'5 urte',inst:'Nata 2 y recreativa',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'Saltos de diferentes formas haciendo hincapié en el salto de cabeza.',intencionada:'Hoy nos vamos a la feria del libro, para eso nos cogeremos las bicis (churros) y nos iremos hasta allí.\nCada uno comprará 2 libros y 6 discos de música. Pero antes necesitamos unas baldas (tablas grandes y pulboys), para guardar los libros y los discos.\nCogeremos las tablas grandes y los pulboys, e irán nadando hasta la mitad de la piscina y los dejarán junto a la cristalera, una vez llevado todo el material construiremos las baldas.\nAhora nos toca ir a comprar los libros y los iremos dejando en las baldas.\nLuego iremos a comprar los discos (fichas sumergibles), en la parte poco profunda de la piscina recreativa.\nAprovecharemos los churros y las tablas y los pulls, para trabajar en diferentes planos y distintos desplazamientos, además se colocarán dos mesas para que puedan descansar.',reflexion:'Mientras nos colocamos las chancletas, les preguntaremos si suelen ir a la feria del libro y que es lo que más les gusta de ella.\nResumen\nIniciación a la entrada al agua de cabeza\nDesplazamientos con diferente material\nInmersiones en agua poco profunda (1m)'},
{id:'S25-5_urte',cod:'S25',nom:'LA SALUD Y LOS ALIMENTOS',nom_es:'LA SALUD Y LOS ALIMENTOS',adina:'5 urte',inst:'Recreativa y NATA 2',pto:'',materiala:[],arranque:'Correremos todos en diferentes direcciones en la z.p.p y cuando digamos “stop” tendrán que: p.e. izarra, sentarse suelo, hacer pino, haces voltereta…',intencionada:'Explicación previa:\nEl tapiz es un “mantel”\nEn el agua tienen todo lo necesario para preparar una mesa:\nLos platos: tablas azules,\nHabrá vasos y botellas\nLa comida: figuras flotantes\nLos cubiertos: picas azules,\nLos pulls serán el segundo plato…\n“Mi menú preferido”\nTendrán que saltar al agua y sacar todo el material en el orden que el monitor les diga.\nEn cada salto solo podrán sacar un objeto.\nCuando tengan todo fuera del agua, cada uno tendrá que poner su mesa y preparar un menú.',reflexion:'Mientras nos colocamos las chancletas, les preguntaremos si les ha gustado y si intentaran probar cosas nuevas y sanas para tener una mejor alimentación.'},
{id:'S26-5_urte',cod:'S26',nom:'Los tres cerditos',nom_es:'Los tres cerditos',adina:'5 urte',inst:'Nata 2 y recreativa',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'Saltos desde fuera de distintas maneras por encima del tapiz, bomba, txiribuelta, y todas las maneras que se nos ocurran.',intencionada:'Érase una vez los tres cerditos y el lobo. Los cerditos tenían que construir una casa de ladrillo, y una vez hecha, llevarla al medio del lago, para que el lobo, que no sabe nadar, no se acercase\nPara eso los cerditos tenían que ir al monte y pasar entre matorrales (Aros verdes).\nEn este cuento los alumnos son los cerditos, los ladrillos son las tablas y los cubos flotantes y el lobo es el monitor.\nSe reparten las tablas y los cubos por el agua, los cerditos entraran y saldrán de la forma que quieran por el aro y cogerán en cada viaje una tabla y un cubo. Una vez recogidas todos los objetos, y llevadas a la orilla construyen la casa encima del tapiz, los trasladan sin que se rompa con colaboración de todos hasta la otra punta de la piscina.',reflexion:'¿Han sido capaces de trabajar colaborativamente?\nResumen\nDesplazamientos con Tablas\nIniciación a las inmersiones\nImplicación y colaboración de todos'},
{id:'S27-5_urte',cod:'S27',nom:'Un día cualquiera',nom_es:'Un día cualquiera',adina:'5 urte',inst:'Nata 2 y recreativa',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'Nos vamos a la piscina irregular después de la ducha donde haremos unas carrerillas y unos saltos en carrera intentando salpicar mucho, para despertarnos bien, puesto que nos acabamos de levantar, entrar por una escalera y salir por la otra.',intencionada:'Nos ponemos en el borde Nata 2 y vamos a realizar una serie de saltos, si alguno no puede sentado en el bordillo. (Saltos haciendo mímica: limpiando y aseándonos y desayunando).\nNos vamos al cole: Nos desplazamos en autobús (esto quiere decir que vamos todos juntos y en fila con los churros).\nEstudiamos; necesitamos carpetas (Tablas). Haremos otros tres desplazamientos de diferentes maneras con nuestros libros (tablas).\nNos vamos al recreo (tres saltos de distintas maneras y nos divertimos).\nNos volvemos para casa, esta vez nos volvemos andando (sin material), diferentes desplazamientos.\nPara acabar nos vamos a la cama, cogemos los tapices pequeños y nos desplazamos primero tumbados boca abalo y después boca arriba, para simular que dormimos.\nUltimo juego: con los tapices pequeño cada vez que pite el monitor habrá que cambiarlo con un compañero.\nResumen\nDesplazamientos con diferente material\nSaltos',reflexion:''},
{id:'S28-5_urte',cod:'S28',nom:'Los cubos misteriosos',nom_es:'Los cubos misteriosos',adina:'5 urte',inst:'Nata 2 y recreativa',pto:'',materiala:['(*). - Chancla','cepillo de dientes','gafas','gorro','peine','llave','zapatilla','globo','chupete','aro','DESARROLLO DE LA SESION'],arranque:'Pediremos a los niños que diseñen un recorrido por la piscina puede ir por fuera entrar, volver a salir… con la condición que termine en el agua. Podrán usar el material que quieran para crear obstáculos. Lo marcaran con una cuerda y les daremos 2-3 minutos para realizarlo. Cuando terminan les explicamos que deben realizar el recorrido por parejas (algún trio) llevando uno de ellos unas gafas opacas que tendremos preparadas. El otro será el guía y tendrá que llevar a su compañer@ sin que sufra ningún percance. Luego cambiaremos de ``rol´´. En el caso de tener algún trio les pedimos que empiecen los primeros.',intencionada:'Pondremos en un extremo de nuestra zona un tapiz con un montón de fichas con la imagen de diferentes objetos. En el otro extremo pondremos cubos que tendrán en le tapa un orificio pequeño, tendrá una tela (pata de una malla o media) que servirá para meter la mano sin posibilidad que se vea lo del interior. Dentro meteremos 4-5 objetos. Pedimos a los niños que coloquen su tabla en el suelo junto a la pared y les daremos alguna ficha para que la identifiquen. Éstos deberán realizar un trayecto por el agua, salir e introducir la mano en los cubos y mediante el tacto adivinar que objetos hay, después volver al tapiz y buscar ese objeto entre las fichas para luego llevar la ficha a su tabla, hasta que hayan pasado por todos los cubos. Para terminar comprobaremos mediante la hoja de verificación, si han adivinado todos los objetos.',reflexion:'¿Cómo nos hemos sentido al no ver y tener que fiarnos de otra persona?\n¿Hemos adivinado de qué objetos se trataba? ¿Nos asusta meter la mano en un lugar que no vemos?\nResumen\nDesplazamientos trasladando material\nSaltos\nConfianza en los compañeros'},
{id:'S29-5_urte',cod:'S29',nom:'Al Monte!!!',nom_es:'Al Monte!!!',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'Saltos de diferentes formas haciendo hincapié en el salto de cabeza. Utilizamos la colchoneta para algunos saltos, o para la iniciación del salto de cabeza.',intencionada:'Tabla (Mochila), Vasos (cantimplora), figuras flotantes (comida)\nPullboy (catalejos), Palos azules (Bastones), Mancuernas azules planas (teléfono).\nNos vamos al monte, pero ¿que necesitamos para poder ir? Prepararemos una mochila con todo lo necesario para poder ir al monte. Para ellos pondremos junto a la escalera central todo el material y tendrán que desplazarse hasta la pared utilizándolo de diferentes maneras. Cada elemento dos vueltas. Dejarán las tablas en el bordillo de dicha pared, y seguirán llevando todo lo necesario y dejándolo sobre la tabla.\nEjemplo: En la primera vuelta, pullboy en las manos y haremos patada crol, y en la segunda vuelta, boca arriba y el pullboy sobre la tripa.\nCuando hayan hecho cada uno su mochila, tendrán que desplazarse por el agua una vuelta sin que se les caiga nada, para poder ir hasta la cima. (Que será la zona de juegos que elijamos)',reflexion:'Mientras nos colocamos las chancletas, les preguntaremos si les ha gustado y les comentamos de lo importante que es llevar en la mochila éstos enseres.\nRESUMEN:\nEntrada al agua de cabeza\nDesplazamientos en diferentes posiciones'},
{id:'S30-5_urte',cod:'S30',nom:'Juego con mis sentidos, la vista',nom_es:'Juego con mis sentidos, la vista',adina:'5 urte',inst:'Nata 2 y recreativa',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'Propondremos diferentes saltos, pero con la dificultad añadida de relacionar cada salto con un color.\nEj.: Tarjeta verde Salto palillo\nTarjeta azul Salto bomba\nTarjeta roja Salto libre',intencionada:'Tenemos una plantilla con diferentes dibujos. Por parejas en cada vuelta deberán coger una ficha relacionada con cada categoría. La plantilla estará en un lado de la piscina y en el otro tendremos fichas encima de un tapiz.\nLos niños podrán ver la plantilla y deberán nadar un tramo para coger una ficha y ponerla en su pizarra. Tendremos un dado para que lo tiren y vayan variando la forma de nadar.\nPlantillas\nSi alguno termina antes que el resto, puede coger un segundo objeto de cada categoría',reflexion:'Han sido capaces de hacer asociaciones de imágenes\nResumen\nDesplazamientos\nAsociación de imágenes'},
{id:'S31-5_urte',cod:'S31',nom:'El monitor es mudo',nom_es:'El monitor es mudo',adina:'5 urte',inst:'Nata 2 y recreativa',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'Repartimos una tabla a cada alumno y deberán hacer equilibrios encima de ella, de pie, sentados, con la tabla en la cabeza, como un camarero, con un pie solo, de rodillas y lo que se nos ocurra.',intencionada:'LA VOZ EN EL BOLSILLO.\nTodas las actividades deberán ser explicadas por medio de gestos.\nPasar corriendo por la pasarela:\n1.- sin material\n2.- con tabla: hasta la mitad, boca arriba\n3.- con tabla: hasta la mitad, pies crol, cabeza dentro\n4.- con txurro: hasta la mitad, de pie encima del txurro\n5.-con txurro: Caballito\nHabrá que intentar pasar por todos los aros. Si alguien necesitara ayuda, podrá ser ayudado por otro compañero',reflexion:'¿Han sido capaces de poder seguir la clase sin que el monitor hablara?, ¿estaban más atentos?\nResumen\nSaltos desde un elemento móvil\nDesplazamientos con diferente material\nEquilibrios'},
{id:'S32-5_urte',cod:'S32',nom:'Las focas que decidieron ser libres',nom_es:'Las focas que decidieron ser libres',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'Tiraremos entre todos las figuras flotantes y las sacaremos de uno en uno saltando cada vez de una forma distinta. Cuando estén todas fuera ordenaremos cada forma por números del 1…. al 10. Las volveremos a tirar al agua y esta vez en cada salto tendremos que imitar a un animal acuático. Cuando estén todas fuera las ordenaremos, pero esta vez en orden alfabético. (AEIOU)',intencionada:'El cuento trata de unas focas que vivían en un parque de atracciones acuático que se pasaban el día actuando para los niños que visitaban el parque. Esta actividad diaria les gustaba, porque se lo pasaban bomba en el agua haciendo demostraciones de lo que sabían hacer, pero llego un momento en que se empezaron a aburrir de hacer siempre lo mismo y se empezaron a preguntar si no serían más felices en libertad en el mar con sus familias y amigos. Un buen día decidieron abandonar el parque.\n- “¿Somos realmente felices en el parque?”\nEsta es la actuación que hacían a diario en el parque: (Montaremos un circuito).\n- Empezarán cogiendo un aro y tendrán que saltar al agua para nadar hasta la mesa en la cual habrá un cono y colocar el aro, saltaran de la mesa y saldrán del agua. Cuando nos quedemos sin aros haremos el ejercicio a la inversa.\n- Cogerán un aro y saltaran a l agua imitando el movimiento y el ruido de las focas. Esta vez habrá un aro flotante y tendrán que saltar entrando por el, habrá otro aro sumergido y lo pasaran buceando, después irán nadando hasta la mesa donde colocaran el aro en el cono para acabar nadando hasta fuera del agua.\n- Jugaremos un partido de pelotas de focas. No podremos tocar la pelota con las manos, solo podremos tocar con la cabeza o con los pies.\n- “¡¡¡Decidimos ser libres y felices!!!!”\nCuando un buen día deciden ser felices…… Saltaremos todos al agua y decidimos, como focas libres y felices que somos, jugar con los amigos, saltar, bucear….',reflexion:'Mientras nos colocamos las chancletas, les preguntaremos si les ha gustado la historia y si ellos cambiarían algo del cuento.\nResumen\nIniciación a la entrada al agua de cabeza\nDesplazamientos trasladando material\nInmersiones'},
{id:'S33-5_urte',cod:'S33',nom:'Las Estaciones del año',nom_es:'Las Estaciones del año',adina:'5 urte',inst:'Nata 2 y recreativa',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'En el borde de la piscina haremos saltos, pero estos dependerán de la estación del año en la que sucedan los hechos que nosotros vamos diciendo. Trabajamos el conocimiento de la estación y la rapidez a nivel cognitivo.\nEjemplo:\nInvierno: salto de bomba\nPrimavera: saltar y nadar hasta la corchera\nVerano: saltar de cabeza (el que no sepa de palo)\nOtoño: salto con las manos encima de la cabeza',intencionada:'En un lado de la piscina sobre el tapiz tenemos tablas grandes, pequeñas, churros, fichas flotantes y un aro grande. Con todo esto deberemos hacer una representación de lo que sucede a un árbol en el campo, durante el año. En la otra esquina de nuestra zona sobre otro tapiz iremos llevando los diferentes elementos que necesitaremos para representar la escena.\nINVIERNO: (Mirar foto), tablas grandes y churros normales. Cuando tengamos esto completado explicamos cómo en invierno los árboles no tienen hojas y no hay flores en el campo.\nPRIMAVERA: (Mirar foto), el material anterior, + tablas pequeñas y fichas sumergibles (flores).\nVERANO: (Mirar foto), el material anterior,+ aro grande y churros finos.\nOTOÑO: (Mirar foto), se caen las hojas del árbol. Retiramos las flores y las tiraremos al agua y retiramos las hojas (tablas), para terminar con la escena.\nPara terminar, saltaremos e intentaremos coger “las flores”, (inmersiones).',reflexion:'¿Han podido identificar fácilmente las diferencias entre cada estación?\n¿Han participado activamente?\nResumen\nSaltos\nDesplazamientos con diferente material\nInmersiones\nINVIERNO/ PRIMAVERA\nVERANO/ OTOÑO'},
{id:'S34-5_urte',cod:'S34',nom:'ESKUAK ONDO GARBITZEN IKASTEN DUGU',nom_es:'ESKUAK ONDO GARBITZEN IKASTEN DUGU',adina:'5 urte',inst:'nata 2',pto:'',materiala:['10 txurroak','10 panpinak','10 uztailak','10 taulak'],arranque:'Haurrei eskuak ondo garbitzearen garrantzia azalduko diegu, gaixotasunak eta ekiditzeko oso garrantzitsua delako.\nluzera batzuk egingo dituzte begiraleak esaten dien bezala. Hau guztia eskuak garbitu barik egingo dutenez ezin izango dute beraien aurpegiak ezta bere taldeko lagunak ikutu. Gorputza berotu ondoren begiralearen aurrean jarri (uretan)eta begiraleak eskuak ondo nola garbitzen diren azalduko die. Haurrak begiraleak egiten duena egingo dute.\nIntentziozko iharduera:\nBerriro egingo ditugu luzerak,baina luzerak egiten dugun bakoitzean eskuak zikindu egingo dira eta orduan luzera bakoitzaren ondoren eskuak garbitu egin behar dira. Era egokian garbitzen dira eskuak? Ondo garbitzen ez badira , berriro azaldu egingo diegu nola egin ondo egiten ikasi arte. Luzera bakoitzean eskuetan zerbait garraiatu beharko dute , horrela eskuak zikintzen bait dira.',intencionada:'',reflexion:'Zerbait aldatu:'},
{id:'S35-5_urte',cod:'S35',nom:'JUEGO CON MIS SENTIDOS, La vista',nom_es:'JUEGO CON MIS SENTIDOS, La vista',adina:'5 urte',inst:'Nata 2 y recreativa',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'“¿NOS FUNCIONA LA MEMORIA?”\nRealizaremos diferentes saltos para después nadar hasta la corchera y volver. En cada salto les enseñaremos una “tarjeta de memoria” que tendrán que recordarla al salir. Además de la última tarjeta tendrán que recordar también las anteriores. ¿Cuántas somos capaces de memorizar?\nDependerá del grupo el nº de tarjetas y como utilizarlas (solo color/color + palabra)',intencionada:'Juego “LAS 5 DIFERENCIAS”\nColocaremos las fichas dentro del agua en el fondo, encima de la mesa, pegadas en la pared o repartidas en los lugares anteriormente mencionados.\nEn cada vuelta iremos nadando por la cuerda intentando pasar también por el aro. Al llegar a la zona de la mesa nos sumergiremos para poder observar la ficha y encontrar UNA de las diferencias. Saldremos del agua para contarle al monitor lo que hemos visto (el monitor podrá tener una de las fichas en su mano para comprobar).\nVamos a por otra vuelta y a por otra diferencia!\nAviso:\n- Hay 5 diferencias (5 vueltas) por lo que podremos añadir vueltas preguntándoles cosas sobre los dibujos: ej. ¿de qué color es la manzana/pantalones?...\n- Podemos aprovechar para que realicen una vuelta por la cuerda y la siguiente sin tocarla.\nCuando acabemos podemos poner en común si coincidimos o no en las cosas que hemos visto.',reflexion:'¿Han sido capaces de a través del juego, de que niños que habitualmente les cuesta meter la cara en el agua, lo hayan logrado?\nResumen\nDesplazamientos con ayuda de la cuerda\nInmersiones'},
{id:'S36-5_urte',cod:'S36',nom:'Descubriendo paraísos',nom_es:'Descubriendo paraísos',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'El monitor le explica que alrededor del mundo hay muchos paisajes diferentes y que hoy los vamos a visitar todos.\nPondremos las tres imágenes, La torre Eiffel, La estatua de la Libertad y El Guggenheim, en la pared. Haremos tres grupos y tiraran las figuras flotantes al agua. Cada grupo tendrá que hacer un dibujo en la pared debajo de cada imagen parecida a ella.',intencionada:'Para ponerlos en parejas de forma diferentes a los alumnos les enseñaremos las cartas de parejas. Las ponemos boca abajo y cojera cada una. Una vez emparejados, empezamos con nuestro viaje.\nHaremos un largo individual y otro en pareja.\nLes enseñamos la primera imagen:\nBosque: viajaremos por un bosque (algas) metiendo la cabeza y mirando a ver si encontramos a alguno de sus habitantes.\nDesierto: Viajaremos por el desierto montados a caballo, podemos hacer variaciones, hacia atrás, dados de la mano, con las manos en la cabeza…\nMonte: veremos el monte más alto del mundo desde un avión (churro en las manos brazos estirados y cabeza adentro, para ver si lo vemos)\nMar: con el churro largo y anudado, iremos con la moto de agua.\nRio: con la tabla grande iremos bajando por el rio intentando sentarnos encima y brazos de braza.',reflexion:'Han participado todos.\nHan seguido las indicaciones\n¿Hemos conseguido meter la cabeza?\nNivel independencia general del grupo.\nResumen\nSaltos\nDesplazamientos con diferente material\nInmersiones'},
{id:'S37-5_urte',cod:'S37',nom:'Trafico',nom_es:'Trafico',adina:'5 urte',inst:'Nata 2 y recreativa',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'Jugaremos al juego del semáforo, los niños comenzaran en el bordillo, y cuando el monitor enseñe la tarjeta verde comenzaran a nadar, pero cuidado! En cualquier momento puede mostrar otra tarjeta, si enseña la roja me tengo que quedar quieto en el agua y si enseña la amarilla tengo que avanzar lentamente.',intencionada:'Pondremos tres conos entre las dos escaleras en nata 2. En el otro extremo pondremos la caja con los “cuadrados flotantes” (entrada al agua)\nExplicación: Tendrán que llevar sobre diferentes partes del cuerpo o sobre la tabla, los cubos y al salir de la piscina, hacer torres a los lados de los conos, (dos torres) .\nExplicación: “Los policías colocaran conos en ciertas zonas para regular el tráfico, nosotros no debemos tocarlos/moverlos”\nAcción: desde el agua con las pelotas, tratarán de derribar las torres desde las mesas colocadas en el agua, sin tocar los conos.\nResumen\nDesplazamientos con diferente material',reflexion:''},
{id:'S38-5_urte',cod:'S38',nom:'Berziklapena',nom_es:'Berziklapena',adina:'5 urte',inst:'Nata2',pto:'',materiala:['Berziklapenaren argazkiak','Karpeta nº 39','(zabor edukiontziak) eta 10 txurro'],arranque:'Argazkiak horman jarriko ditugu, batetik bestera 1,5mko distantzia utziz. 1. argazkiaren aurrean jarriko gara. Adibidez: edukiontzi berdearen aurrean eta edukiontzi honetara bota ahal diren gauzak izendatuko ditugu uretara salto egiten duten einean. Hurrengo argazkiekin berdin egingo dogu.\nIntentziozko jarduera:\n4 edukiontzi egongo dira. Eta bakoitza estilo batekin erlazionatuko dugu. Adibidez: edukiontzi urdina-krol estiloa. Edukiontzi berdea- Bizkar. Edukiontzi horia - bular eta edukiontzi marroia ( organikoa) nahi duten estiloa. Begiralek papera esaten badu denak krol estiloa egin beharko dute igerian....',intencionada:'',reflexion:'Zerbait ikasi dugu? Etxean birziklatzen dugu? edo birziklatzen hasiko gara?\nHobetzeko gauzak'},
{id:'S39-5_urte',cod:'S39',nom:'DURANGOKO TOKIAK',nom_es:'DURANGOKO TOKIAK',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['Durangoko argazki txikiak eta 10 txurro'],arranque:'Banaka, binaka, hirunaka... salto desberdinak egingo dituzte kortzeraraino joan etorriak eginez. Igerian nahi duten bezala egingo dute. Salto egin baino lehen Durangoko toki bat aipatu beharko dute.\nIntentziozko iharduera:\nBegiraleak bakoitzean argazki desberdin bat erakutziko die, ia leku hori non dagoen dakiten galdetuz. Argazki bakoitzarekin luzera bat egin beharko dute begiralak esaten dien estiloan edo eran. Argazki guztiak egin eta gero beraiek esan beharko diete begiraleari non dagoen argazkia eta zein estilotan egingo duten igerian.\n-Santa Anako arkua -Zezena\n-Landakoko igerilekua -Landakoko Polikiroldegia\n-Udaletxea -Ezkurdiko musika kioskoa\n-Santa Mariako aterpea -Tabirako igerilekua',intencionada:'',reflexion:'Zerbait aldatu'},
