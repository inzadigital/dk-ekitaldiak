<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NatEdu · Durango Kirolak</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#007032;--g2:#005828;--g3:#e6f4ec;--g4:#c8e8d4;
  --b:#00475C;--b2:#003347;--b3:#e0eff4;
  --gl:#6AB023;--gl2:#4e8018;--gl3:#eef6e0;
  --bg:#f2f5f2;--white:#fff;
  --txt:#162216;--txt2:#3d5c3d;--txtm:#7a957a;
  --bdr:#cde0d0;--bdr2:#aacfb4;
  --warn:#f59e0b;--red:#e53935;--reds:#fdecea;
  --r:14px;--rs:9px;
  --nav:66px;--hdr:56px;
  --fn:'Nunito',system-ui,sans-serif
}
body{font-family:var(--fn);background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg);border-radius:5px}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:5px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--txtm)}
html{scrollbar-width:thin;scrollbar-color:var(--bdr2) var(--bg)}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:200;background:var(--g);height:var(--hdr);display:flex;align-items:center;padding:0 14px;gap:10px;box-shadow:0 2px 10px rgba(0,112,50,.25)}
.hdr-back{width:36px;height:36px;border:none;background:rgba(255,255,255,.18);color:white;border-radius:8px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--fn)}
.hdr-t{flex:1;font-size:15px;font-weight:800;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logo{display:flex;align-items:center;gap:8px;flex:1}
.logo-dk{display:flex;flex-direction:column;line-height:1.1}
.logo-d{font-size:13px;font-weight:900;color:white;letter-spacing:1.5px;text-transform:uppercase}
.logo-k{font-size:13px;font-weight:900;color:var(--gl)}
.logo-sq{width:30px;height:30px;background:white;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.avatar{min-width:32px;padding:0 7px;height:32px;border-radius:16px;background:rgba(255,255,255,.22);color:white;font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:.3px}
@media (max-width:380px){
  .hdr{padding:0 10px;gap:6px}
  #sync-indicator{padding:4px 7px !important;font-size:9px !important}
  #sync-indicator .sync-dot{width:6px !important;height:6px !important}
}

/* ── NAV ── */
.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:var(--white);border-top:1.5px solid var(--bdr);display:flex;z-index:200}
.nv{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--txtm);font-family:var(--fn);font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding-bottom:4px}
.nv.on{color:var(--g)}
.nv-i{font-size:21px;line-height:1}

/* ── MAIN ── */
.main{padding:14px;padding-bottom:calc(var(--nav)+14px);max-width:560px;margin:0 auto}

/* ── SECTION HEADER ── */
.sh{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.9px;color:var(--txtm);margin:18px 0 8px;display:flex;align-items:center;justify-content:space-between}

/* ── CARD ── */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--bdr);padding:15px;margin-bottom:10px}

/* ── SESSION CARD (home & calendar) ── */
.scard{background:var(--white);border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.scard.ev{border-color:var(--gl);border-left:4px solid var(--gl)}
.scard.pend{border-left:4px solid var(--b)}
.scard:active{opacity:.93}
.scard-hdr{padding:14px 14px 12px;display:flex;gap:12px;align-items:flex-start}
.scard-hora{font-size:26px;font-weight:900;color:var(--g);line-height:1;min-width:58px}
.scard-info{flex:1}
.scard-nom{font-size:15px;font-weight:800;color:var(--txt);margin-bottom:2px;line-height:1.25}
.scard-sub{font-size:12px;color:var(--txt2);font-weight:600}
.scard-st{font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;flex-shrink:0;align-self:flex-start}
.st-ev{background:var(--gl3);color:var(--gl2)}
.st-pend{background:var(--b3);color:var(--b2)}
.scard-tags{padding:0 14px 12px;display:flex;gap:5px;flex-wrap:wrap}

/* ── TAGS ── */
.tag{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;letter-spacing:.2px}
.tg{background:var(--g3);color:var(--g2)}
.tb{background:var(--b3);color:var(--b2)}
.tgl{background:var(--gl3);color:var(--gl2)}
.tw{background:var(--bg);color:var(--txtm);border:1px solid var(--bdr)}

/* ── SESSION DETAIL ── */
.sec-hdr{background:var(--g);padding:16px 14px;margin:-14px -14px 14px}
.sec-cod{font-size:11px;font-weight:900;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.sec-nom{font-size:18px;font-weight:900;color:white;line-height:1.2;margin-bottom:6px}
.sec-meta{display:flex;gap:6px;flex-wrap:wrap}
.sec-mtag{font-size:10px;font-weight:800;padding:3px 9px;border-radius:12px;background:rgba(255,255,255,.18);color:white}

.blk{margin-bottom:14px}
.blk-title{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.9px;color:var(--txtm);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.blk-title::after{content:'';flex:1;height:1px;background:var(--bdr)}

.mat-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--bdr);font-size:14px;font-weight:600;color:var(--txt);line-height:1.4}
.mat-item:last-child{border:none}
.mat-dot{width:7px;height:7px;border-radius:50%;background:var(--gl);flex-shrink:0;margin-top:4px}

.act{border-radius:var(--rs);padding:13px;margin-bottom:8px}
.act-arr{background:var(--g3);border-left:3px solid var(--g)}
.act-int{background:var(--b3);border-left:3px solid var(--b)}
.act-ref{background:var(--gl3);border-left:3px solid var(--gl)}
.act-lbl{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.act-arr .act-lbl{color:var(--g2)}
.act-int .act-lbl{color:var(--b2)}
.act-ref .act-lbl{color:var(--gl2)}
.act-txt{font-size:13px;font-weight:600;color:var(--txt);line-height:1.6}

.pto{background:var(--bg);border-radius:var(--rs);padding:10px 12px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--txt2)}

/* ── EVAL ── */
.eval-section{background:var(--white);border-radius:var(--r);border:2px solid var(--bdr);overflow:hidden;margin-top:20px}
.eval-hdr{background:var(--g);padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.eval-hdr-t{font-size:14px;font-weight:900;color:white}
.eval-hdr-st{font-size:11px;font-weight:800;padding:3px 10px;border-radius:12px;background:rgba(255,255,255,.2);color:white}
.eval-hdr-st.done{background:var(--gl);color:white}
.eval-body{padding:14px}

.crit{margin-bottom:16px}
.crit-lbl{font-size:12px;font-weight:800;color:var(--txt);margin-bottom:8px}
.scale{display:flex;gap:4px}
.sb{flex:1;height:48px;border-radius:8px;border:1.5px solid var(--bdr);background:var(--bg);color:var(--txtm);font-family:var(--fn);font-size:14px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.sb:active{transform:scale(.93)}
.sb.sel-n2,.sb.sel-n1{background:#fde8e8;border-color:#f43f5e;color:#b91c1c}
.sb.sel-0{background:var(--b3);border-color:var(--b);color:var(--b2)}
.sb.sel-p1,.sb.sel-p2{background:var(--g3);border-color:var(--g);color:var(--g2)}

.stars-row{display:flex;justify-content:center;gap:8px;padding:6px 0 2px}
.star{font-size:40px;cursor:pointer;color:#d8e8d8;transition:color .1s,transform .1s;line-height:1}
.star.on{color:var(--warn)}
.star:active{transform:scale(.9)}

.cmt{width:100%;background:var(--bg);border:1.5px solid var(--bdr);border-radius:9px;color:var(--txt);font-family:var(--fn);font-size:14px;padding:11px 13px;resize:none;outline:none;min-height:68px;font-weight:600;line-height:1.5;transition:border-color .2s}
.cmt:focus{border-color:var(--g)}
.autosave{text-align:right;font-size:11px;font-weight:700;color:var(--gl2);margin-top:5px;height:16px;transition:opacity .3s;opacity:0}
.autosave.show{opacity:1}

/* AVISO GRANDE de guardado — visible y satisfactorio */
.bigsave{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.6);background:linear-gradient(135deg,var(--g) 0%,var(--gl) 100%);color:white;padding:36px 56px;border-radius:24px;box-shadow:0 16px 60px rgba(0,112,50,.45),0 0 0 4px rgba(106,176,35,.25);z-index:9999;opacity:0;pointer-events:none;transition:opacity .25s,transform .35s cubic-bezier(.34,1.56,.64,1);text-align:center;font-family:var(--fn);max-width:min(440px,86vw)}
.bigsave.show{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto}
.bigsave-ic{font-size:64px;line-height:1;margin-bottom:14px;animation:bigsave-pop .5s cubic-bezier(.34,1.56,.64,1)}
.bigsave-t{font-size:24px;font-weight:900;margin-bottom:6px;letter-spacing:.3px}
.bigsave-d{font-size:14px;font-weight:600;opacity:.9;line-height:1.4}
@keyframes bigsave-pop{0%{transform:scale(0) rotate(-30deg)}60%{transform:scale(1.15) rotate(8deg)}100%{transform:scale(1) rotate(0)}}
@media (max-width:480px){
  .bigsave{padding:28px 36px}
  .bigsave-ic{font-size:54px}
  .bigsave-t{font-size:20px}
  .bigsave-d{font-size:13px}
}
.bigsave-bg{position:fixed;inset:0;background:rgba(0,0,0,.15);z-index:9998;opacity:0;pointer-events:none;transition:opacity .25s}
.bigsave-bg.show{opacity:1;pointer-events:auto}

/* ── CALENDAR ── */
.wk{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:14px}
.wk-nav-btn{padding:8px 11px;border-radius:9px;border:1.5px solid var(--bdr);background:var(--white);color:var(--txt2);font-family:var(--fn);font-size:13px;font-weight:800;cursor:pointer;transition:all .15s;flex:0 0 auto;line-height:1}
.wk-nav-btn:active{transform:scale(.96)}
.wk-nav-btn.pri{background:var(--g);border-color:var(--g);color:white}
.wk-nav-btn:disabled{opacity:.4;cursor:default}
.wd{background:var(--white);border-radius:10px;border:1.5px solid var(--bdr);padding:9px 4px;text-align:center;cursor:pointer}
.wd.today{border-color:var(--g);background:var(--g3)}
.wd.sel{border-color:var(--b);background:var(--b3)}
.wd-n{font-size:9px;font-weight:900;color:var(--txtm);text-transform:uppercase;letter-spacing:.4px}
.wd-d{font-size:17px;font-weight:900;color:var(--txt);margin:3px 0 2px}
.wd.today .wd-d{color:var(--g2)}
.wd.sel .wd-d{color:var(--b2)}
.wd-dot{width:5px;height:5px;border-radius:50%;background:var(--g);margin:0 auto}

/* ── LIBRARY ── */
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:7px 14px;border-radius:20px;border:1.5px solid var(--bdr);background:transparent;color:var(--txtm);font-family:var(--fn);font-size:12px;font-weight:800;cursor:pointer;flex-shrink:0}
.chip.on{background:var(--g);border-color:var(--g);color:white}

/* ── IDEAS ── */
.ic{background:var(--white);border-radius:var(--r);border:1px solid var(--bdr);padding:13px;margin-bottom:8px}
.ic-txt{font-size:14px;font-weight:600;color:var(--txt);line-height:1.55;margin-bottom:8px}
.ic-ft{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.ic-meta{font-size:11px;color:var(--txtm);font-weight:700}
.ic-clickable{cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s}
.ic-clickable:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,112,50,.08);border-color:var(--g)}
.ic-clickable:active{transform:translateY(0)}
.ic-link{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;color:var(--g);background:var(--g3);padding:4px 9px;border-radius:10px;max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ic-link-arrow{font-weight:900}
.ic-sel{font-size:12px;font-weight:800;padding:4px 10px;border-radius:12px;border:1.5px solid var(--bdr);background:transparent;color:var(--txt2);font-family:var(--fn);cursor:pointer;outline:none}

/* ── CHAT ── */
.chatbox{min-height:180px;max-height:360px;overflow-y:auto;display:flex;flex-direction:column;gap:9px;margin-bottom:11px;padding:4px 0}
.msg{padding:10px 13px;border-radius:12px;font-size:13px;font-weight:600;line-height:1.55;max-width:90%}
.msg-u{background:var(--g);color:white;align-self:flex-end;border-bottom-right-radius:3px}
.msg-a{background:var(--bg);color:var(--txt);border:1px solid var(--bdr);align-self:flex-start;border-bottom-left-radius:3px}
.cin{display:flex;gap:8px}
.cin input{flex:1;background:var(--bg);border:1.5px solid var(--bdr);border-radius:9px;color:var(--txt);font-family:var(--fn);font-size:14px;padding:11px 13px;outline:none;font-weight:600}
.cin input:focus{border-color:var(--g)}
.csend{width:46px;height:46px;border-radius:9px;background:var(--g);border:none;color:white;font-size:19px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}

/* ── METRICS ── */
.mc{background:var(--white);border-radius:var(--rs);border:1px solid var(--bdr);padding:13px;text-align:center}
.mv{font-size:24px;font-weight:900;color:var(--g)}
.ml{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;color:var(--txtm);margin-top:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.bw{margin-bottom:9px}
.bl{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:4px;color:var(--txt2)}
.bl b{color:var(--txt)}
.bt{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px}

/* ── LOGIN ── */
.lwrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;background:var(--bg)}
.lcard{width:100%;max-width:340px;background:var(--white);border-radius:20px;border:1px solid var(--bdr);padding:28px 22px;box-shadow:0 4px 24px rgba(0,112,50,.08)}
.llogo{width:56px;height:56px;background:var(--g);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.ltop{text-align:center;margin-bottom:22px}
.lname{font-size:22px;font-weight:900;color:var(--txt);margin-bottom:2px}
.lsub{font-size:13px;color:var(--txtm);font-weight:600}
.rbtn{display:flex;flex-direction:column;align-items:center;gap:7px;padding:16px 10px;border-radius:12px;border:2px solid var(--bdr);background:var(--bg);cursor:pointer;font-family:var(--fn);font-size:13px;font-weight:800;color:var(--txt2);transition:all .15s;width:100%}
.rbtn.sel{border-color:var(--g);background:var(--g3);color:var(--g2)}
.rbtn-i{font-size:28px}
.ini-grid{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 16px}
.ini-btn{padding:9px 12px;border-radius:9px;border:1.5px solid var(--bdr);background:var(--bg);color:var(--txt2);font-family:var(--fn);font-size:13px;font-weight:900;cursor:pointer;transition:all .15s}
.ini-btn.sel{border-color:var(--g);background:var(--g3);color:var(--g2)}
.lbtn{width:100%;padding:14px;border-radius:11px;background:var(--g);color:white;font-family:var(--fn);font-size:15px;font-weight:900;cursor:pointer;border:none;transition:opacity .2s}
.lbtn:disabled{opacity:.4;cursor:default}
label{font-size:11px;font-weight:800;color:var(--txtm);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
.pw-inp{width:100%;background:var(--bg);border:1.5px solid var(--bdr);border-radius:9px;color:var(--txt);font-family:var(--fn);font-size:15px;padding:12px;outline:none;margin-bottom:14px;font-weight:600}
.pw-inp:focus{border-color:var(--g)}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 20px;color:var(--txtm)}
.empty-i{font-size:44px;margin-bottom:10px}
.empty-t{font-size:15px;font-weight:700}

/* ── BTN ── */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 18px;border-radius:11px;font-family:var(--fn);font-size:14px;font-weight:800;cursor:pointer;border:none;width:100%;transition:opacity .15s}
.btn:active{opacity:.85}
.btn-g{background:var(--g);color:white}
.btn-o{background:transparent;border:1.5px solid var(--bdr2);color:var(--txt2)}
.btn-b{background:var(--b);color:white}

/* ── TOAST ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--g);color:white;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:800;opacity:0;transition:opacity .25s;z-index:999;white-space:nowrap;pointer-events:none}
#toast.on{opacity:1}

@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .22s ease forwards}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 1s infinite}

/* ══════════════════════════════════════════════
   ADMIN PC LAYOUT — activated when body.admin-pc
   Only applies on viewport ≥ 960px
   ══════════════════════════════════════════════ */
@media(min-width:960px){
  body.admin-pc{background:#eef1ee}
  body.admin-pc .hdr,body.admin-pc .nav{display:none}
  body.admin-pc .main{display:none}

  /* Shell */
  .ashell{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  .asb{background:var(--g);color:white;padding:20px 14px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
  .asb-logo{display:flex;align-items:center;gap:10px;padding:4px 8px 18px;border-bottom:1px solid rgba(255,255,255,.15);margin-bottom:16px}
  .asb-sq{width:36px;height:36px;background:white;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .asb-tit{display:flex;flex-direction:column;line-height:1.1}
  .asb-d{font-size:14px;font-weight:900;color:white;letter-spacing:1.5px}
  .asb-k{font-size:13px;font-weight:900;color:var(--gl)}
  .asb-nm{font-size:18px;font-weight:900;color:white;padding:4px 8px;margin-bottom:2px}
  .asb-sub{font-size:11px;font-weight:700;color:rgba(255,255,255,.6);padding:0 8px 16px;letter-spacing:.5px;text-transform:uppercase}
  .asb-items{flex:1;display:flex;flex-direction:column;gap:3px}
  .asb-it{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:9px;color:rgba(255,255,255,.75);font-size:13.5px;font-weight:700;cursor:pointer;border:none;background:transparent;font-family:var(--fn);text-align:left;transition:background .1s}
  .asb-it:hover{background:rgba(255,255,255,.08);color:white}
  .asb-it.on{background:rgba(255,255,255,.14);color:white;font-weight:800}
  .asb-it-i{font-size:17px;width:20px;text-align:center}
  .asb-ft{border-top:1px solid rgba(255,255,255,.15);padding-top:14px;display:flex;align-items:center;gap:10px}
  .asb-av{width:36px;height:36px;border-radius:50%;background:var(--gl);color:white;font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center}
  .asb-usr{flex:1;line-height:1.2}
  .asb-usr-n{font-size:13px;font-weight:800;color:white}
  .asb-usr-r{font-size:10px;color:rgba(255,255,255,.6);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .asb-exit{background:rgba(255,255,255,.1);border:none;width:30px;height:30px;border-radius:7px;color:white;font-size:13px;cursor:pointer;font-family:var(--fn)}

  /* Content area */
  .acont{padding:0;overflow-x:hidden}
  .atop{background:white;border-bottom:1px solid var(--bdr);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
  .atop-l{display:flex;align-items:baseline;gap:12px}
  .atop-t{font-size:22px;font-weight:900;color:var(--txt)}
  .atop-d{font-size:13px;font-weight:700;color:var(--txtm);text-transform:capitalize}
  .atop-r{display:flex;gap:10px}
  .atop-btn{padding:9px 16px;border-radius:9px;font-size:13px;font-weight:800;font-family:var(--fn);cursor:pointer;border:none;display:flex;align-items:center;gap:6px}
  .atop-btn.pri{background:var(--g);color:white}
  .atop-btn.sec{background:transparent;border:1.5px solid var(--bdr);color:var(--txt2)}
  .atop-btn:hover{opacity:.9}

  .abody{padding:24px 28px 40px;max-width:1280px}

  /* Dashboard KPI grid */
  .akpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
  .akpi{background:white;border:1px solid var(--bdr);border-radius:12px;padding:16px 18px}
  .akpi-lbl{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.8px;color:var(--txtm);margin-bottom:6px}
  .akpi-v{font-size:30px;font-weight:900;color:var(--txt);line-height:1.1}
  .akpi-sub{font-size:12px;font-weight:700;color:var(--txt2);margin-top:3px}
  .akpi-ic{float:right;font-size:20px;margin-top:2px;opacity:.5}
  .akpi.g .akpi-v{color:var(--g)}
  .akpi.b .akpi-v{color:var(--b)}
  .akpi.gl .akpi-v{color:var(--gl2)}
  .akpi.w .akpi-v{color:var(--warn)}

  /* Two column grid */
  .acol2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:16px}
  .acol3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .apanel{background:white;border:1px solid var(--bdr);border-radius:12px;overflow:hidden}
  .apanel-hdr{padding:14px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;background:#fafcfa}
  .apanel-t{font-size:14px;font-weight:900;color:var(--txt)}
  .apanel-act{font-size:12px;font-weight:800;color:var(--g);cursor:pointer;background:none;border:none;font-family:var(--fn)}
  .apanel-body{padding:12px 18px 18px}

  /* Planning table */
  .plan-tbl{width:100%;border-collapse:separate;border-spacing:0;background:white;border:1px solid var(--bdr);border-radius:12px;overflow:hidden}
  .plan-tbl th{background:#fafcfa;padding:12px 10px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;color:var(--txtm);text-align:left;border-bottom:1px solid var(--bdr)}
  .plan-tbl th.today{background:var(--g3);color:var(--g2)}
  .plan-tbl td{padding:6px 8px;vertical-align:top;border-bottom:1px solid var(--bdr);min-height:68px;width:14.28%}
  .plan-tbl td.hrc{background:#fafcfa;font-size:13px;font-weight:900;color:var(--txt2);text-align:center;width:68px;padding:10px 8px}
  .plan-tbl td.today{background:#f7fcf8}
  .plan-chip{background:var(--g3);border-left:3px solid var(--g);border-radius:6px;padding:7px 9px;margin-bottom:5px;cursor:pointer;transition:transform .1s}
  .plan-chip:hover{transform:translateX(1px);background:var(--g4)}
  .plan-chip.ev{border-left-color:var(--gl);background:var(--gl3)}
  .plan-chip-nom{font-size:12px;font-weight:800;color:var(--txt);line-height:1.25;margin-bottom:2px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .plan-chip-m{font-size:10px;font-weight:700;color:var(--txt2);display:flex;align-items:center;gap:4px}
  .plan-chip-m b{color:var(--g2)}

  /* Data table */
  .dtbl{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden}
  .dtbl th{background:#fafcfa;padding:11px 14px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.7px;color:var(--txtm);text-align:left;border-bottom:1.5px solid var(--bdr);position:sticky;top:0}
  .dtbl td{padding:12px 14px;font-size:13px;color:var(--txt);border-bottom:1px solid var(--bdr);font-weight:600}
  .dtbl tr{cursor:pointer;transition:background .1s}
  .dtbl tr:hover td{background:#fafcfa}
  .dtbl tr:last-child td{border-bottom:none}

  /* Filters row */
  .afil{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .afil-lbl{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;color:var(--txtm);align-self:center;margin-right:4px}

  /* Monitor cards */
  .mon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
  .mon-card{background:white;border:1px solid var(--bdr);border-radius:12px;padding:18px;transition:border-color .15s;cursor:pointer}
  .mon-card:hover{border-color:var(--g)}
  .mon-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .mon-av{width:48px;height:48px;border-radius:50%;background:var(--g);color:white;font-size:15px;font-weight:900;display:flex;align-items:center;justify-content:center}
  .mon-nm{font-size:16px;font-weight:900;color:var(--txt)}
  .mon-rol{font-size:11px;color:var(--txtm);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .mon-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-top:12px;border-top:1px solid var(--bdr)}
  .mon-stat{text-align:center}
  .mon-stat-v{font-size:18px;font-weight:900;color:var(--g)}
  .mon-stat-l{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--txtm);margin-top:2px}

  /* Activity list */
  .alist-it{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--bdr);align-items:flex-start}
  .alist-it:last-child{border:none}
  .alist-av{width:34px;height:34px;border-radius:50%;background:var(--g3);color:var(--g2);font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .alist-body{flex:1;min-width:0}
  .alist-top{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:2px}
  .alist-top b{color:var(--g2);font-weight:900}
  .alist-sub{font-size:11px;color:var(--txtm);font-weight:700}
  .alist-star{font-size:13px;font-weight:900;color:var(--warn);flex-shrink:0}

  /* Session detail in admin shell */
  body.admin-pc .ashell-sess{background:white;border:1px solid var(--bdr);border-radius:12px;overflow:hidden;max-width:820px}
  body.admin-pc .ashell-sess .sec-hdr{margin:0}

  /* Charts */
  .bar-row{display:grid;grid-template-columns:130px 1fr 50px;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--bdr)}
  .bar-row:last-child{border:none}
  .bar-lbl{font-size:13px;font-weight:700;color:var(--txt)}
  .bar-trk{height:10px;background:var(--bg);border-radius:5px;overflow:hidden}
  .bar-fl{height:100%;border-radius:5px;transition:width .4s}
  .bar-val{font-size:14px;font-weight:900;color:var(--txt2);text-align:right}

  /* Idea card in admin */
  .aidea{background:white;border:1px solid var(--bdr);border-left:3px solid var(--b);border-radius:10px;padding:14px 16px;margin-bottom:10px;display:grid;grid-template-columns:1fr 150px;gap:14px;align-items:flex-start}
  .aidea.aprobada{border-left-color:var(--g)}
  .aidea.probar{border-left-color:var(--gl)}
  .aidea.descartada{border-left-color:#aaa;opacity:.7}
  .aidea-m{font-size:11px;color:var(--txtm);font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .aidea-t{font-size:14px;font-weight:600;color:var(--txt);line-height:1.5}
  .aidea-link{font-size:11px;font-weight:800;color:var(--g);background:var(--g3);border:none;padding:3px 9px;border-radius:10px;cursor:pointer;font-family:var(--fn);transition:all .12s}
  .aidea-link:hover{background:var(--g);color:white}

  /* Forms */
  .fld{margin-bottom:12px}
  .fld label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--txtm);display:block;margin-bottom:6px}
  .fld input,.fld select,.fld textarea{width:100%;background:white;border:1.5px solid var(--bdr);border-radius:8px;padding:10px 12px;font-family:var(--fn);font-size:13px;font-weight:600;color:var(--txt);outline:none}
  .fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--g)}

  /* Override eval section to be wider */
  body.admin-pc .eval-section{max-width:820px}
}

/* Narrow admin fallback — PC user on narrow browser */
@media(max-width:959px){
  body.admin-pc .ashell-only{display:none}
}

/* ══════════════════════════════════════════════
   MODAL (v5)
   ══════════════════════════════════════════════ */
.modal-bg{position:fixed;inset:0;background:rgba(0,40,15,.55);backdrop-filter:blur(3px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fu .2s ease}
.modal{background:white;border-radius:14px;width:100%;max-width:640px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-hdr{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;background:var(--g);color:white;border-radius:14px 14px 0 0}
.modal-hdr-t{font-size:16px;font-weight:900}
.modal-close{background:rgba(255,255,255,.2);border:none;color:white;width:32px;height:32px;border-radius:7px;font-size:15px;cursor:pointer;font-family:var(--fn)}
.modal-body{padding:18px 20px;overflow-y:auto;flex:1}
.modal-ftr{padding:14px 20px;border-top:1px solid var(--bdr);display:flex;gap:10px;justify-content:flex-end;background:#fafcfa;border-radius:0 0 14px 14px}

/* Search input */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{width:100%;background:white;border:1.5px solid var(--bdr);border-radius:9px;padding:11px 14px 11px 40px;font-family:var(--fn);font-size:14px;font-weight:600;color:var(--txt);outline:none}
.search-wrap input:focus{border-color:var(--g)}
.search-wrap::before{content:'🔍';position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.5}

/* Toggle tabs */
.tabs{display:inline-flex;background:#fafcfa;border:1px solid var(--bdr);border-radius:10px;padding:3px;gap:2px;margin-bottom:16px}
.tab{padding:8px 16px;border-radius:8px;border:none;background:transparent;font-family:var(--fn);font-size:13px;font-weight:800;color:var(--txt2);cursor:pointer;transition:all .15s}
.tab.on{background:var(--g);color:white}
.tab:hover:not(.on){background:var(--bg)}

/* Month grid (planning mensual) */
.mo-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;background:var(--bdr);border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
.mo-h{background:#fafcfa;padding:10px 6px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;color:var(--txtm);text-align:center}
.mo-d{background:white;min-height:86px;padding:6px 7px;font-size:11px;position:relative;transition:filter .15s}
.mo-d:hover{filter:brightness(.97)}
.mo-d-metric{font-size:11px;font-weight:800;color:var(--txt2);margin-top:6px}
.mo-d-badge{position:absolute;top:6px;right:6px;font-size:10px;font-weight:800;background:white;padding:2px 6px;border-radius:8px;border:1px solid var(--bdr2);color:var(--txt2)}
.mo-d.other{background:#fafbfa;color:var(--txtm)}
.mo-d.today{background:var(--g3);border:2px solid var(--g);padding:4px 5px}
.mo-d-n{font-size:13px;font-weight:900;color:var(--txt);margin-bottom:4px}
.mo-d.other .mo-d-n{color:var(--txtm);font-weight:700}
.mo-chip{font-size:10px;font-weight:700;background:var(--gl3);border-left:2px solid var(--gl);padding:2px 5px;border-radius:3px;margin-bottom:2px;line-height:1.25;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mo-chip.pend{background:var(--g3);border-left-color:var(--g)}
.mo-chip:hover{filter:brightness(.96)}
.mo-more{font-size:10px;color:var(--b);font-weight:800;margin-top:2px;cursor:pointer}

/* Day card (tabla search results) */
.edit-btn{padding:6px 10px;border-radius:6px;background:var(--b3);border:1px solid var(--b);color:var(--b2);font-family:var(--fn);font-size:11px;font-weight:800;cursor:pointer;margin-right:4px}
.del-btn{padding:6px 10px;border-radius:6px;background:var(--reds);border:1px solid var(--red);color:var(--red);font-family:var(--fn);font-size:11px;font-weight:800;cursor:pointer}
.edit-btn:hover,.del-btn:hover{filter:brightness(.95)}

/* Date range selector */
.daterange{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.daterange label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;color:var(--txtm);margin:0}
.daterange input{background:white;border:1.5px solid var(--bdr);border-radius:7px;padding:8px 10px;font-family:var(--fn);font-size:13px;font-weight:600;color:var(--txt);outline:none}
.daterange input:focus{border-color:var(--g)}

/* Decorative wave (brand from manual) */
.brand-wave{position:absolute;bottom:0;right:0;width:280px;height:140px;pointer-events:none;opacity:.06;overflow:hidden}
.brand-wave svg{width:100%;height:100%}
</style>

{id:'S01-3_urte',cod:'S01',nom:'DE VUELTA A MI PISCINA. EMPIEZA EL CURSO',nom_es:'DE VUELTA A MI PISCINA. EMPIEZA EL CURSO',adina:'3 urte',inst:'Infantil',pto:'Tapiz exterior',materiala:['Figuras flotantes','aros sumergibles','cubos'],arranque:'Jugar con los niños',intencionada:'Es el primer día en la piscina, nos presentaremos, hablaremos del color de nuestro gorro (nos identifica como grupo) y de cual será nuestro sitio para dejar esas cosas mientras estemos en la piscina.\n¿Conocemos la piscina? nos dirigimos hacia los baños, (les explicamos que en el agua no se puede orinar). Pasamos por la zona del material, seguidamente conocemos el botiquín, les enseñamos donde tenemos las “tiritas”, finalmente conoceremos la piscina infantil y cuáles son las zonas de acceso, ¡¡¡pero atención!!!no nos hemos duchado!!!, explicaremos que siempre antes de entrar a la piscina hay que ducharse, ¿y dónde están las duchas?, iremos a conocerlas y nos ducharemos.\n¿Jugamos?\nEncontraremos a un lado de la piscina infantil, figuras flotantes, regaderas, y cubos, ¿los tiramos al agua?, ¿alguien quiere ir a jugar al agua con ellos?',reflexion:'Como es el primer día en la piscina, algunos niños pueden sentirse inseguros al no conocernos y no conocer la instalación, en ese caso invitaremos a sus padres para que hagan el recorrido con nosotros.\n¿Qué os ha gustado más de la piscina?'},
{id:'S01-3_urte',cod:'S01',nom:'DE VUELTA A MI PISCINA. EMPIEZA EL CURSO',nom_es:'DE VUELTA A MI PISCINA. EMPIEZA EL CURSO',adina:'3 urte',inst:'Infantil',pto:'Tapiz exterior',materiala:['Figuras flotantes','Balones','cubos TXAPELAK'],arranque:'Jugar con los niños',intencionada:'Es el primer día en la piscina, nos presentaremos, hablaremos del color de nuestro gorro (nos identifica como grupo) y de cual será nuestro sitio para dejar esas cosas mientras estemos en la piscina.\n¿Conocemos la piscina? nos dirigimos hacia los baños, (les explicamos que en el agua no se puede orinar). Pasamos por la zona del material, seguidamente conocemos el botiquín, les enseñamos donde tenemos las “tiritas”, finalmente conoceremos la piscina infantil y cuáles son las zonas de acceso, ¡¡¡pero atención!!!no nos hemos duchado!!!, explicaremos que siempre antes de entrar a la piscina hay que ducharse, ¿y dónde están las duchas?, iremos a conocerlas y nos ducharemos.\n¿Jugamos?\nEncontraremos a un lado de la piscina infantil, figuras flotantes, regaderas, y cubos, ¿los tiramos al agua?, ¿alguien quiere ir a jugar al agua con ellos?',reflexion:'Como es el primer día en la piscina, algunos niños pueden sentirse inseguros al no conocernos y no conocer la instalación, en ese caso invitaremos a sus padres para que hagan el recorrido con nosotros.\n¿Qué os ha gustado más de la piscina?'},
{id:'S02-3_urte',cod:'S02',nom:'DE VUELTA A MI PISCINA',nom_es:'DE VUELTA A MI PISCINA',adina:'3 urte',inst:'Piscina pequeña',pto:'“El autobús”',materiala:['Tapiz grande (“autobús”)','Vasos de colores','Figuritas flotantes de colores (min. 32)','un cubo'],arranque:'Seguimos conociéndonos; para ello diremos el nombre de cada uno de los niños, el cual deberá elegir y coger uno de los vasos. Cuando todos tengamos nuestro vaso nos acercaremos a la ducha para llenarlo de agua y ducharnos. Después haremos lo mismo en el borde de la piscina.',intencionada:'- “De paseo en autobús”: ¡Vamos a echar todos los vasos al agua! ¿Porque no cogemos nuestro “autobús” (tapiz grande) y recogemos a todos nuestros pasajeros (vasos) desparramados por la piscina para darles una vuelta? Cada uno recogerá y subirá su vaso al autobús y después lo llevaremos entre todos por toda la piscina. ¿Quieren subir ellos también? Todos arriba, el profesor como buen conductor les llevará de paseo "a donde quieran”.\n- “Vamos a llenar el autobús”: Tiraremos entre todos las figuritas flotantes al agua. ¡Cuánta gente quiere subirse a nuestro autobús! Colocaremos un cubo encima del tapiz para ir recogiéndolos. Deberán recoger las figuras-pasajeros de uno en uno hasta que no quede ninguno en el agua. (los niños se desplazan por la piscina como quieran). Acabó el viaje “todos abajo” (los volveremos a tirar al agua)\nVamos a emprender un segundo viaje, volveremos a recoger a los pasajeros de uno en uno pero esta vez deberemos desplazarnos por la piscina tocando el suelo con las manos.\nUna última vuelta: ¡Todos arriba! El profesor vuelve a ser el conductor. Pero podemos cambiar los roles y que sean ellos quienes nos lleven de viaje. ¿Podrán con nosotros?',reflexion:'¿Cuántos niños han podido subir al autobús? ¿Nos acordamos de sus nombres? Los repasaremos entre todos. Esta última parte lo podemos realizar fuera del agua, sentados todos encima de nuestro autobús.'},
{id:'S03-3_urte',cod:'S03',nom:'KOLOREAK',nom_es:'KOLOREAK',adina:'3 urte',inst:'Igerileku txikia',pto:'',materiala:['4 kubo kolore ezberdinetakoak eta urpeko koloretako fitxak (kuboen kolorekoak)'],arranque:'',intencionada:'Koloretako kubo eta urpeko fitxekin jolasean arituko gara igerileku txikian. Koloreka sailkatuz…',reflexion:''},
{id:'S04-3_urte',cod:'S04',nom:'Mis profesores y yo jugamos en el agua',nom_es:'Mis profesores y yo jugamos en el agua',adina:'3 urte',inst:'Piscina infantil.',pto:'En el centro de la piscina.',materiala:['figuras flotantes','tobogan','cubos','pasarela','tapiz','aros pequeños'],arranque:'Soltamos figuras de diferentes colores en el agua y vamos cogiendo uno a uno y metiendo en diferentes cubos según el color',intencionada:'Nos lanzamos por el tobogán y cogemos los aros que están frente a este y los depositamos en el cubo que está en la playa, frente al tobogán y la vuelta al tobogán lo haremos imitando a los cocodrilos\nVariante: Al lado de la pasarela tenemos un cubo lleno de figuras, cogemos una cada uno y pasamos por la pasarela a gatas, a rastras etc… y nos lanzamos por el tobogán, nos dirigimos al tapiz que estará de pie y vamos pegando las figuras.',reflexion:'¿Aparte de ir conociendo nuestra piscina y nuestro material, nos hemos pasado bien y con ganas de repetir?'},
{id:'S05-3_urte',cod:'S05',nom:'El mundo de los animales y sus hábitats',nom_es:'El mundo de los animales y sus hábitats',adina:'3 urte',inst:'Piscina infantil',pto:'Escaleras',materiala:['Tapiz','Puzles de ballena cocodrilo','gato','perro','churros'],arranque:'En piscina pequeña bajamos por el tobogán, les damos una pieza de un animal que tendrán que hacerlo en el tapiz amarillo.\n4 animales: un perro, un cocodrilo, un gato y una ballena.',intencionada:'¿Cómo nadan los perros?, movemos los brazos y las piernas bien rápido como hacen los perros.\nLos cocodrilos andan por el agua, con la boca escondida y los ojos fuera, ¿andamos cómo andan los cocodrilos?\nLas ballenas echan agua por encima de su cabeza, ¿cogemos agua con la boca y la echamos?\n¿Qué otro animal podemos imitar?',reflexion:''},
{id:'S06-3_urte',cod:'S06',nom:'KOLOREAK',nom_es:'KOLOREAK',adina:'3 urte',inst:'Piscina infantil',pto:'escalera pequeña de la infantil',materiala:['tobogán','8 vasos','2 cubos','tapiz para pasar por encima','figuras flotantes'],arranque:'En el agua unos materiales de distintas formas y distintos colores que se están ahogando y necesitan ser rescatados por unos intrépidos socorristas.\nCuando sean rescatados nos lo reagruparemos por colores.',intencionada:'Tapiz alfombra puesto en el agua en la piscina infantil y al final acaba enlazando con el tobogán.\nPasaremos por el tapiz primero gateando y las siguientes veces intentando cambiar la forma de hacerlo, bien de espaldas o de pies etc.\nIntentaremos que pasen por el tapiz con un vaso en la mano y llenen unos cubos que estarán después del tobogán.\nIntentaremos que no se nos derrame el agua porque si no tendremos que volver hacia detrás.',reflexion:'Seguimos conociendo nuestras instalaciones y nuestros materiales.\nAdemás, con los cubos que hemos llenado al final de la sesión nos daremos una gran ducha tirándolos por encima de nuestras cabezas.'},
{id:'S07-3_urte',cod:'S07',nom:'ZENBAKIAK',nom_es:'ZENBAKIAK',adina:'3 urte',inst:'Infantil',pto:'Escaleras pequeñas piscina inf',materiala:['fichas de colores con números'],arranque:'Jugamos un poco en la pequeña y comentamos los números con los niños, dando ejemplos del numero de cosas relacionadas con cada número, ejemplo:\n1) tenemos una nariz, una boca, un sol, una luna....\n2) tenemos 2 ojos, 2orejas, 2 piernas...\n3) ....',intencionada:'En infantil, tenemos en un cubo las fichas con números, realizaremos un desplazamiento y cogerán una ficha y la ordenaran en el punto de inicio de los desplazamientos, preguntamos si nos pueden decir algo relacionado con el numero.\nejemplo:\n1-tengo un hermano\n2-tengo 2 ojos...',reflexion:''},
{id:'S08-3_urte',cod:'S08',nom:'COLORES Y FORMAS',nom_es:'COLORES Y FORMAS',adina:'3 urte',inst:'Piscina infantil.',pto:'En el centro de la piscina',materiala:['figuras','cubos','tobogán','tapiz','aros pequeños'],arranque:'Soltamos figuras y diferentes materiales de diversos colores. Primero haremos una clasificación por zonas de diferentes materiales. Después al acabar, haremos una separación por zonas de diferentes colores de material.',intencionada:'Nos lanzamos por el tobogán y cogemos los aros que están frente a este y los metemos en uno de los churros grandes que están en la playa, frente al tobogán y la vuelta al tobogán lo haremos imitando a diferentes animales bien sean acuáticos o terrestres.\nVariante: Al lado del tobogán tenemos un cubo lleno de figuras, cogemos una cada uno y a continuación, nos lanzamos por el tobogán, nos dirigimos al tapiz que estará de pie y vamos pegando las figuras.',reflexion:''},
{id:'S09-3_urte',cod:'S09',nom:'KOLOREAK',nom_es:'KOLOREAK',adina:'3 urte',inst:'Piscina infantil y recreativa',pto:'DESARROLLO DE LA SESION',materiala:['figuras flotantes de colores','tapiz amarillo'],arranque:'Empezamos jugando en la piscina infantil. Cada niño tendrá que decir los colores que tiene su bañador. También estará atento y puede ayudar a los demás a ver si tiene algún color que se le olvida.',intencionada:'En la piscina recreativa colocaremos el tapiz contra la pared del fondo y la caja de figuras de colores al lado de la segunda escalera. Como estamos al inicio del curso realizaremos desplazamientos cortos. Los que sepan andar con churro pueden ir solos y los demás le ayudaremos. Si el nivel del grupo es bajo podemos poner un recorrido con una mesa y la plataforma rosa para que puedan pasar andando.\nCada vuelta deberán coger una figura y pegarla en el tapiz ordenando los por su color. Podemos colocar una pieza de muestra y explicarles la dinámica antes de entrar en la piscina.',reflexion:''},
{id:'S10-3_urte',cod:'S10',nom:'Ropa y equipo de natación',nom_es:'Ropa y equipo de natación',adina:'3 urte',inst:'Piscina infantil / Piscina irregular',pto:'Piscina infantil y Z.P.P. irregular',materiala:['Churros','fantasmas'],arranque:'Nos juntamos en la piscina infantil y hablamos de la ropa de natación (equipo completo), a parte del traje de baño, forro y gafas también hacen falta… toalla, chancletas… Jugaremos con los fantasmas a pillar, el monitor se la queda. ¿Conseguirán tumbarse encima del fantasma?',intencionada:'En la piscina irregular, parte poco profunda: desplazamientos con el churro, hacia adelante y hacia atrás con nuestra ayuda.\nHacemos que introduzcan la cabeza y buceen un poco.',reflexion:''},
{id:'S11-3_urte',cod:'S11',nom:'Arropa',nom_es:'Arropa',adina:'3 urte',inst:'Piscina pequeña y recreativa',pto:'Piscina pequeña',materiala:['Churros'],arranque:'',intencionada:'',reflexion:''},
{id:'S12-3_urte',cod:'S12',nom:'KOLOREAK',nom_es:'KOLOREAK',adina:'3 urte',inst:'Infantil / Recreativa',pto:'Bordillo / Fuera de la piscina',materiala:['Aros pequeños','1 tapiz','churros','2 conos','isla'],arranque:'En la piscina infantil, echamos los aros de colores al agua. Vamos diciendo qué color coger y los van dejando en el cubo (para luego llevarlo a la recreativa). Sacan los aros de 1 en 1, y ordenado por colores.\nUna vez recogidos todos los aros, vamos con 1 churro cada niño/a hacia la piscina recreativa.',intencionada:'Ponemos 1 cono al lado de la segunda escalera de la piscina recreativa. Sentamos a todos/as los/as niños/as en el borde de la parte poco profunda, con el cubo de los aros al lado.\nCada niño/a va cogiendo un aro, del color que le digamos, se desplazan con el churro hasta el tapiz, situado a unos 5 metros donde está el otro cono encima. La isla estará cerca del tapiz, para que tengan un poco de apoyo. Irán llevando los aros, de uno en uno, hasta llenar el cono de encima del tapiz.\nDespués, irán con el churro hasta el tapiz, cambiarán el churro por el aro que les guste, y con la ayuda del monitor/a, se desplazarán hasta el cono situado fuera del agua, al lado de la 2ª escalera, y dejarán ahí el aro.\nVuelven hasta llevar los aros de un cono a otro.',reflexion:''},
{id:'S13-3_urte',cod:'S13',nom:'NUMEROS',nom_es:'NUMEROS',adina:'3 urte',inst:'Infantil / Recreativa',pto:'Fuera de la piscina, al lado de la escalera.',materiala:['Fichas de números/colores (del 1 al 6 x8 alumnos/as)','fichas de números','flotantes para la piscina recreativa','churros','tapiz','2 cubos pequeños vacíos'],arranque:'Echamos las fichas de números a la piscina infantil, y les decimos a los/las niños/as qué número recoger y cada uno/a debe recoger 6 fichas diferentes en uno de los cubos. Recogemos todas las fichas, repartimos un churro a cada niño/a y vamos a la piscina recreativa, parte poco profunda.',intencionada:'Se sientan todos/as los/las niños/as en el borde de la piscina. Tenemos nosotros/as en una esquina el cubo con los números, y en la pared el tapiz.\nVamos repartiendo las fichas a los/las niños y les preguntamos qué número son.\nLlevan los números de un cubo al tapiz, de uno en uno, hasta que han terminado de llevar todos los números.',reflexion:'Ir conociendo un poco los números y su orden, a la vez que quitan el miedo al agua y se van soltando.'},
{id:'S14-3_urte',cod:'S14',nom:'ELIKAGAIAK. PASTEL ERRALDOIA',nom_es:'ELIKAGAIAK. PASTEL ERRALDOIA',adina:'3 urte',inst:'Umeen igerilekua eta jolas-igerilekua (“recreativa”)',pto:'2. eskailera ondoan',materiala:['8 taula urdin','koloretako blokeak','koltxoneta bat'],arranque:'Igerileku txikian taularekin ibiliko gara jolasean. Ipurdi azpian, eskuetan, tripan, oinpean... Esperimentuan.',intencionada:'Irregularrean; koloretako blokeak banan banan alde batetik bestera eramanez ea nolako pastel handi eta dotorea egiteko gai garen denon artean.\nAusnarketa :\nHOBETU BEHARREKOA',reflexion:''},
{id:'S15-3_urte',cod:'S15',nom:'S15 3 URTE',nom_es:'S15 3 URTE',adina:'3 urte',inst:'Infantil y recreativa',pto:'irla',materiala:['fichas de vocales','fantasmas'],arranque:'Jugaremos con los fantasmas en la piscina pequeña. Luego los llevaremos a la recreativa',intencionada:'Sentados en el bordillo repasamos las vocales, y luego les decimos que tenemos que colocar en el tapiz las vocales que estarán en un cubo, harán un pequeño circuito que el monitor determinará, saldrán por las escaleras y colocarán las fichas en el tapiz. Llevaremos las fichas encima de los fantasmas\nEj, Estarán pegadas en el tapiz las vocales y los niños tendrán que colocar la "a" lado de la a y así.',reflexion:'Parte hartu al dute?\nHOBETU BEHARREKOA'},
{id:'S16-3_urte',cod:'S16',nom:'Formas: cuadrado',nom_es:'Formas: cuadrado',adina:'3 urte',inst:'Recreativa (parte poco profunda)',pto:'Fuera del agua',materiala:['Churros','formas cuadradas','rectangulares flotantes (la mitad)'],arranque:'Cada alumno/a con un churro, desplazamientos variados.',intencionada:'Tenemos figuras cuadradas y rectangulares flotantes al lado de la segunda escalera, y los/las alumnos/as se desplazan desde la primera escalera. Cogen una figura y la llevan desplazándose por el agua hasta al lado de la primera escalera (parte más ancha donde se sientan los/las niños/as).\nAllí van construyendo un cuadrado gigante, con las figuras que van llevando.\nCuando han terminado de llevar todas las figuras, sentamos a todos/as entre la primera y la segunda escalera, y sin churro, ayudamos de uno/a en uno/a a desplazarse hasta la corchera y vuelta.',reflexion:''},
{id:'S17-3_urte',cod:'S17',nom:'KOLOREAK',nom_es:'KOLOREAK',adina:'3 urte',inst:'Igerileku ertaina',pto:'',materiala:['koloretako pilotak eta 4 kubo (kolore bakoitzeko kubo bat)'],arranque:'',intencionada:'igerileku ertainean pelotekin arituko gara jolasean; alde batean hartu eta beste aldean bakoitzari dagokion kubotxoan gordeaz.',reflexion:''},
{id:'S18-3_urte',cod:'S18',nom:'S18 3 URTE',nom_es:'S18 3 URTE',adina:'3 urte',inst:'Infantil / Recreativa',pto:'Escalera',materiala:['Fichas flotantes de letras','tapiz en infantil','churros','plantilla AEIOU'],arranque:'Tenemos un tapiz apoyado en la escalera de la piscina infantil, nosotros/as nos sentamos en el borde de la piscina, por la mitad más o menos, y damos a los/las alumnos/as la parte exterior de la letra para que la peguen en el tapiz. Van cogiendo las fichas de 1 en 1, y después les damos la parte interior de las letras. Les ayudamos a que las introduzcan correctamente.\nAl terminar, recogemos las fichas y las llevamos con nosotros/as.',intencionada:'Nos vamos a la piscina recreativa y les damos un churro a cada alumno/a.\nAyudamos a desplazar de la primera escalera a la segunda escalera, llevando una ficha con letra, y al lado de la escalera tenemos una plantilla pegada en la pared con letras A, E, I, O, U, y entre todos/as, llevan las letras y rellenan las plantillas.',reflexion:'Ayudamos a los/las alumnos/as a ir conociendo las letras'},
{id:'S19-3_urte',cod:'S19',nom:'FORMAS',nom_es:'FORMAS',adina:'3 urte',inst:'Pisc. Infantil + recreativa',pto:'Infantil: bordillo, lateral (material colocado=tapiz pequeño con los cubos encima + tapiz grande en pared)',materiala:['Objetos flotantes de diferentes formas','tapiz pequeño','tapiz grande','cubos'],arranque:'P. infantil: echar todo el material, salpicarse, hacer “llover” …',intencionada:'Llevamos el tapiz entre todos llevando los cubos sobre éste. Tenemos que recoger las formas y clasificarlas en cada cubo (¿las clasificaran por colores? ¿Por formas?)\nTapiz grande: sujeto entre todos, suben uno a uno y le llevamos, le movemos …etc. (según miedo niños)\nA hacer en piscina pequeña o grande: Escogeremos una forma entre todos, el monitor echará las piezas de la forma elegida y tendrán que traer una forma y recrear una más grande con ellas sobre el tapiz. (si eligen cuadrado, cogerán las piezas de cuadrado y harán un cuadrado grande con ellas sobre el tapiz)',reflexion:'¿Conocen las diferentes formas?, ¿Han trabajado juntos? ¿Han participado todos?'},
{id:'S20-3_urte',cod:'S20',nom:'JUEGO CON MIS SENTIDOS: EL PODER DE LA SORGIÑA',nom_es:'JUEGO CON MIS SENTIDOS: EL PODER DE LA SORGIÑA',adina:'3 urte',inst:'piscina pequeña y recreativa',pto:'Entre la segunda escalera y el tapiz',materiala:['8 Aros sumergibles','1 Tapiz grande','2 algas','isla','“una'],arranque:'Infantil: Jugaremos con los aros sumergibles. Se colocarán todos dando la espalda al monitor. Este echará los aros por la piscina y a la voz de ya, tendrán que desplazarse y encontrarlos. Solo podrán coger un aro cada uno y devolvérsela al monitor. Vamos a ir cambiando la manera de coger los aros; lo haremos metiendo la boca o cara, solo con los pies, con las dos manos a la vez… Podremos desplazarnos también de diferentes maneras.',intencionada:'Un paseo mágico\nMientras pasean por el bosque les diremos a los niños que nosotros somos una sorgina que les podemos quitar poderes en cualquier momento. Así, les iremos quitando el poder de…\nHablar: tendrán que llevar la boca dentro del agua\nOír: un oído en el agua\nMover una mano: solo podrán mover la otra\nMover un pie\n…\nEl Circuito:\nP.E.\nP.E: Punto de Encuentro\n1.- Entrada al agua.\n2.- Pasearemos entre los arboles (entre las algas sumergidas)\n3.- Subiremos encima del tronco. Y con un salto llegaremos a la escalera\nY en la última vuelta la Sorgiña les devolverá a su estado normal para que puedan seguir disfrutando',reflexion:'¿Ha sido fácil nadar sin esos poderes? ¿Cómo han nadado más a gusto?'},
{id:'S21-3_urte',cod:'S21',nom:'LAS ESTACIONES/ EPOCAS DEL AÑO',nom_es:'LAS ESTACIONES/ EPOCAS DEL AÑO',adina:'3 urte',inst:'Piscina pequeña. P irregular',pto:'DESARROLLO DE LA SESION',materiala:['16 flores (fichas sumergibles)','tapiz grande','churros','2 cubos','fantasmas (recreativa)'],arranque:'En la piscina pequeña, recogeremos las flores (sumergibles en el fondo) que se han caído al suelo durante el otoño porque en primavera salen las flores y las meteremos en los cubos',intencionada:'Piscina irregular: Nadamos con el churro: izarra, hacia adelante... llevaremos los fantasmas para nadar con ellos',reflexion:'Les preguntaremos si se lo han pasado bien, si les ha gustado….'},
{id:'S22-3_urte',cod:'S22',nom:'S22 3URTE',nom_es:'S22 3URTE',adina:'3 urte',inst:'Piscina infantil. Piscina irregular',pto:'DESARROLLO DE LA SESION',materiala:['figuras flotantes de colores','tapiz'],arranque:'Empezamos jugando en la piscina infantil. Preguntaremos a los niños que nos digas los animales que conocen, donde viven estos animales. ¿Tienen animales en casa? ¿Cuál es el animal que más les gusta?',intencionada:'En la piscina recreativa colocaremos el tapiz contra la pared del fondo y la caja de figuras de colores al lado de la segunda escalera. Realizaremos desplazamientos cortos. Los que sepan andar con churro pueden ir solos y los demás les ayudaremos. Si el nivel del grupo es bajo podemos poner un recorrido con una mesa y la plataforma rosa para que puedan pasar andando.\nCada vuelta deberá coger una figura y pegarla en el tapiz, para hacerlo tienen que decirnos si es un animal, que animal es en ese caso y donde vive este animal.',reflexion:''},
{id:'S23-3_urte',cod:'S23',nom:'GRUFALOA',nom_es:'GRUFALOA',adina:'3 urte',inst:'Errekreatiboa',pto:'Hormaren aldean',materiala:['Urazpiko fitxak','Ipuinaren fitxak','koltxoneta HORIA','irla','3 algak'],arranque:'Urazpiko fitxekin jolastuko gara igerileku txikian.',intencionada:'(Irregularrean)\nAzeria: lau hanketan joango gara koltxonetatik\nHontza: hontzak bezala hegan eginez.\nSugea: Tarrazean mugituko gara\nGrufaloa: Korrika joango gara koltxonetatik.\n1',reflexion:''},
{id:'S24-3_urte',cod:'S24',nom:'Ropa',nom_es:'Ropa',adina:'3 urte',inst:'Infantil / Recreativa',pto:'Fuera de agua',materiala:['Churros','fichas de ropa','tapiz amarillo'],arranque:'Primero vamos a la piscina infantil, y que se desplacen con las manos en el suelo y moviendo las piernas. Con las manos en el suelo y moviendo las piernas pero boca arriba.',intencionada:'Nos dirigimos a la piscina recreativa, parte poco profunda, cada alumno/a con un churro. Allí, tenemos contra la pared el tapiz. Sentamos a los/as niños/as en el borde de la piscina, y repartimos una ficha de ropa a cada uno/a. Les preguntamos si saben cómo se llama la prenda que les damos, y la tienen que llevar desplazándose hasta la segunda escalera, salir afuera y pegarla en el tapiz, volver a coger otra ficha y repetir.',reflexion:'Que los/as niños/as se vayan soltando y quitando el miedo, y aprendan los nombres de las ropas.'},
{id:'S25-3_urte',cod:'S25',nom:'Mis cuentos en la piscina',nom_es:'Mis cuentos en la piscina',adina:'3 urte',inst:'Piscina pequeña / Piscina Recreativa',pto:'Fuera de la piscina, al lado de la 1ª escalera (Zona poco profunda).',materiala:['8 Fantasmas','8 Churros','16 figuras flotantes','tapiz'],arranque:'Piscina pequeña, nos moveremos como los monos y los tiburones por toda la piscina.',intencionada:'Desarrollo del cuento: Los monos y el tiburón\nÉrase una vez una familia de monos que vivían en una playa a los que les encantaba nadar en el mar. Un día se estaban bañando (nos movemos por la piscina encima de los fantasmas) y llegó un tiburón, herbívoro, y les dijo que tenía hambre y que si tenían algo para comer. Los monos le dijeron que sólo fruta, pero que tenía q ayudarles porque ellos solos no podían con toda (tirar flotantes). En la playa había diferentes árboles frutales (Fruta: figuras flotantes, pegadas en el tapiz: árbol, que está apoyado contra la pared)\nEl tiburón (monitor) y los monos (niños), van echando las piezas de fruta al agua. Una vez han echado todas las piezas de fruta, entre todos tienen que ir a buscar la fruta. Entre todos/as, tienen que recoger la fruta y llevar al tapiz, de una en una.\nAl final, contar cuanta fruta han comido entre todos.',reflexion:'Valoramos la sesión.'},
{id:'S26-3_urte',cod:'S26',nom:'LOS SENTIDOS: ¿miraremos debajo del agua?',nom_es:'LOS SENTIDOS: ¿miraremos debajo del agua?',adina:'3 urte',inst:'Piscina recreativa',pto:'tapiz en z.p.p recreativa.',materiala:['1 Tapiz','aros','figuras flotantes','churros de colores','cubos (1 de cada color)'],arranque:'Ikusi makusi zer ikusi? (Piscina infantil)',intencionada:'Se tumbarán en el punto de encuentro para ver que ven debajo del agua. ¿Meterán toda la cara para ver qué hay? Encima de la isla y en el fondo habrá aros dentro de distintos colores. En el agua habrá una mesa con un cubo y aros dentro. Cogerán de uno en uno los aros de los colores que haya en el fondo y lo meterán en el cubo que está en el bordillo.\nLos niños no saldrán del agua, harán un circuito. ¡En cada vuelta tendrán que mirar al fondo para ver que colores hay y así poder coger los aros correspondientes hasta terminar!\nLuego repetiremos lo mismo con churros de colores y con las figuras flotantes. ¡Colocaremos todo por colores al lado del cubo de cada color!\nREFELXION: ¿¿¿¿¿¿verán debajo del agua??????',reflexion:''},
{id:'S27-3_urte',cod:'S27',nom:'ROPA',nom_es:'ROPA',adina:'3 urte',inst:'Infantil / Recreativa',pto:'Sentados en el borde de la piscina',materiala:['Churros','tapiz en piscina recreativa','imágenes de ropas','8 vasos','8 cubos pequeños'],arranque:'En la piscina infantil, tenemos los cubos en el borde de la piscina, uno para cada niño/a. Repartimos un vaso a cada niño/a. Se desplazan desde los cubos hasta la pared con las manos en el suelo y dando patada crol, vuelven andando con las manos y el cuerpo boca-arriba, hacia atrás, y vierten el agua de un vaso en el cubo. Vuelven varios viajes hasta llenar el cubo.',intencionada:'Vamos a la piscina recreativa, parte poco profunda, y tenemos un tapiz junto a la pared. En el tapiz, tendremos pegadas las fichas de las ropas, todas las fichas en una parte del tapiz y los/las niños/as deben de ir de la primera escalera a la segunda escalera desplazándose con el churro. Salen por la escalera y van andando al tapiz, cogen una imagen de ropa y van clasificando las ropas por temporadas, verano, otoño, invierno, primavera.\nLes preguntamos si ellos/as saben cómo se llama esa prenda, si se la ponen en verano o en invierno.',reflexion:'Uso de prendas de ropa en diferentes estaciones del año.'},
{id:'S28-3_urte',cod:'S28',nom:'FAMILIAK ETA UMEAK',nom_es:'FAMILIAK ETA UMEAK',adina:'3 urte',inst:'Infantil y recreativa',pto:'Sentados/as en el borde de la piscina',materiala:['Churros','figuras flotantes','tapiz amarillo'],arranque:'Empezamos en la piscina infantil, que los/las niños/as se suelten un poco con los/las padres/madres.\nDespués repartimos un churro a cada alumno/a y vamos a la piscina recreativa, parte poco profunda.',intencionada:'Sentamos a todos/as los/as niños/as en el borde de la piscina y los padres/madres se meten en el agua.\nUnos desplazamientos por la piscina para demostrar cómo van los/las niños/as.\nTenemos el tapiz amarillo fuera del agua, apoyado en la pared y la caja con las figuras flotantes al lado de la segunda escalera. Los padres/madres dentro del agua, y los/las niños/as fuera en la segunda escalera, van cogiendo una figura flotante cada viaje, se desplazan por el agua y salen enfrente al tapiz y lo pegan en él. Vuelven y cogen otro.\nSi hay tiempo, demostración de cada niño/a con su padre/madre sin churro.',reflexion:''},
{id:'S29-3_urte',cod:'S29',nom:'KOLOREAK',nom_es:'KOLOREAK',adina:'3 urte',inst:'Umeen igerilekua eta jolas-igerilekua (“recreativa”)',pto:'irla',materiala:['koloretako pilotak (Nererenak)','txurroak','koloretako kuboak (berdea','urdina','horia','gorria)','irla','mahaia'],arranque:'',intencionada:'Gaur koloreetan ibiliko gara, horretarako, jolas-igerilekuan , umeek pilota guztiak botako dituzte, aldi berean, guk txurroekin eta konektoreekin borobil batzuk egingo ditugu (edo 4 kuboak sakabanatu ditzazkegu). Umeek pilota bakoitza bere lekuan jarri behar dute, adibidez, pilota gorriak borobil gorrian, urdinak urdinean eta horrela.\nGero, denbora soberan badago, koloreak nahastu ditzakegu.',reflexion:'Denek hitzegin al dute? Parte hartu al dute?\nHOBETU BEHARREKOA'},
{id:'S30-3_urte',cod:'S30',nom:'NUMEROS:1, 2 , 3',nom_es:'NUMEROS:1, 2 , 3',adina:'3 urte',inst:'Piscina infantil, piscina irregular',pto:'Fuera del agua',materiala:['Churros','piezas flotantes de colores'],arranque:'Piscina infantil\nEn todo momento utilizamos los números 1, 2, 3,\nLes preguntamos la edad utilizando dedos de la mano\nJuego de 1, 2 ,3 calabin calavera',intencionada:'Piscina irregular\nNos desplazamos a la piscina irregular, parte poco profunda, Tiramos las piezas de colores. Tienen que ir cogiendo las piezas, primero de 1 en 1, luego de 2 en 2, y al final de 3 en 3, haciendo cada niño su montón. Según el nivel con churro o sin. Y también según el nivel trabajamos los colores y cogen las piezas del mismo color',reflexion:'Trabajo de números y también de colores'},
{id:'S31-3_urte',cod:'S31',nom:'PAISAJES Y ENTORNOS: ANIMALES DE LA SELVA',nom_es:'PAISAJES Y ENTORNOS: ANIMALES DE LA SELVA',adina:'3 urte',inst:'Piscina infantil / Piscina irregular',pto:'El tapiz que estará fuera del agua',materiala:['churros (uno para cada uno)','2 tapices (uno atado corchera)','fichas de animales de la selva','fantasmas'],arranque:'En la piscina pequeña, les enseñamos las fichas de los animales salvajes, les preguntamos si saben cómo se llaman.\nActividad\n- ¿Sabemos que animales viven en la selva?\n* Nadaremos por la piscina irregular (la selva) con la ayuda del fantasma (barco)\n* Tapiz en corchera. El otro tapiz fuera.\nDesplazarse hasta el tapiz con el churro, coger ficha de animal de la selva imitara al animal que ha cogido y saldrá fuera para pegar la ficha en el tapiz.\nCuando estén todas las fichas fuera del agua, haremos un repaso de cuáles son los animales que viven en la selva',intencionada:'',reflexion:'Les preguntaremos si saben que animales viven en la selva… También les preguntaremos si se lo han pasado bien, si les ha gustado….'},
{id:'S32-3_urte',cod:'S32',nom:'LAS ESTACIONES Y ÉPOCAS DEL AÑO',nom_es:'LAS ESTACIONES Y ÉPOCAS DEL AÑO',adina:'3 urte',inst:'Infantil y recreativa poco profunda',pto:'Borde de la piscina',materiala:['(2x8) Pelotas','churros','cubos pequeños','tobogán (en recre.)'],arranque:'En la piscina infantil, echamos las pelotitas de plástico al agua y las recogen.',intencionada:'En la piscina recreativa:\nNos sentamos en el borde de la piscina y movemos fuerte los pies para simular lluvia.\nRepartimos una pelota:\nCada uno tira su pelota al agua y la recoge. De este modo les motivamos a entrar al agua con nuestra ayuda. (repetimos varias veces)\nRepetimos lo anterior con 2 pelotas por niño\nY si tiramos la pelota por el tobogán y vamos a buscarlo?\nPara terminar, volvemos a la infantil y jugamos a la lluvia de granizo y a lanzar agua hacia arriba simulando lluvia.',reflexion:''},
{id:'S33-3_urte',cod:'S33',nom:'MIS CUENTOS: isatsaren ipuina',nom_es:'MIS CUENTOS: isatsaren ipuina',adina:'3 urte',inst:'Piscina Recreativa',pto:'tapiz',materiala:['tapiz','isla','cubo con las colas de los animales','animales'],arranque:'Jugamos en la infantil y preguntamos qué animales que tengan cola conocen. Si no funciona, podemos proponer nosotros animales y ellos decir si tienen cola o no.',intencionada:'piscina irregular\nExplicar a los niños que deben juntar cada animal con su respectiva cola.\nCogerán una cola del cubo, entraran en la piscina e irán nadando hasta la escalera, saldrán por la escalera y en el tapiz estarán los animales, le colocaran la cola al animal correcto.\nAhora, tendrán que nadar imitando a los animales de nuestro cuento, ¿Cómo nadaría un pez?, y un cocodrilo y un caballo?\nDependiendo de las características del grupo podemos añadir el siguiente cuento.\n“Aspaldi aspaldian animali batek ere ez zuen isatsik, zaldiak ez zeukan buztana, ezta izurdeak, ezta baleak, ezta txakurrak, ezta katuak, ezta kokodriloak.\nAnimali batek ere ez zeukan isatsik.\nEgun batean, isatsez beteriko gurdi bat zeukan saltzaile bat agertu zen, animaliek jakin zutenean, oso pozik jarri ziren.\nZaldiak esan zuen erosiko zuen isatsarekin gainean jartzen zitzaizkion euli guztiak uxatuko zituela, tximuak berriz, zuhaitzetako adarretan eskegiko zela esan zuen eta arrainek buztanarekin azkarrago igeri egingo zutela esan zuten.\nAnimaliak bustana edukitzeko irrikitan zeudenez, korrika joan ziren saltzailerengana eta hartu zuten lehenengo isatsa erosi zuen bakoitzak, horrela, tximuak kokodrilo isatsa izan zuen, kokodriloak zaldi isatsa, zaldiak txerri isatsa eta txerriak tximuarenak.\nAnimali bakarrak ere ez zuen balio zion isatsa, horregatik animali guztiak oso triste jarri ziren, isatsa izan arren ezertarako balio ez zielako.\nLagunduko diegu animaliei pozik jartzen?, jarriko diegu animali bakoitzari tokatzen zaion isatsa?”',reflexion:''},
{id:'S34-3_urte',cod:'S34',nom:'ANIMALES. LAS BURBUJAS Y LOS ELEFANTES',nom_es:'ANIMALES. LAS BURBUJAS Y LOS ELEFANTES',adina:'3 urte',inst:'Piscina infantil y recreativa.',pto:'Escaleras de la piscina infantil.',materiala:['16 pelotas de plastico','8 tubos azules (trompas)','churros'],arranque:'¡Vamos a tirar todas las pelotitas de colores y todos los tubos azules al agua! Jugaremos con ellos.',intencionada:'“Soplando voy” (piscina infantil)\nNos moveremos por la piscina de diferentes maneras llevando cada uno su pelota solo con nuestro soplido.\nVamos a llenar la piscina de burbujas y para ello cogeremos el tubo azul que será “nuestra trompa de elefante”\n¿Somos capaces de hacer burbujas metiendo la boca/cara en el agua?\n“Sigo soplando” (piscina recreativa)\nNos llevaremos cada uno nuestra trompa a la piscina recreativa. Mientras nos movemos nadando con nuestro churrito por la piscina les diremos que tenemos que llenarla de burbujas. ¿Y sin trompa? ¿Son las burbujas más grandes? Vamos a probarlo.\n“Manada de elefantes”\nLos elefantes se mueven siempre en grupo. Vamos a descubrir donde viven moviéndonos por la piscina de diferentes maneras. ¿Llegaremos hasta el otro lado del valle?',reflexion:'¿Cuántas burbujas hemos hecho?'},
{id:'S35-3_urte',cod:'S35',nom:'EL TIEMPO',nom_es:'EL TIEMPO',adina:'3 urte',inst:'Piscina infantil, piscina irregular',pto:'Fuera del agua',materiala:['Churros','8 cubos','aletas de tiburón'],arranque:'Llegan las lluvias, en la piscina de chapoteo simularemos la lluvia con los cubos, nos salpicamos,...\nColocamos las aletas de tiburón a los/las niños/as.',intencionada:'Nos desplazamos a la piscina irregular, parte poco profunda, y lloverá más fuerte, los ríos crecen y tenemos que a travesar el río. Utilizaran los churros para ayudarse en la travesia.',reflexion:''},
{id:'S36-3_urte',cod:'S36',nom:'KOLOREAK',nom_es:'KOLOREAK',adina:'3 urte',inst:'Piscina irregular (parte poco profunda)',pto:'Piscina de chapoteo',materiala:['Tapiz','churros','flotantes de colores (cuadrados','rectángulos)'],arranque:'Sobre el tapiz flotante vamos a hacer torres de colores.',intencionada:'Ponemos el tapiz en el agua y construimos torres de colores sobre el tapiz, después transportaremos el tapiz hasta la otra parte de la piscina.',reflexion:''},
{id:'S37-3_urte',cod:'S37',nom:'ESTACIONES DEL AÑO',nom_es:'ESTACIONES DEL AÑO',adina:'3 urte',inst:'Piscina infantil / piscina recreativa',pto:'Fuera del agua',materiala:['Churros','fantasmas','tapiz amarillo','fichas de hojas de árboles (carpeta nº7)'],arranque:'En la piscina infantil, repartimos un fantasma a cada alumno/a y que hagan un poco de patada a lo ancho de la piscina. Después vamos a la recreativa.',intencionada:'Podremos utilizar los fantasmas para seguir dando patadas en la recreativa\nNos dirigimos a la parte poco profunda de la recreativa y explicamos lo que ocurre en el otoño, que se caen las hojas de los árboles y a los árboles que no se les caen las hojas, les cambia el color a marrón.\nRepartimos una hoja de árbol a cada niño/a, y se tienen que desplazar desde la primera a la segunda escalera, salen a fuera y llevan la hoja de árbol plastificada al tapiz. Que hagan unas cuantas vueltas.',reflexion:'Los/las niños/as van conociendo lo que es el otoño.'},
{id:'S38-3_urte',cod:'S38',nom:'LOS ALIMENTOS',nom_es:'LOS ALIMENTOS',adina:'3 urte',inst:'Recreativa, infantil',pto:'bordillo al lado escalera',materiala:['8 Cubos de agua','8 vasos'],arranque:'Jugamos en la pequeña. Se nos ha vaciado un poco la piscina, vamos a llenarla de agua…',intencionada:'Jugaremos con los niños. Cada uno tendrá un vaso y un cubo (alternativa de todo un mismo cubo)\nSe trata de que los niños se desplacen solos por el agua con el churro, de diferentes maneras. Zaldia, hacia delante, para atrás,…\nCon los vasos llenaremos los cubos para luego llenar la piscina que se nos ha vaciado… llevar los cubos con agua a la piscina pequeña y vaciarlos allí.',reflexion:''},
{id:'S39-3_urte',cod:'S39',nom:'MIS CUENTOS EN LA PISCINA',nom_es:'MIS CUENTOS EN LA PISCINA',adina:'3 urte',inst:'Piscina Recreativa y piscina pequeña',pto:'El tapiz grande, fuera del agua',materiala:['churros','1 fantasma (vaca)','1 tapiz grande','la isla','5-6 tablas (piedras)'],arranque:'-“El juego del stop”: Jugaremos en la piscina pequeña moviéndonos y bailando de diferentes maneras mientras cantamos una canción o nos movemos al ritmo de unas palmadas. En cuanto se pare la canción o las palmadas nos quedaremos todos quietos quietos sin mover ni un pelo…',intencionada:'Perutxo era un niño muy pequeño muy pequeño que vivía en un caserío junto a sus padres. Era feliz y le encantaba jugar y pasear en caballo:\n- “Jugamos felices” : Vamos a jugar libremente por la zona limitada saltando, desplazándonos, sumergiéndonos…\n- “Nos vamos de paseo con el caballo”: Nos vamos a colocar cada uno encima de nuestro caballo (churro). ¿Cómo se llamará? Vamos a movernos todos juntos por el prado, paseándonos como Perutxo. Adelante, atrás, a trote…\n-“Jugando en el prado junto a la vaca”: Colocaremos la vaca (un fantasma) flotando en el agua. Les diremos a los “Perutxos” que no nos podemos acercar mucho a la vaca ya que nos podría comer sin querer. CIRCUITO\n1.- Tapiz. Introducción al agua por el tapiz.\n2.- Isla. Llegada al monte.\n3.- Escaleras. Trepar al árbol\n4.- Tablas. Saltos de piedra a piedra.,',reflexion:'¿Lo han pasado bien? Les aplaudiremos fuerte fuerte por el trabajo realizado.'},
{id:'S40-3_urte',cod:'S40',nom:'ANIMALIAK: MARRAZOAK',nom_es:'ANIMALIAK: MARRAZOAK',adina:'3 urte',inst:'P. Txikia eta irregularra',pto:'SAIOAREN GARAPENA',materiala:['marrazoen hegatsak'],arranque:'Pistina txikian marrazoen mugimenduak imitatuko dituzte joan etorriak eginez.',intencionada:'',reflexion:'Hegatsak epiniko dituzte eta pistina irregularrean arituko dira marrazoak izango balira bezala.'},
{id:'S41-3_urte',cod:'S41',nom:'LETRAK (A, B, C, D…)',nom_es:'LETRAK (A, B, C, D…)',adina:'3 urte',inst:'infantil y recreativa',pto:'piscina infantil',materiala:['Isla','churros','letras flotantes','tapiz','tobogán (en recreativa)'],arranque:'Buscamos las letras que estarán por la piscina infantil y trataremos de cogerlas metiendo la cabeza dentro del agua para posteriormente identificarlas. Una vez tengamos todas las letras el monitor las llevará a la piscina recreativa.',intencionada:'En la piscina recreativa, bajando por el tobogán, llevaremos las letras al tapiz mediante diferentes desplazamientos. Cada alumno antes de colocar su letra en el tapiz deberá nombrar un animal, color, objeto…. que comience con la letra que ha transportado.\n¿Podremos bajar por el tobogán de diferentes maneras?\nAusnarketa : ¿Todos han participado en la sesión?\nHOBETU BEHARREKOA',reflexion:''},
{id:'S42-3_urte',cod:'S42',nom:'pajita',nom_es:'pajita',adina:'3 urte',inst:'Piscina pequeña e irregular zona poco profunda',pto:'DESARROLLO DE LA SESION',materiala:['Tabla grande','8 palotes','8 vasos','isla'],arranque:'Juegos en piscina pequeña',intencionada:'Vamos a BEBER CON PAJITA DEL VASO con los materiales de la piscina:\n-Piscina infantil tirando objetos al agua: Los niños tendrán que coger los vasos que están por la piscina. Luego los llevaremos a la piscina recreativa\n-Piscina recreativa con objetos en el borde: Dejaremos el vaso en el borde y tiramos los palotes azules(pajitas). Los niños irán cogiendo cada uno su "pajita".\nSimulando que vamos en caballo, iremos "bebiendo del vaso" (que se desplacen con churro y manos ocupadas...)',reflexion:''},
{id:'S43-3_urte',cod:'S43',nom:'KOLOREAK',nom_es:'KOLOREAK',adina:'3 urte',inst:'Infantil / Recreativa',pto:'Bordillo / Fuera de la piscina',materiala:['(24 aros/3 colores) Aros pequeños','1 tapiz','churros'],arranque:'En la piscina infantil, echamos los aros de colores al agua. Vamos diciendo qué color coger y los van dejando en el cubo (para luego llevarlo a la recreativa). Intentan sacar los aros de 1 en 1, y ordenado por colores.\nUna vez recogidos todos los aros, vamos con 1 churro cada niño/a hacia la piscina recreativa.',intencionada:'Ponemos 1 cono al lado de la segunda escalera de la piscina recreativa y tiramos las piezas de colores al agua (sobre mesa o isla). Tienen que coger según el color que les digamos y salir por la 2ª escalera.\nSentamos a todos/as los/as niños/as en el borde de la parte poco profunda, con el cubo de los aros al lado.\nCada niño/a va cogiendo un aro, del color que le digamos, se desplazan con el churro hasta el tapiz, situado a unos 5 metros donde está el otro cono encima. La isla estará cerca del tapiz, para que tengan un poco de apoyo. Irán llevando los aros, de uno en uno, hasta llenar el cono de encima del tapiz.\nDespués, irán con el churro hasta el tapiz, cambiarán el churro por el aro que les guste, y con la ayuda del monitor/a, se desplazarán hasta el cono situado fuera del agua, al lado de la 2ª escalera, y dejarán ahí el aro así hasta pasar los aros de un cono a otro.',reflexion:''},
{id:'S44-3_urte',cod:'S44',nom:'INGURUNE ETA PAISAIA. TABIRAKO IGERILEKUA',nom_es:'INGURUNE ETA PAISAIA. TABIRAKO IGERILEKUA',adina:'3 urte',inst:'Txikia eta Irregularra',pto:'',materiala:['Txurroak','ispilua','txirrista ertainean'],arranque:'Igerileku txikian animalia ezberdinak imitatuko ditugu eta ispiluen laguntzaz gure mugimendu eta aurpegiak ikusiko ditugu. Zelako tximino aurpegia!',intencionada:'Zaldia: zaldian Tabirako igerilekuetara joango gara. Bertan, bero asko dago eta uretara salto desberdin batzuk egingo ditugu. Bost animalia ezberdin, (adib. tximinoa, behia, marrazoa, txakurra eta untxia) erara egingo dugu salto.\nTxirrista: Igerilekuan jolas leku bat ere badago. Txirristatik modu ezberdinetan jeisten jolastuko gara.\nIzarra (begiralearen laguntzarekin): toallara joango gara siestatxo bat egitera.',reflexion:'Asmatu ahal dugu zer gustatzen zaien animaliei? Guk ere jaten al ditugu gauza berdinak?'},
{id:'S45-3_urte',cod:'S45',nom:'LAS ESTACIONES Y ÉPOCAS DEL AÑO. RECOLECTORES',nom_es:'LAS ESTACIONES Y ÉPOCAS DEL AÑO. RECOLECTORES',adina:'3 urte',inst:'Piscina infantil y recreativa',pto:'Fuera de la piscina, al lado de la escalera.',materiala:['Tapiz','+/- 32 figuras flotantes','cubos','8 fantasmas'],arranque:'Vamos a recolectar la fruta de los árboles: Tiraremos todo el material al agua, simulando que son frutas variadas caídas de los árboles. Dicha fruta la introduciremos en los cubos que se encuentran en el tapiz rojo. Así los niños jugaran a ser granjeros/recolectores.',intencionada:'En la piscina recreativa\nEmpezaremos nadando encima de nuestro fantasma simulando que es nuestro tractor.\nColocamos el tapiz rojo lleno de frutas en un lado de la piscina. Al otro lado, se encontrara una frutería hecha con tablas. Los niños deberán de transportar las frutas de un lado al otro de la piscina (pondremos la isla rosa para facilitarles el trasnsito). Así aprenderán como se llevan las frutas de las huertas y campos a las tiendas.',reflexion:'Que aprendan cuales son las fases desde que cae la fruta hasta que llegue a la tienda.'},
{id:'S46-3_urte',cod:'S46',nom:'LOS PAISAJES Y ENTORNOS DEL MUNDO: LA ISLA',nom_es:'LOS PAISAJES Y ENTORNOS DEL MUNDO: LA ISLA',adina:'3 urte',inst:'Piscina infantil / Piscina irregular',pto:'Tapiz de salida',materiala:['8 Churros','3 tablas','3 pull boys','1 tapiz','3 picas azules','3 perlas','4 aros','4 chapas de colores(números)'],arranque:'Somos animales, nos vamos a desplazar por la piscina pequeña con las manos por el suelo y boca abajo (cocodrilos), después boca arriba (ballenas), nos desplazaremos dando saltos (ranas) y lanzándonos y poniéndonos de pies (delfines).',intencionada:'Nuestro paisaje hoy es una isla:\nExplicamos e interrelacionamos para ver que saben sobre una isla (cómo es? ¿Que nos podemos encontrar? ¿Que podríamos comer? ¿qué animales viven allí? etc.\nUna vez de haber explicado todo esto, el monitor lanzara diferentes objetos al agua y les diremos que estamos solos en la isla y que debemos recoger diferentes alimentos para sobrevivir:\nPicas azules: Plátanos\nTablas: tortugas\nPullboys: Cocos\nChurros grandes: Troncos para hacernos fuego.\nAros: peces\nPerlas: Erizos de mar\nChapas de colores: Langostas y cangrejos.\nPara recoger estos debemos meter la cabeza.\nNos cambiamos de piscina a la piscina irregular\nHemos construido una balsa (tapiz) donde nos tumbaremos y moviendo los pies nos intentaremos desplazar, después colocaremos la isla hundida que nos hará de rocas para descansar y poder volver a la civilización realizando diferentes desplazamientos. (con o sin ayuda auxiliar).',reflexion:'Seguimos conociendo nuestra piscina y nuestro material, también las figuras y los colores.\nConocimiento de otro entorno y trabajo en equipo.'},
{id:'S47-3_urte',cod:'S47',nom:'MIS CUENTOS DE LA PISCINA',nom_es:'MIS CUENTOS DE LA PISCINA',adina:'3 urte',inst:'Piscina pequeña e irregular zona poco profunda',pto:'La pasarela en la piscina pequeña, aletas, aro grande, pelotas pequeñas, canasta y pulls',materiala:['Pasarela','Txirrista','8 pelotas','canasta','2 aros grandes','8 aletas de delfín','8 pulls','isla'],arranque:'En la piscina pequeña haremos un circuito como si estuviéramos actuando en el parque. Les pondremos las a aletas en la espalda. Pondremos la pasarela en mitad de la piscina para que vayan por encima de ella, saltaran al agua y haciendo el delfín pasaran por debajo del txirrista para luego tirarse por el. Pasaran por un aro grande tirándose de cabeza, cogerán una pelota que intentaran encestar en la canasta. Haremos este circuito unas cuantas veces.',intencionada:'En la piscina irregular haremos otro circuito con la isla, el aro grande ( que nos servirá para bucear, los pulls ( los tendrán que llevar en la cabeza), tendrán que hacer saltos desde fuera de la piscina dentro del aro…. Todo dependerá un poco del nivel del grupo… Al final harán lo que mas les apetezca como los delfines parar ser mas felices.',reflexion:''},
