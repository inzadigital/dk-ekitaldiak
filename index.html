{id:'S40-5_urte',cod:'S40',nom:'Montes de nuestro entorno',nom_es:'Montes de nuestro entorno',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['1 tapiz pequeño rojo','1 verde','fichas de animales','1 tapiz grande para fichas'],arranque:'Preguntamos a los niños si conocen algún monte en nuestro entorno.\nMugarra, Oiz, Anboto, Untzillaitz, Udalaitz, Eskubaratz…\nCada vez que uno de los niños diga un monte todos deben saltar y volver a salir.',intencionada:'Realizaremos una excursión a uno de los montes de nuestro entorno.\nEn esta excusión observaremos diferentes animales que habitan en nuestros montes y bosques.\nAl lado de la cristalera tendremos un tapiz grande con imágenes de animales y al lado de la silla del socorrista los tapices rojo y verde.\nLos niños deberán realizar desplazamientos desde el lado cercano a la recreativa hasta la escalera del centro y volver andando. Cada vuelta cogerá una imagen de un animal y lo clasificará dependiendo si habita en los bosques de nuestro entorno o no.\nSi -> tapiz verde\nNo -> tapiz rojo\nCuando terminemos nos juntaremos todos y repasaremos los animales y sus nombres con los niños y veremos si todos están correctos.\nPara terminar, recolocaremos las fichas para el siguiente grupo.',reflexion:''},
{id:'S41-5_urte',cod:'S41',nom:'Al restaurante',nom_es:'Al restaurante',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['pollo (pullboys 10)','patatas fritas (churros amarillos 10)','lechuga (fichas flotantes verdes 10)','tapiz rojo (1)'],arranque:'Saltaremos imitando la forma de los diferentes alimentos que iremos diciendo.\nEjemplo: manzana = bomba, esparrago = palito…',intencionada:'A cocinar!!!!\nMENU: Pollo con patatas y ensalada de lechuga.\nOpciones: dejar el material fuera o tirar todo a la vez,…(Si lo lanzamos todo al agua lo recogerán de uno en uno,…)\nPondremos el tapiz junto a la cristalera de nata 2 y allí irán dejando el material para ir preparando el menú, 1º pollo, 2º patatas, 3º ensalada.\nTendremos que llevar la bandeja desde la cocina a la mesa (llevar el tapiz entre todos por el agua sin que se caiga la comida) TENDRAN QUE DAR UNA VUELTA ENTERA POR DENTRO DEL AGUA CON LA BANDEJA',reflexion:''},
{id:'S42-5_urte',cod:'S42',nom:'Entre Delfines',nom_es:'Entre Delfines',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['10 Aletas de delfines','1 circulo azul','1 amarillo (churro grande + conector)','15 piezas flotantes (redondas','triangulares','cuadradas…) amarillas','15 azules','10 aros lastrados (1x niño “pececillos”)','4 algas'],arranque:'Los delfines son felices saltando. ¿Cómo saltan? Vamos a realizar por lo menos 5 saltos diferentes “a lo delfín”',intencionada:'- “Nos convertimos en delfines”: Para convertirnos en delfines deberemos pasar unas pruebas: - Salto de delfín. – Mover la cola como un delfín - Nadar como un delfín.\nAhora sí nos podemos poner la aleta de delfín.\n“Observando el fondo del mar”: Tiraremos las algas por la piscina. Después nos moveremos despacito por la piscina observando el fondo marino e imitando a los delfines. Acabamos junto al punto de encuentro, dentro del agua.\nCONSIGNA: -Pasear solos /Por parejas/ En 2 grupos.\n- “Vamos a jugar”: (seguimos jugando en dos grupos: amarillos y azules). Para este juego echaremos al agua las diferentes piezas (redondas, triangulares, cuadradas…) de color azul y amarillo. Los delfines se colocarán ahora cerca de los dos círculos (churros grandes con un conector). A la hora de oír la señal (silbido, aplauso, “ya” …) los delfines deberán reaccionar rápido para poder traer a su círculo las piezas de su color.',reflexion:'¿Sabemos cómo se comunican los delfines? ¿Podemos hablar y escuchar dentro del agua? Vamos a probar.'},
{id:'S43-5_urte',cod:'S43',nom:'LOS PAISAJES Y ENTORNOS DEL MUNDO',nom_es:'LOS PAISAJES Y ENTORNOS DEL MUNDO',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['10 Aletas tiburón','30 flotantes azules','1 pasarela','2 aros grandes sumergibles','10 Pullboy'],arranque:'Vamos a saltar: primer salto solos, segundo en parejas y nos iremos juntando hasta saltar todos juntos',intencionada:'#LOS TIBURONES TIENEN HAMBRE: Nos colocamos las aletas de tiburón en la espalda. Echaremos las piezas azules al agua y nos imaginaremos que es la hora de comer.\nPara poder coger la comida tenemos que nadar hasta ella. Saltaremos por la pasarela e intentaremos comer las piezas azules. Cogeremos de una en una y en cada viaje nadaremos de distinta manera. Dejaremos el material en el bordillo.\n#LA HORA DE LA SIESTA: Después de tanto comer tenemos que echar la siesta, estamos tan cansados que necesitamos dormir. Haremos el muerto, boca abajo, de lado, encogidos, estirados, …. De todas las maneras que se nos ocurran. El monitor marcara el tiempo que estarán en cada postura, la cual elegirá cada uno la suya de manera independiente, no obligando en ningún momento a hacer una postura no deseada.\n#SEGUIMOS HAMBRIENTOS: Echaremos los pullboys y los aros grandes sumergibles. Haremos lo mismo que con el anterior material, pero esta vez pasaremos por los aros sumergidos (rojo/amarillo)\nPara terminar, cada uno cogerá un pullboy y una pieza azul y lo tendrá que llevar de un lado al otro como quiera, aprovechando este viaje para dejarlo ordenado para el siguiente grupo.',reflexion:''},
{id:'S44-5_urte',cod:'S44',nom:'Tráfico',nom_es:'Tráfico',adina:'5 urte',inst:'NATA2',pto:'',materiala:['4 Algas','10 churros','10 picas','fichas de tráfico 5 años','1 tapiz en la cristalera','1 mesa'],arranque:'Dividimos el espacio de trabajo a lo largo en dos partes, con las algas, haciendo dos carriles.\nLos/las alumnos se desplazarán por la derecha y volverán por la izquierda, como el trafico. Cogerán un churro y una pica azul, montados como en una bicicleta con la pica en las manos haciendo de manillar, realizarán 2 o 3 vueltas. Deben de respetar la dirección dentro del carril por el que se desplazan.',intencionada:'Tenemos las fichas de tráfico en la mesa, que se encuentra fuera del agua. Cada alumno/a cogerá una ficha de encima de la mesa y la llevara por su carril derecho hasta la mitad, saldrá por la escalera, pondrá la ficha en el tapiz, y volverá por el otro carril.\nCuando vuelven tienen que coger otra ficha igual (hasta que se agoten y cambien de ficha), e ir colocándolas en orden, según el tipo de señal (prohibición, obligación, peligro).',reflexion:'Los/las alumnos/as, se van fijando en las señales, y van aprendiendo su significado. Van haciendo memoria al recordar que señal han llevado y la vuelven a llevar.'},
{id:'S45-5_urte',cod:'S45',nom:'LARRIALDIA.SOROSLEAK GARA',nom_es:'LARRIALDIA.SOROSLEAK GARA',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['10 Taulak','10 mamuak eta 10 Txurroak badaezpada'],arranque:'Uretara sartzeko modu desberdinak frogatuko ditugu. Tartean, SOROSLEEN SALTOA ere egingo dugu (burua urperatu gabe geldituz).',intencionada:'Gaurkoan Igerilekuko sorosle ausartak izango gara!\n1.- Bihotz taupadak sentitu. Bihotzean/Zaman. Azkar doaz?Astiro?\n2.- Desplazamendu ezberdinak:\n- Igerian burua kanpoan, aurreruntz, atzeruntz.\n- Arrasteak: Taularekin edo/eta mamuarekin\n3.- Benetako froga. Mamuak erdian utziko ditugu eta guri laguntza eskatzen dabilen jendea dela esango diegu. Beraiengana igerian joan eta bueltan ekarri beharko ditugu irteerako puntura arte. Gai izango ote gara denak onik ateratzeko?\n4.- Flotabilitateko ariketak lasaitasunera itzuliz: izarra gora ta behera begira, bola,bola+izarra...\nOHARRA: Une ezberdinetan bihotz taupadak nabaritzeko aukera izan dezakegu. Zer dio gure bihotzak? Arin doa?Lasai?',reflexion:'Zerbait aldatu:'},
{id:'S46-5_urte',cod:'S46',nom:'Una explosión de colores',nom_es:'Una explosión de colores',adina:'5 urte',inst:'Nata 2 y Recreativa',pto:'',materiala:['Fichas plastificadas colores (AZUL','ROJA','AMARILLA Y VERDE) 20 aros'],arranque:'SALTO DE LOS COLORES:\nCuando enseño la ficha verde, salto, muy lejos\nCuando enseño la ficha azul, salto palito.\nPrimero trabajo con estas dos consignas, y luego meta los otros 2 colores para que sea fácil de memorizar.\nCuando enseño la ficha roja salto bomba\nCuando enseño la ficha amarilla ello eligen el salto.',intencionada:'Repartimos churros y les decimos que salten al agua haciendo el “caballito” y les explicamos que cuando el monitor levante la mano cambiarán de churro con un compañero pero el churro tendrá que ser de un color diferente al que tenían.\nLos que tienen churros rojos (de fresa), tendrán que desplazarse en “caballito” hasta el medio y volver andando.\nLos que tienen churros verdes, (de menta), irán con el churro debajo de los brazos hasta el medio y volverán andando\nLos que tienen churros amarillos (de limón), se colocarán el churro debajo de la cabeza y se desplazarán hasta el medio y volverán andando.\nRepito 2 veces cada ejercicio y cambio el color del churro hasta que todos los niños hallan pasado por los diferentes churros.\n(Acciones descritas básicas, dependiendo del grupo se podrá complicar los diferentes largos)\nPara reforzar las inmersiones, iremos a tirar aros en la parte poco profunda de la piscina recreativa, una vez recogidos iremos a la cuesta de la recreativa y finalizaremos en la zona profunda de la recreativa.',reflexion:''},
{id:'S47-5_urte',cod:'S47',nom:'Deportes: waterpolo',nom_es:'Deportes: waterpolo',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['1 portería de waterpolo','1 balón','10 churros','10 pelotas'],arranque:'Desplazamientos variados hasta la segunda escalera en estilos de crol, espalda y braza. Salir y volver andando.',intencionada:'#Individualmente: Saltar al agua, coger una pelota y lanzarla a portería y continuar el desplazamiento hasta la mitad. Salir y volver a realizar otra vez.\n#Dividir el grupo en parejas: desplazarse hasta la mitad y vuelta, a la vez que se van pasando la pelota.\n#Dividir el grupo en dos: Ponemos la portería entre las dos escaleras. Y repartimos un churro a cada alumno/a. El churro lo usarán como de caballito, para aguantar mejor el desarrollo del partido. Les explicaremos un poco el juego de hoy y sus normas: Sólo se puede lanzar el balón con una mano, no vale quitar de las manos el balón, deben hacer 3 pases entre miembros del mismo equipo antes de lanzar a portería, no vale hacer aguadillas ni apoyarse en la pared. Mientras que unos defienden los otros atacaran.\n#Variación: Hacemos 4 tiempos de 5 minutos cada tiempo. Cambiando de equipo en portería. 5 minutos un equipo y 5 minutos el otro equipo. Mientras que unos defienden los otros atacaran.',reflexion:'Trabajo en equipo.'},
{id:'S48-5_urte',cod:'S48',nom:'TRABAJO EN EQUIPO',nom_es:'TRABAJO EN EQUIPO',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['1 tapiz','10 churros grandes','10 aros sumergibles','1 aro grande'],arranque:'Preguntamos a los niños a ver cuántos tipos de saltos conocen. Y saltaremos intentando hacer diferentes saltos. Podemos saltar también de 1 en 1, luego de 2 en 2 así hasta la totalidad del grupo.',intencionada:'Por parejas: Cada pareja con un churro tienen que ir medio largo, hacia delante, mirando para arriba, de caballito cambiando las posiciones delante - atrás. Acaban juntándose todos los caballitos haciendo una sola fila(tren).\nPor parejas y a caballito irán con un aro agarrándolo ambos con una mano y en el medio de la piscina cambiaran de sentido y de mano.\nVamos complicando el mismo ejercicio a tríos, cuartetos y según el nivel todo el grupo, unidos entre ellos con un aro grande.\nPara acabar deben de llevar la colchoneta entre todos hasta media piscina. Solo se puede montar uno en la colchoneta, y cada ½ largo se van cambiando. Ellos organizan el turno para subirse, y si no se organizan el profesor va diciendo quien se sube y quien se baja',reflexion:''},
{id:'S49-5_urte',cod:'S49',nom:'RECICLANDO',nom_es:'RECICLANDO',adina:'5 urte',inst:'Nata 2, en una calle entera en el extremo de la piscina, la idea es que naden un largo y vuelvan andando.',pto:'',materiala:['1 Tapiz','1 mesa','5 fotos de contenedores de reciclaje','10 palos azules','(serán las botellas que reciclaremos en el contenedor verde)','10 tablas','será nuestro papel','cartón que reciclaremos en el contenedor azul','10 cubos','contendrá el aceite usado que reciclaremos en el contenedor naranja','10 vasos que será nuestros envases que reciclaremos en el contenedor amarillo'],arranque:'Les explicamos que hoy vamos a conocer cuáles son los colores del reciclaje:\nAmarillo: envases\nAzul: papel y cartón\nVerde: vidrio\nNaranja: aceite usado\nMarrón: basura orgánica\nUna vez explicados, saltaremos diciendo los colores según el material a reciclar que dice el monitor. Ejemplo: Si el monitor dice papel lo niños tendrán que saltar diciendo azul, si el monitor dice basura orgánica los niños tendrán que saltar diciendo el color marrón y así con todos.',intencionada:'Colocaremos las fotos de los contenedores en el muro, encima de la piscina,\nprimero reciclaremos el papel y el cartón, cogerán una tabla cada uno e irán nadando hasta el otro lado de la piscina como el monitor diga\nLuego colocaremos las botellas en la mitad de la piscina, saldremos nadando desde una punta cuando llegamos al medio, nos sumergimos cogemos una botella y la arrastramos hasta el otro lado donde la reciclaremos en el contenedor verde.\nLes daremos un vaso a cada uno que tendrán que llevar nadando boca arriba, para depositarlo en el contenedor amarillo\nTiraremos los muñequitos de colores, que reciclaremos en el contenedor marrón como materia orgánica\nSaldrán nadando desde una punta de la piscina en la mitad cogerán un cubo que llenaran de agua y arrastraran la siguiente mitad de la piscina, ese será el aceite usado que reciclaran en el contenedor naranja.',reflexion:'Conocían los diferentes colores de reciclaje? Ahora lo saben?'},
{id:'S50-5_urte',cod:'S50',nom:'Saskibaloia',nom_es:'Saskibaloia',adina:'5 urte',inst:'',pto:'',materiala:[],arranque:'',intencionada:'',reflexion:''},
{id:'S51-5_urte',cod:'S51',nom:'Los fantasmas tienen frio',nom_es:'Los fantasmas tienen frio',adina:'5 urte',inst:'Nata 2 y recreativa',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'En la piscina recreativa recoger los aros que están en el suelo. Los que se animen a coger los aros de la nata2, se los tiraremos en nata2',intencionada:'Colocamos 2 fantasmas en un extremo de la piscina, nosotros estamos en el medio de la piscina, les decimos a los niños que los fantasmas están sin ropa y tienen frio, y nosotros tenemos que abrigarlos con hojas, cogemos una foto plastificada de la cesta y tenemos que pegarla en el fantasma hasta cubrir todo su cuerpo con las hojas que estarán en el cubo, y desde aproximadamente la mitad de la piscina, se desplazarán con una tabla, y en la tabla llevarán la foto, saldrán por la escalera y vendrán andando hasta el cubo.',reflexion:'Es primavera, les preguntamos si suelen ir al monte y que pasa en primavera con los árboles.\nResumen\nDesplazamientos con y sin material\nInmersiones en agua poco profunda (1m)\nSaltos'},
{id:'S52-5_urte',cod:'S52',nom:'Números',nom_es:'Números',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'Tirarán el dado y nadarán de acuerdo al animal que sale en el dado desde el bordillo hasta la corchera, ej. Si sale el delfín nadarán como un delfín, si sale una ranita, nadarán como una ranita, podrán nadar desde el bordillo hasta la corchera y volver.',intencionada:'Deberán colocar los eslabones de la cadena, según los números que estarán indicados, en cada vuelta colocarán un eslabón hasta completar el número que se les indica.\nResumen\nImitación del nado de diferentes animales\nDesplazamientos de diferentes maneras sin material',reflexion:''},
{id:'S53-5_urte',cod:'S53',nom:'DURANGO – URKIOLA – POL POL – ANBOTO IBILALDIA!',nom_es:'DURANGO – URKIOLA – POL POL – ANBOTO IBILALDIA!',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'Oinez, korrika eta saltoka ibiliko gara ibilaldirako beroketak eginez.',intencionada:'Gaurkoan ibilaldi bat egitera joango gara. Ibilaldi hau, etapa ezberdinetan banatuko dugu. Etapa bakoitza egiten dugula simulatzeko modu desberdinetan egingo dugu igeri. Eta toki bakoitzean aurkitzen dugun berezitasunaren arabera froga bat egin beharko dugu denon artean.\n1.- Durango – Urkiola. (Igerian)\nBerezitasuna; Eliza aurrean dagoen “meteoritoa”. Kondairak dio bere inguruan 7 buelta emanez gero mutil/neskalaguna aurkituko duzula.\nFroga: Taldeka tapiz handia (meteoritoa) denen artean erdirarte eraman eta bertan 7 aldiz bira araziko dugu. Gero berriz buelta.\n2.- Urkiola - Pol Pol (Igerian)\nBerezitasuna; Pol poleko iturria. Ur minerala ematen duen 3 txorrotako iturri bat da.\nFroga: 3 kubo egongo dira uretatik kanpo denen artean eta basoen laguntzaz bete beharko dituztenak. Gure iturria izango da.\n3.- Pol pol – Anboto (Igerian)\nBerezitasuna; Anbotoko Mariren koba. Kondairak dio koban Mari bizi dela eta bertatik atzeraka irten behar garela beti berarekiko errespetua erakutsiz, bestela bertan geldituko garela betirako.\nFroga: Tapiz bat jarriko dugu igerileku iskinean eta bertatik atzeraka ibiliko gara uretara salto eginez. Uretan dauden uztai handietatik ere pasatu ahalko dira, atzerantz pasatzeko gai ote dira?',reflexion:'¿Conocen Urkiola?, ¿suelen ir al monte?, ¿habían oído hablar del “meteorito”? ¿de Mari?\nResumen\nDesplazamientos con diferente material\nSaltoak\nInmersiones'},
{id:'S54-5_urte',cod:'S54',nom:'TARTALO',nom_es:'TARTALO',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'Juego libre 5´',intencionada:'Vamos a hacerle a Tártalo una casa. Para ello usaremos los cubos de colores y las tablas. El monitor determinará según su criterio de que forma utilizaremos este material didácticamente. Podremos utilizar también los churros para que hagan espalda. Procuraremos, de vez en cuando pasar por el aro, lo que simulara el ojo de tartalo.\n“Su entretenimiento favorito es tirar piedras de un monte a otro.” Para ello, cada niño cojera un aro pequeño y lo lanzará dentro de nuestro espacio y tendrá que ir a buscarlo, (inmersiones).\nWikipedia\nEn la mitología vasca, Tartalo representa a un cíclope antropomorfo, gigantesco, con un solo ojo en medio de la frente​​ con costumbres antropófagas y comportamiento terrorífico. Vivía en las montañas. Su tamaño es descomunal al igual que lo es su fuerza, y su entretenimiento favorito es tirar piedras de un monte a otro. Se alimenta de ovejas, niños e incluso adultos de vez en cuando.',reflexion:'Mientras nos colocamos las chancletas, les preguntaremos si conocían a Tartalo, o a otros seres de la mitología vasca.\nResumen\nDesplazamientos con diferente material\nInmersiones'},
{id:'S55-5_urte',cod:'S55',nom:'OCA DE LOS SENTIDOS',nom_es:'OCA DE LOS SENTIDOS',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'Tiramos los churros y las tablas al agua, y cada niño/a saltará al agua a por un churro y una tabla, haciendo en dos ocasiones desplazamientos hasta la mitad.',intencionada:'Colocaremos encima de la mesa fuera de la piscina, la plantilla del juego de la oca, y cada alumno/a tendrá una ficha para identificarles en el juego. Tendremos un dado con los números, y otro dado (con las imágenes de los sentidos) que tirarán y dependiendo de lo que salga, tendrán que desplazarse hasta la escalera de una forma u otra.\nVISTA: nado CROL, intentando sacar los brazos TACTO: nado BRAZA\nOÍDO: nado CABALLITO con churro OLFATO: nado ESPALDA con TABLA\nGUSTO: BUCEO ESTRELLA, nado COMO QUIERO\nCuando llego a la escalera, salgo y vuelvo a tirar el dado para ir avanzando en la oca, y otro dado para saber cómo hay que desplazarse.',reflexion:'¿Han sido capaces de identificar los sentidos?\nResumen\nDesplazamientos con diferente material y de diferente manera\nInmersiones'},
{id:'S56-5_urte',cod:'S56',nom:'Jinkana',nom_es:'Jinkana',adina:'5 urte',inst:'Nata 2 y recreativa',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'Juego libre en piscina recreativa 5’',intencionada:'Hoy haremos “mini pruebas”, para completar nuestro cartón con galletas\nNos vamos de pesca, echaremos al agua 10 fotos de peces diferentes y los niños tendrán que ser capaces de sumergirse y coger por lo menos uno para ganar su galleta.\nNadar 3 largos de crol (desde el bordillo hasta la mitad), cuando lo hagan conseguirán su segunda galleta\nDesde el lateral de la piscina, nadaremos por debajo del agua hasta la corchera coger aire y volverlo a hacer para conseguir mi tercera galleta\nNadar 2 largos de crol boca arriba, desde el bordillo hasta la escalera para conseguir mi cuarta galleta.\nColocar el tapiz azul, los niños deberán pasar por el tapiz y “entrar al agua de cabeza”, si lo logran recibirán su quinta galleta\nPor último, les daremos una pelota a cada uno y deberán pasar por el tapiz ir nadando con la pelota y tratar de encestarla en el cesto flotante que previamente habremos colocado en el otro extremo de la piscina dentro del agua\nResumen\nEntrada al agua de cabeza\nDesplazamientos sin material\nInmersiones en diferentes profundidades',reflexion:''},
{id:'S57-5_urte',cod:'S57',nom:'Nuestro reloj',nom_es:'Nuestro reloj',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'Preguntamos a los niños hasta que numero saben contar. Y saltaremos intentando poner el cuerpo de los números. Si es necesario se podrán juntar los niños.\nPodemos saltar también de 1 en 1, luego de 2 en 2 así hasta la totalidad del grupo.',intencionada:'Vamos hacer un reloj y nombrar horas que conocemos, como por ejemplo a que hora nos despiertan para ir al cole.\nPrimero necesitamos una esfera de reloj. Por lo que el monitor tirara un aro grande y una vez pasados todos el último lo sacara. (Pasar 2 veces, diferente profundidades)\nPara las agujas del reloj utilizaremos las picas azules y para conseguirlas haremos un juego. Dos grupos y los alumnos en caballito y en fila. El primero cogerá la pica y la llevara con el brazo levantado, acabado el primer largo se lo pasara al segundo y el primero pasara a ser el ultimo y así sucesivamente hasta que lo coja el ultimo niño de su fila. Una vez pongamos las agujas del reloj pasaremos a buscar los numero. Dependiendo del grupo se puede hacer en nata 2 o llevarles a la recreativa, cada monitor valora. El objetivo es que consigan los números necesarios para hacer los del reloj. (Para el 7 por ejemplo, 5+2)\nUna vez conseguido el reloj les decimos que pongan las agujas en la hora a la que han entrado a clase.',reflexion:'¿Han sido capaces de jugar en parejas?, ¿reconocen algunas horas?\nResumen\nDesplazamientos\nInmersiones\nSaltos'},
{id:'S58-5_urte',cod:'S58',nom:'Montes de nuestro entorno',nom_es:'Montes de nuestro entorno',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['10 txurros','1 tapiz grande','30 pullboys'],arranque:'Jugaremos a pillarnos en la zona poco profunda de la recreativa.',intencionada:'Tiramos entre todos los pullboys en nata 2 y el tapiz grande.\nTendrán que coger el tapiz grande entre todos y sacarlo de la piscina. Lo colocaremos en el suelo cerca de la piscina. Ahora para construir nuestra montaña iremos cogiendo los pullboys de uno en uno y con los pies/piernas, por cada pullboy que vayamos a coger, tendremos que saltar cada vez de una manera diferente. Después de cada largo dejaremos el pullboy sobre el tapiz fuera del agua.\nSi nos queda tiempo haremos unos largos más. Cogeremos el pullboy y haremos 3 largos diferentes. Ejemplo: pullboy en mano, patada braza, patada crol y patada espalda con el pullboy tras la cabeza.\nCon estos últimos largos aprovecharemos para dejar los pullboys ordenados junto a la pared, para el siguiente grupo.',reflexion:'Preguntamos si han ido a los montes que tenemos alrededor (Urkiola, Zabalaundi, Anboto, Mugarra, Oiz,…) y la importancia de cuidarlos.'},
{id:'S59-5_urte',cod:'S59',nom:'LAS ESTACIONES/ÉPOCAS DEL AÑO',nom_es:'LAS ESTACIONES/ÉPOCAS DEL AÑO',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['10 fantasmas','1 mesa (p. 2)','1 tapiz que irá atada a la corchera (p.3)','2 pesas cuadradas atadas a 2 algas (p.4)','1 cuerda (p.6)','10 Fichas de números','10 aros lastrados','10 palos lastrados','20 figuras flotantes de colores','1 cubo para recogerlos'],arranque:'- “El juego del fantasma”: Cada uno cogerá su fantasma y se lanzará al agua. Vamos a movernos libremente, pero a la voz de “aldaketa” tendremos que dejar nuestro fantasma para subirnos a otro. Así 3 ó 4 veces.',intencionada:'- “Construimos nuestra casa”: Tiraremos todos los “fantasmas” al agua. Les explicaremos que somos un grupo de ARDILLAS y que queremos prepararnos para la llegada del invierno. Para empezar necesitamos construir una casa calentita y confortable. Para ello vamos a recoger cada uno una pieza de nuestra casa (un fantasma) y ya en al punto de encuentro montaremos nuestra casita.\n- CIRCUITO “Buscamos comida por el bosque”: Sabemos que en otoño podemos encontrar mucha comida en el bosque y así, guardando parte de ella, el invierno se nos hará menos duro (comida en la zona 7, alrededor de la cuerda también).\nEn cada vuelta por el bosque podemos recoger una pieza de comida; perretxikos, avellanas, nueces… trabajamos de uno en uno o por parejas (dependiendo del nivel del grupo). Y lo iremos guardando todo en nuestra casa.',reflexion:'¿Qué nos da el bosque para comer? (a nosotros; las ardillas), ¿Qué cosas debemos evitar recoger? Perretxikos pequeños, perretxikos no comestibles, fruta podrida…'},
{id:'S60-5_urte',cod:'S60',nom:'HORAS',nom_es:'HORAS',adina:'5 urte',inst:'NATA2',pto:'',materiala:['1 mesa','ficha juego reloj','10 avatares niños/as','1 dado números','1 dado formas natación','10 tablas'],arranque:'Preguntamos a los/las alumnos/as si conocen cómo funciona un reloj de agujas, analógico.\nEchamos las tablas al agua, y les decimos que cada alumno/a debe coger 1 tabla.\nTenemos la mesa fuera, en el ancho de la piscina con la ficha del juego del reloj con el dado.',intencionada:'Cada alumno/a echa el dado y mueve la ficha con el nº que le haya salido en el dado, encima de las esferas de los relojes. Tienen que decir la hora correcta, encima de donde les haya tocado. Si fallan, una forma de desplazamiento con tabla. Sin aciertan, sin tabla. Echan también el dado de los estilos. Se desplazaran de la forma que indique el dado de los estilos de natación, hasta la mitad y vuelven andando a echar otra vez los dados y mover la ficha para llegar hasta la meta.',reflexion:''},
{id:'S61-5_urte',cod:'S61',nom:'5,4,3,2, 1…explosión de colores',nom_es:'5,4,3,2, 1…explosión de colores',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['10 fantasmas (3 rojos','3 amarillos','4 azules) 11Tablas','11 aros amarillos','11 vasos rosas','11 fichas verdes','11 fichas rojas sumergibles','11 figura azul ovalada flotante','1 cubo'],arranque:'Cada uno con un fantasma al agua, al grito de ya, cambiamos de color de fantasma, así hasta que todos hayan pasado por todos los colores.',intencionada:'Les enseñamos la forma que hemos hecho con el material:\nTiramos el material a la piscina. En el primer largo\nCogen el material y en el segundo lo utilizan y lo\ndejan en su sitio para crear la forma.\nTabla: pies crol\nAro: en la cabeza y braza\nFicha sumergibles: pies de espalda\nVaso: (con el fantasma) ponemos el vaso sobre\nel fantasma y sin tocar el vaso lo llevarlo un largo\nsin que se caiga al agua.\nFigura azul ovalada flotante: llegarlo de un sitio a otro soplando',reflexion:''},
{id:'S62-5_urte',cod:'S62',nom:'Durangoko Oka',nom_es:'Durangoko Oka',adina:'5 urte',inst:'Nata 2 y recreativa',pto:'',materiala:['DESARROLLO DE LA SESION'],arranque:'Salto desberdinak beroketa moduan',intencionada:'Bikoteka jarriko gara. Taldea egoki ikusi ezkero banaka.\nFitxa aukeratuko dugu lehenengo.\nIgerian buelta bat egin beharko dute dadoa bota ahal izateko. Erortzen diren laukiaren irudia zer den jakiten saiatu beharko dira.\nGainontzean Oca-ren arauak jarraitu.',reflexion:'¿Conocían el juego de la oca?, ¿suelen jugarlo?, ¿conocían algunos de los sitios de Durango que salían en el juego?, ¿se lo pasaron bien?\nResumen\nDesplazamientos en diferentes posiciones\nActividad lúdica'},
{id:'S63-5_urte',cod:'S63',nom:'PARAOLINPIAR JOKOAK',nom_es:'PARAOLINPIAR JOKOAK',adina:'5 urte',inst:'Nata II',pto:'',materiala:[],arranque:'Taldekako saltoak egin ditzakegu.',intencionada:'Gaur igeri egitean gure sentzumenek duten eragina bizituko dugu. Igeri egiteko zenbat modu ezberdin dauden konturatuko gara. EZAGUTZEN DITUZUE PARAOLINPIAR JOKOAK?\nGoazen frogatzera nola egin dezakegun igeri adib:\nBeso bakarrarekin. Besorik gabe…\nHanka bakarrarekin. Hankarik gabe…\nHanka eta beso bakarrarekin.\nIkusi gabe. Begi batekin…\nHitzegin gabe.\nEntzun gabe…\n…\nKontutan izan luzerak egitean estilo ezberdinetan egin dezakegula lana.\nBukatzeko gure gorputz guztia erabiliz egingo ditugu zenbait luze. Igartzen ahal dugu ezberdintasunik?',reflexion:'Zerbait aldatu:'},
{id:'S64-5_urte',cod:'S64',nom:'Las Horas',nom_es:'Las Horas',adina:'5 urte',inst:'NATA 2',pto:'',materiala:['Reloj verde (El que hizo Laura)','10 tablas','10 vasos','10 picas azules','30 aros de buceo o 30 fichas sumergibles (colores o números variados)'],arranque:'Tiramos todo el material porque estamos muy locos, vamos corriendo por la vida. Sin horarios todo va mal. “¡mira que desastre!”',intencionada:'# “¿A que hora desayunamos?”\nPondremos en el reloj la hora en la que más o menos desayunan los niños Cogeremos nuestros plato, vaso y cuchara (cada monitor indicará cómo se desplazaran por la piscina) para poder desayunar.\n# “Eskolara? Zein ordutan sartzen zara?”\nPondremos en el reloj la hora y hoy toca matemáticas. Tendrán que sacar entre todos los aros y poner el número de aros que indique el monitor. (4verdes 1 azules o 2verdes+1azul= 3 amarillas…)\n# “Zer ordutan jaten duzue?”\nPondremos en el reloj la hora en la que más o menos comen todos. Tendrán que llevar la bandeja de la comida (tabla + vaso + pica) los largos que determine el monitor sin que se les caiga.',reflexion:''},
{id:'S65-5_urte',cod:'S65',nom:'Larrialdiak',nom_es:'Larrialdiak',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['10 Tablas','1 tapiz grande'],arranque:'El ataque del tiburón.\nEstamos todo el grupo dentro del agua (menos uno) en una playa haciendo surf con nuestras tablas hasta que el socorrista (monitor) avista a un gran tiburón blanco. Este saltara al agua en busca de sus presas a intentarles. (El tocar es el ataque del tiburón y vamos cambiando de tiburón hasta que lo sean tod@s).',intencionada:'#El tsunami.\nTod@s nos lanzaremos a la orden del monitor que avistara un tsunami que nos viene por detrás y nos desplazaremos hasta la otra escalera lo más rápido posible para ponernos a salvo. (cambiamos de estilos). Aquí podemos utilizar las tablas y meter unos cuantos largos con tabla y algo de técnica.\n#El Naufrago\nPondremos el tapiz grande en el otro extremo de la piscina donde habrá dos náufragos que salten desde la orilla y se suban encima, para que después el resto del grupo salte y los traiga hasta el punto de salida.',reflexion:''},
{id:'S66-5_urte',cod:'S66',nom:'sentimientos y colores',nom_es:'sentimientos y colores',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['Hoja de la sesión','tarjetas de sentimientos','50 fichas sumergibles (5 por niño','1verde','1rojo','1amarillo','1morado','1azul) 10 tablas pequeñas','5 churros largos','10 churros cortos'],arranque:'# Tiraremos las fichas sumergibles a la piscina recreativa (depende del grupo en la parte poco profunda o en la profunda) les daremos una tabla, que dejaran junto a la zona donde hemos tirado las fichas sumergibles. Les diremos que coja cada uno una ficha de cada color y que la dejen en su tabla.\n# Una vez tengamos las 5 fichas, cogerán cada uno su tabla y nos iremos a NATA 1. Cogeremos las tarjetas de los sentimientos y se las enseñaremos, comprobaremos junto con los niños, que todos tenemos las fichas de los colores y que todos saben que sentimiento va con que color. Ejemplo: Rojo = Ira, Azul =Triste\n# Haremos saltos cambiando los saltos diciendo los sentimientos.\nEjemplo: Amarillo = alegría = saltamos riéndonos.',intencionada:'Una vez que sepan identificar el color con el sentimiento, les haremos preguntas y depende que conteste harán el largo de una manera u otra. Aquí cada monitor jugara con las preguntas y variara dependiendo del nivel del grupo ya que detrás de cada tarjeta ira una acción sencilla.\nEjemplo: ¿cómo nos ponemos cuando vemos a un amigo? Alegre, detrás de dicha tarjeta pondrá Caballito. Puede ser caballito hacia delante, hacia atrás, solos, de dos en dos….etc.',reflexion:''},
{id:'S67-5_urte',cod:'S67',nom:'A la Playa',nom_es:'A la Playa',adina:'5 urte',inst:'Piscina nata 2',pto:'',materiala:['10 Tablas','10 churros','20 fichas sumergibles','1 cubo para las fichas','10 tapiz pequeña (1 por niño)'],arranque:'Preparemos las cosas para ir a la playa, lo primero es preparar la mochila, una tabla será la mochila, para ello iremos nadando con la tabla ida y vuelta y dejamos la tabla en el muro.\nJugaremos con nuestra imaginación, preguntaremos a los niños que se necesita llevar a la playa ej.(toalla, crema, sombrilla, chanclas, juguetes), iremos nadando hasta la mitad y volveremos con “algo” imaginario y lo colocaremos en la tabla.',intencionada:'Cuando tengamos todo lo que necesitamos para ir a la playa, cogeremos la tabla y haremos 4 largos para llegar a la playa.\n¡¡Ya estamos en la playa!! ¿Qué podemos hacer?, jugaremos en el agua, nos tiramos de cabeza, les enseñamos a los niños la entrada al agua de cabeza.\n¡A tomar el sol!, les daremos a cada niño una colchoneta individual y tomaremos el sol, intentaremos desplazarnos boca arriba y boca abajo encima de la colchoneta.\nRecogeremos txirlas! tiraremos fichas al fondo de la piscina, las cogeremos y las dejaremos dentro de un cubo.\nPara acabar nos daremos un ultimo chapuzón, saltando todos juntos y gritando ¡¡PLAYA!!',reflexion:''},
{id:'S68-5_urte',cod:'S68',nom:'Aquamaths (Matematicas acuaticas)',nom_es:'Aquamaths (Matematicas acuaticas)',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['1 Mesa','20 aros (4 x 5colores)','1 dado grande','números plastificados (30)'],arranque:'Diferentes saltos que cada niño dirá. Y quien lo dice, quien acierte el resultado de una suma o una resta sencilla. Ejemplo: 1+4= 5, dice que salto hacer quien lo acierte.',intencionada:'# Para ponernos por parejas, lo que aremos será poner los aros en la zona amplia de la piscina junto a la cristalera (Pondremos 2 de cada color y 5 colores diferentes). Tendrán que hacer 2 largos de cada estilo, 2 de crol, 2 de espalda y 2 de braza y en el último largo coger un aro. Se pondrán en parejas según el color que cojan.\n# Por parejas, deberán de lanzar el dado fuera del agua. Saldrá un número, por ejemplo, el 6, entonces entre los dos tendrán que coger 6 aros y enseñarle al grupo que han cogido los 6. El monitor les da el numero plastificado 6. En caso de no coger 6, se les da el número que cojan. Así lo harán todas las parejas durante 3 rondas. Quien más números tenga al finalizar todas las rondas, será el mejor matemático acuático.',reflexion:''},
{id:'S69-5_urte',cod:'S69',nom:'Paseo por Durango',nom_es:'Paseo por Durango',adina:'5 urte',inst:'Nata 2',pto:'',materiala:['10 Tablas','nombres/fotos de lugares de Durango'],arranque:'Hablamos de los sitios de Durango a donde nos gusta ir y que cosas hacemos. A continuación hacemos un plano general de Durango con las tablas. Ponemos: Tabira, Santa Ana, Ezkurdi, Magdalena, Puente de iurreta y las piscinas.',intencionada:'Una vez puesto cada zona junto a la piscina pondremos las indicaciones en el suelo y nos desplazaremos nadando de los siguientes diferentes ejercicios.\nTabira: Pies y brazos crol.\nSanta Ana: pies y brazos espalda.\nEzkurdi: Delfines.\nMagdalena: pies y manos braza.\nPuente de Iurretan: Buceo.',reflexion:''},
{id:'S70-5_urte',cod:'S70',nom:'¡OPORRAK HELDU DIRA!!!',nom_es:'¡OPORRAK HELDU DIRA!!!',adina:'5 urte',inst:'Pisina nata 2',pto:'',materiala:['10 Txurro','10 picas azules','10 tablas'],arranque:'Udan egiten diren gauzetaz galdetuko diegu umeei. Bakoitzak zelan pasatzen du uda? Non pasako dituzte oporrak?\nGogoratuko dugu udan krema jartzea garrantzitsua dela eguzkitik babesteko. Igerilekura edo hondartzara goazenean gurasoetatik hurbil mantendu behar gara eta beti nondik nora gabiltzan jakin behar dute.\nIntentziozko iharduera:\nLehenengo bizikletan ibiltzera joango gara ikastaroko lagunekin. Txurro bat jarriko dugu hanka artean eta makila urdin bat eskuetan.\nOndoren mendira joango gara. Motxila (tabla) hartu eta menditik ibilaldi on bat egingo dugu. Modu desberdinetan biliko gara.\nBukatzeko hondartzara joango gara eta irten ibiltzeko aprobetxatuko dugu. Igeri egin eta mota desberdinetako saltoak egingo ditugu.',intencionada:'',reflexion:'Hobetzeko gauzak:'},
{id:'S23-5_urte',cod:'S23',nom:'CONSTRUIMOS ENTRE TODOS UN RELOJ',nom_es:'CONSTRUIMOS ENTRE TODOS UN RELOJ',adina:'5 urte',inst:'Recreativa',pto:'',materiala:['Churros material para construir un reloj reloj de goma eva','DESARROLLO DE LA SESIÓN'],arranque:'el bordillo a la y',intencionada:'reloj como modelo\nEntre todos tenemos que construir un reloj\nen la pared\nniños en cada vuelta saldrán por las escaleras y un y lo colocarán en el sitio correcto dentro del circulo\nterminar colocarán las agujas.\n¡¡¡¡Intentar no meter los números al agua!!!\nDespués que está montado, les enseñamos como se colocan las agujas cuando son las doce, cuando son las tres, cuando son las seis y cuando son las nueve.\nCuando el monitor pone en el reloj\n9 1 largo\nrol, intentando sacar los brazos de agua\nas 12ay que hacer la estrella\nas adarán como les guste\nVariante: A la una un largo de crol, a las dos, 2 largos espalda, a las 3 tres largos ranita, etc',reflexion:''},
{id:'S01-67_urte',cod:'S01',nom:'DE VUELTA A MI PISCINA',nom_es:'DE VUELTA A MI PISCINA',adina:'6-7 urte',inst:'Piscina Nata 2',pto:'Tapiz',materiala:['2 tapices grandes','mesa','cono','aros pequeños','2 aros grandes','fichas de acción (min. 36)','Carpeta Nº19'],arranque:'Ponemos una mesa con un cono encima posada en el agua de modo que retenga aire debajo y se quede flotando. Repartiremos los aros que tenemos entre los/las niños/as y lanzaran intentando meterlos en el cono. Cuando acaban les decimos que salte quién pueda a recoger los que han fallado y repetimos 2-3 veces.',intencionada:'Tendremos unas fichas preparadas con diferentes conductas por parejas. En una ficha tendremos una imagen de la acción y en otra la acción escrita con otra pequeña imagen relacionada como ayuda.\nEjemplo:\n‘‘Comer\'\' \'\'gritar\'\' \'\'Nadar\'\' \'\'Jugar\'\' \'\'ducharse antes\'\'\nTodas estas fichas las pondremos al lado de la segunda escalera en un tapiz boca abajo. Dependiendo del nivel del grupo podemos separar los dibujos de las palabras y reducir o aumentar y aumentar o reducir el número de fichas. Podemos ver las fichas y emparejarlas primero en el tapiz para que las conozcan.\nLos/las niños/as tendrán que realizar un recorrido que les plantearemos y por cada vuelta podrán levantar 2 fichas. Si son pareja las apartaran y si no lo son las volverán a dejar boca abajo. Cuando tengamos todas las parejas hechas entre todos/as clasificaremos las conductas en \'\'correctas\'\' o \'\'incorrectas\'\' debatiendo las razones. Si vemos que no participan todos/as pediremos la primera valoración directamente a cada niño/a de forma alternativa.\nOpción 1\nOpción 2: Con dos aros sumergibles',reflexion:'Los niños asimilan comprendiendo los motivos por lo que son correctas o incorrectas las diferentes conductas en lugar de ser solo receptores de órdenes. Trabajamos la memoria, la compresión lectora y las asociaciones de conceptos.'},
{id:'S02-67_urte',cod:'S02',nom:'DE VUELTA A MI PISCINA',nom_es:'DE VUELTA A MI PISCINA',adina:'6-7 urte',inst:'piscina recreativa y NATA 2',pto:'Sentados/as en la grada',materiala:['Tapiz','churros','vasos','tablas grandes'],arranque:'Nos sentaremos en el bordillo y el profesor desde el agua les animará a que se metan en el agua para ver cuánto les cubre a cada uno.\n¿Quién se atreve a sentarse en el suelo? Intentaremos hacer unos saltos dentro del agua, tocar el suelo con las manos.\nPrimero de manera individual y dependiendo del nivel del grupo lo haremos de nuevo por parejas, luego tríos y luego todos juntos.',intencionada:'(Nata 2)\nLes explicaremos que recogeremos siempre el material de uno en uno, no se pueden transportar más de uno a la vez.\nJuego “Una torre”\nVamos a hacer una torre lo más alta posible. Para ello entre todos echaremos los vasos al agua.\nSaltar/entrar/entrar al agua, diciendo nuestro nombre y recogeremos un vaso. Habrá que recoger así, todos los vasos de colores hasta que no quede ninguno flotando.\nEntre todos haremos una torre con los vasos.\nJuego “ Más alto”\nHaremos lo mismo con las tablas. Las echaremos al agua siempre diciendo su nombre, y las recogeremos de una en una. Las tablas nos servirán de apoyo para volver al bordillo. Haremos otra torre una vez recogido todo el material\nVolvemos al punto de encuentro. ¿Cómo haremos una torre aún más alta? Haremos una torre utilizando los dos materiales encima del tapiz. Lo meteremos dentro del agua y lo llevaremos de un lado a otro procurando que la torre no se destruya\nRecogeremos el material',reflexion:'¿Hemos construido? ¿Nos hemos conocido?\nTrabajo individual y de grupo\nNOTA: APROVECHANDO QUE SON LOS PRIMEROS DIAS DE CURSO, HAY QUE ENSEÑAR A LOS NIÑOS A DEJAR TODO EL MATERIAL ORDENADO'},
{id:'S03-67_urte',cod:'S03',nom:'NOS INVENTAMOS UN CUENTO',nom_es:'NOS INVENTAMOS UN CUENTO',adina:'6-7 urte',inst:'Nata2',pto:'Sentados/as en la grada',materiala:['fichas variadas de todo un poco','tapiz grande'],arranque:'Preguntamos cuales son los cuentos que se saben. Los irán diciendo y cuando veamos que alguno sabe un cuento que otros desconocen pedimos que lo cuente. Como nos ha gustado nos desplazamos hasta la mitad y volver, por el agua.',intencionada:'En esta parte de la clase tendremos el tapiz al lado de la escalera de la mitad con fichas puestas encima.\nCada niño tendrá una tabla para colocar las fichas. Irán realizando desplazamientos y en cada vuelta cogerá una ficha con la que deberá ir inventándose un cuento. Cada uno deberá inventar un cuento con 5-6 fichas. Cuando lo tengan detenemos la clase y cada uno cuenta su cuento. Se pueden hacer cuentos más largos y complejos si vemos que la dinámica del grupo lo permite. En caso de que contar los cuentos entre todos ralentice demasiado la sesión, haremos grupos de 3-4 para que se cuenten los cuentos entre ellos.\nRepetimos esta dinámica hasta que terminemos la clase.',reflexion:''},
{id:'S04-67_urte',cod:'S04',nom:'Saioa S04',nom_es:'Saioa S04',adina:'6-7 urte',inst:'Nata 2',pto:'Nata 2ko harmailetan',materiala:['Urpeko algak','aroak','3 urpeko aro handiak','12 taula','12 makil urdinak','12 pull'],arranque:'Hasierako 8`-10 minutuetan luzerak egiten ibiliko dira gorputza berotzeko begiraleak esaten dien estilo edo eran, itsasoan igeri egiten daudela esanez. Hasieran itsasoak garbi zeuden eta gizakiaren ohitura txarrei esker plastiko eta zikinkeriaz beteta daude.\nIntentziozko jarduera:\nDaukagun plastiko (material) guztia uretara bota eta luzera batzuk egingo dituzte ur gainean eta azpian dagoen materiala ukitu gabe. Konturatu dira nola daukagun itsasoa? jakinarazi behar diegu gure egietako ozeanoa ere horrela dagoela eta zerbait egin behar dugula denon artean hori konpontzeko.\nAriketa honetan itsasoan daukagun plastiko(material) guztia aterako dute, itsasoa garbi geratzeko.',intencionada:'',reflexion:'HOBETU BEHARREKOA'},
{id:'S05-67_urte',cod:'S05',nom:'Las estaciones del año: verano - otoño',nom_es:'Las estaciones del año: verano - otoño',adina:'6-7 urte',inst:'Nata 2',pto:'Sentados/as en la grada',materiala:['fotos ropa (verano','otoño)','12 tablas pequeñas (maleta de mano)','12 tablas grandes (maleta)','1 tapiz','aro grande'],arranque:'Características del otoño:\nEn esta época del año los árboles pierden sus hojas y su verdor, la energía que antes se concentraba en las hojas se recoge hacia las raíces para mantenerse durante los meses fríos. Las hojas de los árboles cambian y su color verde se vuelve amarillento hasta que se secan y caen.\nHacen unos desplazamientos hasta la mitad y vuelta de calentamiento.\nDe mientras repartimos las fichas de las ropas entre las tablas grandes de los alumnos que tendrán encima del muro fuera del agua.',intencionada:'Hemos terminado las vacaciones de verano y tenemos que recoger la ropa de verano y sacar la de otoño. Tenemos la maleta grande (tabla grande) con la ropa de verano y la tenemos que guardar en el armario. Nos desplazamos a nuestro armario ropero (tapiz en frente a la 2ª escalera en el suelo) y llevaremos de una en una todas las cosas que no necesitemos para el otoño y la trasladaremos con nuestra maleta de mano (tabla pequeña). Ir y venir por el agua\nLo mismo haremos para preparar nuestra ropa para el otoño.\nTambién podemos introducir un aro grande lastrado como si fuese el acceso al armario, para quién pueda pasar por él.\nUtilizaremos los desplazamientos para trabajar la técnica de nado.\nDespués entre todos decidiremos como queremos hacer los viajes, tren, autobús, avión, etc.',reflexion:'El 22 de septiembre entramos en otoño y les comentamos las características de la estación.'},
{id:'S06-67_urte',cod:'S06',nom:'ALIMENTOS SALUDABLES. LA PIRAMIDE ALIMENTICIA',nom_es:'ALIMENTOS SALUDABLES. LA PIRAMIDE ALIMENTICIA',adina:'6-7 urte',inst:'Nata 2',pto:'Junto al tapiz',materiala:['Fotos plastificadas de comida','foto de la pirámide alimenticia','foto del semáforo','las 3 flechas de “askotan','batzutan','gutxitan”','tapiz de agujeros rojo','amarillo','verde'],arranque:'Saltos desde el bordillo lateral.\nSi el monitor dice un alimento saludable deberán saltar desde el bordillo e irán nadando hasta la corchera. Si el alimento no es saludable no se salta.',intencionada:'Haremos una asociación de colores con los colores del semáforo, los alimentos y los tapices. Ponemos en el tapiz rojo el cartel de “gutxitan”, en el tapiz amarillo “batzutan” y en el tapiz verde “askotan”.\nCada niño/a tendrá que coger una foto de un alimento y llevarla a su destino de la manera que indique el monitor. Aprovecharemos para meter técnica de nado.\nLes diremos a los niños que clasifiquen la comida dependiendo si lo comen "GUTXITAN", "BATZUTAN" o "ASKOTAN" a la semana.\nCuando acabemos podremos valorar con ellos el resultado. Ejemplo; ¿comen bollería muchas veces a la semana? y fruta?',reflexion:'Hablamos de los alimentos que a ellos les gusta y de los que creen que son saludables.\nPD: los alimentos clasificados en los tapices una vez finalizada la actividad los transportaremos por el agua hasta su lugar de origen.'},
{id:'S07-67_urte',cod:'S07',nom:'KOLOREEKIN JOLASEAN',nom_es:'KOLOREEKIN JOLASEAN',adina:'6-7 urte',inst:'Nata 2',pto:'Eskailera bien artean, erdialdean.',materiala:['Koloretako karratuak (gorria','berdea','urdina','horia','beltza eta laranja).   12 taula','12 palito urdin','6 kubo','6 txurro luze','ditugun ume kopuruaren arabera egokituz. Harrizko eserlekuan kokatu dena'],arranque:'- “Aurkitu koloreak”: Salto ezberdinak egingo ditugu. Monitoreak kolore bat aipatzean kolore hori nonbaiten ukitu eta gero egin beharko dute salto.',intencionada:'- “Zein kolore ote da?: Elkargunean umeari edo bikote bati (denek parte hartzeko aukera izan dezaten) kolore bat esango diogu belarrira. Beraiek kolorea esan gabe azaldu beharko die lagunei zein kolore den. Asmatzean, kolore hori dagoen tokira joan eta bertan dagoen materiala denen artean banatu beharko dute. Lehengo joan etorria beraiek nahi duten bezala egingo dute, bigarrenean aldiz, begiraleak proposatuko die desplazatzeko modua, teknika sartzeko aprobetxatuz.\nKolore batekin bukatzean berriz ere elkartuko gara elkargunean beste kolore bat asmatu eta jolasean jarrai dezagun.\nHauek dira koloreak eta bakoitzari dagokion materiala:\nGORRIA: 12 Taula. BANAKAKO LANA\nBERDEA: 12 Palito. BANAKAKO LANA\nURDINA: 6 Kubo. BINAKAKO LANA\nHORIA: 6 txurro luze. BINAKAKO LANA\nBELTZA: 4 Uztai handi. HIRUNAKAKO LANA\nNARANJA: Taula handia. DENEN ARTEKO LANA\nOHARRA: Material mota eta kantitateak begiraleak moldatu ahal ditu bere taldearen arabera. Beti ere ELKARREN ARTEKO LANA bultzatuz.',reflexion:'Erraz asmatu ahal ditugu koloreak? Lagun ezberdinekin ados jartzeko eta dibertitzeko gai izan al gara?\nHOBETU BEHARREKOA'},
{id:'S08-67_urte',cod:'S08',nom:'CONSTRUIMOS UN RELOJ',nom_es:'CONSTRUIMOS UN RELOJ',adina:'6-7 urte',inst:'Nata2',pto:'Sentados/as en la grada',materiala:['Churros','material para construir un reloj','reloj de goma-eva','relojes plastificados con encuadernadores (con','sin números)'],arranque:'Saltos desde el bordillo, cada uno/a, inventará un salto y los/las demás tendrán que imitarlo.',intencionada:'Tenemos un reloj como modelo al lado para que los niños lo miren si lo necesitan. Entre todos/as tendrán que construir un reloj, para ello, tendremos un circulo vacio que lo pondremos en la grada y los/las niños/as en cada vuelta saldrán por las escaleras, vuelven andando y cogerán un número y lo colocarán en el sitio correcto dentro del circulo, para terminar, colocarán las agujas. ¡¡¡No meter los números al agua!!!\nUna vez terminado de montar los relojes de goma-eva, sacamos las esferas plastificadas con/sin números, repartimos por parejas dependiendo del conocimiento que tengan de los relojes.\nUna vez explicado cómo funciona un reloj, les diremos que cada pareja tiene que colocar: la hora a la que se levanta por las mañanas, después se desplazarán hasta la mitad y vuelta por el agua en parejas; la hora a la que entran al colegio; a qué hora comen; a qué hora vienen a la piscina; a qué hora cenan;...',reflexion:'Conocimiento de un reloj analógico e inicio a su funcionamiento.'},
{id:'S09-67_urte',cod:'S09',nom:'LOS PAISAJES Y ENTORNOS DEL MUNDO',nom_es:'LOS PAISAJES Y ENTORNOS DEL MUNDO',adina:'6-7 urte',inst:'NATA2',pto:'Sentados/as en la grada',materiala:['12 churros amarillos finos','12 tablas grandes'],arranque:'El profesor les dirá un transporte y ellos tendrán que saltar ir hasta la corchera y volver intentando imitar la velocidad a la que suele ir ese transporte. 9 transportes mínimo (9 vueltas).',intencionada:'Para ir a Londres tenemos que coger un avión. Nadaremos con los brazos bien extendidos hasta llegar a Londres.\nDespués cogeremos en tren desde el aeropuerto hasta el centro de Londres. Iremos todos alineados imitando los vagones de un tren.\nPara visitar Londres el primer día alquilamos unas bicis y visitaremos el Big Ben y el palacio de Buckingham.\nSeguiremos nadando imitando la forma del transporte que les diga el profe. Ejem: Metro- buceo, patinete- nadando de pie encima de la tabla, moto- sentados en la tabla ,avión- tabla en la tripa, bici-txurro entre las piernas, Taxi, tren, tranvía y autobús lo harán nadando crol espalda y braza después de darles una pequeña explicación. Al final harán largos imitando los transportes que más les gusten.',reflexion:''},
{id:'S10-67_urte',cod:'S10',nom:'El niño y el canal',nom_es:'El niño y el canal',adina:'6-7 urte',inst:'NATA2',pto:'Sentadas/os la grada fuera del agua',materiala:['puente','churros','12 tablas','12 pull buoys','fichas sumergibles'],arranque:'Echar todos los churros y tablas al agua.',intencionada:'Esto eran una vez unos niños, que tenían que pasar por un rio para ir a la escuela. A veces había poco agua y pasaban fácilmente, pero un día llovió mucho y el rio llevaba mucha agua. El agua tenía tanta fuerza que arrastró y destruyó todo lo que encontraba en su camino. Cuando el temporal amainó los niños vieron como el rio había quedado lleno de objetos (troncos, rocas...) y decidieron limpiar ellos mismos su rio.\nCada alumna/o debe ir hacia el puente pegado a la pared salir antes de llegar al puente que está atado a la 2ª escalera y pasar por el puente, saltar y coger una tabla y volver hasta el inicio.\nCuando han recogido todas las tablas, recogen los pulls, de uno en uno, y hacer el mismo recorrido.\nHaremos lo mismo para recoger los objetos que han quedado debajo del agua (fichas de colores).\nDespués de recoger todo el material, los/as alumnos/as deben de venir desde el puente y esta vez nadar sin material.\nIntentar que naden en diferentes estilos y por debajo del agua también.',reflexion:'Uso de diferente material y trabajo en equipo para recoger todo.'},
{id:'S11-67_urte',cod:'S11',nom:'Las hormigas',nom_es:'Las hormigas',adina:'6-7 urte',inst:'Nata 2',pto:'Sentadas/os en el muro fuera del agua',materiala:['Tapiz','12 churros de diferentes medidas','12 pull buoys','12 tablas grandes','3 aros lastrados grandes diferentes'],arranque:'Hoy seremos hormigas que se desplazan en fila una detrás de otra, nos dividimos en dos grupos y la hormiga reina/zángano que será la primera determinara la forma en la que nos vamos a desplazar por la piscina (iremos cambiando la reina/zángano).',intencionada:'A continuación echamos todo el material al agua y lo deben de recoger de uno en uno y ponemos el material encima del tapiz que estará enfrente a la 2ª escalera.\nEl tapiz es lo último que se transporta donde viajara todo el material recogido y entre todas/os sin que nadie se suba encima, deberán desplazarlo desde la segunda escalera.\nConstruirán su propia cueva encima del muro fuera del agua y ordenarán todo el material por tipo.',reflexion:'Hasta lo más pequeño es importante si se hace bien. Trabajo en equipo.'},
{id:'S12-67_urte',cod:'S12',nom:'La vista y la memoria',nom_es:'La vista y la memoria',adina:'6-7 urte',inst:'NATA 2',pto:'',materiala:['Fichas de Jon (cajas misteriosas): Fichas','plantilla para las series','1 dado','12 tablas grandes','12x 12 cosas diferentes para cada alumno/a (un vaso','una figura flotante cuadrada','una pieza rectangular','una triangular','un aro','un cubo','un rastrillo','una pala','un palo azul','una tabla','un pull buoy','una ficha sumergible)','1 mesa','1 puente (atado a la 2ª escalera)'],arranque:'Tiraremos las tablas al agua. Cada uno cogerá la suya y la sacara moviendo los pies tan fuerte como pueda. Esto será la pizarra.\nTiraremos las cosas diferentes al agua. Cada uno deberá coger una cosa de cada y deberá tener 12 en total cada uno/a.',intencionada:'Tenemos una plantilla con palabras/conceptos y deberán coger un dibujo de cada categoría.\nLa plantilla estará en un lado de la piscina y en el otro tendremos las fichas encima de un tapiz.\nLas/los niñas/os podrán ver la plantilla y deberán desplazarse hasta la mitad para coger una ficha y ponerla en su pizarra. Tendremos un dado para que lo tiren y vayan variando la forma de nadar.\nSi alguno termina antes que el resto, puede coger un segundo objeto de cada categoría.',reflexion:''},
{id:'S13-67_urte',cod:'S13',nom:'Saioa S13',nom_es:'Saioa S13',adina:'6-7 urte',inst:'Nata 2',pto:'Sentados/as en las gradas',materiala:['Imágenes','cartas parejas','tablas grandes','algas','churros','aros','Piezas de profundidad'],arranque:'Les ponemos boca abajo las cartas de parejas y que cada uno coja una. Una vez hecho esto, cada se pondrá con otro niño que quiera sin enseñar su carta. Cada uno deberá salta y nadar como lo hace el animal de su carta y el compañero adivinarlo. (Les damos unos 5/6 min)',intencionada:'Ahora nos ponemos en parejas según las cartas, y comenzaremos nuestro viaje.\nEl monitor les enseñara las imágenes del mundo y les explicara que hay machos paisajes diferentes y que hoy intentaremos visitarlos todos.\nHaremos dos viajes, el primero lo haremos solos y el segundo con nuestra pareja. Cuando vamos solos no podemos coger nada, solo podremos coger cuando vayamos con nuestra pareja.\nLes enseñamos la primera imagen:\nBosque: viajaremos por un bosque (algas) metiendo la cabeza y mirando a ver si encontramos a alguno de sus habitantes o de sus frutos (Piezas de profundidad)\nDesierto: Viajaremos por el desierto montados a caballo, podemos hacer variaciones, hacia atrás, dados de la mano, con las manos en la cabeza…\nMonte: veremos el monte más alto del mundo desde un avión (churro en las manos brazos estirados y cabeza adentro, para ver si lo vemos) a la hora de hacerlo en pareja un solo churro.\nMar: con el churro largo y anudado, iremos con la moto de agua y tendremos que buscar peces (Aros, cada pareja un color)\nRio: con la tabla grande iremos bajando por el rio intentando sentarnos encima y brazos de braza',reflexion:'Han participado todos, Han seguido las indicaciones, ¿Hemos conseguido meter la cabeza?\nNivel independencia general del grupo.'},
{id:'S14-67_urte',cod:'S14',nom:'Los cubos misteriosos',nom_es:'Los cubos misteriosos',adina:'6-7 urte',inst:'nata2',pto:'grada',materiala:['Churros','fichas','cuerda','cubos misteriosos'],arranque:'Pediremos a los niños que diseñen un recorrido por la piscina puede ir por fuera entrar, volver a salir… con la condición que termine en el agua. Podrán usar el material que quieran para crear obstáculos. Lo marcaran con una cuerda y les daremos 2-3 minutos para realizarlo. Cuando terminan les explicamos que deben realizar el recorrido por parejas (algún trió) llevando uno de ellos unas gafas opacas que tendremos preparadas. El otro será el guía y tendrá que llevar a su compañero sin que sufra ningún percance. Luego cambiaremos de ``rol´´. En el caso de tener algún trió les pedimos que empiecen los primeros.',intencionada:'Pondremos en un extremo de nuestra zona un tapiz con un montón de fichas con la imagen de diferentes objetos. En el otro extremo pondremos cubos que tendrán en le tapa un orificio pequeño. Tendrá una tela (pata de una malla o media) que servirá para meter la mano sin posibilidad que se vea lo del interior. Dentro meteremos 4-5 objetos. Pedimos a los niños que se pongan en parejas o tríos (no vale repetir). Cada grupo tendrá asignado un cubo y deberá realizar un trayecto por el agua desde el tapiz al cubo introducir la mano y mediante el tacto adivinar que objetos hay, después volver al tapiz y buscar ese objeto llevando la ficha a su cubo. En cada trayecto del grupo completo podrán transportar una ficha y deberán seguir hasta que crean tener todos los objetos.\nPara terminar abriremos los cubos y comprobaremos si han adivinado que objetos tenían.',reflexion:'¿Cómo nos hemos sentido al no ver y tener que fiarnos de otra persona?\n¿Hemos adivinado de qué objetos se trataba? ¿Nos asusta meter la mano en un lugar que no vemos?'},
{id:'S15-67_urte',cod:'S15',nom:'UNA EXPLOSIÓN DE COLORES',nom_es:'UNA EXPLOSIÓN DE COLORES',adina:'6-7 urte',inst:'Piscina Nata II',pto:'En la parte ancha de la piscina (fuera)',materiala:['1 Tapiz','Las fichas de colores (por lo menos 6 colores por cada crio)','Tablas','1 Mesa'],arranque:'El semáforo: Vamos a jugar con tres colores diferentes, rojo, naranja y verde. Les diremos a los niños que se metan todos al agua pero que tendrán que estar atentos al color que enseñe el monitor. El color verde significa que tienen que estar en continuo movimiento en nuestra zona y a poder ser sin tocar la pared. El naranja, que tendrán que realizar giros (en el sentido que quieran). Y el rojo, que tendrán que mantenerse quietos donde estén.',intencionada:'- “¿Somos capaces de formar un arco iris?: Nos juntaremos en el punto de encuentro para explicarles que vamos a intentar formar un arco iris entre todos con las fichas sumergidas de colores que encontremos en la piscina.\nTras decidir entre todos el color con que vayamos a empezar a formar el primer arco, les diremos que tendrán que nadar desde aquí hasta la zona de las fichas, recoger cada uno una del fondo y volver al punto de encuentro. Acabaremos con el primer color cuando el último coloque su ficha en el tapiz formando el arco. ATENCIÓN: Será responsabilidad de todos ayudar a quien le cueste coger su ficha. Y mientras lleguen todos pueden esperar en el agua.\nHaremos lo mismo con el resto de los colores; elegir entre todos, recoger y formar el arco. Tener en cuenta que APROVECHAREMOS LOS DESPLAZAMIENTOS PARA TRABAJAR LA TÉCNICA. Podemos utilizar unas tablas por ejemplo.\n- “Mezclamos colores”: Por parejas.\nLes preguntaremos como harían para conseguir EL VERDE entre los dos cada uno cogiendo un color diferente. Elegirán la manera de saltar y desplazarse por la piscina pero teniendo en cuenta que sus colores tienen que permanecer en contacto para seguir siendo VERDE.\nHaremos lo mismo con el MORADO y el NARANJA.\nNOTA: colocaremos la mesa con algunas fichas cerca de la escalera del centro junto al bordillo, para así facilitarles la recogida de las fichas a los que les cueste llegar al fondo.',reflexion:'¿Cómo haríamos para conseguir el color negro? ¿Habéis experimentado alguna vez en clase? ¿Sabemos cuándo se forma un arco iris?'},
{id:'S16-67_urte',cod:'S16',nom:'Mis cuentos en la piscina',nom_es:'Mis cuentos en la piscina',adina:'6-7 urte',inst:'Nata 2',pto:'Fuera del agua sentados/as en el muro',materiala:['Tablas','tapiz','aros pequeños','aro verde','algas naranjas'],arranque:'“Los tres cerditos”\nErase una vez Los tres cerditos y el lobo. Los cerditos tenían que construir una casa de paja, y una vez hecha llevarla al medio del lago, para que el lobo, que no sabe nadar, no se acercase.\nPara eso los cerditos tenían que ir al monte y pasar entre matorrales (Aros verdes y algas).\nEchar aros pequeños y, explicarles que serán las ventanas de la casa. Los deben coger de uno en uno.',intencionada:'En este cuento los/las niños/as son los cerditos, la paja son las tablas y el lobo es el monitor.\nSe reparten las tablas y aros pequeños por el agua, los cerditos pasaran por el aro verde, cogerán una tabla e irán hasta la pasarela. Allí darán la vuelta y volverán a la pared de la forma siguiente (TECNICA):\nMoviendo los pies\nBoca arriba solo moviendo los pies\nSURF: Boca abajo. Tabla en la tripa moviendo los brazos\nSURF: Boca abajo. Tabla en la tripa moviendo sólo piernas\nMoviendo brazos y pies CROL\nMoviendo brazos y pies ESPALDA\nUna vez recogidas todas las tablas y llevadas a la orilla construyen la casa encima del tapiz, los trasladan sin que se rompa con colaboración de todos hasta la otra punta de la piscina y vuelta.\nSacan el tapiz afuera, comentan el desarrollo del cuento y recogen todo el material.',reflexion:'Implicación y colaboración de todos/as'},
{id:'S17-67_urte',cod:'S17',nom:'Saioa S17',nom_es:'Saioa S17',adina:'6-7 urte',inst:'Nata 2',pto:'',materiala:[],arranque:'Taldekako saltoak egin ditzakegu.',intencionada:'Gaur igeri egitean gure sentzumenek duten eragina bizituko dugu. Igeri egiteko zenbat modu ezberdin dauden konturatuko gara. EZAGUTZEN DITUZUE PARAOLINPIAR JOKOAK?\nGoazen frogatzera nola egin dezakegun igeri adib:\nBeso bakarrarekin. Besorik gabe…\nHanka bakarrarekin. Hankarik gabe…\nHanka eta beso bakarrarekin.\nIkusi gabe. Begi batekin…\nHitzegin gabe. Entzun gabe…\n…\nKontutan izan luzerak egitean estilo ezberdinetan egin dezakegula lana.\nBukatzeko gure gorputz guztia erabiliz egingo ditugu zenbait luze. Igartzen ahal dugu ezberdintasunik?',reflexion:'HOBETZEKO GAUZAK'},
{id:'S18-67_urte',cod:'S18',nom:'112 – SOS Deiak',nom_es:'112 – SOS Deiak',adina:'6-7 urte',inst:'Nata2',pto:'Sentados/as en la grada',materiala:['12 tablas grandes','12 pulls','12 palos azules','6 alfombras'],arranque:'El número de teléfono 112 está establecido como un número único de asistencia a la ciudadanía ante cualquier tipo de emergencia en Europa. Lo conocen todas/os?\nNadaran 1 largo con el palo azul, 1 largo con el pull y 2 largos con la tabla. Después cada niño/a se quedará con 1 palo, 1 pull y una tabla. Ese será su material de emergencia.',intencionada:'Pondremos a las/los niñas/os en parejas y tendrán que elegir una profesión relacionada con las emergencias (médico, policía, bombero, socorrista…). Cada pareja tendrá una alfombra para utilizar como camilla, un palo azul que será el teléfono, un pull como botiquín y una tabla para ayudarse en el rescate que realice cada uno.\nElijan la profesión que quieran, el rescate deben hacerlo por el agua, ir en busca de la victima cuando llamen al 112 y les digan lo que les pasa y donde están (esperarán al lado de la 2ª escalera). Van a buscarle nadando, le ayudan a volver al inicio nadando y lo colocan encima de la camilla. Le hacen una valoración de lo que le ocurre y utilizan el botiquín si lo necesitan.\nCambian de rol en la pareja.',reflexion:'¿Conocen el 112? ¿Han llamado alguna vez? ¿Han tenido alguna emergencia?'},
{id:'S19-67_urte',cod:'S19',nom:'Una explosión de colores',nom_es:'Una explosión de colores',adina:'6-7 urte',inst:'Nata 2',pto:'Fuera del agua sentados/as en la grada',materiala:['4 tarjetas de colores (amarillo','rojo','azul','verde)','churros','tablas grandes','12 fichas de colores sumergibles (del color de las tarjetas)'],arranque:'Juego “COLOR COLOR”\nTarjeta amarilla: sacamos los pies del agua\nTarjeta roja: sacamos las manos del agua\nTarjeta azul: txiribuelta\nTarjeta verde: plancha boca arriba\nVoy añadiendo las consignas de a una, para que sea fácil de memorizar, tenemos que andar por todo el espacio y cuando levanto la tarjeta amarilla tengo que sacar los pies fuera del agua. Lo repito 2 o 3 veces, hago lo mismo con las demás tarjetas.',intencionada:'Separamos a los niños en 3 filas, color azul contra la corchera, color rojo al lado de este y color verde contra el bordillo.\nColor verde: patada con tabla.\nColor rojo: con el churro en las manos técnica de brazada de crol.\nColor azul: técnica de crol completa.\nRepiten un par de veces y cambiamos de color para que todos hagan los diferentes ejercicios.\nLuego hacemos lo mismo pero con la técnica de espalda, el color verde patada espalda con tabla, el color rojo con el churro en las piernas o en la cintura brazada espalda y el color azul la técnica completa. (** Depende del nivel...)\nBuceo: tiraremos las fichas de buceo de colores. Les enseñaremos una tarjeta de color. Tendrán que ir nadando hasta las fichas y recoger una ficha de ese color. Tener en cuenta que tendrán que ayudarle a quien no llegue para que cada niño pueda tener su ficha.',reflexion:'Vamos introduciendo técnica y desarrollan el compañerismo en el ejercicio de buceo. Trabajan la memoria'},
{id:'S20-67_urte',cod:'S20',nom:'EL MUNDO DE LOS ANIMALES Y SUS HÁBITATS',nom_es:'EL MUNDO DE LOS ANIMALES Y SUS HÁBITATS',adina:'6-7 urte',inst:'Nata 2. En la irregular parte poco profunda (reflexión)',pto:'Fuera del agua alrededor del círculo azul y amarillo',materiala:['Circulo azul','amarillo (churro grande + conector)','piezas flotantes (redondas','triangulares','cuadradas…) amarillas','azules','12 aros lastrados (“pececillos”)','4 algas. 6 Aletas de azules','6 aletas amarillas'],arranque:'Los delfines son felices saltando. ¿Cómo saltan? Vamos a realizar desplazamiento “a lo delfín” y siguen desplazándose hasta la 2ª escalera y vuelven por el agua.',intencionada:'- “Nos convertimos en delfines”: Vamos a ser una familia de delfines que ha llegado a nuestra costa. Pero antes de convertirnos deberemos realizar “cosas que hacen los delfines” (enseñar una aleta, una pirueta…).\n-“Observando el fondo del mar”: Tiraremos las algas por la piscina. Nos moveremos despacito por la piscina observando el fondo marino e imitando a los delfines.\nDelfín solitario: de uno en uno.\nPor parejas, una cría y la madre. La cría no se separará de la madre.\nEn grupos. Lo haremos en dos grupos. (Aleta amarilla o azul)\n- “Vamos a jugar”: Colocamos el aro azul y el aro amarillo separados fuera del agua y seguimos jugando en dos grupos: amarillos y azules. Para este juego echaremos al agua las diferentes piezas (redondas, triangulares, cuadradas…) de color azul y amarillo. Los delfines se colocarán en el bordillo y a la señal del monitor los delfines deberán traer una pieza de su color y meterla en el círculo correspondiente.\n- “Vamos a comer”: Tiraremos los aros pequeños en la zona de la segunda escalera. Los delfines tendrán que ir a buscar su comida de diferentes maneras.',reflexion:'En piscina recreativa:\n¿Sabemos cómo se comunican los delfines? ¿Podemos hablar y escuchar dentro del agua? Vamos a probar. Nos iremos a la parte poco profunda de la piscina irregular. Allí les explicaremos que si meten los oídos dentro del agua podrán oír perfectamente la palabra o el mensaje que les queremos mandar desde dentro del agua. ¿Quién quiere probar? (Lo pueden hacer por parejas o en grupos pequeños)¿Sabe alguien como son los sonidos que hacen los delfines?'},
{id:'S21-67_urte',cod:'S21',nom:'reproducir la foto',nom_es:'reproducir la foto',adina:'6-7 urte',inst:'Piscina Nata II',pto:'En el escalón de la cristalera',materiala:['pasarela en medio de nata dos','5 vasos azules','6 vasos amarillos','6 vasos rosas','6 vasos verdes','2 vasos naranjas','3 vasos morados','fichas sumergibles: 2 amarillas','3 azules','2 naranjas','1 morada','3 verdes','1 roja','8 tablas pequeñas','2 pulls azules','1 verde','1 amarillo'],arranque:'EL ROJO\nNos colocamos en el bordillo y cada vez que el monitor nombra algo de color rojo salto al agua “de bomba” y si tiene otro color,“de cabeza”.\nEj.:Tomate-bomba, plátano-de cabeza, fresa, txanogorritxo, lechuga, odola, manzana, limón, etc.',intencionada:'Es importante que esté el material exacto preparado porque si no, no saldrá bien la actividad. La actividad consiste en copiar exactamente la foto con la posición y los colores en el mismo sitio.\nPrimero colocamos los vasos encima de la pasarela, y les explicamos que tendrán que reproducir con el material, que hay encima de la pasarela, lo que muestra la foto, respetando los colores y la forma de la construcción.\nDesde el bordillo, saltamos y vamos nadando de la forma que diga el monitor, cogemos el material de a uno por niño y lo llevamos al punto de encuentro donde intentaremos copiar la imagen. (Sigue atrás)\nSolo colocaremos encima de la pasarela el material de la foto que vamos a utilizar, si hago la construcción de los vasos solo estarán los vasos.',reflexion:''},
{id:'S22-67_urte',cod:'S22',nom:'UN ESPANTAPAJAROS EN MI PISCINA',nom_es:'UN ESPANTAPAJAROS EN MI PISCINA',adina:'6-7 urte',inst:'Nata 2',pto:'Tapiz exterior',materiala:['1 tapiz','12 fantasmas','12 pull-buoys','12 cinturones aquagym','12 churros largos','dibujos estaciones (tantos como niños haya)'],arranque:'Indios y vaqueros. Dividimos a los/las alumnos/as en dos grupos, y unos son vaqueros y otros/as indios. Salen unos/as detrás de otros/as a perseguirles. Tienen que hacer un recorrido circular, hasta la mitad de la calle y vuelta. Cuando han cogido a todos/as, se cambian los roles.',intencionada:'Juego “VESTIMOS AL FANTASMA”\nEstamos en otoño, pero ¿Sabemos cuáles son las estaciones del año?\nSon 4: explicaremos brevemente las estaciones con ayuda de unos dibujos\nColocaremos en cada lado del tapiz un dibujo de cada una de las estaciones del año.\nTiraremos todo el material al agua: fantasmas, pull-buoys, churros grandes, cinturones aquagym.\nTendrán que recogerlos del agua de uno en uno y ordenarlos en el tapiz por grupos.\nUna vez esté todo colocado cada alumno/a vestirá a su fantasma. Cada alumno/a como quiera (LIBRE)\nPara poder vestir al fantasma, tendrán que utilizar en el agua primero el material. Tendrán que dar una vuelta completa a la piscina y colocarlo en el fantasma y para ello todos tendrán que empezar utilizando su fantasma.\nUna vez vestido el fantasma tendrán que llevarlo por el mismo recorrido dentro del agua, pero sin que se le caiga ningún elemento.\nDesnudaremos al fantasma y lo dejaremos todo el material en su sitio. Todo menos el fantasma\nJuego “ME LO CAMBIAS”\nEn el punto de encuentro explicamos el juego\nNos meteremos en el agua cada uno con su fantasma y a la señal del profesor tendremos que cambiarlo con un compañero.\nHaremos 5 cambios y ninguno puede ser con el mismo compañero/a de modo que entre cambio y cambio tendrán que desplazarse por la piscina y buscar a algún compañero/a distinto con el que cambiarlo la siente vez',reflexion:'Autonomía para cambios en nata 2\nEstaciones del año\nAutonomía con material\nCompañerismo'},
{id:'S23-67_urte',cod:'S23',nom:'JUEGO CON MIS SENTIDOS: olfato, gusto, vista, tacto y oído',nom_es:'JUEGO CON MIS SENTIDOS: olfato, gusto, vista, tacto y oído',adina:'6-7 urte',inst:'Nata 2',pto:'Sentados/as en el muro fuera del agua.',materiala:['12 tablas','juego de la oca + 2 dado (1 con números','otro con sentidos)','12 avatares','1 mesa (para poner el juego encima)'],arranque:'Tiramos las tablas al agua y cada uno debe coger una y desplazarse hasta la mitad de la calle y volver. Salir y explicar la actividad.',intencionada:'“OCA DE LOS SENTIDOS”\nColocaremos encima de la mesa el tablero de la oca, y repartimos un avatar a cada alumno/a.\nTendremos un dado que tirarán y dependiendo de lo que salga, tendrán que ir nadando hasta la escalera de una forma u otra.\nVista: nado CROL, TABLA+BRAZOS TACTO: nado BRAZA\nOÍDO: nado ESPALDA+ BRAZOS OLFATO: nado ESPALDA con TABLA\nGUSTO: BUCEO ESTRELLA, nado COMO QUIERO\nVolver andando por fuera, tirar los dos dados, y desplazarse de la forma que haya salido otra vez.',reflexion:'Conocen el juego de la oca, los sentidos y desarrollan los diferentes estilos de natación.'},
{id:'S24-67_urte',cod:'S24',nom:'¡Al Monte!',nom_es:'¡Al Monte!',adina:'6-7 urte',inst:'Nata 2',pto:'Sentados/as en la grada',materiala:['12 tablas','churros pequeños','12 vasos','fichas sumergibles','24 figuras flotantes','12 pull-boy','24 palos azules'],arranque:'Saltos de diferentes maneras: palillo, bomba, de cabeza, de lado, hacia atrás, en pareja, tríos…todos juntos en cadena.',intencionada:'Nos vamos al monte, para ello tenemos que hacernos la mochila. Tiraremos todo el material al agua y para poder empezar tendrán que cada niño/a de una en una, las siguientes cosas:\nTabla (mochila), vasos, figuras flotantes (comida), pull-boy (catalejos), palos azules (bastones)\nTendrán que hacer dos largos de formas diferentes con cada material. Cuando tenga cada uno su mochila hecha, podrá ayudar a su compañero/a para ir juntos hasta la cima (que será ir a jugar)',reflexion:'Trabajo en equipo y conocimiento de actividades en naturaleza.'},
{id:'S25-67_urte',cod:'S25',nom:'LA SALUD Y LOS ALIMENTOS',nom_es:'LA SALUD Y LOS ALIMENTOS',adina:'6-7 urte',inst:'NATA 2',pto:'Sentados/as en el muro fuera del agua',materiala:['1 tapiz','12 tablas medianas','12 vasos','24 palos azules','fichas de comidas'],arranque:'Echamos todo el material al agua entre todos/as.\nExplicamos como el tapiz va a ser la cocina, y hay que desplazarse hasta allí y volver por el agua; y el material restante, los platos van a ser las tablas, los palos los cubiertos y habrá vasos.\nEncima del tapiz, enfrente de la 2ª escalera en el suelo, pondremos las fichas de las comidas boca abajo.',intencionada:'Primero sacan el tapiz del agua entre todos/as. Cada alumno/a debe coger una tabla, dos palos y un vaso. Deben de sacar cada utensilio de uno en uno. Platos, cubiertos, vasos. En ese orden.\nCuando tengan la mesa preparada, cada alumno/a debe ir nadando hasta la mitad, salir y coger una ficha de comida, volver por el agua, para preparar un menú con primer plato, segundo plato y postre. Si dan vuelta a una ficha y repiten el plato, volver a nadar y volver a elegir ficha. Hasta sacar, 1° 1 primero; 2° el 2° plato; y 3a ficha, el postre.',reflexion:'Los/las alumnos/as, han preparado un menú equilibrado.'},
{id:'S26-67_urte',cod:'S26',nom:'LAS ESTACIONES DEL AÑO',nom_es:'LAS ESTACIONES DEL AÑO',adina:'6-7 urte',inst:'Nata 2',pto:'En el muro fuera del agua',materiala:['12 fantasmas','1 mesa (p.2)','otra mesa (p.3)','3 pesas cuadradas atadas a 3 algas (p.4)','cuerda (p.6)','aros (perretxikos)','perlas (perretxikos venenosas)','figuras flotantes de colores (avellanas','nueces','castañas…) entre ellas las amarillas geométricas (frutos secos podridos) (p.7)','12 cubos'],arranque:'“El juego del fantasma”: Cada uno/a cogerá su fantasma y se lanzará al agua. Vamos a movernos libremente, pero a la voz de “cambio” tendremos que dejar nuestro fantasma para subirnos a otro. Así 3 ó 4 veces.',intencionada:'“Construimos nuestra casa”: Tiraremos todos los “fantasmas” al agua. Les explicaremos a los/las niños/as que son un grupo de ardillas y que tienen que prepararse para la llegada del invierno. Para empezar necesitamos construir una casa calentita y confortable. Para ello van a recoger cada uno/a una pieza de nuestra casa (un fantasma) y ya en al punto de encuentro montaremos nuestra casita.\n“Buscamos comida por el bosque”: Sabemos que en otoño podemos encontrar mucha comida en el bosque y así, guardando parte de ella, el invierno se nos hará menos duro. Les enseñaremos esa comida fuera del agua. Les contaremos que habrá todo tipo de “perretxikos” (aros de colores y perlas) y también “nueces y castañas” (objetos flotantes) que tendremos que diferenciar.\nEchamos todo en la zona de la cuerda (tirar cosas alrededor de la cuerda también para que puedan utilizarlo como ayuda).\nLa salida será desde antes de la 2ª escalera, para no molestar a los de 5 años.\nVamos a descubrir el bosque:\nNuestros paseos por el bosque van a ser diferentes en cada vuelta:\n1ª. Vamos a ver, observar y conocer nuestro bosque. Esta primera vuelta la haremos de forma individual y sin recoger nada de comida.\n2ª. Ahora sí, a recoger! En esta vuelta recogeremos una única pieza de comida pero teniendo en cuenta un par de consignas importantes. “No podemos recoger ni “perretxikos pequeños” (aros), ni “venenosos” (perlas), ni “fruta podrida” (figuras flotantes amarillas).\n3ª. Me llevo la comida. Las ardillas guardan su comida para trasladarse. Vamos a dar una vuelta llevando lo que hayamos recogido en la vuelta anterior y volveremos a coger otra pieza de comida teniendo en cuenta las consignas anteriores. Ahora sí lo guardamos todo en el cubo situado en el punto de encuentro.\n4ª. Por parejas. Las mismas consignas pero esta vez recogerán 1 única pieza por pareja, y “quien coja la pieza no será el mismo que la guarde”\n5ª. Cambio de parejas…',reflexion:'Entre todos vamos a contar toda la comida que hemos recogido. ¿Son todas buenas? ¿Hay alguna que tendremos que devolver al bosque? ¿Recordamos qué cosas nos ofrece el bosque para comer? La siguiente vez que volvamos a nuestro bosque volverá a estar llena de perretxikos y de frutos para que podamos recogerlos y disfrutar del otoño.'},
